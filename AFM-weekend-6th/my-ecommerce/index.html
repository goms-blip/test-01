    // ========================================
    // 🎨 Design System — UI Primitives
    // ========================================
    function Button({ variant='primary', size='md', className='', disabled, children, ...rest }) {
      const base = 'inline-flex items-center justify-center gap-2 font-medium transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed select-none';
      const sizes = { sm: 'px-3 py-1.5 text-sm', md: 'px-5 py-2.5 text-sm', lg: 'px-7 py-3.5 text-base' };
      const variants = {
        primary:   'bg-ink-800 text-ivory-50 hover:bg-ink-900 rounded-none',
        secondary: 'bg-ivory-100 text-ink-800 hover:bg-ivory-200 border border-ink-800/10 rounded-none',
        outline:   'bg-transparent text-ink-800 border border-ink-800 hover:bg-ink-800 hover:text-ivory-50 rounded-none',
        ghost:     'bg-transparent text-ink-700 hover:text-ink-900',
        danger:    'bg-transparent text-ink-700 hover:text-red-700 underline-offset-4 hover:underline',
      };
      return (
        <button disabled={disabled} className={`${base} ${sizes[size]} ${variants[variant]} ${className}`} {...rest}>
          {children}
        </button>
      );
    }

    function Badge({ children, className='' }) {

    function Modal({ isOpen, onClose, children, title, size='md' }) {
      useEffect(() => {
        if (!isOpen) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose?.(); };
        document.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow=''; };
      }, [isOpen, onClose]);
      if (!isOpen) return null;
      const widths = { sm:'max-w-sm', md:'max-w-lg', lg:'max-w-3xl' };
      return (
        <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center" role="dialog" aria-modal>
          <div className="absolute inset-0 bg-ink-900/60" onClick={onClose}></div>
          <div className={`relative bg-ivory-50 w-full ${widths[size]} mx-0 md:mx-4 p-6 md:p-8 fade-up`}>
            <div className="flex items-start justify-between mb-4">
              {title && <h3 className="font-serif-kr text-xl">{title}</h3>}
              <button onClick={onClose} aria-label="닫기" className="ml-auto text-ink-700 hover:text-ink-900 text-xl leading-none">×</button>
            </div>
            {children}
          </div>
        </div>
      );

    // ========================================
    // 🔀 Hash Router
    // ========================================
    const RouterContext = createContext({ path: '/', navigate: () => {} });

    function Router({ children }) {
      const getPath = () => {
        const h = window.location.hash || '#/';
        return h.startsWith('#') ? h.slice(1) : h;
      };
      const [path, setPath] = useState(getPath());
      useEffect(() => {
        const onChange = () => { setPath(getPath()); window.scrollTo({ top:0, behavior:'instant' }); };
        window.addEventListener('hashchange', onChange);
        if (!window.location.hash) window.location.hash = '#/';
        return () => window.removeEventListener('hashchange', onChange);
      }, []);
      const navigate = useCallback((to) => { window.location.hash = '#' + to; }, []);
      return <RouterContext.Provider value={{ path, navigate }}>{children}</RouterContext.Provider>;
    }
    const useRouter = () => useContext(RouterContext);

    function matchRoute(pattern, path) {
      const pp = pattern.split('/').filter(Boolean);
      const ap = path.split('/').filter(Boolean);
      if (pp.length !== ap.length) return null;
      const params = {};
      for (let i=0; i<pp.length; i++) {
        if (pp[i].startsWith(':')) params[pp[i].slice(1)] = decodeURIComponent(ap[i]);
        else if (pp[i] !== ap[i]) return null;
      }
      return params;
    }

    function Link({ to, children, className='', ...rest }) {
      const { navigate } = useRouter();
      return (
        <a href={'#' + to} onClick={(e)=>{ e.preventDefault(); navigate(to); }}
           className={className} {...rest}>{children}</a>
      );
    }

    // ========================================
    // 🛒 Cart Context — localStorage 영속화
    // ========================================
    const CartContext = createContext(null);
    const useCart = () => useContext(CartContext);
    const CART_KEY = 'dodam_cart_v1';

    function CartProvider({ children }) {
      const [items, setItems] = useState(() => {
        try { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); }
        catch { return []; }
      });
      const [toast, setToast] = useState(null);
      useEffect(() => { localStorage.setItem(CART_KEY, JSON.stringify(items)); }, [items]);
      useEffect(() => {
        if (!toast) return;
        const t = setTimeout(() => setToast(null), 1800);
        return () => clearTimeout(t);
      }, [toast]);

      const addItem = (product, opts) => {
        const key = `${product.id}__${opts.color}__${opts.size}`;
        setItems(prev => {
          const found = prev.find(i => i.key === key);
          if (found) return prev.map(i => i.key===key ? {...i, qty: i.qty + (opts.qty||1)} : i);
          return [...prev, { key, productId: product.id, name: product.name, price: product.price,
                             image: product.image, color: opts.color, size: opts.size, qty: opts.qty||1 }];
        });
        setToast(`${product.name}이(가) 장바구니에 담겼습니다`);
      };
      const updateQty = (key, qty) => setItems(prev => prev.map(i => i.key===key ? {...i, qty: Math.max(1, qty)} : i));
      const removeItem = (key) => setItems(prev => prev.filter(i => i.key!==key));
      const clear = () => setItems([]);
      const total = items.reduce((s,i) => s + i.price*i.qty, 0);
      const count = items.reduce((s,i) => s + i.qty, 0);

      return (
        <CartContext.Provider value={{ items, addItem, updateQty, removeItem, clear, total, count }}>
          {children}
          {toast && (
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] bg-ink-900 text-ivory-50 px-5 py-3 text-sm shadow-lg fade-up">
              {toast}
            </div>
          )}
        </CartContext.Provider>
      );
    }

    // ========================================
    // 🔐 Auth Context — JWT 토큰 + 사용자 상태
    // ========================================
    const AuthContext = createContext(null);
    const useAuth = () => useContext(AuthContext);
    const TOKEN_KEY = 'dodam_token_v1';

    function AuthProvider({ children }) {
      const [token, setToken] = useState(() => localStorage.getItem(TOKEN_KEY) || null);
      const [user, setUser]   = useState(null);
      const [loading, setLoading] = useState(!!localStorage.getItem(TOKEN_KEY));

      // 토큰이 있으면 로드 시 /api/auth/me 로 사용자 복원
      useEffect(() => {
        let cancelled = false;
        if (!token) { setUser(null); setLoading(false); return; }
        setLoading(true);
        fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } })
          .then(async (r) => {
            const data = await r.json().catch(()=>({}));
            if (!r.ok) throw new Error(data?.error || 'auth_failed');
            return data;
          })
          .then((data) => { if (!cancelled) { setUser(data.user); setLoading(false); } })
          .catch(() => {
            if (cancelled) return;
            // 토큰이 무효하면 정리
            localStorage.removeItem(TOKEN_KEY);
            setToken(null); setUser(null); setLoading(false);
          });
        return () => { cancelled = true; };
      }, [token]);

      const login = async (email, password) => {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await r.json().catch(()=>({}));
        if (!r.ok) throw new Error(data?.error || '로그인에 실패했습니다.');
        localStorage.setItem(TOKEN_KEY, data.token);
        setToken(data.token);
        setUser(data.user);
        return data.user;
      };

      const signup = async (email, password, name) => {
        const r = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, name }),
        });
        const data = await r.json().catch(()=>({}));
        if (!r.ok) throw new Error(data?.error || '회원가입에 실패했습니다.');
        localStorage.setItem(TOKEN_KEY, data.token);
        setToken(data.token);
        setUser(data.user);
        return data.user;
      };

      const logout = () => {
        localStorage.removeItem(TOKEN_KEY);
        setToken(null);
        setUser(null);
      };

      return (
        <AuthContext.Provider value={{ user, token, loading, login, signup, logout }}>
          {children}
        </AuthContext.Provider>
      );
    }

    // ========================================
    // 🧩 Layout — Header / Footer
    // ========================================
    function UserMenu() {
      const { user, logout } = useAuth();
      const { navigate } = useRouter();
      const [open, setOpen] = useState(false);
      const ref = useRef(null);
      useEffect(() => {
        const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', onDoc);
        return () => document.removeEventListener('mousedown', onDoc);
      }, []);
      if (!user) return null;
      const initial = (user.name || user.email || '?').trim().charAt(0).toUpperCase();
      return (
        <div className="relative" ref={ref}>
          <button
            onClick={() => setOpen(o => !o)}
            className="flex items-center gap-2 pl-1 pr-2 py-1 hover:bg-ivory-100 transition"
            aria-label="내 계정"
          >
            <span className="w-7 h-7 rounded-full bg-celadon-600 text-ivory-50 text-xs flex items-center justify-center font-medium">
              {initial}
            </span>
            <span className="hidden md:inline text-sm text-ink-800 max-w-[120px] truncate">
              {user.name || user.email}
            </span>
          </button>
          {open && (

    // ========================================
    // 📄 Page — Shop (목록 + 필터/정렬)
    // ========================================
    function ShopPage() {
      const { path, navigate } = useRouter();
      const initialCat = useMemo(() => {
        const m = path.match(/\?cat=([\w-]+)/);
        return m ? m[1] : 'all';
      }, [path]);
      const [cat, setCat] = useState(initialCat);
      const [sort, setSort] = useState('recommend');
      useEffect(() => { setCat(initialCat); }, [initialCat]);

      const filtered = useMemo(() => {
        let list = cat === 'all' ? [...PRODUCTS] : PRODUCTS.filter(p => p.category === cat);
        switch (sort) {
          case 'price-asc':  list.sort((a,b) => a.price - b.price); break;
          case 'price-desc': list.sort((a,b) => b.price - a.price); break;
          case 'name':       list.sort((a,b) => a.name.localeCompare(b.name)); break;
          default: /* recommend: best 우선 */ list.sort((a,b) => (b.best?1:0) - (a.best?1:0));
        }
        return list;
      }, [cat, sort]);

      return (
        <div className="fade-up max-w-7xl mx-auto px-5 md:px-8 py-12 md:py-16">
          <div className="border-b hairline pb-8 mb-10 flex flex-col md:flex-row md:items-end md:justify-between gap-4">
            <div>
              <div className="text-[11px] tracking-[0.35em] text-celadon-600 uppercase mb-2">SHOP ALL</div>
              <h1 className="font-serif-kr text-3xl md:text-5xl text-ink-900">
                {CATEGORIES.find(c=>c.id===cat)?.name || '전체'} <span className="text-clay-300 num text-2xl ml-2">{filtered.length}</span>
              </h1>
            </div>
            <div className="flex flex-wrap items-center gap-3">
              <select value={sort} onChange={e=>setSort(e.target.value)}
                      className="bg-transparent border hairline text-sm py-2 px-3 outline-none focus:border-ink-800">
                <option value="recommend">추천순</option>
                <option value="price-asc">가격 낮은순</option>
                <option value="price-desc">가격 높은순</option>
                <option value="name">이름순</option>
              </select>
            </div>
          </div>
          {/* 카테고리 탭 */}
          <div className="flex gap-2 md:gap-4 flex-wrap mb-10">
            {CATEGORIES.map(c => {
              const active = cat === c.id;
              return (
                <button key={c.id}
                  onClick={() => { setCat(c.id); navigate(c.id==='all' ? '/shop' : `/shop?cat=${c.id}`); }}
                  className={`px-4 py-2 text-sm border transition ${active
                    ? 'bg-ink-900 text-ivory-50 border-ink-900'
                    : 'bg-transparent text-clay-700 hairline hover:text-ink-900'}`}>
                  {c.name}
                </button>
              );
            })}
          </div>
          {filtered.length === 0 ? (
            <div className="py-24 text-center text-clay-500">해당 카테고리의 상품이 아직 준비 중입니다.</div>
          ) : (
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-6 gap-y-12">
              {filtered.map(p => <ProductCard key={p.id} product={p} />)}
            </div>
          )}
        </div>
      );

    // ---- Hash routing safe query parser ------------------------------------
    // 토스 successUrl 이 hash 라우팅 URL 일 때 paymentKey/orderId/amount 는
    // location.search 에, paymentType 등은 hash 안 query 에 들어옴. 둘 다 합쳐서 본다.
    function parseHashQuery() {
      const params = new URLSearchParams();
      const search = new URLSearchParams(window.location.search);
      search.forEach((v, k) => params.set(k, v));
      const hash = window.location.hash;
      const qi = hash.indexOf('?');
      if (qi !== -1) {
        const hashSearch = new URLSearchParams(hash.slice(qi + 1));
        hashSearch.forEach((v, k) => params.set(k, v));
      }
      return params;
    }

    // ---- 클라이언트 키 로더 (서버 /api/config 에서 가져옴) ------------------
    function useTossClientKey() {
      const [clientKey, setClientKey] = useState(null);
      const [error, setError] = useState(null);
      useEffect(() => {
        let cancelled = false;
        fetch('/api/config')
          .then(r => r.json())
          .then(d => { if (!cancelled) setClientKey(d.tossClientKey || null); })
          .catch(e => { if (!cancelled) setError(e.message || 'config_failed'); });
        return () => { cancelled = true; };
      }, []);
      return { clientKey, error };
    }

    // ========================================
    // 📄 Page — Checkout (결제 위젯)
    // ========================================
    function CheckoutPage() {
      const { items, total, clear } = useCart();
      const { user, token } = useAuth();
      const { navigate } = useRouter();
      const { clientKey } = useTossClientKey();

      const shipping = total === 0 ? 0 : (total >= 50000 ? 0 : 3500);
      const grandTotal = total + shipping;

      const [order, setOrder]       = useState(null); // 서버에서 만든 주문 (orderId/amount/orderName)
      const [creating, setCreating] = useState(false);
      const [paying,   setPaying]   = useState(false);
      const [error,    setError]    = useState(null);

      const widgetsRef    = useRef(null);
      const isRenderedRef = useRef(false);

      // 1) 빈 장바구니 가드
      useEffect(() => {
        if (items.length === 0 && !order) {
          // /cart 로 보냄 (직접 URL 진입한 경우 대비)
          // 결제 성공 후 clear() 하면 items 가 비지만 그때는 order 가 살아있어 무시됨
        }
      }, [items.length, order]);

      // 2) 페이지 진입 시 서버에 주문 생성 요청 (가격 검증 + orderId 발급)
      useEffect(() => {
        if (items.length === 0) return;
        if (order || creating) return;
        let cancelled = false;
        (async () => {
          setCreating(true);
          setError(null);
          try {
            const r = await fetch('/api/payments/orders', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                ...(token ? { Authorization: `Bearer ${token}` } : {}),
              },
              body: JSON.stringify({
                items: items.map(i => ({
                  productId: i.productId, qty: i.qty,
                  color: i.color, size: i.size,
                })),
              }),
            });
            const d = await r.json().catch(()=>({}));
            if (!r.ok) throw new Error(d?.error || '주문 생성 실패');
            if (!cancelled) setOrder(d);
          } catch (e) {
            if (!cancelled) setError(e.message || '주문을 만들 수 없습니다.');
          } finally {
            if (!cancelled) setCreating(false);
          }
        })();
        return () => { cancelled = true; };
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      // 3) 위젯 초기화 + 렌더 (clientKey & order 둘 다 준비된 후 한 번만)
      useEffect(() => {
        if (!clientKey || !order) return;
        if (typeof window.TossPayments !== 'function') {
          setError('토스 SDK 로드 실패. 새로고침해 주세요.');
          return;
        }
        let cancelled = false;
        (async () => {
          try {
            if (!widgetsRef.current) {
              const tossPayments = window.TossPayments(clientKey);
              widgetsRef.current = tossPayments.widgets({
                customerKey: user ? `dodam-user-${user.id}` : window.TossPayments.ANONYMOUS,
              });
            }
            await widgetsRef.current.setAmount({ currency: 'KRW', value: order.amount });

            if (!isRenderedRef.current && !cancelled) {
              await widgetsRef.current.renderPaymentMethods({
                selector: '#toss-payment-methods',
                variantKey: 'DEFAULT',
              });
              await widgetsRef.current.renderAgreement({
                selector: '#toss-agreement',
                variantKey: 'AGREEMENT',
              });
              isRenderedRef.current = true;
            }
          } catch (e) {
            console.error('[toss render]', e);
            if (!cancelled) setError(e.message || '결제 위젯 렌더링 실패');
          }
        })();
        return () => { cancelled = true; };
      }, [clientKey, order, user]);

      const requestPayment = async () => {
        if (!widgetsRef.current || !order) return;
        setPaying(true);
        setError(null);
        try {
          // 결제 직전 cart snapshot 저장 — 성공 페이지에서 cart clear 트리거용
          sessionStorage.setItem('dodam_pending_order', JSON.stringify({ orderId: order.orderId }));

          const baseUrl = window.location.origin;
          await widgetsRef.current.requestPayment({
            orderId:   order.orderId,
            orderName: order.orderName,
            successUrl: `${baseUrl}/#/payments/success`,
            failUrl:    `${baseUrl}/#/payments/fail`,
            customerEmail: user?.email || undefined,
            customerName:  user?.name  || undefined,
          });
        } catch (e) {
          // USER_CANCEL 등은 사용자가 그냥 닫은 것이라 무시
          if (e?.code !== 'USER_CANCEL') {
            console.error('[toss requestPayment]', e);
            setError(e?.message || '결제 요청 중 오류가 발생했습니다.');
          }
          setPaying(false);
        }
      };

      // 빈 장바구니 — 단, 결제 직후 clear() 된 상태와 진짜 빈 상태 구분
      if (items.length === 0 && !creating && !order) {
        return (
          <div className="fade-up max-w-3xl mx-auto px-5 md:px-8 py-20 text-center">
            <h1 className="font-serif-kr text-3xl md:text-4xl text-ink-900 mb-4">결제하기</h1>
            <p className="text-clay-700 mb-8">결제할 상품이 없습니다.</p>
            <Link to="/shop"><Button variant="primary">쇼핑 시작하기</Button></Link>
          </div>
        );
      }

      return (
        <div className="fade-up max-w-6xl mx-auto px-5 md:px-8 py-10 md:py-16">
          <div className="text-[11px] tracking-[0.35em] text-celadon-600 uppercase mb-2">CHECKOUT</div>
          <h1 className="font-serif-kr text-3xl md:text-5xl text-ink-900 mb-10">결제하기</h1>

          <div className="grid lg:grid-cols-[1fr_360px] gap-10">
            {/* 좌: 결제 위젯 */}
            <div>
              {error && (
                <div className="mb-6 text-sm text-red-700 bg-red-50 border border-red-200 px-4 py-3">
                  {error}
                </div>
              )}
              {creating && (
                <div className="text-sm text-clay-700 py-10 text-center border hairline">
                  주문서를 만들고 있습니다…
                </div>
              )}
              <div id="toss-payment-methods" className="mb-4"></div>
              <div id="toss-agreement" className="mb-6"></div>
              {order && clientKey && (
                <Button
                  size="lg" variant="primary" className="w-full"
                  onClick={requestPayment} disabled={paying}>
                  {paying ? '결제 진행 중…' : `${formatKRW(order.amount)} 결제하기`}
                </Button>
              )}
              <p className="mt-4 text-xs text-clay-700">
                테스트 카드: 임의의 16자리 숫자, 유효기간 미래, CVC 임의 3자리, 비밀번호 앞 2자리.
              </p>
            </div>

            {/* 우: 주문 요약 */}
            <aside className="bg-ivory-100 p-6 md:p-8 h-fit">
              <h3 className="font-serif-kr text-xl mb-5">주문 요약</h3>
              <ul className="space-y-3 text-sm border-b hairline pb-4">
                {items.map(it => (
                  <li key={it.key} className="flex justify-between gap-3">
                    <span className="text-ink-800 truncate">
                      {it.name} <span className="text-clay-700">× {it.qty}</span>
                    </span>
                    <span className="num text-ink-900 shrink-0">{formatKRW(it.price * it.qty)}</span>
                  </li>
                ))}
              </ul>
              <div className="space-y-2.5 text-sm pt-4">
                <div className="flex justify-between">
                  <span className="text-clay-700">상품 합계</span>
                  <span className="num">{formatKRW(total)}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-clay-700">배송비</span>
                  <span className="num">{shipping === 0 ? '무료' : formatKRW(shipping)}</span>
                </div>
              </div>
              <div className="flex justify-between items-baseline pt-4 mt-4 border-t hairline">
                <span className="text-sm text-ink-800">총 결제 금액</span>
                <span className="font-serif-kr text-2xl num text-ink-900">{formatKRW(grandTotal)}</span>
              </div>
              {order && (
                <div className="mt-4 text-[11px] text-clay-700 break-all">
                  주문번호: <span className="num">{order.orderId}</span>
                </div>
              )}
            </aside>
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 Page — Payment Success
    // ========================================
    function PaymentSuccessPage() {
      const { clear } = useCart();
      const [state, setState] = useState({ status: 'pending', data: null, error: null });

      useEffect(() => {
        const q = parseHashQuery();
        const paymentKey = q.get('paymentKey');
        const orderId    = q.get('orderId');
        const amountStr  = q.get('amount');

        if (!paymentKey || !orderId || !amountStr) {
          setState({ status: 'error', data: null,
            error: '결제 정보가 올바르지 않습니다. (paymentKey/orderId/amount 누락)' });
          return;
        }
        const amount = Number(amountStr);

        let cancelled = false;
        (async () => {
          try {
            const r = await fetch('/api/payments/confirm', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ paymentKey, orderId, amount }),
            });
            const d = await r.json().catch(()=>({}));
            if (cancelled) return;
            if (!r.ok) {
              setState({ status: 'error', data: null, error: d?.error || '결제 승인 실패' });
              return;
            }
            // 성공 — 장바구니 비우기 + URL 청소 (재새로고침 시 재confirm 방지)
            clear();
            sessionStorage.removeItem('dodam_pending_order');
            const cleanUrl = window.location.pathname + window.location.hash;
            window.history.replaceState({}, '', cleanUrl);
            setState({ status: 'ok', data: { ...d, orderId, amount }, error: null });
          } catch (e) {
            if (!cancelled) setState({ status: 'error', data: null, error: e.message || '네트워크 오류' });
          }
        })();
        return () => { cancelled = true; };
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      return (
        <div className="fade-up max-w-2xl mx-auto px-5 md:px-8 py-16 md:py-24 text-center">
          {state.status === 'pending' && (
            <>
              <div className="seal mx-auto mb-6">道</div>
              <h1 className="font-serif-kr text-3xl md:text-4xl text-ink-900 mb-4">결제 승인 중…</h1>
              <p className="text-clay-700">잠시만 기다려 주세요.</p>
            </>
          )}
          {state.status === 'ok' && (
            <>
              <div className="seal mx-auto mb-6">完</div>
              <h1 className="font-serif-kr text-3xl md:text-5xl text-ink-900 mb-4">결제가 완료되었습니다</h1>
              <p className="text-clay-700 mb-8">도담을 선택해 주셔서 감사합니다.</p>
              <div className="bg-ivory-100 p-6 md:p-8 text-left text-sm space-y-2 mb-8">
                <div className="flex justify-between gap-3"><span className="text-clay-700">주문번호</span>
                  <span className="num text-ink-900 break-all">{state.data.orderId}</span></div>
                <div className="flex justify-between gap-3"><span className="text-clay-700">결제 금액</span>
                  <span className="num text-ink-900">{formatKRW(state.data.amount)}</span></div>
                {state.data.method && (
                  <div className="flex justify-between gap-3"><span className="text-clay-700">결제 수단</span>
                    <span className="text-ink-900">{state.data.method}</span></div>
                )}
                {state.data.alreadyProcessed && (
                  <div className="text-xs text-celadon-600 pt-2">이미 처리된 주문입니다.</div>
                )}
              </div>
              <div className="flex flex-col sm:flex-row gap-3 justify-center">
                {state.data.receiptUrl && (
                  <a href={state.data.receiptUrl} target="_blank" rel="noreferrer">
                    <Button variant="outline">영수증 보기</Button>
                  </a>
                )}
                <Link to="/shop"><Button variant="primary">쇼핑 계속하기</Button></Link>
              </div>
            </>
          )}
          {state.status === 'error' && (
            <>
              <div className="seal mx-auto mb-6">×</div>
              <h1 className="font-serif-kr text-3xl md:text-4xl text-ink-900 mb-4">결제 승인 실패</h1>
              <p className="text-red-700 bg-red-50 border border-red-200 px-4 py-3 mb-8 inline-block">
                {state.error}
              </p>
              <div className="flex gap-3 justify-center">
                <Link to="/cart"><Button variant="outline">장바구니로</Button></Link>
                <Link to="/"><Button variant="primary">홈으로</Button></Link>
              </div>
            </>
          )}
        </div>
      );
    }

    // ========================================
    // 📄 Page — Payment Fail
    // ========================================
    function PaymentFailPage() {
      const q = parseHashQuery();
      const code    = q.get('code');
      const message = q.get('message');
      const orderId = q.get('orderId');
      return (
        <div className="fade-up max-w-2xl mx-auto px-5 md:px-8 py-16 md:py-24 text-center">
          <div className="seal mx-auto mb-6">×</div>
          <h1 className="font-serif-kr text-3xl md:text-4xl text-ink-900 mb-4">결제에 실패했습니다</h1>
          <div className="bg-ivory-100 p-6 text-left text-sm space-y-2 mb-8 inline-block">
            {message && <div><span className="text-clay-700">사유:</span> <span className="text-ink-900">{message}</span></div>}
            {code    && <div><span className="text-clay-700">코드:</span> <span className="num text-ink-900">{code}</span></div>}
            {orderId && <div><span className="text-clay-700">주문번호:</span> <span className="num text-ink-900 break-all">{orderId}</span></div>}
          </div>
          <div className="flex gap-3 justify-center">
            <Link to="/cart"><Button variant="outline">장바구니로</Button></Link>
            <Link to="/"><Button variant="primary">홈으로</Button></Link>
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 Page — About / Brand
    // ========================================
    function AboutPage() {
      return (
        <div className="fade-up">
          <section className="max-w-7xl mx-auto px-5 md:px-8 pt-16 md:pt-24 pb-10">
            <div className="text-[11px] tracking-[0.35em] text-celadon-600 uppercase mb-3">OUR STORY</div>
            <h1 className="font-serif-kr text-4xl md:text-6xl text-ink-900 leading-[1.15] max-w-3xl">
              그릇이 비어 있을 때, <br/>식탁은 비로소 채워집니다.
            </h1>
          </section>

          <section className="max-w-7xl mx-auto px-5 md:px-8 py-10 md:py-16 grid md:grid-cols-2 gap-10 md:gap-16 items-center">
            <div className="aspect-[4/3] overflow-hidden">
              <img src="images/story1.jpg" alt="" className="w-full h-full object-cover" />
            </div>
            <div>
              <h2 className="font-serif-kr text-2xl md:text-3xl text-ink-900 leading-snug">
                흙과 손, 그리고 시간.
              </h2>
              <p className="mt-5 text-clay-700 leading-relaxed">
                도담은 2017년 이천에서 시작된 작은 공방에서 출발했습니다.
                서두르지 않고, 흙의 결을 살피고, 손의 감각을 따릅니다.
                같은 그릇이라도 만든 사람의 호흡에 따라 미세하게 달라지는 표정 —
                그것이 도담이 가장 사랑하는 디테일입니다.
              </p>
              <p className="mt-4 text-clay-700 leading-relaxed">
                백자의 단정함, 청자의 깊이, 분청의 자유로움.
                전통의 결을 잃지 않으면서도 오늘의 식탁에 자연스럽게 어울리는
                그릇을 빚어내고 있습니다.
              </p>
            </div>
          </section>

          <section className="max-w-7xl mx-auto px-5 md:px-8 py-12 md:py-16 grid md:grid-cols-2 gap-10 md:gap-16 items-center">
            <div className="md:order-2 aspect-[4/3] overflow-hidden">
              <img src="images/story2.jpg" alt="" className="w-full h-full object-cover" />
            </div>
            <div>
              <h2 className="font-serif-kr text-2xl md:text-3xl text-ink-900 leading-snug">
                매일 쓰기에 좋은 그릇.
              </h2>
              <p className="mt-5 text-clay-700 leading-relaxed">
                예술품처럼 모셔두는 그릇이 아니라, 매일 손에 쥐는 그릇이 되길 바랍니다.
                무게, 크기, 입술이 닿는 부분의 곡선까지 — 사용하는 사람의 일상을 먼저 떠올리며 만듭니다.
                대부분의 그릇은 식기세척기와 전자레인지에 사용 가능하며,
                작은 흠집과 색감의 차이는 핸드메이드의 자연스러운 흔적입니다.
              </p>
            </div>
          </section>

          <section className="max-w-5xl mx-auto px-5 md:px-8 py-16 md:py-24 text-center">
            <div className="seal mx-auto mb-6">道</div>
            <p className="font-serif-kr text-xl md:text-2xl text-ink-900 leading-relaxed">
              “좋은 그릇은 음식을 빛나게 합니다. <br className="hidden md:block"/>
              하지만 가장 좋은 그릇은, 함께한 시간을 빛나게 합니다.”
            </p>
            <div className="mt-5 text-xs tracking-[0.3em] text-clay-700">— 도담 도예가, 김도담</div>
            <div className="mt-12">
              <Link to="/shop"><Button size="lg" variant="primary">컬렉션 둘러보기</Button></Link>
            </div>
          </section>
        </div>
      );
    }

    // ========================================
    // 🔐 Auth Pages — Login / Signup
    // ========================================
    function AuthShell({ title, subtitle, children }) {
      return (
        <div className="min-h-[70vh] flex items-center justify-center px-5 py-16 fade-up">
          <div className="w-full max-w-md">
            <div className="text-center mb-10">
              <span className="seal mx-auto mb-4">道</span>
              <h1 className="font-serif-kr text-3xl text-ink-900">{title}</h1>
              {subtitle && <p className="mt-2 text-sm text-clay-700">{subtitle}</p>}
            </div>
            <div className="border hairline bg-ivory-50 p-7 md:p-9">
              {children}
            </div>
          </div>
        </div>
      );
    }

    function LoginPage() {
      const { login, user } = useAuth();
      const { navigate } = useRouter();
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [submitting, setSubmitting] = useState(false);

      useEffect(() => { if (user) navigate('/'); }, [user]);

      const onSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setSubmitting(true);
        try {
          await login(email.trim(), password);
          navigate('/');
        } catch (err) {
          setError(err.message || '로그인에 실패했습니다.');
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <AuthShell title="로그인" subtitle="도담의 컬렉션과 주문 내역을 만나보세요.">
          <form onSubmit={onSubmit} className="space-y-5">
            <Input label="이메일" type="email" autoComplete="email" required
              value={email} onChange={(e)=>setEmail(e.target.value)}
              placeholder="you@example.com" />
            <Input label="비밀번호" type="password" autoComplete="current-password" required
              value={password} onChange={(e)=>setPassword(e.target.value)}
              placeholder="6자 이상" />
            {error && (
              <div className="text-sm text-red-700 bg-red-50 border border-red-200 px-3 py-2">
                {error}
              </div>
            )}
            <Button type="submit" variant="primary" size="lg" className="w-full" disabled={submitting}>
              {submitting ? '로그인 중…' : '로그인'}
            </Button>
            <div className="text-center text-sm text-clay-700 pt-2">
              아직 계정이 없으신가요? <Link to="/signup" className="text-celadon-600 hover:text-celadon-800 underline-offset-4 hover:underline">회원가입으로</Link>
            </div>
          </form>
        </AuthShell>
      );
    }

    function SignupPage() {
      const { signup, user } = useAuth();
      const { navigate } = useRouter();
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [password2, setPassword2] = useState('');
      const [error, setError] = useState('');
      const [submitting, setSubmitting] = useState(false);

      useEffect(() => { if (user) navigate('/'); }, [user]);

      const onSubmit = async (e) => {
        e.preventDefault();
        setError('');
        if (password.length < 6) return setError('비밀번호는 최소 6자 이상이어야 합니다.');
        if (password !== password2) return setError('비밀번호가 서로 일치하지 않습니다.');
        setSubmitting(true);
        try {
          await signup(email.trim(), password, name.trim());
          navigate('/');
        } catch (err) {
          setError(err.message || '회원가입에 실패했습니다.');
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <AuthShell title="회원가입" subtitle="도담의 결을 함께 만들어 가요.">
          <form onSubmit={onSubmit} className="space-y-5">
            <Input label="이름" type="text" autoComplete="name"
              value={name} onChange={(e)=>setName(e.target.value)}
              placeholder="홍길동" />
            <Input label="이메일" type="email" autoComplete="email" required
              value={email} onChange={(e)=>setEmail(e.target.value)}
              placeholder="you@example.com" />
            <Input label="비밀번호" type="password" autoComplete="new-password" required
              value={password} onChange={(e)=>setPassword(e.target.value)}
              placeholder="6자 이상" />
            <Input label="비밀번호 확인" type="password" autoComplete="new-password" required
              value={password2} onChange={(e)=>setPassword2(e.target.value)}
              placeholder="다시 한 번 입력" />
            {error && (
              <div className="text-sm text-red-700 bg-red-50 border border-red-200 px-3 py-2">
                {error}
              </div>
            )}
            <Button type="submit" variant="primary" size="lg" className="w-full" disabled={submitting}>
              {submitting ? '가입 중…' : '가입하기'}
            </Button>
            <div className="text-center text-sm text-clay-700 pt-2">
              이미 계정이 있으신가요? <Link to="/login" className="text-celadon-600 hover:text-celadon-800 underline-offset-4 hover:underline">로그인으로</Link>
            </div>
          </form>
        </AuthShell>
      );
    }

    // ========================================
    // 🚀 Routes 진입
    // ========================================
    function Routes() {
      const { path } = useRouter();
      // strip query for matching
      const [pathname] = path.split('?');
      if (pathname === '/' || pathname === '') return <HomePage />;
      if (pathname === '/shop') return <ShopPage />;
      if (pathname === '/cart') return <CartPage />;
      if (pathname === '/checkout') return <CheckoutPage />;
      if (pathname === '/payments/success') return <PaymentSuccessPage />;
      if (pathname === '/payments/fail')    return <PaymentFailPage />;
      if (pathname === '/about') return <AboutPage />;
      if (pathname === '/login') return <LoginPage />;
      if (pathname === '/signup') return <SignupPage />;
      const params = matchRoute('/product/:id', pathname);
      if (params) return <ProductDetailPage id={params.id} />;
      return (
        <div className="max-w-3xl mx-auto px-5 py-32 text-center fade-up">
          <h2 className="font-serif-kr text-3xl mb-4">페이지를 찾을 수 없습니다.</h2>
          <Link to="/"><Button variant="outline">홈으로 돌아가기</Button></Link>
        </div>
      );
    }

    // ========================================
    // 🚀 App Root
    // ========================================
    function App() {
      const [searchOpen, setSearchOpen] = useState(false);
      return (
        <Router>
          <AuthProvider>
            <CartProvider>
              <div className="min-h-screen flex flex-col">
                <Header onSearchOpen={()=>setSearchOpen(true)} />
                <main className="flex-1">
                  <Routes />
                </main>
                <Footer />
                <SearchModal isOpen={searchOpen} onClose={()=>setSearchOpen(false)} />
              </div>
            </CartProvider>
          </AuthProvider>
        </Router>
      );
    }

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
