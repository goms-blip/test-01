<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Signature Cut — v1 vs v2</title>
<style>
  body {
    margin: 0;
    background: #1c1c1c;
    color: #f4efe8;
    font-family: 'Inter', -apple-system, sans-serif;
    padding: 40px;
  }
  h1 {
    font-weight: 300;
    letter-spacing: 0.04em;
    margin: 0 0 8px;
  }
  p.sub {
    color: #b68a5e;
    margin: 0 0 36px;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }
  .card {
    background: #f4efe8;
    color: #1a2a4f;
    border: 1px solid #b68a5e;
    padding: 24px;
  }
  .card img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
    margin-bottom: 16px;
  }
  .card h2 {
    margin: 0 0 8px;
    font-weight: 400;
    font-size: 24px;
    font-style: italic;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }
  .card .note {
    font-size: 13px;
    line-height: 1.5;
    color: #1a2a4f;
    opacity: 0.7;
  }
  .meta {
    margin-top: 12px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #b68a5e;
  }
</style>
</head>
<body>
  <h1>Café Crème d'amande — Signature Cut</h1>
  <p class="sub">v1 vs v2 · gpt-image-2 · 3-color palette</p>
  <div class="grid">
    <div class="card">
      <img src="images/signature_latte.png" alt="v1" />
      <h2>v1 — Overhead w/ Almond Blossom</h2>
      <div class="note">살짝 위에서 바라본 컷. 라떼 잔 + 아몬드 블로섬 가지 + 통아몬드 3알 + 인디고 천. 정적·시그니처 광고 톤.</div>
      <div class="meta">현재 적용본</div>
    </div>
    <div class="card">
      <img src="images/signature_latte_v2.png" alt="v2" />
      <h2>v2 — Eye-level w/ Steam &amp; Pitcher</h2>
      <div class="note">눈높이 측면 컷. 잔 + 증기 + 뒤쪽 작은 크림 피처(보케) + 마블 카운터 + 아몬드 3알. 카페 카운터 현장감 강한 톤.</div>
      <div class="meta">추가 컷</div>
    </div>
  </div>
</body>
</html>
