<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0e0e" />
  <title>오승훈 · (주)그리프 · 디지털 명함</title>

  <!-- Open Graph -->
  <meta property="og:type" content="profile" />
  <meta property="og:title" content="오승훈 · (주)그리프" />
  <meta property="og:description" content="AI와 함께 커나가고 있는 마케팅 & 디자인 에이전시" />

  <!-- Fonts: Pretendard (KR) + Inter (Latin) — 2종 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

  <!-- React 18 + Babel + Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- QR -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

  <script>
    // Tailwind config (인라인 — 빌드 도구 없음)
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard Variable', 'Pretendard', 'Inter', 'system-ui', 'sans-serif'],
            inter: ['Inter', 'Pretendard Variable', 'system-ui', 'sans-serif'],
          },
          colors: {
            ink: '#0e0e0e',
            ink2: '#2b2b2b',
            paper: '#fafaf7',
            paper2: '#f1f0eb',
            rule: '#d9d9d2',
            mute: '#7a7a73',
            sage: '#6f7a5c',     // 단 하나의 액센트
            sageDeep: '#4f5840',
          },
          letterSpacing: {
            ultra: '0.22em',
          },
          boxShadow: {
            card: '0 30px 80px -30px rgba(14,14,14,0.35), 0 8px 24px -12px rgba(14,14,14,0.18)',
            cardDark: '0 30px 80px -30px rgba(0,0,0,0.8), 0 8px 24px -12px rgba(0,0,0,0.6)',
          },
        },
      },
    };
  </script>

  <style>
    html, body { background: #ecebe6; }
    body.dark { background: #0a0a0a; }
    /* 명함 비율 90:50 = 9:5 — 디지털에서도 유지 */
    .card-aspect { aspect-ratio: 9 / 5; }

    /* Flip */
    .flip-stage { perspective: 1800px; }
    .flip-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.85s cubic-bezier(0.22, 1, 0.36, 1);
      transform-style: preserve-3d;
    }
    .flip-inner.is-flipped { transform: rotateY(180deg); }
    .flip-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 18px;
      overflow: hidden;
    }
    .flip-back { transform: rotateY(180deg); }

    /* Hairline accent */
    .hairline {
      display: inline-block;
      width: 44px; height: 1px;
      background: currentColor;
      opacity: 0.85;
    }

    /* Subtle grain — 종이 질감 */
    .grain::after {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(14,14,14,0.04) 1px, transparent 1px);
      background-size: 3px 3px;
      mix-blend-mode: multiply;
      opacity: 0.35;
    }
    .dark .grain::after {
      background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
      mix-blend-mode: screen;
    }

    /* Focus ring */
    :focus-visible { outline: 2px solid #6f7a5c; outline-offset: 3px; border-radius: 6px; }

    /* Toast */
    @keyframes toast-in {
      from { opacity: 0; transform: translate(-50%, 8px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }
    .toast-anim { animation: toast-in 0.25s ease-out both; }

    /* 태그라인 강조 — 미세한 reveal */
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .tag-emphasis {
      background: linear-gradient(
        90deg,
        currentColor 0%,
        currentColor 40%,
        #9aa581 50%,
        currentColor 60%,
        currentColor 100%
      );
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 6s ease-in-out infinite;
    }

    /* QR 이미지 sizing */
    .qr-img { image-rendering: pixelated; }

    /* 클릭 가능한 카드 hover */
    @media (hover: hover) {
      .flip-stage:hover .flip-hint { opacity: 1; }
    }
    .flip-hint { transition: opacity 0.3s ease; opacity: 0.55; }
  </style>
</head>
<body class="font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ========================================
    // 데이터 (요청한 6가지만)
    // ========================================
    const PROFILE = {
      category: '마케팅 & 디자인 에이전시',
      tagline: 'AI와 함께 커나가고 있는',
      company: '(주)그리프',
      name: '오승훈',
      nameEn: 'OH SEUNG HUN',
      email: 'seunghun.oh@griff.co.kr',
      phone: '010-8565-7487',
      phoneIntl: '+82-10-8565-7487',
      address: '서울시 성동구 광나루로 8길 31',
      addressShort: '서울시 성동구 광나루로 8길 31',
    };

    // ========================================
    // vCard 생성 — 표준 v3.0
    // ========================================
    function buildVCard(p) {
      // CRLF 줄바꿈 필수
      const lines = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        `N:${p.name};;;;`,
        `FN:${p.name}`,
        `ORG:${p.company}`,
        `TITLE:${p.category}`,
        `TEL;TYPE=CELL,VOICE:${p.phoneIntl}`,
        `EMAIL;TYPE=INTERNET,WORK:${p.email}`,
        `ADR;TYPE=WORK:;;${p.address};;;;`,
        `NOTE:${p.tagline}`,
        'END:VCARD',
      ];
      return lines.join('\r\n');
    }

    // ========================================
    // 외부 링크 헬퍼
    // ========================================
    function mapUrl(addr) {
      // 카카오맵 검색이 한국 주소에 가장 정확
      return `https://map.kakao.com/?q=${encodeURIComponent(addr)}`;
    }

    // ========================================
    // 🎨 Design System — Icon (인라인 SVG)
    // ========================================
    function Icon({ name, className = 'w-4 h-4', stroke = 1.5 }) {
      const common = {
        viewBox: '0 0 24 24',
        fill: 'none',
        stroke: 'currentColor',
        strokeWidth: stroke,
        strokeLinecap: 'round',
        strokeLinejoin: 'round',
        className,
      };
      switch (name) {
        case 'mail':
          return (
            <svg {...common}>
              <rect x="3" y="5" width="18" height="14" rx="2" />
              <path d="m3 7 9 6 9-6" />
            </svg>
          );
        case 'phone':
          return (
            <svg {...common}>
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.86 19.86 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.86 19.86 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.8a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.28-1.27a2 2 0 0 1 2.11-.45c.9.34 1.84.57 2.8.7A2 2 0 0 1 22 16.92Z" />
            </svg>
          );
        case 'pin':
          return (
            <svg {...common}>
              <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
              <circle cx="12" cy="10" r="3" />
            </svg>
          );
        case 'copy':
          return (
            <svg {...common}>
              <rect x="9" y="9" width="13" height="13" rx="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
          );
        case 'check':
          return (
            <svg {...common}>
              <path d="m5 12 5 5L20 7" />
            </svg>
          );
        case 'download':
          return (
            <svg {...common}>
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <path d="m7 10 5 5 5-5" />
              <path d="M12 15V3" />
            </svg>
          );
        case 'flip':
          return (
            <svg {...common}>
              <path d="M3 12a9 9 0 0 1 15-6.7L21 8" />
              <path d="M21 3v5h-5" />
              <path d="M21 12a9 9 0 0 1-15 6.7L3 16" />
              <path d="M3 21v-5h5" />
            </svg>
          );
        case 'sun':
          return (
            <svg {...common}>
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
            </svg>
          );
        case 'moon':
          return (
            <svg {...common}>
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" />
            </svg>
          );
        case 'arrow':
          return (
            <svg {...common}>
              <path d="M5 12h14" />
              <path d="m12 5 7 7-7 7" />
            </svg>
          );
        default:
          return null;
      }
    }

    // ========================================
    // 🎨 Design System — Toast
    // ========================================
    function Toast({ message, show }) {
      if (!show) return null;
      return (
        <div
          role="status"
          aria-live="polite"
          className="toast-anim fixed left-1/2 bottom-8 z-50 -translate-x-1/2 rounded-full bg-ink/95 px-4 py-2 text-xs font-medium text-white shadow-lg backdrop-blur dark:bg-white/95 dark:text-ink"
        >
          {message}
        </div>
      );
    }

    // ========================================
    // 🎨 Design System — IconButton
    // ========================================
    function IconButton({ children, onClick, label, variant = 'ghost', className = '' }) {
      const base =
        'inline-flex items-center justify-center gap-1.5 rounded-full text-xs font-medium transition active:scale-[0.97]';
      const styles = {
        ghost:
          'border border-ink/15 px-3 py-1.5 text-ink/75 hover:border-ink/40 hover:text-ink dark:border-white/15 dark:text-white/70 dark:hover:border-white/40 dark:hover:text-white',
        solid:
          'bg-ink px-4 py-2 text-paper hover:bg-ink2 dark:bg-paper dark:text-ink dark:hover:bg-paper2',
        sage:
          'bg-sage px-4 py-2 text-white hover:bg-sageDeep',
      };
      return (
        <button
          type="button"
          onClick={onClick}
          aria-label={label}
          className={`${base} ${styles[variant]} ${className}`}
        >
          {children}
        </button>
      );
    }

    // ========================================
    // 🎨 Card Front — 핵심 정보 (5초 인식)
    // ========================================
    function CardFront() {
      return (
        <div className="grain relative h-full w-full bg-paper text-ink dark:bg-ink dark:text-paper">
          {/* 좌상단 카테고리 라벨 */}
          <div className="absolute left-[6%] top-[8%] right-[6%] flex items-start justify-between">
            <div className="text-[10px] sm:text-[11px] font-medium uppercase tracking-ultra text-mute dark:text-white/55">
              Marketing &amp; Design Agency
            </div>
            <div className="text-[10px] sm:text-[11px] font-medium tracking-widest text-mute dark:text-white/55 font-inter">
              GRIFF · 2026
            </div>
          </div>

          {/* 중앙 메인 — 강조 1개: 태그라인 */}
          <div className="absolute inset-0 flex flex-col items-center justify-center px-6 text-center">
            <span className="hairline mb-5 sm:mb-6" />
            <div className="text-[15px] sm:text-lg font-medium tracking-tight text-ink dark:text-paper mb-3 sm:mb-4">
              {PROFILE.category}
            </div>

            <h1 className="font-sans font-medium leading-[1.18] tracking-tight text-[clamp(16px,3.6vw,28px)] max-w-[20ch] text-mute dark:text-white/70">
              <span className="tag-emphasis">{PROFILE.tagline}</span>
            </h1>

            <div className="mt-6 sm:mt-8 flex items-baseline gap-2.5">
              <span className="text-[14px] sm:text-base text-mute dark:text-white/55">{PROFILE.company}</span>
              <span className="h-3.5 w-px bg-rule dark:bg-white/20" />
              <span className="text-xl sm:text-2xl font-semibold tracking-tight">{PROFILE.name}</span>
            </div>
            <div className="mt-1.5 text-[10px] sm:text-[11px] font-inter tracking-ultra text-mute dark:text-white/50">
              {PROFILE.nameEn}
            </div>
          </div>

          {/* 하단 hint */}
          <div className="flip-hint absolute bottom-[7%] left-1/2 -translate-x-1/2 flex items-center gap-1.5 text-[10px] font-inter uppercase tracking-ultra text-mute dark:text-white/50">
            <Icon name="flip" className="w-3 h-3" stroke={1.6} />
            <span>Tap to flip</span>
          </div>
        </div>
      );
    }

    // ========================================
    // 🎨 Card Back — 연락처 + QR
    // ========================================
    function CardBack({ qrDataUrl }) {
      return (
        <div className="grain relative h-full w-full bg-paper text-ink dark:bg-ink dark:text-paper">
          <div className="absolute inset-0 grid grid-cols-[1.55fr_1fr] gap-5 sm:gap-7 px-[6%] py-[7%]">
            {/* Left — Contact */}
            <div className="flex flex-col justify-between min-w-0">
              <div>
                <div className="text-[10px] sm:text-[11px] font-medium uppercase tracking-ultra text-mute dark:text-white/55">
                  Contact
                </div>
                <span className="hairline mt-3 mb-4 sm:mt-4 sm:mb-5 opacity-60" />
              </div>

              <div className="space-y-3 sm:space-y-4 min-w-0">
                <div className="min-w-0">
                  <div className="text-[9px] sm:text-[10px] uppercase tracking-ultra text-mute dark:text-white/50 font-inter">
                    Email
                  </div>
                  <div className="mt-0.5 truncate text-[12px] sm:text-sm font-inter font-medium">
                    {PROFILE.email}
                  </div>
                </div>
                <div>
                  <div className="text-[9px] sm:text-[10px] uppercase tracking-ultra text-mute dark:text-white/50 font-inter">
                    Phone
                  </div>
                  <div className="mt-0.5 text-[12px] sm:text-sm font-inter font-medium tabular-nums">
                    {PROFILE.phoneIntl}
                  </div>
                </div>
                <div className="min-w-0">
                  <div className="text-[9px] sm:text-[10px] uppercase tracking-ultra text-mute dark:text-white/50 font-inter">
                    Address
                  </div>
                  <div className="mt-0.5 text-[11px] sm:text-[13px] leading-relaxed text-ink2 dark:text-white/85">
                    {PROFILE.address}
                  </div>
                </div>
              </div>

              <div className="text-[10px] sm:text-[11px] text-mute dark:text-white/50 font-inter tracking-wider">
                {PROFILE.company} · {PROFILE.name}
              </div>
            </div>

            {/* Right — Portrait */}
            <div className="flex flex-col items-end justify-between">
              <div className="text-[10px] sm:text-[11px] font-inter uppercase tracking-ultra text-mute dark:text-white/55 self-end">
                Portrait
              </div>
              <div className="flex flex-col items-center">
                <div className="overflow-hidden rounded-xl ring-1 ring-rule/80 dark:ring-white/15 shadow-sm">
                  <img
                    src="./portrait.png"
                    alt="오승훈 일러스트 초상"
                    className="block h-[112px] w-[112px] sm:h-[136px] sm:w-[136px] object-cover"
                  />
                </div>
                <div className="mt-2 text-[9px] sm:text-[10px] text-mute dark:text-white/55 font-inter tracking-wider">
                  Oh Seunghun
                </div>
              </div>
              <div className="self-end text-right">
                <div className="text-[10px] font-inter tracking-ultra text-mute dark:text-white/45">
                  GRIFF
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 Page — Card 전체 (앞/뒤 flip + 액션 패널)
    // ========================================
    function CardPage() {
      const [flipped, setFlipped] = useState(false);
      const [dark, setDark] = useState(false);
      const [toast, setToast] = useState({ show: false, msg: '' });
      const [qrDataUrl, setQrDataUrl] = useState('');
      const toastTimer = useRef(null);

      // 다크/라이트 — 시스템 prefers-color-scheme 자동 감지 (초기)
      useEffect(() => {
        const m = window.matchMedia('(prefers-color-scheme: dark)');
        setDark(m.matches);
        const listener = (e) => setDark(e.matches);
        m.addEventListener?.('change', listener);
        return () => m.removeEventListener?.('change', listener);
      }, []);

      useEffect(() => {
        document.body.classList.toggle('dark', dark);
        document.documentElement.classList.toggle('dark', dark);
      }, [dark]);

      // QR — 현재 페이지 URL을 담음 (URL이 vCard보다 모든 스캐너에서 안정적)
      useEffect(() => {
        if (typeof QRCode === 'undefined') return;
        const url = window.location.href.replace(/^file:.*$/, 'https://griff.co.kr');
        QRCode.toDataURL(url, {
          margin: 0,
          width: 320,
          color: { dark: '#0e0e0e', light: '#ffffff' },
          errorCorrectionLevel: 'M',
        })
          .then(setQrDataUrl)
          .catch(() => setQrDataUrl(''));
      }, []);

      const showToast = useCallback((msg) => {
        setToast({ show: true, msg });
        clearTimeout(toastTimer.current);
        toastTimer.current = setTimeout(() => setToast({ show: false, msg: '' }), 1800);
      }, []);

      const copy = useCallback(async (text, label) => {
        try {
          await navigator.clipboard.writeText(text);
          showToast(`${label} 복사됨`);
        } catch {
          // fallback
          const ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); showToast(`${label} 복사됨`); } catch {}
          document.body.removeChild(ta);
        }
      }, [showToast]);

      const downloadVCard = useCallback(() => {
        const vcard = buildVCard(PROFILE);
        // utf-8 BOM 추가 — 한글 안정성
        const blob = new Blob(['﻿' + vcard], { type: 'text/vcard;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'griff_oh-seunghun.vcf';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        showToast('연락처 파일이 저장되었습니다');
      }, [showToast]);

      // 카드 클릭 → flip (단, 버튼/링크는 stopPropagation)
      const onCardClick = useCallback((e) => {
        setFlipped((f) => !f);
      }, []);

      const onCardKey = useCallback((e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          setFlipped((f) => !f);
        }
      }, []);

      return (
        <div className="min-h-[100svh] w-full overflow-x-hidden bg-paper2 text-ink transition-colors duration-500 dark:bg-[#0a0a0a] dark:text-paper">
          {/* 상단 바 */}
          <header className="mx-auto flex w-full max-w-[760px] items-center justify-between px-5 py-5 sm:py-7">
            <div className="flex items-center gap-2 text-[10px] sm:text-[11px] font-inter uppercase tracking-ultra text-mute dark:text-white/55">
              <span className="inline-block h-1.5 w-1.5 rounded-full bg-sage" />
              <span>Digital Business Card</span>
            </div>
            <button
              type="button"
              onClick={() => setDark((d) => !d)}
              aria-label={dark ? '라이트 모드로 전환' : '다크 모드로 전환'}
              className="inline-flex items-center gap-1.5 rounded-full border border-ink/15 px-3 py-1.5 text-[11px] font-medium text-ink/75 transition hover:border-ink/40 hover:text-ink dark:border-white/15 dark:text-white/70 dark:hover:border-white/40 dark:hover:text-white"
            >
              <Icon name={dark ? 'sun' : 'moon'} className="w-3.5 h-3.5" stroke={1.6} />
              <span className="font-inter tracking-wider">{dark ? 'LIGHT' : 'DARK'}</span>
            </button>
          </header>

          {/* 카드 */}
          <main className="mx-auto w-full max-w-[760px] px-5 pb-10">
            <div
              className="flip-stage cursor-pointer select-none"
              onClick={onCardClick}
              onKeyDown={onCardKey}
              role="button"
              tabIndex={0}
              aria-label={flipped ? '명함 앞면 보기' : '명함 뒷면 보기 (연락처)'}
              aria-pressed={flipped}
            >
              <div
                className={`flip-inner card-aspect rounded-[18px] shadow-card dark:shadow-cardDark ${
                  flipped ? 'is-flipped' : ''
                }`}
              >
                <div className="flip-face">
                  <CardFront />
                </div>
                <div className="flip-face flip-back">
                  <CardBack qrDataUrl={qrDataUrl} />
                </div>
              </div>
            </div>

            {/* Flip 상태 표시 */}
            <div className="mt-4 flex items-center justify-center gap-2">
              <button
                type="button"
                onClick={() => setFlipped(false)}
                className={`h-1.5 rounded-full transition-all ${
                  !flipped ? 'w-6 bg-ink dark:bg-paper' : 'w-1.5 bg-ink/25 dark:bg-white/30'
                }`}
                aria-label="앞면"
              />
              <button
                type="button"
                onClick={() => setFlipped(true)}
                className={`h-1.5 rounded-full transition-all ${
                  flipped ? 'w-6 bg-ink dark:bg-paper' : 'w-1.5 bg-ink/25 dark:bg-white/30'
                }`}
                aria-label="뒷면"
              />
            </div>
          </main>

          {/* 액션 패널 — 디지털 명함의 핵심 */}
          <section className="mx-auto w-full max-w-[760px] px-5 pb-16">
            <div className="text-[10px] font-inter uppercase tracking-ultra text-mute dark:text-white/50 mb-3">
              Quick Actions
            </div>

            <div className="grid grid-cols-1 gap-2.5 sm:grid-cols-3">
              {/* Email */}
              <ActionRow
                icon="mail"
                label="Email"
                value={PROFILE.email}
                href={`mailto:${PROFILE.email}`}
                onCopy={() => copy(PROFILE.email, '이메일')}
              />
              {/* Phone */}
              <ActionRow
                icon="phone"
                label="Phone"
                value={PROFILE.phone}
                href={`tel:${PROFILE.phoneIntl.replace(/\s/g, '')}`}
                onCopy={() => copy(PROFILE.phone, '전화번호')}
              />
              {/* Address */}
              <ActionRow
                icon="pin"
                label="Address"
                value={PROFILE.addressShort}
                href={mapUrl(PROFILE.address)}
                onCopy={() => copy(PROFILE.address, '주소')}
                external
              />
            </div>

            {/* Primary CTA — vCard */}
            <div className="mt-5 flex flex-col gap-2.5 sm:flex-row">
              <button
                type="button"
                onClick={downloadVCard}
                className="group inline-flex flex-1 items-center justify-between rounded-2xl bg-ink px-5 py-4 text-paper transition hover:bg-ink2 active:scale-[0.99] dark:bg-paper dark:text-ink dark:hover:bg-paper2"
              >
                <span className="flex items-center gap-3">
                  <span className="flex h-9 w-9 items-center justify-center rounded-full bg-sage text-white">
                    <Icon name="download" className="w-4 h-4" stroke={1.8} />
                  </span>
                  <span className="text-left">
                    <span className="block text-[10px] font-inter uppercase tracking-ultra opacity-60">
                      vCard
                    </span>
                    <span className="block text-sm font-semibold">내 연락처에 저장</span>
                  </span>
                </span>
                <Icon name="arrow" className="w-4 h-4 transition-transform group-hover:translate-x-1" stroke={1.8} />
              </button>

              <button
                type="button"
                onClick={() => setFlipped((f) => !f)}
                className="inline-flex items-center justify-center gap-2 rounded-2xl border border-ink/15 px-5 py-4 text-sm font-medium text-ink/80 transition hover:border-ink/40 hover:text-ink dark:border-white/15 dark:text-white/75 dark:hover:border-white/40 dark:hover:text-white"
              >
                <Icon name="flip" className="w-4 h-4" stroke={1.7} />
                <span>{flipped ? '앞면 보기' : '뒷면 보기'}</span>
              </button>
            </div>

            {/* Footer */}
            <div className="mt-12 flex items-center justify-between text-[10px] font-inter uppercase tracking-ultra text-mute dark:text-white/45">
              <span>© 2026 GRIFF</span>
              <span>Made with care · Seoul</span>
            </div>
          </section>

          <Toast show={toast.show} message={toast.msg} />
        </div>
      );
    }

    // ========================================
    // 🎨 Action Row — 액션 카드 (탭=링크, 복사 버튼 분리)
    // ========================================
    function ActionRow({ icon, label, value, href, onCopy, external = false }) {
      return (
        <div className="group flex items-center justify-between gap-2 rounded-xl border border-ink/10 bg-paper px-3.5 py-3 transition hover:border-ink/25 dark:border-white/10 dark:bg-white/[0.03] dark:hover:border-white/25">
          <a
            href={href}
            target={external ? '_blank' : undefined}
            rel={external ? 'noopener noreferrer' : undefined}
            className="flex min-w-0 flex-1 items-center gap-3 text-left"
            aria-label={`${label}: ${value}`}
          >
            <span className="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-paper2 text-ink/70 transition group-hover:bg-sage group-hover:text-white dark:bg-white/[0.06] dark:text-white/70">
              <Icon name={icon} className="w-3.5 h-3.5" stroke={1.7} />
            </span>
            <span className="min-w-0 flex-1">
              <span className="block text-[9px] font-inter uppercase tracking-ultra text-mute dark:text-white/50">
                {label}
              </span>
              <span className="block truncate text-[13px] font-medium text-ink/90 dark:text-white/90">
                {value}
              </span>
            </span>
          </a>
          <button
            type="button"
            onClick={onCopy}
            aria-label={`${label} 복사`}
            className="flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-ink/50 transition hover:bg-ink/5 hover:text-ink dark:text-white/50 dark:hover:bg-white/10 dark:hover:text-white"
          >
            <Icon name="copy" className="w-3.5 h-3.5" stroke={1.7} />
          </button>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return <CardPage />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
