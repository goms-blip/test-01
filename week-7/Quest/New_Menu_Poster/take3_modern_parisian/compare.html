<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Hero Cut — v1 vs v2</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Inter:wght@300;500&display=swap" rel="stylesheet" />
<style>
  body {
    margin: 0;
    background: #1c1c1c;
    color: #f4efe8;
    font-family: 'Inter', sans-serif;
    padding: 40px;
  }
  h1 {
    font-weight: 300;
    letter-spacing: 0.04em;
    margin: 0 0 6px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 34px;
  }
  p.sub {
    color: #E26B4A;
    margin: 0 0 36px;
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }
  .card {
    background: #f4efe8;
    color: #1a2a4f;
    border: 1px solid #E26B4A;
    padding: 24px;
  }
  .card img {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    display: block;
    margin-bottom: 16px;
  }
  .card h2 {
    margin: 0 0 8px;
    font-weight: 400;
    font-size: 22px;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
  }
  .card .note {
    font-size: 13px;
    line-height: 1.55;
    opacity: 0.78;
  }
  .meta {
    margin-top: 12px;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #E26B4A;
  }
</style>
</head>
<body>
  <h1>Café Frappé Amande — Hero Cut</h1>
  <p class="sub">v1 vs v2 · gpt-image-2 · 1024×1536</p>
  <div class="grid">
    <div class="card">
      <img src="images/hero_frappe_amande.png" alt="v1" />
      <h2>v1 — Eye-level Centered</h2>
      <div class="note">가운데 정렬·정적 광고형. 잔 + 두툼한 크림캡 + 인디고 천 + 호라이즌 보케 + 코랄 냅킨. 안정감 강함.</div>
      <div class="meta">현재 적용본</div>
    </div>
    <div class="card">
      <img src="images/hero_frappe_amande_v2.png" alt="v2" />
      <h2>v2 — Lifestyle Three-Quarter</h2>
      <div class="note">우측 배치 3/4 로우앵글·라이프스타일. 코랄 종이 빨대 + 좌측 전경 아몬드 접시 + 해변 보케 후방. 동적·SNS 친화.</div>
      <div class="meta">추가 컷</div>
    </div>
  </div>
</body>
</html>
