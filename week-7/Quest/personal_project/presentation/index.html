<!--

없어도 슬라이드는 회색 placeholder로 정상 동작합니다.

  - cover-hero.png        : "베이킹 재료들(박력분/계란/버터/설탕)이 흰 배경 위에 가지런히 배열된 인포그래픽 스타일 컴포지션, 따뜻한 톤, 미니멀, 톱다운, 흰 접시·종이, 부드러운 그림자"
  - persona-minji.png     : "27세 한국 여성이 자취 원룸 주방에서 마들렌 레시피 화면을 보다 '박력분?' 에서 멈춘 순간, 일러스트레이션, 따뜻한 파스텔, 깔끔한 라인, 휴대폰 화면에는 흐릿한 한글 레시피"

  - screen-home.png       : "베이킹 재료 사전 공개 사이트 홈 스크린샷, 매거진 톤, 흑백+크림 + 시나몬 액센트, 큰 세리프 헤딩, 박력분 사진 1장"
  - screen-category.png   : "카테고리(가루류) 페이지 스크린샷, 4열 그리드 재료 카드, 사진 + 한글 + 영문"
  - screen-detail.png     : "재료 상세 페이지 스크린샷, 9개 정보 항목이 카드로 정렬, 박력분 상세, 초보자 실수 카드만 강조"
  - screen-compare.png    : "비교 모드 스크린샷, 박력분/중력분/강력분 3컬럼이 한 화면, 9개 항목이 행으로 정렬"
  - screen-admin.png      : "관리자 콘솔 스크린샷, 좌측 사이드바 + 폼 카드 + 드래그앤드롭 이미지 영역 + 가시성 토글 스위치, 스튜디오 톤"
  - data-grid.png         : "57 × 9 = 513칸 데이터 그리드 인포그래픽, 모두 채워진 셀들이 코랄로 글로우, 비어있는 셀 0개"
  - qr-baking-dict.png    : "https://baking-dict.vercel.app 으로 향하는 QR 코드, 따뜻한 베이지 배경"

생성 후 동일한 슬러그(slug).png 파일명으로 ./images/ 안에 저장하면 자동 표시됩니다.
=============================================================
-->

<style>
  html, body {
    margin: 0;
    padding: 0;

    font-family: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;

  }

  /* 슬라이드 스테이지: 16:9 고정, 부모에 fit */
  .stage {

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ========================================
// CONSTANTS
// ========================================
const LIVE_URL = 'https://baking-dict.vercel.app';
const PRESENTER = '오승훈 (seunghun.oh@griff.co.kr)';
const PRESENT_DATE = '2026-05-16';

// ========================================
// 🎨 DESIGN SYSTEM COMPONENTS
// ========================================
function Kicker({ children, className = '' }) {
  return <div className={`kicker ${className}`}>{children}</div>;
}

function PillAccent({ children }) {
  return <span className="pill-accent">{children}</span>;
}

function Chip({ children }) {
  return <span className="chip">{children}</span>;
}

function SlideShell({ index, total, title, kicker, children, footer }) {
  return (
    <div className="slide-frame slide-anim-enter">
      {/* top label row */}
      <div className="absolute top-0 left-0 right-0 px-16 pt-8 flex items-center justify-between">
        <div className="kicker">Baking Ingredients Dictionary · Issue 01</div>
        <div className="kicker">{String(index).padStart(2,'0')} / {String(total).padStart(2,'0')}</div>
      </div>

      <div className="absolute left-16 right-16" style={{ top: 72 }}>
        <div className="h-px bg-rule" />
      </div>

      {/* content */}
      <div className="absolute left-16 right-16 top-24 bottom-24 flex flex-col">
        {kicker && <div className="mb-3"><Kicker>{kicker}</Kicker></div>}
        {title && <h1 className="head-ko text-[58px] leading-[1.05] mb-8 max-w-[1200px]">{title}</h1>}
        <div className="flex-1 min-h-0">{children}</div>
      </div>

      {/* bottom */}
      <div className="absolute left-16 right-16 bottom-8 flex items-center justify-between">
        <div className="kicker">{footer || 'baking-dict.vercel.app'}</div>
        <div className="kicker">{PRESENTER.split(' ')[0]} · {PRESENT_DATE}</div>
      </div>
    </div>
  );
}

// 이미지 placeholder + 실제 파일이 있으면 자동 표시.
// fit:      'cover'  → 박스에 꽉 채우고 넘치는 부분 잘라냄 (썸네일용 기본)
//           'contain'→ 이미지 전체 보이게 (잘림 없음, 박스에 여백 가능)
// position: 'center' (기본) | 'top' | 'bottom' | 'left' | 'right'
function Img({ src, alt, className = '', ratio = 'aspect-[4/3]', label, fit = 'cover', position = 'center' }) {
  const [failed, setFailed] = useState(false);
  if (!src || failed) {
    return (
      <div className={`img-placeholder ${ratio} ${className}`}>
        <div>
          <div style={{ fontSize: 28, marginBottom: 6 }}>◇</div>
          <div>{label || alt || 'IMAGE PLACEHOLDER'}</div>
        </div>
      </div>
    );
  }
  return (
    <img
      src={src}
      alt={alt || ''}
      onError={() => setFailed(true)}
      className={`${ratio} object-${fit} object-${position} ${className}`}
    />
  );
}

// ========================================
// 📄 SLIDES
// ========================================

// 01 — COVER
function SlideCover({ index, total }) {
  return (
    <SlideShell index={index} total={total} footer={LIVE_URL}>
      <div className="grid grid-cols-12 gap-10 h-full">
        <div className="col-span-7 flex flex-col justify-center">
          <Kicker>An Editorial Index, in Korean — v1</Kicker>
          <h1 className="head-ko text-[88px] leading-[.98] mt-6 mb-6" style={{ fontWeight: 500 }}>
            초보자를 위한<br/>
            <span className="accent-underline">베이킹 재료 사전</span>
          </h1>
          <div className="display-xl text-[34px] leading-tight text-ink-soft mb-10">
            <span className="display-xl">Cake Flour</span>,&nbsp;
            <span className="display-it">Powdered Sugar</span>,&nbsp;
            <span className="display-xl">Cream of Tartar</span>.
          </div>
          <p className="text-xl text-ink-soft max-w-[560px] leading-relaxed mb-10">
            한국 베이킹 초보자가 레시피에서 마주치는 모르는 재료를
            <strong className="text-ink"> 30초가 아닌 3초</strong> 안에 이해하도록 돕는 재료 정체성 사전.
          </p>
          <div className="flex items-center gap-3">
            <PillAccent>LIVE</PillAccent>
            <a className="display-xl text-2xl text-ink underline decoration-accent decoration-2 underline-offset-4">
              {LIVE_URL.replace('https://','')}
            </a>
          </div>
        </div>
        <div className="col-span-5 flex items-center">
          <div className="w-full">
            <Img src="./images/cover-hero.png" alt="베이킹 재료 컴포지션" ratio="aspect-[4/5]" label="COVER-HERO.PNG" className="w-full rounded-sm" />
          </div>
        </div>
      </div>
    </SlideShell>
  );
}

// 02 — PROBLEM
function SlideProblem({ index, total }) {
  return (
    <SlideShell index={index} total={total} kicker="Problem · 문제" title="박력분이 뭔지 30분, 결국 도구는 서랍 속으로.">
      <div className="grid grid-cols-12 gap-10 h-full">
        <div className="col-span-7 flex flex-col justify-between">
          <div>
            <p className="text-[22px] leading-relaxed text-ink mb-6">
              내 아내는 베이킹 유튜버를 하고 있고 베이킹으로 유명한 학교를 나온 사람이다. <strong>그런 아내도</strong> 가끔 레시피를 보면서 궁금한게 많은지 재료를 다시 찾아보곤 한다.
            </p>
            <p className="text-[22px] leading-relaxed text-ink-soft">
              전문가도 그런데, 베이킹을 막 시작한 초보자에게 “박력분”, “슈가파우더”, “타르타르 크림” 같은 이름은 훨씬 큰 벽일 것이다. 초보자는 레시피 한 줄에 막혀 검색을 헤매다 결국 <em>“나는 베이킹에 안 맞나 보다”</em>며 도구를 서랍에 넣어버리기 쉽다.
            </p>
          </div>

          <div className="rule-t pt-6 grid grid-cols-3 gap-8">
            <div>
              <div className="display-xl text-5xl accent">30+</div>
              <div className="text-sm text-ink-soft mt-1">검색에 쓰는 분</div>
            </div>
            <div>
              <div className="display-xl text-5xl accent">3</div>
              <div className="text-sm text-ink-soft mt-1">평균 헤매는 블로그 수</div>
            </div>
            <div>
              <div className="display-xl text-5xl accent">→ 서랍</div>
              <div className="text-sm text-ink-soft mt-1">결국 도구는 묻힘</div>
            </div>
          </div>
        </div>

        <div className="col-span-5 flex flex-col">
          <div className="flex-1">
            <Img src="./images/persona-minji.png" alt="페르소나 민지" ratio="aspect-[4/5]" label="PERSONA · MINJI" className="w-full" />
          </div>
          <div className="mt-4">
            <Kicker>Persona</Kicker>
            <div className="head-ko text-3xl mt-1">민지 · 27세, 회사원</div>
            <p className="text-sm text-ink-soft mt-2 leading-relaxed">
              토요일 오후 2시. 마들렌 레시피 “박력분 100g, 베이킹파우더 3g”에서 멈춤. 30분 검색 → 그냥 “밀가루” 봉지를 사 옴 → 식감 망함 → 도구 서랍행.
            </p>
          </div>
        </div>
      </div>
    </SlideShell>
  );
}

// 03 — SOLUTION
function SlideSolution({ index, total }) {
  const steps = [
    { n: '01', ko: '이름 검색', en: 'Search', desc: '한글 / 영문 부분 일치' },
    { n: '02', ko: '재료 한 장', en: 'One Card', desc: '정체 · 사진 · 한 줄 정의' },
    { n: '03', ko: '9개 항목', en: 'Nine Fields', desc: '역할 · 차이 · 실수 · 대체 · 보관 · 구매' },
  ];
  return (
    <SlideShell index={index} total={total} kicker="Solution · 해결" title="이름 한 번 → 9개 항목 한 화면 → 3초.">
      <div className="grid grid-cols-12 gap-10 h-full">
        <div className="col-span-7 flex flex-col justify-center gap-6">
          {steps.map(s => (
            <div key={s.n} className="rule-b pb-6 flex items-start gap-8">
              <div className="display-xl text-6xl text-ink-soft" style={{ minWidth: 110 }}>{s.n}</div>
              <div className="flex-1">
                <div className="head-ko text-3xl mb-1">{s.ko}</div>
                <div className="display-it text-xl text-accent mb-2">{s.en}</div>
                <div className="text-base text-ink-soft">{s.desc}</div>
              </div>
              <div className="display-xl text-3xl accent">→</div>
            </div>
          ))}
          <div className="mt-2 flex items-center gap-3">
            <PillAccent>약속</PillAccent>
            <div className="text-lg text-ink">유튜브·블로그가 30초~3분 걸리는 답을, <strong className="accent">3초 이내</strong>로.</div>
          </div>
        </div>
        <div className="col-span-5 flex items-center">
          <Img src="./images/solution-flow.png" alt="검색 → 카드 → 9개 항목 플로우" ratio="aspect-[4/5]" label="SOLUTION-FLOW.PNG" className="w-full" />
        </div>
      </div>
    </SlideShell>
  );
}

// 04 — TARGET & DIFFERENTIATION
function SlideTarget({ index, total }) {
  const diff = [
    { num: '01', ko: '비교 모드', en: 'Side by Side', desc: '박력분/중력분/강력분처럼 헷갈리는 재료를 한 화면에 펼쳐 9개 항목 나란히. 한국 사이트에 거의 없는 포맷.' },
    { num: '02', ko: '3초 약속', en: 'Three Seconds', desc: '검색창 → 답까지 3초. 성공 기준이자 마케팅 메시지.' },
    { num: '03', ko: '초보자 실수 강조', en: 'Common Mistakes', desc: '단순 정의 대신 “이거 잘못 쓰면 망함” 경고를 매 페이지 표기. 실패 회피 사전.' },
    { num: '04', ko: '시각 통일감', en: 'One Visual Tone', desc: '57개 재료 사진을 모두 같은 톤·구도. 인스타·핀터레스트에서 시리즈로 발견되도록.' },
  ];
  return (
    <SlideShell index={index} total={total} kicker="Target & Differentiation" title="좁고 깊게 — 한국 초보자가 자주 막히는 30개.">
      <div className="grid grid-cols-12 gap-10 h-full">
        <div className="col-span-4 flex flex-col">
          <Kicker>Target</Kicker>
          <div className="head-ko text-[42px] leading-tight mt-3 mb-4">한국 베이킹 초보자</div>

// ========================================
// 🚀 APP — Router + Stage
// ========================================
const SLIDES = [
  SlideCover,
  SlideProblem,
  SlideSolution,
  SlideTarget,
  SlideTour,
  SlideStack,
  SlideDataModel,
  SlideArchitecture,
  SlideAdmin,
  SlideDeploy,
  SlideMetrics,
  SlideLessons,
  SlideNext,
  SlideClosing,
];

function parseHash() {
  const m = (location.hash || '').match(/^#\/(\d+)/);
  if (!m) return 1;
  const n = parseInt(m[1], 10);
  if (Number.isNaN(n)) return 1;
  return Math.max(1, Math.min(SLIDES.length, n));
}

function App() {
  const [current, setCurrent] = useState(parseHash());
  const [scale, setScale] = useState(1);

  // hash sync
  useEffect(() => {
    const onHash = () => setCurrent(parseHash());
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  useEffect(() => {
    const target = `#/${current}`;
    if (location.hash !== target) {
      history.replaceState(null, '', target);
    }
  }, [current]);

  // scale to viewport
  useEffect(() => {
    const fit = () => {
      const W = window.innerWidth;
      const H = window.innerHeight;
      const s = Math.min(W / 1600, H / 900);
      setScale(s);
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  // keyboard navigation
  const goNext = useCallback(() => setCurrent(c => Math.min(SLIDES.length, c + 1)), []);
  const goPrev = useCallback(() => setCurrent(c => Math.max(1, c - 1)), []);

  useEffect(() => {
    const onKey = (e) => {
      // ignore if user is typing in an input (none expected)
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;

      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
        e.preventDefault();
        goNext();
      } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        e.preventDefault();
        goPrev();
      } else if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        const el = document.documentElement;
        if (!document.fullscreenElement) {
          el.requestFullscreen && el.requestFullscreen();
        } else {
          document.exitFullscreen && document.exitFullscreen();
        }
      } else if (e.key === 'Escape') {
        if (document.fullscreenElement) {
          document.exitFullscreen && document.exitFullscreen();
        }
      } else if (e.key === 'Home') {
        e.preventDefault();
        setCurrent(1);
      } else if (e.key === 'End') {
        e.preventDefault();
        setCurrent(SLIDES.length);
      } else if (/^[0-9]$/.test(e.key)) {
        const n = parseInt(e.key, 10);
        if (n === 0) {
          setCurrent(10 <= SLIDES.length ? 10 : SLIDES.length);
        } else if (n >= 1 && n <= SLIDES.length) {
          setCurrent(n);
        }
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [goNext, goPrev]);

  const Current = SLIDES[current - 1];

  return (
    <>
      {/* Click zones for navigation */}
      <div className="zone-left"  onClick={goPrev} title="이전 (←)" />
      <div className="zone-right" onClick={goNext} title="다음 (→ / Space)" />

      <div className="stage">
        <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}>
          <Current key={current} index={current} total={SLIDES.length} />
        </div>
      </div>

      {/* Floating nav dots — at top center, doesn't block clicks (pointer-events none on container, on for buttons) */}
      <div
        style={{
          position: 'fixed',
          top: 18,
          left: '50%',
          transform: 'translateX(-50%)',
          display: 'flex',
          gap: 6,
          zIndex: 70,
        }}
      >
        {SLIDES.map((_, i) => (
          <button
            key={i}
            onClick={() => setCurrent(i + 1)}
            className={`nav-dot ${i + 1 === current ? 'active' : ''}`}
            style={{ border: 'none', cursor: 'pointer', padding: 0 }}
            aria-label={`슬라이드 ${i + 1}`}
          />
        ))}
      </div>

      {/* Keyboard hint — only shown briefly */}
      <KeyboardHint />

      {/* progress */}
      <div className="progress">
        <div className="progress-bar" style={{ width: `${(current / SLIDES.length) * 100}%` }} />
      </div>
    </>
  );
}

function KeyboardHint() {
  const [visible, setVisible] = useState(true);
  useEffect(() => {
    const t = setTimeout(() => setVisible(false), 4200);
    return () => clearTimeout(t);
  }, []);
  if (!visible) return null;
  return (
    <div
      style={{
        position: 'fixed',
        right: 18,
        bottom: 20,
        zIndex: 70,
        background: 'rgba(248,244,237,.92)',
        color: '#1A1714',
        border: '1px solid #E4DCCF',
        borderRadius: 8,
        padding: '10px 14px',
        fontSize: 12,
        boxShadow: '0 10px 30px rgba(0,0,0,.25)',
      }}
    >
      <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
        <span className="kbd">←</span> <span className="kbd">→</span> 슬라이드
        <span style={{ opacity: .3 }}>·</span>
        <span className="kbd">Space</span> 다음
        <span style={{ opacity: .3 }}>·</span>
        <span className="kbd">F</span> 풀스크린
        <span style={{ opacity: .3 }}>·</span>
        <span className="kbd">1–9</span> 점프
      </div>
    </div>
  );
}
