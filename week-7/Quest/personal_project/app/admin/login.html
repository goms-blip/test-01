<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baking Dict · 관리자 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    html, body { background: #F3F4F6; margin: 0; padding: 0; height: 100%; font-family: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif; color: #111827; -webkit-font-smoothing: antialiased; }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { width: 100%; max-width: 380px; background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; padding: 36px 32px 30px; box-shadow: 0 1px 0 rgba(17,24,39,0.04); }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .brand .logo { width: 40px; height: 40px; border-radius: 6px; background: #111827; color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: -0.02em; }
    .brand .name { font-family: 'Inter', 'Pretendard', sans-serif; font-weight: 700; font-size: 15px; color: #111827; letter-spacing: -0.01em; }
    .brand .sub { font-size: 11px; color: #6B7280; margin-top: 2px; }
    h1 { font-family: 'Inter', 'Pretendard', sans-serif; font-weight: 300; font-size: 22px; color: #111827; margin: 0 0 6px; letter-spacing: -0.02em; }
    .lead { font-size: 13px; color: #6B7280; margin-bottom: 24px; }
    .label { font-family: 'Inter', sans-serif; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; color: #6B7280; margin-bottom: 6px; display: block; }
    input.pw { width: 100%; background: #fff; border: 1px solid #E5E7EB; border-radius: 4px; padding: 11px 12px; font-size: 14px; color: #111827; font-family: inherit; box-sizing: border-box; transition: border-color .12s ease; }
    input.pw:focus { outline: none; border-color: #9CA3AF; }
    button.submit { width: 100%; background: #10B981; color: #fff; border: 0; padding: 12px 16px; border-radius: 4px; font-size: 14px; font-weight: 600; letter-spacing: 0.02em; cursor: pointer; margin-top: 18px; transition: filter .12s ease; font-family: inherit; }
    button.submit:hover { filter: brightness(0.95); }
    button.submit:disabled { background: #C7CBD1; cursor: not-allowed; }
    .err { margin-top: 14px; font-size: 12.5px; color: #DC2626; min-height: 1.2em; }
    .foot { margin-top: 26px; padding-top: 18px; border-top: 1px solid #EEF0F3; font-size: 11.5px; color: #9CA3AF; display: flex; justify-content: space-between; }
    .foot a { color: #6B7280; text-decoration: none; }
    .foot a:hover { color: #111827; }
  </style>
</head>
<body>
  <div class="wrap">
    <form class="card" id="form" autocomplete="off">
      <div class="brand">
        <div class="logo">BD</div>
        <div>
          <div class="name">Baking Dict</div>
          <div class="sub">관리자 콘솔</div>
        </div>
      </div>
      <h1>관리자 로그인</h1>
      <div class="lead">계속하려면 관리자 비밀번호를 입력하세요.</div>

      <label class="label" for="pw">비밀번호</label>
      <input id="pw" class="pw" type="password" name="password" autofocus required />

      <button type="submit" class="submit" id="submit">로그인</button>

      <div class="err" id="err" aria-live="polite"></div>

      <div class="foot">
        <a id="publicLink" href="/" target="_blank" rel="noreferrer">공개 사이트 →</a>
        <span>v0.1 · admin</span>
      </div>
    </form>
  </div>

  <script>
    (function () {
      const form = document.getElementById('form');
      const pw = document.getElementById('pw');
      const submit = document.getElementById('submit');
      const err = document.getElementById('err');

      // Localhost vs deployed origin — the public site is on a different port in dev.
      const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      const publicHref = isLocal ? 'http://localhost:8080/' : '/';
      document.getElementById('publicLink').href = publicHref;

      // After login, return to the admin shell. ./ resolves to /admin/ in prod,
      // and to / in local dev (where server.mjs maps / → admin/index.html).
      const adminHome = './';

      // If already authed, skip the form.
      fetch('/api/auth/me', { credentials: 'same-origin' }).then(r => {
        if (r.ok) location.replace(adminHome);
      }).catch(() => {});

      // Only accept same-origin relative paths to avoid open-redirect via ?next=https://evil.com.
      // Allowed: paths starting with "/" but not "//" or "/\" (which can resolve to other origins).
      function safeNext(raw) {
        if (typeof raw !== 'string' || !raw) return adminHome;
        if (!raw.startsWith('/')) return adminHome;
        if (raw.startsWith('//') || raw.startsWith('/\\')) return adminHome;
        return raw;
      }
      const next = safeNext(new URLSearchParams(location.search).get('next'));

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        err.textContent = '';
        submit.disabled = true;
        submit.textContent = '확인 중…';
        fetch('/api/auth/login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw.value }),
        }).then(function (r) {
          return r.json().then(function (b) { return { ok: r.ok, body: b }; });
        }).then(function (result) {
          if (result.ok) {
            location.replace(next);
          } else {
            err.textContent = (result.body && result.body.error) || '로그인 실패';
            pw.select();
          }
        }).catch(function (e) {
          err.textContent = '네트워크 오류: ' + e.message;
        }).finally(function () {
          submit.disabled = false;
          submit.textContent = '로그인';
        });
      });
    })();
  </script>
</body>
</html>
