<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baking Dict · Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            page:    '#F3F4F6',
            card:    '#FFFFFF',
            line:    '#E5E7EB',
            line2:   '#EEF0F3',
            ink:     '#111827',
            ink2:    '#1F2937',
            mute:    '#6B7280',
            mute2:   '#9CA3AF',
            mute3:   '#C7CBD1',
            soft:    '#F8F9FB',
            accent:  '#E25A5A',  // coral (active nav, primary brand)
            accent2: '#FFE0E0',  // active nav bg tint
            warn:    '#F59E0B',  // help-card accent
            ok:      '#10B981',  // save button
            ok2:     '#059669',
            danger:  '#DC2626',
          },
          fontFamily: {
            sans:  ['Pretendard', 'Noto Sans KR', 'system-ui', 'sans-serif'],
            disp:  ['Inter', 'Pretendard', 'sans-serif'],
          },
          letterSpacing: { ultra: '0.22em', wide2: '0.06em' },
          boxShadow: { card: '0 1px 0 rgba(17,24,39,0.04)' },
        },
      },
    };
  </script>

  <style>
    html, body { background: #F3F4F6; }
    body {
      font-family: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
      color: #111827;
      -webkit-font-smoothing: antialiased;
      font-weight: 400;
    }
    .label {
      font-family: 'Inter', 'Pretendard', sans-serif;
      font-size: 10.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
      color: #6B7280;
    }
    .meta {
      font-family: 'Inter', 'Pretendard', sans-serif;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .input, .textarea, .select {
      width: 100%;
      background: #FFFFFF;
      border: 1px solid #E5E7EB;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 14px;
      color: #111827;
      transition: border-color .12s ease;
    }
    .input:focus, .textarea:focus, .select:focus {
      outline: none;
      border-color: #9CA3AF;
    }
    .textarea { resize: vertical; min-height: 96px; line-height: 1.55; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    @media (max-width: 640px) { .field-row, .field-row.cols-3 { grid-template-columns: 1fr; } }

    /* sidebar */
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: 6px;
      color: #6B7280; font-size: 13px; font-weight: 500;
      letter-spacing: 0.02em;
      transition: background .12s ease, color .12s ease;
      cursor: pointer;
    }
    .nav-item:hover { background: #F3F4F6; color: #111827; }
    .nav-item.active { background: #FFE0E0; color: #E25A5A; }
    .nav-item .ic { width: 32px; height: 32px; border-radius: 6px; background: #F3F4F6; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .nav-item.active .ic { background: #E25A5A; color: #fff; }
    .nav-item .ic svg { width: 16px; height: 16px; }
    .nav-item .meta-row { display: flex; flex-direction: column; line-height: 1.2; }
    .nav-item .sub { font-size: 11px; color: #9CA3AF; font-weight: 400; margin-top: 2px; }
    .nav-item.active .sub { color: #E25A5A; opacity: 0.7; }

    /* help card right column */
    .help-card { position: relative; background: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 6px; padding: 18px 20px 20px; }
    .help-card::before { content:''; position: absolute; left: 0; top: 14px; bottom: 14px; width: 2px; background: #F59E0B; border-radius: 2px; }

    /* drag-drop */
    .dropzone {
      border: 1.5px dashed #D1D5DB; border-radius: 6px;
      background: #FAFBFC;
      min-height: 220px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      transition: background .12s ease, border-color .12s ease;
      cursor: pointer;
    }
    .dropzone.over { background: #FFF7ED; border-color: #F59E0B; }

    /* table */
    .row-card { background: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 6px; transition: border-color .12s ease, box-shadow .12s ease; cursor: pointer; }
    .row-card:hover { border-color: #C7CBD1; }
    .pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; background: #F3F4F6; color: #4B5563; font-size: 11px; letter-spacing: 0.02em; }

    /* buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 18px; border-radius: 4px; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; cursor: pointer; transition: filter .12s ease, background .12s ease; user-select: none; }
    .btn-primary { background: #10B981; color: #fff; }
    .btn-primary:hover { filter: brightness(0.95); }
    .btn-primary:disabled { background: #C7CBD1; cursor: not-allowed; filter: none; }
    .btn-ghost { background: transparent; color: #6B7280; }
    .btn-ghost:hover { color: #111827; }
    .btn-danger { background: transparent; color: #DC2626; }
    .btn-danger:hover { background: #FEF2F2; }
    .btn-dark { background: #111827; color: #fff; }
    .btn-dark:hover { filter: brightness(1.1); }

    /* hide visual scrollbar on sidebar */
    .scroll-soft::-webkit-scrollbar { width: 6px; }
    .scroll-soft::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 3px; }

    /* toggle switch */
    .toggle {
      position: relative; display: inline-flex; align-items: center;
      width: 38px; height: 22px; border-radius: 999px;
      background: #D1D5DB; cursor: pointer; flex-shrink: 0;
      transition: background .15s ease;
    }
    .toggle::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px; background: #fff; border-radius: 50%;
      transition: left .15s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.18);
    }
    .toggle.on { background: #10B981; }
    .toggle.on::after { left: 19px; }
    .toggle.busy { opacity: 0.5; pointer-events: none; }

    .row-card.hidden-row { opacity: 0.55; }
    .row-card.hidden-row .row-thumb { filter: grayscale(0.6); }

    /* small select wrapper */
    .select-wrap { position: relative; }
    .select-wrap::after { content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #9CA3AF; pointer-events: none; font-size: 11px; }
    select.select { appearance: none; padding-right: 28px; }
  </style>
</head>
<body>
  <div id="root">
    <div style="min-height:60vh;display:flex;align-items:center;justify-content:center;color:#9CA3AF;font-size:14px">관리자 콘솔 로딩 중…</div>
  </div>

  <script type="text/babel" data-presets="env,react">
  const { useState, useEffect, useMemo, useCallback, useRef } = React;

  // ===== API client =====================================================
  // All requests include cookies (same-origin). 401 → bounce to /login.html.
  const f = (url, init) => fetch(url, { credentials: 'same-origin', ...(init || {}) });
  const api = {
    list:   () => f('/api/ingredients').then(j),
    upsert: (row) => f('/api/ingredients', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(row),
    }).then(j),
    patch: (slug, patch) => f(`/api/ingredients/${encodeURIComponent(slug)}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(patch),
    }).then(j),
    remove: (slug) => f(`/api/ingredients/${encodeURIComponent(slug)}`, { method: 'DELETE' }).then(j),
    uploadImage: (slug, file) => f(`/api/ingredients/${encodeURIComponent(slug)}/image`, {
      method: 'PUT',
      headers: { 'Content-Type': file.type || 'image/png' },
      body: file,
    }).then(j),
    logout: () => f('/api/auth/logout', { method: 'POST' }).then(j),
  };
  // Absolute paths — relative ./login.html would resolve to /login.html when
  // the URL bar shows /admin (no trailing slash, which is how Vercel serves it).
  const LOGIN_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? '/admin/login.html'   // dev shim serves /admin/login.html directly
    : '/admin/login';       // Vercel cleanUrls drops the .html
  function j(res) {
    if (res.status === 401) {
      location.replace(LOGIN_URL + '?next=' + encodeURIComponent(location.pathname + location.hash));
      // Return a never-resolving promise so the caller doesn't continue rendering.
      return new Promise(() => {});
    }
    if (!res.ok) return res.json().then(b => { throw new Error(b.error || `HTTP ${res.status}`); });
    return res.json();
  }

  // Public-site link depends on whether we're on localhost (separate dev port)
  // or a real deployment (same origin).
  const PUBLIC_HOME = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? 'http://localhost:8080/'
    : '/';

  // ===== UI metadata (admin-only; DB enum is the source of truth) ======
  const CATEGORIES = [
    { slug: 'flour',     name: '가루류',                emoji: '🌾' },
    { slug: 'leavening', name: '팽창제',                emoji: '🫧' },
    { slug: 'sugar',     name: '당류',                  emoji: '🍯' },
    { slug: 'dairy_fat', name: '유제품·지방',           emoji: '🧈' },
    { slug: 'etc',       name: '계란·견과·초콜릿·향료', emoji: '🥚' },
    { slug: 'spirit',    name: '술·리큐어',             emoji: '🍷' },
  ];
  const catLabel = (slug) => CATEGORIES.find(c => c.slug === slug)?.name || slug;

  const ICONS = {
    dashboard: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>),
    ingredients: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M4 7h16M6 7v12a2 2 0 002 2h8a2 2 0 002-2V7M9 7V5a3 3 0 116 0v2"/></svg>),
    image: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="M21 17l-5-5-9 9"/></svg>),
    eye: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>),
    plus: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12h14"/></svg>),
    search: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>),
    trash: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M6 6l1 14a2 2 0 002 2h6a2 2 0 002-2l1-14"/></svg>),
    upload: (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>),
  };

  // ===== Router =========================================================
  function useHashRoute() {
    const [hash, setHash] = useState(() => location.hash || '#/ingredients');
    useEffect(() => {
      const on = () => setHash(location.hash || '#/ingredients');
      window.addEventListener('hashchange', on);
      return () => window.removeEventListener('hashchange', on);
    }, []);
    return hash;
  }
  const nav = (to) => { location.hash = to; };

  // ===== Sidebar ========================================================
  function Sidebar({ active }) {
    const items = [
      { key: 'dashboard',  to: '#/dashboard',   icon: 'dashboard',   title: '대시보드',  sub: '데이터 현황' },
      { key: 'ingredients',to: '#/ingredients', icon: 'ingredients', title: '재료',     sub: '57건 관리' },
      { key: 'images',     to: '#/images',      icon: 'image',       title: '이미지',   sub: 'Storage 자산' },
      { key: 'preview',    href: PUBLIC_HOME, icon: 'eye', title: '미리보기', sub: '공개 사이트' },
    ];
    return (
      <aside className="sidebar fixed top-0 bottom-0 left-0 w-[260px] bg-white border-r border-line2 px-5 py-6 scroll-soft overflow-y-auto z-30">
        <div className="flex items-center gap-3 pb-6 border-b border-line2">
          <div className="w-10 h-10 rounded bg-ink text-white flex items-center justify-center" style={{fontFamily:'Inter'}}>
            <span className="font-bold tracking-tight text-[15px]">BD</span>
          </div>
          <div>
            <div className="font-disp font-bold text-[15px] tracking-tight text-ink leading-none">Baking Dict</div>
            <div className="text-[11px] text-mute mt-1">관리자 콘솔</div>
          </div>
        </div>

        <nav className="mt-5 flex flex-col gap-1">
          {items.map(it => {
            const className = `nav-item ${active === it.key ? 'active' : ''}`;
            const inner = (
              <>
                <span className="ic">{ICONS[it.icon]}</span>
                <span className="meta-row">
                  <span>{it.title}</span>
                  <span className="sub">{it.sub}</span>
                </span>
              </>
            );
            if (it.href) {
              return (
                <a key={it.key} href={it.href} target="_blank" rel="noreferrer" className={className}>
                  {inner}
                </a>
              );
            }
            return (
              <a key={it.key} href={it.to} className={className}>
                {inner}
              </a>
            );
          })}
        </nav>

        <div className="mt-10 pt-5 border-t border-line2">
          <button className="w-full nav-item" onClick={async () => {
            try { await api.logout(); } catch (e) {}
            location.replace(LOGIN_URL);
          }}>
            <span className="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></span>
            <span className="meta-row">
              <span>로그아웃</span>
              <span className="sub">세션 종료</span>
            </span>
          </button>
        </div>

        <div className="mt-6 text-[11px] text-mute2 leading-relaxed">
          <div>v0.1 · admin</div>
          <div className="mt-1">© 2026 baking dict</div>
        </div>
      </aside>
    );
  }

  // ===== Shell ==========================================================
  function Shell({ active, title, subtitle, children, action }) {
    return (
      <div>
        <Sidebar active={active} />
        <main className="ml-[260px] min-h-screen px-10 py-10 max-w-[1480px]">
          <header className="flex items-end justify-between mb-8">
            <div>
              <h1 className="font-disp text-[28px] font-light tracking-tight text-ink leading-tight">{title}</h1>
              {subtitle && <div className="text-mute text-sm mt-1">{subtitle}</div>}
            </div>
            <div className="flex items-center gap-3">{action}</div>
          </header>
          {children}
        </main>
      </div>
    );
  }

  // ===== Pages: List ====================================================
  function ListPage({ rows, reload, setRows }) {
    const [q, setQ] = useState('');
    const [cat, setCat] = useState('all');
    const [vis, setVis] = useState('all'); // all | visible | hidden
    const [busySlug, setBusySlug] = useState(null);

    const filtered = useMemo(() => {
      const k = q.trim().toLowerCase();
      return rows.filter(r => {
        if (cat !== 'all' && r.category !== cat) return false;
        if (vis === 'visible' && !r.is_visible) return false;
        if (vis === 'hidden' && r.is_visible) return false;
        if (!k) return true;
        return (
          (r.name_ko || '').toLowerCase().includes(k) ||
          (r.name_en || '').toLowerCase().includes(k) ||
          (r.slug || '').toLowerCase().includes(k)
        );
      });
    }, [rows, q, cat, vis]);

    const counts = useMemo(() => ({
      visible: rows.filter(r => r.is_visible).length,
      hidden: rows.filter(r => !r.is_visible).length,
    }), [rows]);

    const toggleVisible = async (e, row) => {
      e.stopPropagation();
      const next = !row.is_visible;
      setBusySlug(row.slug);
      // optimistic update
      setRows(prev => prev.map(r => r.slug === row.slug ? { ...r, is_visible: next } : r));
      try {
        await api.patch(row.slug, { is_visible: next });
      } catch (err) {
        // rollback
        setRows(prev => prev.map(r => r.slug === row.slug ? { ...r, is_visible: !next } : r));
        alert('변경 실패: ' + err.message);
      } finally {
        setBusySlug(null);
      }
    };

    const action = (
      <button className="btn btn-dark" onClick={() => nav('#/ingredients/new')}>
        <span className="w-4 h-4">{ICONS.plus}</span>
        <span>새 재료</span>
      </button>
    );

    return (
      <Shell active="ingredients" title="재료 관리" subtitle={`총 ${rows.length}건 · 공개 ${counts.visible} · 숨김 ${counts.hidden}`} action={action}>
        <div className="grid grid-cols-[1fr_180px_180px] gap-3 mb-5">
          <div className="relative">
            <span className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-mute2">{ICONS.search}</span>
            <input className="input pl-10" placeholder="한글·영문·slug로 검색" value={q} onChange={e => setQ(e.target.value)} />
          </div>
          <div className="select-wrap">
            <select className="select" value={vis} onChange={e => setVis(e.target.value)}>
              <option value="all">공개·숨김 모두</option>
              <option value="visible">공개만</option>
              <option value="hidden">숨김만</option>
            </select>
          </div>
          <div className="select-wrap">
            <select className="select" value={cat} onChange={e => setCat(e.target.value)}>
              <option value="all">전체 카테고리</option>
              {CATEGORIES.map(c => <option key={c.slug} value={c.slug}>{c.emoji} {c.name}</option>)}
            </select>
          </div>
        </div>

        <div className="text-[11px] text-mute mb-2">
          {filtered.length}건 표시{q || cat !== 'all' || vis !== 'all' ? ` · 전체 ${rows.length}건 중` : ''}
        </div>

        <div className="grid grid-cols-1 gap-2">
          {filtered.map(r => (
            <div key={r.slug}
                 className={`row-card grid grid-cols-[56px_1fr_120px_120px_80px_20px] items-center gap-4 px-4 py-3 ${r.is_visible ? '' : 'hidden-row'}`}
                 onClick={() => nav(`#/ingredients/edit/${encodeURIComponent(r.slug)}`)}>
              <div className="row-thumb w-14 h-14 rounded bg-soft overflow-hidden border border-line2">
                {r.image_url ? <img src={r.image_url} alt="" className="w-full h-full object-cover" loading="lazy" /> : null}
              </div>
              <div>
                <div className="text-[15px] font-medium text-ink leading-tight">
                  {r.name_ko}
                  <span className="text-mute2 text-[12px] font-normal ml-1">{r.name_en}</span>
                  {!r.is_visible && <span className="ml-2 pill" style={{background:'#FEF3C7',color:'#92400E'}}>숨김</span>}
                </div>
                <div className="text-[12px] text-mute mt-1 line-clamp-1">{r.summary}</div>
              </div>
              <div><span className="pill">{catLabel(r.category)}</span></div>
              <div className="text-[11px] text-mute2 font-mono">{r.slug}</div>
              <div className="flex items-center justify-center"
                   onClick={e => toggleVisible(e, r)}
                   title={r.is_visible ? '공개 중 — 클릭하면 숨김' : '숨김 중 — 클릭하면 공개'}>
                <span className={`toggle ${r.is_visible ? 'on' : ''} ${busySlug === r.slug ? 'busy' : ''}`} role="switch" aria-checked={r.is_visible}></span>
              </div>
              <div className="text-mute2 text-right">›</div>
            </div>
          ))}
          {!filtered.length && (
            <div className="bg-card border border-line2 rounded p-10 text-center text-mute text-sm">
              조건에 맞는 재료가 없습니다.
            </div>
          )}
        </div>
      </Shell>
    );
  }

  // ===== Pages: Edit / New =============================================
  const EMPTY = {
    slug: '', name_ko: '', name_en: '', name_zh: '', category: 'flour',
    summary: '', emoji: '', role: '',
    similar_ingredients: '', common_mistakes: '', substitutes: '',
    storage: '', where_to_buy: '',
    sort_order: null, image_url: '', is_visible: true,
  };

  function EditPage({ rows, slug, reload }) {
    const original = useMemo(() => rows.find(r => r.slug === slug), [rows, slug]);
    const isNew = !slug;
    const [form, setForm] = useState(() => isNew ? { ...EMPTY } : { ...EMPTY, ...(original || {}) });
    const [saving, setSaving] = useState(false);
    const [uploading, setUploading] = useState(false);
    const [error, setError] = useState(null);
    const [toast, setToast] = useState(null);
    const [dirty, setDirty] = useState(false);
    const fileInput = useRef(null);
    const [dragOver, setDragOver] = useState(false);

    useEffect(() => {
      if (!isNew && original) setForm({ ...EMPTY, ...original });
    }, [original, isNew]);

    const set = (k, v) => { setForm(prev => ({ ...prev, [k]: v })); setDirty(true); };

    const onSave = async () => {
      setError(null); setSaving(true);
      try {
        const payload = { ...form };
        if (!payload.slug || !payload.name_ko || !payload.name_en || !payload.category || !payload.summary || !payload.role) {
          throw new Error('필수: slug / name_ko / name_en / category / summary / role');
        }
        if (payload.sort_order != null && payload.sort_order !== '') payload.sort_order = Number(payload.sort_order);
        else delete payload.sort_order;
        await api.upsert(payload);
        await reload();
        setDirty(false);
        setToast('저장됨');
        setTimeout(() => setToast(null), 1500);
        if (isNew) nav(`#/ingredients/edit/${encodeURIComponent(payload.slug)}`);
      } catch (e) {
        setError(e.message);
      } finally {
        setSaving(false);
      }
    };

    const onDelete = async () => {
      if (!confirm(`'${form.slug}' 재료를 삭제할까요? 이 작업은 되돌릴 수 없습니다.`)) return;
      try {
        await api.remove(form.slug);
        await reload();
        nav('#/ingredients');
      } catch (e) {
        setError(e.message);
      }
    };

    const onPickImage = () => fileInput.current?.click();
    const onFile = async (file) => {
      if (!file || !form.slug) {
        setError('이미지 업로드는 재료를 먼저 저장한 뒤 가능합니다.');
        return;
      }
      setError(null); setUploading(true);
      try {
        const result = await api.uploadImage(form.slug, file);
        setForm(prev => ({ ...prev, image_url: result.image_url }));
        await reload();
        setToast('이미지 업로드됨');
        setTimeout(() => setToast(null), 1500);
      } catch (e) {
        setError(e.message);
      } finally {
        setUploading(false);
      }
    };

    return (
      <Shell
        active="ingredients"
        title={isNew ? '새 재료 추가' : form.name_ko || form.slug}
        subtitle={isNew ? '필수 항목을 채운 뒤 저장하면 이미지 업로드가 열립니다' : `slug: ${form.slug}`}
        action={
          <div className="flex items-center gap-2">
            {!isNew && (
              <button className="btn btn-danger" onClick={onDelete}>
                <span className="w-4 h-4">{ICONS.trash}</span>
                <span>삭제</span>
              </button>
            )}
            <a className="btn btn-ghost" href="#/ingredients">목록으로</a>
          </div>
        }
      >
        <div className="grid grid-cols-[1fr_280px] gap-5">
          <div className="flex flex-col gap-5">
            {/* SECTION: 공개 상태 */}
            <section className={`bg-card border rounded-md p-5 flex items-center justify-between ${form.is_visible ? 'border-line2' : 'border-[#F59E0B]'}`}>
              <div>
                <div className="label mb-1">공개 상태</div>
                <div className="text-[13px] text-ink font-medium">
                  {form.is_visible
                    ? <>공개 중 <span className="text-mute font-normal">— 사이트 방문자에게 표시됨</span></>
                    : <>숨김 <span className="text-mute font-normal">— 공개 사이트에서 보이지 않음</span></>}
                </div>
              </div>
              <div className="flex items-center gap-3">
                <span className="text-[12px] text-mute">{form.is_visible ? '공개' : '숨김'}</span>
                <span className={`toggle ${form.is_visible ? 'on' : ''}`} role="switch" aria-checked={form.is_visible}
                      onClick={() => set('is_visible', !form.is_visible)}></span>
              </div>
            </section>

            {/* SECTION: 기본 정보 */}
            <section className="bg-card border border-line2 rounded-md p-7">
              <div className="label mb-4">기본 정보</div>

              <div className="flex flex-col gap-3">
                <div>
                  <div className="meta text-mute mb-1.5">SLUG (URL 식별자) *</div>
                  <input className="input font-mono text-[13px]" placeholder="cake-flour"
                         value={form.slug} disabled={!isNew}
                         onChange={e => set('slug', e.target.value)} />
                  {isNew && <div className="text-[11px] text-mute2 mt-1">저장 후 변경 불가. 영문 소문자·숫자·하이픈.</div>}
                </div>

                <div className="field-row">
                  <div>
                    <div className="meta text-mute mb-1.5">이름 (한글) *</div>
                    <input className="input" value={form.name_ko} onChange={e => set('name_ko', e.target.value)} />
                  </div>
                  <div>
                    <div className="meta text-mute mb-1.5">이름 (영문) *</div>
                    <input className="input" value={form.name_en} onChange={e => set('name_en', e.target.value)} />
                  </div>
                </div>

                <div className="field-row">
                  <div>
                    <div className="meta text-mute mb-1.5">이름 (한자/일문)</div>
                    <input className="input" value={form.name_zh || ''} onChange={e => set('name_zh', e.target.value)} />
                  </div>
                  <div>
                    <div className="meta text-mute mb-1.5">이모지</div>
                    <input className="input" placeholder="🌾" value={form.emoji || ''} onChange={e => set('emoji', e.target.value)} />
                  </div>
                </div>

                <div className="field-row">
                  <div>
                    <div className="meta text-mute mb-1.5">카테고리 *</div>
                    <div className="select-wrap">
                      <select className="select" value={form.category} onChange={e => set('category', e.target.value)}>
                        {CATEGORIES.map(c => <option key={c.slug} value={c.slug}>{c.emoji} {c.name}</option>)}
                      </select>
                    </div>
                  </div>
                  <div>
                    <div className="meta text-mute mb-1.5">정렬 순서 (낮을수록 위)</div>
                    <input type="number" className="input" placeholder="10" value={form.sort_order ?? ''}
                           onChange={e => set('sort_order', e.target.value)} />
                  </div>
                </div>
              </div>
            </section>

            {/* SECTION: 콘텐츠 */}
            <section className="bg-card border border-line2 rounded-md p-7">
              <div className="label mb-4">콘텐츠</div>

              <div className="flex flex-col gap-3">
                <div>
                  <div className="meta text-mute mb-1.5">한 줄 정체 (summary) *</div>
                  <textarea className="textarea" rows={2} value={form.summary} onChange={e => set('summary', e.target.value)} />
                </div>
                <div>
                  <div className="meta text-mute mb-1.5">베이킹에서의 역할 (role) *</div>
                  <textarea className="textarea" rows={4} value={form.role} onChange={e => set('role', e.target.value)} />
                </div>
                <div>
                  <div className="meta text-mute mb-1.5">헷갈리는 비슷한 재료와의 차이</div>
                  <textarea className="textarea" rows={4} value={form.similar_ingredients || ''} onChange={e => set('similar_ingredients', e.target.value)} />
                </div>
                <div>
                  <div className="meta text-mute mb-1.5">초보자가 자주 하는 실수</div>
                  <textarea className="textarea" rows={4} value={form.common_mistakes || ''} onChange={e => set('common_mistakes', e.target.value)} />
                </div>
                <div>
                  <div className="meta text-mute mb-1.5">대체 가능 여부 + 비율</div>
                  <textarea className="textarea" rows={3} value={form.substitutes || ''} onChange={e => set('substitutes', e.target.value)} />
                </div>
                <div className="field-row">
                  <div>
                    <div className="meta text-mute mb-1.5">보관법</div>
                    <textarea className="textarea" rows={3} value={form.storage || ''} onChange={e => set('storage', e.target.value)} />
                  </div>
                  <div>
                    <div className="meta text-mute mb-1.5">한국에서 구매 가능한 곳</div>
                    <textarea className="textarea" rows={3} value={form.where_to_buy || ''} onChange={e => set('where_to_buy', e.target.value)} />
                  </div>
                </div>
              </div>
            </section>

            {/* SECTION: 이미지 */}
            <section className="bg-card border border-line2 rounded-md p-7">
              <div className="label mb-4">이미지</div>
              <div className="grid grid-cols-[200px_1fr] gap-5">
                <div className="w-[200px] h-[200px] rounded bg-soft border border-line2 overflow-hidden flex items-center justify-center">
                  {form.image_url
                    ? <img src={form.image_url} alt="" className="w-full h-full object-cover" />
                    : <div className="text-mute2 text-[12px] text-center px-3">이미지 없음<br/><span className="text-[10px]">저장 후 업로드 가능</span></div>}
                </div>
                <div
                  className={`dropzone ${dragOver ? 'over' : ''} ${!form.slug || isNew && !rows.find(r=>r.slug===form.slug) ? 'opacity-60 pointer-events-none' : ''}`}
                  onClick={onPickImage}
                  onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                  onDragLeave={() => setDragOver(false)}
                  onDrop={e => { e.preventDefault(); setDragOver(false); const f = e.dataTransfer.files?.[0]; onFile(f); }}>
                  <div className="w-8 h-8 text-mute2">{ICONS.upload}</div>
                  <div className="font-medium text-ink text-sm">
                    {uploading ? '업로드 중…' : <>여기에 드래그하거나 <span className="underline">파일 선택</span></>}
                  </div>
                  <div className="text-[11px] text-mute2">PNG · JPG · WEBP · AVIF / 권장 1024×1024 / 최대 4MB</div>
                  <input ref={fileInput} type="file" accept="image/*" className="hidden"
                         onChange={e => { const f = e.target.files?.[0]; if (f) onFile(f); e.target.value=''; }} />
                </div>
              </div>
            </section>
          </div>

          {/* Right: help cards */}
          <aside className="flex flex-col gap-4">
            <div className="help-card">
              <div className="font-disp font-semibold text-[14px] text-ink mb-2">slug에 대하여</div>
              <p className="text-[12.5px] text-mute leading-relaxed">
                URL 식별자입니다. 한 번 저장하면 변경할 수 없으니 신중히 정하세요. <code className="text-ink bg-soft px-1 rounded">cake-flour</code>처럼 영문 소문자·하이픈 권장.
              </p>
            </div>
            <div className="help-card">
              <div className="font-disp font-semibold text-[14px] text-ink mb-2">필수 6개 필드</div>
              <p className="text-[12.5px] text-mute leading-relaxed">
                slug · 한글명 · 영문명 · 카테고리 · summary · role 은 비어 있으면 저장이 거부됩니다. 나머지 항목은 비워둬도 OK.
              </p>
            </div>
            <div className="help-card">
              <div className="font-disp font-semibold text-[14px] text-ink mb-2">이미지 업로드</div>
              <p className="text-[12.5px] text-mute leading-relaxed">
                새 재료는 <b>먼저 저장</b>해야 업로드할 수 있습니다 (slug 기준 경로). 업로드 시 같은 slug의 기존 이미지는 자동 덮어쓰기.
              </p>
            </div>
          </aside>
        </div>

        {/* Bottom action bar */}
        <div className="mt-7 flex items-center justify-between">
          <div className="text-[12px] text-mute">
            {error
              ? <span className="text-danger">⚠ {error}</span>
              : toast
                ? <span className="text-ok2">✓ {toast}</span>
                : dirty
                  ? '변경 사항 있음'
                  : <>&nbsp;</>}
          </div>
          <div className="flex items-center gap-2">
            <a className="btn btn-ghost" href="#/ingredients">취소하고 돌아가기</a>
            <button className="btn btn-primary" onClick={onSave} disabled={saving || !dirty && !isNew}>
              {saving ? '저장 중…' : isNew ? '재료 만들기' : '변경 저장'}
            </button>
          </div>
        </div>
      </Shell>
    );
  }

  // ===== Pages: simple placeholders ====================================
  function DashboardPage({ rows }) {
    const byCat = useMemo(() => {
      const m = {}; rows.forEach(r => m[r.category] = (m[r.category]||0)+1); return m;
    }, [rows]);
    const withImg = rows.filter(r => r.image_url).length;
    return (
      <Shell active="dashboard" title="대시보드" subtitle="데이터 현황">
        <div className="grid grid-cols-3 gap-4">
          <div className="bg-card border border-line2 rounded p-6">
            <div className="label">총 재료</div>
            <div className="font-disp text-[36px] font-light mt-2">{rows.length}</div>
            <div className="text-[12px] text-mute mt-1">목표 60</div>
          </div>
          <div className="bg-card border border-line2 rounded p-6">
            <div className="label">이미지 보유</div>
            <div className="font-disp text-[36px] font-light mt-2">{withImg}</div>
            <div className="text-[12px] text-mute mt-1">/ {rows.length}</div>
          </div>
          <div className="bg-card border border-line2 rounded p-6">
            <div className="label">카테고리</div>
            <div className="font-disp text-[36px] font-light mt-2">{Object.keys(byCat).length}</div>
            <div className="text-[12px] text-mute mt-1">고정 6개</div>
          </div>
        </div>
        <div className="mt-5 bg-card border border-line2 rounded p-6">
          <div className="label mb-4">카테고리별 분포</div>
          <div className="grid grid-cols-6 gap-3">
            {CATEGORIES.map(c => (
              <div key={c.slug}>
                <div className="text-[12px] text-mute">{c.emoji} {c.name}</div>
                <div className="font-disp text-[24px] mt-1">{byCat[c.slug] || 0}</div>
              </div>
            ))}
          </div>
        </div>
      </Shell>
    );
  }

  function ImagesPage({ rows }) {
    const without = rows.filter(r => !r.image_url);
    return (
      <Shell active="images" title="이미지" subtitle={`Storage 자산 · 누락 ${without.length}건`}>
        <div className="bg-card border border-line2 rounded p-6">
          <div className="label mb-3">미보유 재료</div>
          {without.length === 0
            ? <div className="text-mute text-sm">모든 재료에 이미지가 있습니다.</div>
            : <div className="grid grid-cols-3 gap-2">
                {without.map(r => (
                  <a key={r.slug} href={`#/ingredients/edit/${encodeURIComponent(r.slug)}`} className="row-card px-4 py-3 block">
                    <div className="text-[14px] text-ink">{r.name_ko}</div>
                    <div className="text-[11px] text-mute2 font-mono">{r.slug}</div>
                  </a>
                ))}
              </div>}
        </div>
      </Shell>
    );
  }

  // ===== App ============================================================
  function App() {
    const hash = useHashRoute();
    const [rows, setRows] = useState([]);
    const [loading, setLoading] = useState(true);
    const [bootError, setBootError] = useState(null);

    const reload = useCallback(async () => {
      const data = await api.list();
      setRows(data);
    }, []);

    useEffect(() => {
      (async () => {
        try { await reload(); }
        catch (e) { setBootError(e.message); }
        finally { setLoading(false); }
      })();
    }, [reload]);

    if (loading) {
      return <div className="min-h-screen flex items-center justify-center text-mute text-sm">데이터 불러오는 중…</div>;
    }
    if (bootError) {
      return <div className="min-h-screen flex items-center justify-center text-danger text-sm">API 호출 실패: {bootError}</div>;
    }

    if (hash.startsWith('#/ingredients/new')) {
      return <EditPage rows={rows} slug={null} reload={reload} />;
    }
    const editMatch = hash.match(/^#\/ingredients\/edit\/(.+)$/);
    if (editMatch) {
      return <EditPage rows={rows} slug={decodeURIComponent(editMatch[1])} reload={reload} />;
    }
    if (hash.startsWith('#/dashboard')) return <DashboardPage rows={rows} />;
    if (hash.startsWith('#/images'))    return <ImagesPage rows={rows} />;
    return <ListPage rows={rows} reload={reload} setRows={setRows} />;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
