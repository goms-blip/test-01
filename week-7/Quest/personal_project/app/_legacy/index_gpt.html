  function highlight(text, q) {
    if (!q) return text;
    const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const parts = String(text).split(new RegExp(`(${safe})`, 'ig'));
    return parts.map((p, i) =>
      p.toLowerCase() === q.toLowerCase()
        ? <mark key={i} className="hl">{p}</mark>
        : <span key={i}>{p}</span>
    );
  }

  function searchIngredients(q) {
    if (!q || !q.trim()) return [];
    const k = q.trim().toLowerCase();
    return INGREDIENTS.filter(i =>
      i.name_ko.toLowerCase().includes(k) ||
      i.name_en.toLowerCase().includes(k) ||
      (i.name_zh && i.name_zh.toLowerCase().includes(k)) ||
      i.summary.toLowerCase().includes(k)
    ).slice(0, 12);
  }

  // ========================================
  const TRAY_KEY = 'baking-dict.compare-tray.v1';
  const TrayContext = createContext(null);
  const useTray = () => useContext(TrayContext);

  function TrayProvider({ children }) {
    const [ids, setIds] = useState(() => {
      try {
        const raw = localStorage.getItem(TRAY_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed.slice(0, 3) : [];
      } catch { return []; }
    });

    useEffect(() => {
      try { localStorage.setItem(TRAY_KEY, JSON.stringify(ids)); } catch {}
    }, [ids]);

    const add = useCallback((slug) => {
      setIds(prev => prev.includes(slug) || prev.length >= 3 ? prev : [...prev, slug]);
    }, []);
    const remove = useCallback((slug) => setIds(prev => prev.filter(s => s !== slug)), []);
    const clear  = useCallback(() => setIds([]), []);
    const has    = useCallback((slug) => ids.includes(slug), [ids]);

    const value = useMemo(() => ({ ids, add, remove, clear, has }), [ids, add, remove, clear, has]);
    return <TrayContext.Provider value={value}>{children}</TrayContext.Provider>;
  }

  // ========================================
  // 🔀 Hash Router (path + query)
  // ========================================
  const RouterContext = createContext(null);
  const useRouter = () => useContext(RouterContext);

  function parseHash() {
    const raw = (window.location.hash || '#/').replace(/^#/, '');
    const [path, qs = ''] = raw.split('?');
    const query = {};
    new URLSearchParams(qs).forEach((v, k) => { query[k] = v; });
    return { path: path || '/', query };
  }

  function Router({ children }) {
    const [route, setRoute] = useState(parseHash());
    useEffect(() => {
      const onHash = () => setRoute(parseHash());
      window.addEventListener('hashchange', onHash);
      if (!window.location.hash) window.location.hash = '#/';
      return () => window.removeEventListener('hashchange', onHash);
    }, []);

    const navigate = useCallback((to) => {
      if (!to.startsWith('#')) to = '#' + to;
      if (window.location.hash !== to) window.location.hash = to;
      window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
    }, []);

    return (
      <RouterContext.Provider value={{ ...route, navigate }}>
        {children}
      </RouterContext.Provider>
    );
  }

  function Link({ to, children, className = '', onClick, ariaLabel }) {
    const { navigate } = useRouter();
    const handle = (e) => {
      e.preventDefault();
      onClick?.(e);
      navigate(to);
    };
    return (
      <a href={'#' + to} onClick={handle} className={className} aria-label={ariaLabel}>{children}</a>
    );
  }

  function matchRoute(path) {
    if (path === '/' || path === '') return { name: 'home', params: {} };
    let m = path.match(/^\/category\/([^/]+)$/);
    if (m) return { name: 'category', params: { slug: decodeURIComponent(m[1]) } };
    m = path.match(/^\/ingredient\/([^/]+)$/);
    if (m) return { name: 'ingredient', params: { slug: decodeURIComponent(m[1]) } };
    if (path === '/compare') return { name: 'compare', params: {} };
    if (path === '/search')  return { name: 'search',  params: {} };
    return { name: 'notfound', params: {} };
  }

                onChange={(e) => { setQ(e.target.value); setOpen(true); }}
                onFocus={() => setOpen(true)}
                placeholder="박력분, 베이킹소다, 슈가파우더..."
                aria-label="재료 검색"
                className="w-full bg-transparent outline-none text-sm placeholder:text-bake-400"
              />
              {q && (
                <button type="button" onClick={() => setQ('')} className="text-bake-400 hover:text-bake-700 text-xs ml-2" aria-label="검색어 지우기">✕</button>
              )}
            </div>

            {/* 라이브 결과 드롭다운 */}
            {open && q.trim() && (
              <div className="absolute left-0 right-0 mt-2 bg-white border border-bake-200 rounded-2xl shadow-lift max-h-80 overflow-auto z-40">
                {results.length === 0 ? (
                  <div className="p-4 text-sm text-bake-700">
                    일치하는 재료가 없어요. <span className="text-bake-500 font-bold">"{q}"</span>
                  </div>
                ) : (
                  <ul className="py-2">
                    {results.map(r => (
                      <li key={r.slug}>
                        <button
                          type="button"
                          className="w-full text-left px-3 py-2.5 hover:bg-bake-50 flex items-center gap-3 transition"
                          onClick={() => { navigate(`/ingredient/${r.slug}`); setOpen(false); }}
                        >
                          <span className="w-10 h-10 rounded-xl bg-bake-100 flex items-center justify-center text-xl shrink-0 overflow-hidden">
                            <IngredientImage ingredient={r} />
                          </span>
                          <span className="min-w-0 flex-1">
                            <span className="block text-sm font-bold text-bake-800 truncate font-pyeojin">
                              {highlight(r.name_ko, q)} <span className="text-bake-500 font-normal text-xs">· {highlight(r.name_en, q)}</span>
                            </span>
                            <span className="block text-xs text-bake-700/80 truncate mt-0.5">{r.summary}</span>
                          </span>
                        </button>
                      </li>
                    ))}
                    <li className="border-t border-bake-100 mt-1">
                      <button type="button" onClick={submit} className="w-full text-left px-3 py-2.5 text-sm text-bake-500 font-bold hover:bg-bake-50">
                        "{q}" 전체 결과 보기 →
                      </button>
                    </li>
                  </ul>
                )}
              </div>
            )}
          </form>
        </div>
      </header>
    );
  }

  function CompareTray() {
    const tray = useTray();
    const { navigate, path } = useRouter();

    if (tray.ids.length === 0) return null;

    const goCompare = () => navigate(`/compare?ids=${tray.ids.join(',')}`);

    return (
      <div className="fixed bottom-3 inset-x-3 sm:left-auto sm:right-5 sm:bottom-5 sm:w-[380px] z-40">

            </div>
            <button onClick={tray.clear} className="text-xs text-bake-700/70 hover:text-bake-500 font-semibold">모두 비우기</button>
          </div>
          <ul className="flex gap-2 mb-3 overflow-x-auto no-scrollbar">
            {tray.ids.map(id => {
              const ing = getIngredient(id);

              return (
                <li key={id} className="shrink-0 relative">
                  <div className="w-16 h-16 rounded-2xl overflow-hidden bg-bake-100 border border-bake-200">

                  <div className="text-[11px] text-center mt-1 w-16 truncate text-bake-800 font-bold">{ing.name_ko}</div>
                  <button
                    onClick={() => tray.remove(id)}

    }

    return (
      <main className="max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12 fade-up">
        <nav className="text-xs text-bake-700/80 mb-4 font-semibold">
          <Link to="/" className="hover:text-bake-500">홈</Link> <span className="mx-1.5">›</span> <span className="text-bake-800">{cat.name}</span>
        </nav>

        {/* 큰 헤더 카드 */}
        <div className="bg-bake-100 rounded-3xl border border-bake-200 p-6 sm:p-8 mb-8 flex items-center gap-5 sm:gap-7">
          <div className="text-6xl sm:text-7xl lg:text-8xl shrink-0 leading-none">{cat.emoji}</div>
          <div className="min-w-0">
            <h1 className="font-pyeojin text-bake-900 text-3xl sm:text-4xl lg:text-5xl leading-tight">{cat.name}</h1>
            <p className="text-sm sm:text-base text-bake-700 mt-2 leading-snug">{CATEGORY_TAGLINE[cat.slug] || cat.desc}</p>
            <div className="mt-3">
              <Chip tone="orange">{list.length}개 재료</Chip>
            </div>
          </div>
        </div>

        {list.length === 0 ? (
          <div className="bg-white rounded-2xl border border-bake-200 p-10 text-center text-bake-700">
            아직 이 카테고리에 등록된 재료가 없어요. 곧 추가될 예정입니다.
          </div>
        ) : (
          <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-5">
            {list.map(ing => (
              <Link key={ing.slug} to={`/ingredient/${ing.slug}`} className="card-lift block focus-ring rounded-2xl">
                <div className="bg-white rounded-2xl border border-bake-200 overflow-hidden h-full">
                  <div className="photo-zoom aspect-square bg-bake-100">
                    <IngredientImage ingredient={ing} />
                  </div>
                  <div className="p-3 sm:p-4">
                    <div className="font-pyeojin text-bake-900 text-lg leading-tight">{ing.name_ko}</div>
                    <div className="text-xs text-bake-500 font-semibold mt-0.5">{ing.name_en}</div>
                    <div className="text-xs text-bake-700 mt-2 line-clamp-2 leading-snug">{ing.summary}</div>
                  </div>
                </div>
              </Link>
            ))}
          </div>
        )}
      </main>
    );
  }

  // ========================================
  // 📄 Page: 재료 상세 (9개 항목)
  // ========================================
  function IngredientPage({ slug }) {
    const ing = getIngredient(slug);
    const tray = useTray();

    if (!ing) {
      return (
        <main className="max-w-screen-lg mx-auto px-4 py-16 text-center fade-up">
          <div className="text-5xl">🥣</div>
          <h1 className="font-pyeojin text-3xl text-bake-900 mt-3">재료를 찾을 수 없어요</h1>
          <div className="mt-5"><Link to="/"><Button variant="primary">홈으로 →</Button></Link></div>
        </main>
      );
    }

    const cat = getCategory(ing.category);
    const inTray = tray.has(ing.slug);

    const sections = [
      { key: 'role',                title: '베이킹에서의 역할',     icon: '🎯', tone: 'normal' },
      { key: 'similar_ingredients', title: '비슷한 재료와의 차이',   icon: '🔍', tone: 'normal' },
      { key: 'common_mistakes',     title: '초보자 자주 하는 실수',  icon: '⚠️', tone: 'warn'   },
      { key: 'substitutes',         title: '대체 가능 여부 + 비율',  icon: '🔄', tone: 'normal' },
      { key: 'storage',             title: '보관법',                icon: '📦', tone: 'normal' },
      { key: 'where_to_buy',        title: '한국에서 구매 가능한 곳',icon: '🛒', tone: 'normal' },
    ];

    return (
      <main className="max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12 fade-up pb-32">
        <nav className="text-xs text-bake-700/80 mb-4 font-semibold">
          <Link to="/" className="hover:text-bake-500">홈</Link>
          <span className="mx-1.5">›</span>
          {cat && (<><Link to={`/category/${cat.slug}`} className="hover:text-bake-500">{cat.name}</Link><span className="mx-1.5">›</span></>)}
          <span className="text-bake-800">{ing.name_ko}</span>
        </nav>

        {/* 상단 히어로 카드: 사진 + 이름 + 정체 + 비교 추가 */}
        <div className="bg-white rounded-3xl border border-bake-200 overflow-hidden shadow-soft mb-6 sm:mb-8">
          <div className="grid lg:grid-cols-2 gap-0">
            <div className="aspect-[4/3] lg:aspect-auto lg:min-h-[420px] bg-bake-100">
              <IngredientImage ingredient={ing} />
            </div>
            <div className="p-6 sm:p-8 lg:p-10 flex flex-col gap-4 justify-center">
              {cat && (
                <div>
                  <Chip tone="cream">{cat.emoji} {cat.name}</Chip>
                </div>
              )}
              <div>
                <h1 className="font-pyeojin text-bake-900 text-4xl sm:text-5xl lg:text-6xl leading-[1.05]">{ing.name_ko}</h1>
                <div className="mt-2 text-sm sm:text-base text-bake-700">
                  <span className="font-bold text-bake-500">{ing.name_en}</span>
                  {ing.name_zh && <span className="ml-2 text-bake-700/70">· {ing.name_zh}</span>}
                </div>
              </div>
              <p className="text-base sm:text-lg text-bake-800 leading-relaxed">{ing.summary}</p>
              <div className="mt-2 flex flex-wrap gap-2">
                <Button
                  variant={inTray ? 'secondary' : 'primary'}
                  size="lg"
                  onClick={() => inTray ? tray.remove(ing.slug) : tray.add(ing.slug)}
                  aria-pressed={inTray}
                  disabled={!inTray && tray.ids.length >= 3}
                >
                  {inTray ? '✓ 비교에 담겼어요' : (tray.ids.length >= 3 ? '비교 가득 (3/3)' : '＋ 비교에 추가')}
                </Button>
                {cat && (
                  <Link to={`/category/${cat.slug}`}>
                    <Button variant="outline" size="lg">같은 카테고리 더 보기 →</Button>
                  </Link>
                )}
              </div>
            </div>
          </div>
        </div>

        {/* 6개 정보 카드 (2-col 그리드) */}
        <div className="grid sm:grid-cols-2 gap-4 sm:gap-5">
          {sections.map(s => (
            <div
              key={s.key}
              className={`rounded-2xl border p-5 sm:p-6 ${
                s.tone === 'warn'
                  ? 'bg-bake-100 border-bake-300'
                  : 'bg-white border-bake-200'
              }`}
            >
              <div className="flex items-center gap-2 mb-2">
                <span className="text-2xl" aria-hidden>{s.icon}</span>
                <h3 className={`font-pyeojin text-lg ${s.tone === 'warn' ? 'text-bake-700' : 'text-bake-900'}`}>{s.title}</h3>
              </div>
              <p className="text-sm sm:text-base text-bake-800 leading-relaxed whitespace-pre-line">{ing[s.key]}</p>
            </div>
          ))}
        </div>
      </main>
    );
  }

  // ========================================
  // 📄 Page: 비교 (9 row × 2~3 column)
  // ========================================
  function ComparePage({ ids }) {
    const tray = useTray();
    const { navigate } = useRouter();

    const list = useMemo(() => {
      const raw = (ids || tray.ids.join(',')).split(',').map(s => s.trim()).filter(Boolean);
      const uniq = [...new Set(raw)].slice(0, 3);
      return uniq.map(getIngredient).filter(Boolean);
    }, [ids, tray.ids]);

    if (list.length === 0) {
      return (
        <main className="max-w-screen-lg mx-auto px-4 py-16 text-center fade-up">
          <div className="text-5xl">⚖️</div>
          <h1 className="font-pyeojin text-3xl text-bake-900 mt-3">비교할 재료를 골라주세요</h1>
          <p className="text-sm text-bake-700 mt-2">홈의 비교 카드를 누르거나, 재료 상세 페이지에서 "비교에 추가"를 눌러보세요.</p>
          <div className="mt-6"><Link to="/"><Button variant="primary" size="lg">홈으로 →</Button></Link></div>
        </main>
      );
    }

    const removeFromCompare = (slug) => {
      const next = list.map(i => i.slug).filter(s => s !== slug);
      if (next.length === 0) {
        navigate('/');
      } else {
        navigate(`/compare?ids=${next.join(',')}`);
      }
    };

    const fieldRows = [
      { key: 'name',                title: '이름',                   icon: '🏷️' },
      { key: 'summary',             title: '한 줄 정체',             icon: '✏️' },
      { key: 'image',               title: '사진',                   icon: '📸' },
      { key: 'role',                title: '베이킹에서의 역할',      icon: '🎯' },
      { key: 'similar_ingredients', title: '비슷한 재료와의 차이',   icon: '🔍' },
      { key: 'common_mistakes',     title: '초보자 자주 하는 실수',  icon: '⚠️' },
      { key: 'substitutes',         title: '대체 가능 여부',         icon: '🔄' },
      { key: 'storage',             title: '보관법',                icon: '📦' },
      { key: 'where_to_buy',        title: '한국 구매처',            icon: '🛒' },
    ];

    const colWidth = list.length === 2 ? 'min-w-[280px] sm:min-w-0 sm:w-1/2' : 'min-w-[260px] sm:min-w-0 sm:w-1/3';
    const labelW   = 'min-w-[130px] sm:min-w-[170px] w-[150px] sm:w-[190px]';

    const renderCell = (ing, key) => {
      if (key === 'name') {
        return (
          <div>
            <div className="font-pyeojin text-bake-900 text-lg leading-tight">{ing.name_ko}</div>
            <div className="text-xs text-bake-500 font-semibold mt-0.5">{ing.name_en}</div>
            {ing.name_zh && <div className="text-xs text-bake-700/60">{ing.name_zh}</div>}
          </div>
        );
      }
      if (key === 'image') {
        return (
          <div className="aspect-[4/3] bg-bake-100 rounded-xl overflow-hidden">
            <IngredientImage ingredient={ing} />
          </div>
        );
      }
      return <p className="text-sm text-bake-800 leading-relaxed whitespace-pre-line">{ing[key]}</p>;
    };

    return (
      <main className="max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-10 fade-up pb-24">
        <nav className="text-xs text-bake-700/80 mb-3 font-semibold">
          <Link to="/" className="hover:text-bake-500">홈</Link> <span className="mx-1.5">›</span> <span className="text-bake-800">비교</span>
        </nav>

        <div className="flex items-end justify-between gap-3 mb-5 flex-wrap">
          <div>
            <Chip tone="orange" className="mb-2">⚖️ 비교 모드</Chip>
            <h1 className="font-pyeojin text-bake-900 text-3xl sm:text-4xl leading-tight">
              재료 {list.length}개 나란히 보기
            </h1>
            <p className="text-sm text-bake-700 mt-1.5 leading-snug">9개 항목을 행, 재료를 열로 펼쳤어요. 모바일에서는 가로로 스와이프해 비교하세요.</p>
          </div>
          <Button variant="outline" size="md" onClick={() => navigate('/')}>홈으로</Button>
        </div>

        {/* sticky 헤더 + 본문 비교 표 */}
        <div className="bg-white rounded-3xl border border-bake-200 overflow-hidden shadow-soft">
          {/* 헤더 row */}
          <div className="flex border-b-2 border-bake-200 bg-bake-50 sticky top-[64px] z-10">
            <div className={`${labelW} shrink-0 p-3 sm:p-4 bg-bake-100 font-pyeojin text-sm text-bake-800 border-r border-bake-200 flex items-center`}>
              항목 \ 재료
            </div>
            <div className="flex overflow-x-auto compare-scroll no-scrollbar flex-1">
              {list.map(ing => (
                <div key={ing.slug} className={`${colWidth} shrink-0 p-3 sm:p-4 border-r last:border-r-0 border-bake-200`}>
                  <div className="flex items-start gap-3">
                    <div className="w-14 h-14 sm:w-16 sm:h-16 rounded-2xl bg-bake-100 overflow-hidden shrink-0">
                      <IngredientImage ingredient={ing} />
                    </div>
                    <div className="min-w-0 flex-1">
                      <Link to={`/ingredient/${ing.slug}`} className="font-pyeojin text-base text-bake-900 hover:text-bake-500 block leading-tight truncate">
                        {ing.name_ko}
                      </Link>
                      <div className="text-[11px] text-bake-500 font-semibold truncate">{ing.name_en}</div>
                      <button
                        onClick={() => removeFromCompare(ing.slug)}
                        className="text-[11px] text-bake-700/70 hover:text-bake-500 mt-1 font-semibold"
                      >
                        ✕ 빼기
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* 본문 rows */}
          <div>
            {fieldRows.map((row, idx) => (
              <div key={row.key} className={`flex border-b last:border-b-0 border-bake-200/60 ${idx % 2 === 1 ? 'bg-bake-50/60' : 'bg-white'}`}>
                <div className={`${labelW} shrink-0 p-3 sm:p-4 bg-bake-100/70 border-r border-bake-200/60 sticky left-0 z-[1]`}>
                  <div className="flex items-center gap-1.5">
                    <span aria-hidden className="text-base">{row.icon}</span>
                    <span className="font-pyeojin text-xs sm:text-sm text-bake-800">{row.title}</span>
                  </div>
                </div>
                <div className="flex overflow-x-auto compare-scroll no-scrollbar flex-1">
                  {list.map(ing => (
                    <div key={ing.slug + row.key} className={`${colWidth} shrink-0 p-3 sm:p-4 border-r last:border-r-0 border-bake-200/60`}>
                      {renderCell(ing, row.key)}
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>

        <p className="text-xs text-bake-700/70 mt-4 text-center">
          ※ 모바일에서는 표 안의 재료 열이 가로 스와이프됩니다. 좌측 항목 라벨은 고정.
        </p>
      </main>
    );
  }

  // ========================================
  // 📄 Page: 검색 결과
  // ========================================
  function SearchPage({ q }) {
    const { navigate } = useRouter();
    const [text, setText] = useState(q || '');
    useEffect(() => { setText(q || ''); }, [q]);

    const results = useMemo(() => searchIngredients(text), [text]);

    const grouped = useMemo(() => {
      const map = {};
      results.forEach(r => { (map[r.category] = map[r.category] || []).push(r); });
      return map;
    }, [results]);

    const submit = (e) => {
      e.preventDefault();
      if (!text.trim()) return;
      navigate(`/search?q=${encodeURIComponent(text.trim())}`);
    };

    return (
      <main className="max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-10 fade-up">
        <nav className="text-xs text-bake-700/80 mb-4 font-semibold">
          <Link to="/" className="hover:text-bake-500">홈</Link> <span className="mx-1.5">›</span> <span className="text-bake-800">검색 결과</span>
        </nav>

        <h1 className="font-pyeojin text-bake-900 text-3xl sm:text-4xl lg:text-5xl leading-tight">
          "<span className="text-bake-500">{q}</span>" 검색 결과
        </h1>
        <p className="text-sm text-bake-700 mt-2 font-semibold">총 {results.length}개 재료가 일치해요.</p>

        <form onSubmit={submit} className="mt-5 max-w-xl">
          <div className="flex items-center bg-white border-2 border-bake-200 rounded-full px-4 py-2 shadow-soft focus-within:border-bake-500 focus-within:ring-4 focus-within:ring-bake-500/15">
            <span className="text-bake-500 mr-2">🔍</span>
            <input
              value={text}
              onChange={(e) => setText(e.target.value)}
              placeholder="다시 검색"
              className="w-full bg-transparent outline-none text-sm placeholder:text-bake-400"
              aria-label="검색어 수정"
            />
            <Button type="submit" size="sm" className="ml-2 shrink-0">검색</Button>
          </div>
        </form>

        {results.length === 0 ? (
          <div className="mt-8 bg-bake-100 rounded-3xl p-10 sm:p-12 text-center">
            <div className="text-5xl sm:text-6xl">🤔</div>
            <h2 className="font-pyeojin text-bake-900 text-xl sm:text-2xl mt-4">일치하는 재료가 없어요</h2>
            <p className="text-sm text-bake-700 mt-2">한글/영문 이름이나 다른 표기로 시도해보세요.</p>
            <div className="mt-5 flex justify-center gap-2 flex-wrap">
              {CATEGORIES.slice(0, 3).map(c => (
                <Link key={c.slug} to={`/category/${c.slug}`}>
                  <Button variant="secondary" size="sm">{c.emoji} {c.name}</Button>
                </Link>
              ))}
            </div>
          </div>
        ) : (
          <div className="mt-8 space-y-6">
            {CATEGORIES.filter(c => grouped[c.slug]?.length).map(c => (
              <section key={c.slug} className="bg-bake-100/70 rounded-3xl p-5 sm:p-6 border border-bake-200">
                <div className="flex items-center gap-2 mb-4">
                  <span className="text-2xl" aria-hidden>{c.emoji}</span>
                  <h2 className="font-pyeojin text-bake-900 text-xl sm:text-2xl">{c.name}</h2>
                  <Chip tone="orange" className="ml-1">{grouped[c.slug].length}개</Chip>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4">
                  {grouped[c.slug].map(r => (
                    <Link key={r.slug} to={`/ingredient/${r.slug}`} className="card-lift block focus-ring rounded-2xl">
                      <div className="bg-white rounded-2xl border border-bake-200 p-3 sm:p-4 h-full">
                        <div className="flex gap-3">
                          <div className="w-16 h-16 rounded-xl bg-bake-100 overflow-hidden shrink-0">
                            <IngredientImage ingredient={r} />
                          </div>
                          <div className="min-w-0 flex-1">
                            <div className="font-pyeojin text-bake-900 text-base leading-tight truncate">
                              {highlight(r.name_ko, q)}
                            </div>
                            <div className="text-xs text-bake-500 font-semibold truncate mt-0.5">
                              {highlight(r.name_en, q)}
                            </div>
                            <div className="text-xs text-bake-700 mt-1.5 line-clamp-2 leading-snug">
                              {highlight(r.summary, q)}
                            </div>
                          </div>
                        </div>
                      </div>
                    </Link>
                  ))}
                </div>
              </section>
            ))}
          </div>
        )}
      </main>
    );
  }

  // ========================================
  // 📄 Page: Not Found
  // ========================================
  function NotFoundPage() {
    return (
      <main className="max-w-screen-lg mx-auto px-4 py-20 text-center fade-up">
        <div className="text-6xl">🥯</div>
        <h1 className="font-pyeojin text-bake-900 text-3xl sm:text-4xl mt-4">페이지를 찾지 못했어요</h1>
        <p className="text-sm text-bake-700 mt-2">주소를 확인하거나 홈으로 돌아가 카테고리에서 둘러보세요.</p>
        <div className="mt-6">
          <Link to="/"><Button variant="primary" size="lg">홈으로 →</Button></Link>
        </div>
      </main>
    );
  }

  // ========================================
  // 🚀 App
  // ========================================
  function Routes() {
    const { path, query } = useRouter();
    const route = matchRoute(path);

    switch (route.name) {
      case 'home':       return <HomePage />;
      case 'category':   return <CategoryPage slug={route.params.slug} />;
      case 'ingredient': return <IngredientPage slug={route.params.slug} />;
      case 'compare':    return <ComparePage ids={query.ids} />;
      case 'search':     return <SearchPage q={query.q || ''} />;
      default:           return <NotFoundPage />;
    }
  }

  function App() {
    return (
      <Router>
        <TrayProvider>
          <div className="min-h-screen flex flex-col bg-bake-50">
            <Header />
            <div className="flex-1">
              <Routes />
            </div>
            <Footer />
            <CompareTray />
          </div>
        </TrayProvider>
      </Router>
    );
  }

  // ========================================
  // Render
  // ========================================
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
