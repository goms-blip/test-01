  function highlight(text, q) {
    if (!q) return text;
    const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const parts = String(text).split(new RegExp(`(${safe})`, 'ig'));
    return parts.map((p, i) =>
      p.toLowerCase() === q.toLowerCase()
        ? <mark key={i} className="hl">{p}</mark>
        : <span key={i}>{p}</span>
    );
  }

  function searchIngredients(q) {
    if (!q || !q.trim()) return [];
    const k = q.trim().toLowerCase();
    return INGREDIENTS.filter(i =>
      i.name_ko.toLowerCase().includes(k) ||
      i.name_en.toLowerCase().includes(k) ||
      (i.name_zh && i.name_zh.toLowerCase().includes(k)) ||
      i.summary.toLowerCase().includes(k)
    ).slice(0, 12);
  }

  // ========================================
  const TRAY_KEY = 'baking-dict.compare-tray.v1';
  const TrayContext = createContext(null);
  const useTray = () => useContext(TrayContext);

  function TrayProvider({ children }) {
    const [ids, setIds] = useState(() => {
      try {
        const raw = localStorage.getItem(TRAY_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed.slice(0, 3) : [];
      } catch { return []; }
    });

    useEffect(() => {
      try { localStorage.setItem(TRAY_KEY, JSON.stringify(ids)); } catch {}
    }, [ids]);

    const add = useCallback((slug) => {
      setIds(prev => prev.includes(slug) || prev.length >= 3 ? prev : [...prev, slug]);
    }, []);
    const remove = useCallback((slug) => setIds(prev => prev.filter(s => s !== slug)), []);
    const clear  = useCallback(() => setIds([]), []);
    const has    = useCallback((slug) => ids.includes(slug), [ids]);

    const value = useMemo(() => ({ ids, add, remove, clear, has }), [ids, add, remove, clear, has]);
    return <TrayContext.Provider value={value}>{children}</TrayContext.Provider>;
  }

  // ========================================
  // 🔀 Hash Router (path + query)
  // ========================================
  const RouterContext = createContext(null);
  const useRouter = () => useContext(RouterContext);

  function parseHash() {
    const raw = (window.location.hash || '#/').replace(/^#/, '');
    const [path, qs = ''] = raw.split('?');
    const query = {};
    new URLSearchParams(qs).forEach((v, k) => { query[k] = v; });
    return { path: path || '/', query };
  }

  function Router({ children }) {
    const [route, setRoute] = useState(parseHash());
    useEffect(() => {
      const onHash = () => setRoute(parseHash());
      window.addEventListener('hashchange', onHash);
      // 초기 진입 보정
      if (!window.location.hash) window.location.hash = '#/';
      return () => window.removeEventListener('hashchange', onHash);
    }, []);

    const navigate = useCallback((to) => {
      if (!to.startsWith('#')) to = '#' + to;
      if (window.location.hash !== to) window.location.hash = to;
      // 페이지 스크롤 맨 위로
      window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
    }, []);

    return (
      <RouterContext.Provider value={{ ...route, navigate }}>
        {children}
      </RouterContext.Provider>
    );
  }

  function Link({ to, children, className = '', onClick }) {
    const { navigate } = useRouter();
    const handle = (e) => {
      e.preventDefault();
      onClick?.(e);
      navigate(to);
    };
    return (
      <a href={'#' + to} onClick={handle} className={className}>{children}</a>
    );
  }

  function matchRoute(path) {
    // 지원: '/', '/category/:slug', '/ingredient/:slug', '/compare', '/search'
    if (path === '/' || path === '') return { name: 'home', params: {} };
    let m = path.match(/^\/category\/([^/]+)$/);
    if (m) return { name: 'category', params: { slug: decodeURIComponent(m[1]) } };
    m = path.match(/^\/ingredient\/([^/]+)$/);
    if (m) return { name: 'ingredient', params: { slug: decodeURIComponent(m[1]) } };
    if (path === '/compare') return { name: 'compare', params: {} };
    if (path === '/search')  return { name: 'search',  params: {} };
    return { name: 'notfound', params: {} };
  }

  function CompareTray() {
    const tray = useTray();
    const { navigate, path } = useRouter();

    if (tray.ids.length === 0) return null;
    if (path === '/compare') return null; // 비교 페이지에선 숨김 (이미 비교 중)

    const goCompare = () => navigate(`/compare?ids=${tray.ids.join(',')}`);

    return (
      <div className="fixed bottom-3 inset-x-3 sm:left-auto sm:right-4 sm:bottom-4 sm:w-[360px] z-40">
        <Card className="p-3 sm:p-4 bg-white/95 backdrop-blur border-caramel/40 shadow-lift">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-2">
              <Badge tone="cinnamon">⚖️ 비교 트레이</Badge>
              <span className="text-xs text-cocoa/70">{tray.ids.length}/3</span>
            </div>
            <button onClick={tray.clear} className="text-xs text-cocoa/60 hover:text-cinnamon">모두 비우기</button>
          </div>
          <ul className="flex gap-2 mb-3 overflow-x-auto no-scrollbar">
            {tray.ids.map(id => {
              const ing = getIngredient(id);
              if (!ing) return null;
              return (
                <li key={id} className="shrink-0 relative">
                  <div className="w-16 h-16 rounded-xl overflow-hidden bg-crumb border border-caramel/30">
                    <IngredientImage ingredient={ing} size="sm" />
                  </div>
                  <div className="text-[11px] text-center mt-1 w-16 truncate text-cocoa">{ing.name_ko}</div>
                  <button
                    onClick={() => tray.remove(id)}
                    aria-label={`${ing.name_ko} 트레이에서 빼기`}
                    className="absolute -top-1 -right-1 bg-white border border-caramel/40 rounded-full w-5 h-5 text-[10px] leading-none flex items-center justify-center shadow-soft hover:bg-cream"
                  >✕</button>
                </li>
              );
            })}
            {Array.from({ length: Math.max(0, 2 - tray.ids.length) }).map((_, i) => (
              <li key={`ph-${i}`} className="shrink-0">
                <div className="w-16 h-16 rounded-xl border border-dashed border-caramel/50 flex items-center justify-center text-caramel/60 text-xs">＋</div>
                <div className="text-[11px] text-center mt-1 w-16 text-cocoa/40">담아주세요</div>
              </li>
            ))}
          </ul>
          <Button
            size="md"
            variant="primary"
            className="w-full"
            onClick={goCompare}
            disabled={tray.ids.length < 2}
          >
            {tray.ids.length < 2 ? '재료 2개 이상 담아주세요' : `${tray.ids.length}개 비교하기 →`}
          </Button>
        </Card>
      </div>
    );
  }

    sugar:     { num: '03', subtitle: '단맛 너머 색·식감·보존까지 좌우하는 당.' },
    dairy_fat: { num: '04', subtitle: '풍미·촉촉함·결을 만드는 지방과 유제품.' },

  const CATEGORY_LABEL = {

  };

  const LINEUP_SLUGS = [

  // 사진이 실패하면 paper 배경 + 작은 영문 라벨만 보여주는 fallback
  function EditorialPhoto({ ingredient, ratio = 'aspect-[4/5]', className = '' }) {
    const [errored, setErrored] = useState(false);
    const label = CATEGORY_LABEL[ingredient.category] || 'INGREDIENT';
    // 사진 자체 배경이 흰색 가루 + 흰 배경이라 paper와 합쳐지는 걸 막기 위해
    // 컨테이너에 paper보다 살짝 진한 톤(#EFE7D7)을 깔아 사진 경계를 분명히 한다.
    return (
      <div className={`relative w-full ${ratio} overflow-hidden ${className}`} style={{ backgroundColor: '#EFE7D7' }}>
        {(!ingredient.image_url || errored) ? (
          <div className="photo-fallback absolute inset-0 flex items-center justify-center">
            <span className="kicker text-ink-soft">{label}</span>
          </div>
        ) : (
          <img
            src={ingredient.image_url}
            alt={`${ingredient.name_ko} (${ingredient.name_en})`}
            onError={() => setErrored(true)}
            loading="lazy"
            className="absolute inset-0 w-full h-full object-cover"
          />
        )}
      </div>
    );
  }

  function ComparePage({ ids }) {
    const tray = useTray();
    const { navigate } = useRouter();

    // ids 결정: URL ?ids 우선, 없으면 트레이
    const list = useMemo(() => {
      const raw = (ids || tray.ids.join(',')).split(',').map(s => s.trim()).filter(Boolean);
      const uniq = [...new Set(raw)].slice(0, 3);
      return uniq.map(getIngredient).filter(Boolean);
    }, [ids, tray.ids]);

    if (list.length === 0) {
      return (
        <main className="max-w-screen-lg mx-auto px-4 py-12 fade-up text-center">
          <div className="text-4xl">⚖️</div>
          <h1 className="font-head text-2xl text-roast mt-3">비교할 재료를 골라주세요</h1>
          <p className="text-sm text-cocoa/70 mt-2">홈의 비교 프리셋을 누르거나, 재료 상세 페이지에서 “비교에 추가”를 눌러보세요.</p>
          <div className="mt-5"><Link to="/"><Button variant="primary">홈으로 →</Button></Link></div>
        </main>
      );
    }

    const removeFromCompare = (slug) => {
      const next = list.map(i => i.slug).filter(s => s !== slug);
      if (next.length === 0) {
        // 모두 비우면 비교 페이지에서 의미가 없으니 홈으로
        navigate('/');
      } else {
        navigate(`/compare?ids=${next.join(',')}`);
      }
    };

    const fieldRows = [
      { key: 'name',                title: '1. 이름',                   icon: '🏷️' },
      { key: 'summary',             title: '2. 한 줄 정체',             icon: '✏️' },
      { key: 'image',               title: '3. 사진',                   icon: '📸' },
      { key: 'role',                title: '4. 베이킹에서의 역할',      icon: '🎯' },
      { key: 'similar_ingredients', title: '5. 비슷한 재료와의 차이',   icon: '🪞' },
      { key: 'common_mistakes',     title: '6. 초보자 자주 하는 실수',  icon: '⚠️' },
      { key: 'substitutes',         title: '7. 대체 가능 여부',         icon: '🔄' },
      { key: 'storage',             title: '8. 보관법',                 icon: '📦' },
      { key: 'where_to_buy',        title: '9. 한국 구매처',            icon: '🛒' },
    ];

    // 열 너비 (재료 갯수에 따라)
    const colWidth = list.length === 2 ? 'min-w-[260px] sm:min-w-0 sm:w-1/2' : 'min-w-[240px] sm:min-w-0 sm:w-1/3';
    const labelW   = 'min-w-[120px] sm:min-w-[160px] w-[140px] sm:w-[180px]';

    const renderCell = (ing, key) => {
      if (key === 'name') {
        return (
          <div>
            <div className="font-head text-lg text-roast leading-tight">{ing.name_ko}</div>
            <div className="text-xs text-cocoa/70 mt-0.5">{ing.name_en}</div>
            {ing.name_zh && <div className="text-xs text-cocoa/50">{ing.name_zh}</div>}
          </div>
        );
      }
      if (key === 'image') {
        return (
          <div className="aspect-[4/3] bg-crumb rounded-lg overflow-hidden">
            <IngredientImage ingredient={ing} />
          </div>
        );
      }
      return <p className="text-sm text-cocoa leading-relaxed whitespace-pre-line">{ing[key]}</p>;
    };

    return (
      <main className="max-w-screen-lg mx-auto px-4 py-6 sm:py-10 fade-up pb-24">
        <nav className="text-xs text-cocoa/70 mb-2">
          <Link to="/" className="hover:underline">홈</Link> <span className="mx-1">›</span> <span className="text-cocoa">비교</span>
        </nav>
        <div className="flex items-end justify-between gap-3 mb-3">
          <div>
            <Badge tone="cinnamon">⚖️ 비교 모드</Badge>
            <h1 className="font-head text-2xl sm:text-3xl text-roast mt-2">
              재료 {list.length}개 나란히 보기

            <p className="text-sm text-cocoa/70 mt-1">9개 항목을 행, 재료를 열로 펼쳤어요. 모바일에서는 가로로 스와이프해 비교하세요.</p>
          </div>
          <Button variant="outline" size="sm" onClick={() => navigate('/')}>홈으로</Button>

        {/* sticky 헤더 (재료 사진+이름) + 본문 비교 표 */}

          {/* 헤더 row */}
          <div className="flex border-b border-caramel/30 bg-cream sticky top-[57px] z-10">
            <div className={`${labelW} shrink-0 p-3 sm:p-4 bg-butter/60 font-head text-sm text-roast border-r border-caramel/30`}>
              항목 \ 재료
            </div>
            <div className="flex overflow-x-auto compare-scroll no-scrollbar flex-1">
              {list.map(ing => (
                <div key={ing.slug} className={`${colWidth} shrink-0 p-3 sm:p-4 border-r last:border-r-0 border-caramel/30`}>
                  <div className="flex items-start gap-3">

                    <div className="min-w-0 flex-1">

                      >
                        ✕ 비교에서 빼기
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* 본문 rows */}
          <div>
            {fieldRows.map((row, idx) => (
              <div key={row.key} className={`flex border-b last:border-b-0 border-caramel/20 ${idx % 2 === 1 ? 'bg-cream/40' : 'bg-white'}`}>

        </Card>

        <p className="text-xs text-cocoa/60 mt-3 text-center">
          ※ 모바일에서는 표 안의 재료 열이 가로 스와이프됩니다. 좌측 항목 라벨은 고정.
        </p>

  // ========================================
  // 📄 Page: 검색 결과
  // ========================================
  function SearchPage({ q }) {
    const { navigate } = useRouter();
    const [text, setText] = useState(q || '');
    useEffect(() => { setText(q || ''); }, [q]);

    const results = useMemo(() => searchIngredients(text), [text]);

    // 카테고리별 그룹
    const grouped = useMemo(() => {
      const map = {};
      results.forEach(r => { (map[r.category] = map[r.category] || []).push(r); });
      return map;
    }, [results]);

    const submit = (e) => {
      e.preventDefault();
      if (!text.trim()) return;
      navigate(`/search?q=${encodeURIComponent(text.trim())}`);
    };

    return (
      <main className="max-w-screen-lg mx-auto px-4 py-8 sm:py-10 fade-up">
        <nav className="text-xs text-cocoa/70 mb-3">
          <Link to="/" className="hover:underline">홈</Link> <span className="mx-1">›</span> <span className="text-cocoa">검색 결과</span>
        </nav>
        <h1 className="font-head text-2xl sm:text-3xl text-roast">
          “<span className="text-cinnamon">{q}</span>” 검색 결과
        </h1>
        <p className="text-sm text-cocoa/70 mt-1">총 {results.length}개 재료가 일치해요.</p>

        <form onSubmit={submit} className="mt-4 max-w-xl">
          <div className="flex items-center bg-white border border-caramel/40 rounded-xl px-3 py-2">
            <span className="text-caramel mr-2">🔍</span>
            <input
              value={text}
              onChange={(e) => setText(e.target.value)}
              placeholder="다시 검색"
              className="w-full bg-transparent outline-none text-sm"
              aria-label="검색어 수정"
            />
            <Button type="submit" size="sm" className="ml-2">검색</Button>
          </div>
        </form>

        {results.length === 0 ? (
          <Card className="p-8 mt-6 text-center text-cocoa/70">
            <div className="text-3xl">🤔</div>
            <p className="mt-2">일치하는 재료가 없어요. 한글/영문 이름이나 다른 표기로 시도해보세요.</p>
            <div className="mt-4">
              <Link to="/"><Button variant="primary" size="md">카테고리로 둘러보기 →</Button></Link>
            </div>
          </Card>
        ) : (
          <div className="mt-6 space-y-8">
            {CATEGORIES.filter(c => grouped[c.slug]?.length).map(c => (
              <section key={c.slug}>
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-xl">{c.emoji}</span>
                  <h2 className="font-head text-lg text-roast">{c.name}</h2>
                  <span className="text-xs text-cocoa/60">({grouped[c.slug].length})</span>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4">
                  {grouped[c.slug].map(r => (
                    <Link key={r.slug} to={`/ingredient/${r.slug}`} className="block">
                      <Card className="p-3 sm:p-4 card-lift">
                        <div className="flex gap-3">
                          <div className="w-16 h-16 rounded-lg bg-crumb overflow-hidden shrink-0">
                            <IngredientImage ingredient={r} size="sm" />
                          </div>
                          <div className="min-w-0">
                            <div className="font-head text-base text-roast leading-tight truncate">
                              {highlight(r.name_ko, q)}
                            </div>
                            <div className="text-xs text-cocoa/70 truncate">
                              {highlight(r.name_en, q)}
                            </div>
                            <div className="text-xs text-cocoa/80 mt-1 line-clamp-2">
                              {highlight(r.summary, q)}
                            </div>
                          </div>
                        </div>
                      </Card>
                    </Link>
                  ))}
                </div>
              </section>
            ))}
          </div>
        )}
      </main>
    );
  }

  // ========================================
  // 📄 Page: Not Found
  // ========================================
  function NotFoundPage() {
    return (
      <main className="max-w-screen-lg mx-auto px-4 py-16 text-center fade-up">
        <div className="text-5xl">🥯</div>
        <h1 className="font-head text-3xl text-roast mt-3">페이지를 찾지 못했어요</h1>
        <p className="text-sm text-cocoa/70 mt-2">주소를 확인하거나 홈으로 돌아가 카테고리에서 둘러보세요.</p>
        <div className="mt-5">
          <Link to="/"><Button variant="primary">홈으로 →</Button></Link>
        </div>
      </main>
    );
  }

  // ========================================
  // 🚀 App
  // ========================================
  function Routes() {
    const { path, query } = useRouter();
    const route = matchRoute(path);

    switch (route.name) {
      case 'home':       return <HomePage />;
      case 'category':   return <CategoryPage slug={route.params.slug} />;
      case 'ingredient': return <IngredientPage slug={route.params.slug} />;
      case 'compare':    return <ComparePage ids={query.ids} />;
      case 'search':     return <SearchPage q={query.q || ''} />;
      default:           return <NotFoundPage />;
    }
  }

  function App() {
    return (
      <Router>
        <TrayProvider>
          <div className="min-h-screen flex flex-col">
            <Header />
            <div className="flex-1">
              <Routes />
            </div>
            <Footer />
            <CompareTray />
          </div>
        </TrayProvider>
      </Router>
    );
  }

  // ========================================
  // Render
  // ========================================
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
