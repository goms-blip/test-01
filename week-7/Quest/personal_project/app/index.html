<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAKING DICT — GOM'S STUDIO</title>

  <!-- Fonts: Inter (영문 디스플레이/메뉴) + Pretendard + Noto Sans/Serif KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

  <!-- Tailwind / React / Babel / Supabase via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./lib/supabase-client.js"></script>

  <script>
    // ========================================
    // Tailwind config — 라운드 6: STUDIO (GRAY THEORY 결)
    // 흑백 + 다층 그레이, 직각 모서리, 그림자 거의 없음.
    // 좌측 사이드 네비 + 우측 큰 그리드 갤러리.
    // ========================================
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink:    '#0E0E0E',
            ink2:   '#1A1A1A',
            paper:  '#FFFFFF',
            mute:   '#9A9A9A',
            mute2:  '#C9C9C9',
            line:   '#E5E5E5',
            soft:   '#F5F5F5',
            ash:    '#4D4D4D',
          },
          fontFamily: {
            sans:  ['Pretendard', 'Noto Sans KR', 'system-ui', 'sans-serif'],
            disp:  ['Inter', 'Pretendard', 'sans-serif'],
            serif: ['"Noto Serif KR"', 'serif'],
          },
          letterSpacing: {
            ultra: '0.22em',
            wide2: '0.06em',
          },
        }
      }
    };
  </script>

  <style>
    html, body { background: #FFFFFF; }
    body {
      font-family: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
      color: #0E0E0E;
      -webkit-font-smoothing: antialiased;
      font-weight: 300;
    }

    mark.hl {
      background: #0E0E0E;
      color: #FFFFFF;
      padding: 0 4px;
      font-weight: 500;
    }

    /* ====== Sidebar ====== */
    .sidebar {
      width: 280px;
      position: fixed;
      top: 0; bottom: 0; left: 0;
      padding: 24px;
      background: #FFFFFF;
      z-index: 30;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    @media (max-width: 1023px) {
      .sidebar {
        position: sticky;
        top: 0;
        width: 100%;
        height: auto;
        bottom: auto;
        padding: 0;
        overflow: visible;
        z-index: 40;
        border-bottom: 1px solid #E5E5E5;
      }
    }

    /* 브랜드 행 — 데스크탑은 단순 컨테이너, 모바일은 검정 한 줄 바 */
    .brand-row { display: block; }
    .brand-link { display: block; flex: 1; }
    @media (max-width: 1023px) {
      .brand-row {
        display: flex;
        align-items: stretch;
        background: #0E0E0E;
      }
    }

    /* 검정 정사각 브랜드 박스 (데스크탑) → 한 줄 바 (모바일) */
    .brand-box {
      background: #0E0E0E;
      color: #FFFFFF;
      aspect-ratio: 1 / 1;
      width: 100%;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 6px;
    }
    @media (max-width: 1023px) {
      .brand-box {
        aspect-ratio: auto;
        width: 100%;
        padding: 14px 18px;
        flex-direction: row;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
      }
    }

    /* 데스크탑 큰 디스플레이 (BAKING / DICT- / IONARY) */
    .brand-display {
      font-family: 'Inter', 'Pretendard', sans-serif;
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.05;
      font-size: 40px;
    }
    .brand-display b { font-weight: 700; }
    /* 모바일 한 줄 디스플레이 ("BAKING DICT.") */
    .brand-display-mobile {
      font-family: 'Inter', 'Pretendard', sans-serif;
      font-weight: 300;
      letter-spacing: -0.01em;
      font-size: 20px;
      line-height: 1;
      color: #FFFFFF;
      white-space: nowrap;
    }
    .brand-display-mobile b { font-weight: 700; }

    /* 햄버거 버튼 (모바일 전용 — lg:hidden은 Tailwind 처리) */
    .mobile-menu-btn {
      background: #0E0E0E;
      color: #FFFFFF;
      border: 0;
      padding: 0 16px;
      min-width: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .mobile-menu-btn:hover { opacity: 0.85; }

    /* 사이드바 네비 */
    .sidebar-nav { margin-top: 32px; }
    @media (min-width: 1024px) {
      .sidebar-nav { margin-top: 40px; }
    }
    /* 모바일: 기본 숨김, .open일 때 드롭다운으로 펼침 */
    @media (max-width: 1023px) {
      .sidebar-nav {
        display: none;
        margin-top: 0;
        padding: 16px 20px 20px;
        background: #FFFFFF;
        border-top: 1px solid #E5E5E5;
      }
      .sidebar-nav.open { display: block; }
    }

    /* 사이드바 푸터 (v1 · ... · 2026) */
    .sidebar-foot { margin-top: 40px; }
    @media (max-width: 1023px) {
      .sidebar-foot { margin-top: 20px; padding-top: 16px; border-top: 1px solid #E5E5E5; }
    }

    /* 메뉴 */
    .nav-item {
      display: block;
      padding: 6px 0 6px 14px;
      font-size: 22px;
      line-height: 1.25;
      color: #9A9A9A;
      letter-spacing: -0.01em;
      font-weight: 300;
      transition: color .15s ease;
      position: relative;
    }
    .nav-item:hover { color: #0E0E0E; }
    .nav-item.active { color: #0E0E0E; }
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 8px; bottom: 8px;
      width: 1px;
      background: #0E0E0E;
    }
    .nav-sub {
      display: block;
      padding: 4px 0 4px 30px;
      font-size: 15px;
      color: #9A9A9A;
      font-weight: 300;
      letter-spacing: -0.01em;
      transition: color .15s ease;
      position: relative;
    }
    .nav-sub:hover { color: #0E0E0E; }
    .nav-sub.active { color: #0E0E0E; }
    .nav-sub.active::before {
      content: '';
      position: absolute;
      left: 14px; top: 7px; bottom: 7px;
      width: 1px;
      background: #0E0E0E;
    }
    @media (max-width: 1023px) {
      .nav-item, .nav-sub { font-size: 16px; padding-left: 0; }
      .nav-item.active::before, .nav-sub.active::before { display: none; }
    }

    /* 메타 라벨 (대문자 트래킹) */
    .meta {
      font-family: 'Inter', 'Pretendard', sans-serif;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* 디스플레이 헤딩 */
    .display {
      font-family: 'Inter', 'Pretendard', sans-serif;
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .display b { font-weight: 700; }

    /* 콘텐츠 영역 */
    .stage {
      margin-left: 280px;
      padding: 32px 40px 80px;
      min-height: 100vh;
      max-width: 1480px;
    }
    @media (max-width: 1023px) {
      .stage { margin-left: 0; padding: 20px 20px 80px; }
    }

    /* 그리드 (사진 갤러리, 빈틈 없음) */
    .gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      /* 회색 배경/gap 제거 — 빈 그리드 셀이 회색으로 보이는 답답함 방지.
         타일 간 1px 구분선은 타일 자체의 right/bottom border 로 그린다. */
    }
    @media (max-width: 1023px) {
      .gallery { grid-template-columns: repeat(2, 1fr); }
    }
    .gallery > .tile {
      background: #FFFFFF;
      border-right: 1px solid #E5E5E5;
      border-bottom: 1px solid #E5E5E5;
    }
    /* 마지막 컬럼(4번째)은 우측 선 없음 — 페이지 우측이 깔끔하게 끝남 */
    .gallery > .tile:nth-child(4n) { border-right: none; }
    @media (max-width: 1023px) {
      .gallery > .tile:nth-child(4n) { border-right: 1px solid #E5E5E5; }
      .gallery > .tile:nth-child(2n) { border-right: none; }
    }
    .tile { position: relative; overflow: hidden; display: block; }
    .tile-photo { aspect-ratio: 1 / 1; background: #F5F5F5; }
    .tile-photo img,
    .tile-photo .fallback {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .8s cubic-bezier(.2,.6,.2,1);
      display: block;
    }
    .tile:hover .tile-photo img,
    .tile:hover .tile-photo .fallback { transform: scale(1.03); }
    .tile-overlay {
      position: absolute;
      left: 12px; right: 12px; bottom: calc(20% + 20px);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      transition: opacity .25s ease;
      pointer-events: none;
    }
    .tile:hover .tile-overlay { opacity: 1; }
    .tile-overlay .ovbtn {
      background: rgba(255,255,255,0.95);
      color: #0E0E0E;
      padding: 6px 9px;
      font-size: 11px;
      letter-spacing: 0.06em;
      font-weight: 500;
    }
    .tile-caption {
      padding: 10px 12px 14px;
      display: flex;
      justify-content: space-between;

    }
    .tile-caption .num {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #9A9A9A;
      letter-spacing: 0.18em;
      font-weight: 500;
    }
    .tile-caption .ko {
      font-size: 14px;
      color: #0E0E0E;
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    .tile-caption .en {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #9A9A9A;
      font-style: italic;
      letter-spacing: 0.02em;
    }

    /* 페이드 */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px);} to { opacity:1; transform: none;} }
    .fade-up { animation: fadeUp .35s ease both; }

    /* 포커스 */
    a:focus-visible, button:focus-visible {
      outline: 2px solid #0E0E0E;
      outline-offset: 2px;
    }

    /* 검색 underline input */
    .search-input {
      background: transparent;
      border: 0;
      border-bottom: 1px solid #0E0E0E;
      padding: 6px 4px;

      outline: none;

    .search-input::placeholder { color: #9A9A9A; }

    /* 우측 상단 작은 메뉴 */
    .top-right-link {

      font-size: 13px;
      color: #0E0E0E;
      letter-spacing: -0.01em;
    }
    .top-right-link:hover { text-decoration: underline; text-underline-offset: 4px; }

    /* 스크롤바 숨김 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { scrollbar-width: none; }

    /* compare 표 */
    .compare-grid {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
  <div id="root">
    <div style="min-height:60vh;display:flex;align-items:center;justify-content:center;font-family:Pretendard,'Noto Sans KR',system-ui,sans-serif;color:#9A9A9A;font-size:14px;letter-spacing:0.06em">
      재료 데이터 불러오는 중…
    </div>
  </div>

  <script type="text/babel" data-presets="env,react">
  // ========================================
  // React Hooks
  // ========================================
  const { useState, useEffect, useMemo, useCallback, useRef, createContext, useContext } = React;

  // ========================================
  // 🔌 API 자리
  // ========================================
  const API_BASE_URL = '/api';

  // ========================================
  // 📚 CATEGORIES — UI 메타데이터 (DB enum과 slug 일치)
  // ========================================
  const CATEGORIES = [
    { slug: 'flour',     name: '가루류',                 emoji: '🌾', en: 'Flour',       desc: '베이킹의 뼈대. 글루텐 함량으로 식감이 갈린다.' },
    { slug: 'leavening', name: '팽창제',                 emoji: '🫧', en: 'Leavening',   desc: '반죽을 부풀려 가볍게 만드는 마법의 가루.' },
    { slug: 'sugar',     name: '당류',                   emoji: '🍯', en: 'Sugar',       desc: '단맛 + 색·식감·보존까지 좌우.' },
    { slug: 'dairy_fat', name: '유제품·지방',            emoji: '🧈', en: 'Dairy & Fat', desc: '풍미·촉촉함·바삭함을 만드는 지방의 세계.' },
    { slug: 'etc',       name: '계란·견과·초콜릿·향료',  emoji: '🥚', en: 'Finishing',   desc: '구조·풍미·포인트를 더하는 마무리 재료.' },
    { slug: 'spirit',    name: '술·리큐어',              emoji: '🍷', en: 'Spirits',     desc: '베이킹의 풍미를 한 차원 더하는 술과 리큐어. 럼·브랜디·오렌지/커피 리큐어 등.' },
  ];

  // ========================================
  // 📚 INGREDIENTS — Supabase에서 부팅 시 fetch (lib/supabase-client.js)
  // ========================================
  const INGREDIENTS = [];

  const COMPARE_PRESETS = [
    { title: '박력분 vs 중력분 vs 강력분', subtitle: '글루텐 함량으로 갈리는 가루 3형제', ids: ['cake-flour','all-purpose-flour','bread-flour'] },
    { title: '베이킹소다 vs 베이킹파우더',  subtitle: '한 글자 차이, 결과는 완전 다름',    ids: ['baking-soda','baking-powder'] },
    { title: '백설탕 vs 슈가파우더',         subtitle: '왜 마카롱엔 분당을 쓸까',          ids: ['granulated-sugar','powdered-sugar'] },
    { title: '버터 vs 생크림',               subtitle: '같은 유지방, 다른 역할',          ids: ['butter','heavy-cream'] },
    { title: '다크초콜릿 vs 바닐라',         subtitle: '향과 풍미를 책임지는 두 주자',     ids: ['dark-chocolate','vanilla-extract'] },
  ];

  // 유틸
  const getCategory   = (slug) => CATEGORIES.find(c => c.slug === slug);
  const getIngredient = (slug) => INGREDIENTS.find(i => i.slug === slug);
  const categoryCount = (slug) => INGREDIENTS.filter(i => i.category === slug).length;

  function highlight(text, q) {
    if (!q) return text;
    const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const parts = String(text).split(new RegExp(`(${safe})`, 'ig'));
    return parts.map((p, i) =>
      p.toLowerCase() === q.toLowerCase()
        ? <mark key={i} className="hl">{p}</mark>
        : <span key={i}>{p}</span>
    );
  }

  function searchIngredients(q) {
    if (!q || !q.trim()) return [];
    const k = q.trim().toLowerCase();
    return INGREDIENTS.filter(i =>
      i.name_ko.toLowerCase().includes(k) ||
      i.name_en.toLowerCase().includes(k) ||
      (i.name_zh && i.name_zh.toLowerCase().includes(k)) ||
      i.summary.toLowerCase().includes(k)
    ).slice(0, 12);
  }

  // ========================================
  // 🗳️ 비교 트레이 (Context)
  // ========================================
  const TRAY_KEY = 'baking-dict.compare-tray.v1';
  const TrayContext = createContext(null);
  const useTray = () => useContext(TrayContext);

  function TrayProvider({ children }) {
    const [ids, setIds] = useState(() => {
      try {
        const raw = localStorage.getItem(TRAY_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed.slice(0, 3) : [];
      } catch { return []; }
    });
    useEffect(() => { try { localStorage.setItem(TRAY_KEY, JSON.stringify(ids)); } catch {} }, [ids]);
    const add    = useCallback((slug) => setIds(prev => prev.includes(slug) || prev.length >= 3 ? prev : [...prev, slug]), []);
    const remove = useCallback((slug) => setIds(prev => prev.filter(s => s !== slug)), []);
    const clear  = useCallback(() => setIds([]), []);
    const has    = useCallback((slug) => ids.includes(slug), [ids]);
    const value  = useMemo(() => ({ ids, add, remove, clear, has }), [ids, add, remove, clear, has]);
    return <TrayContext.Provider value={value}>{children}</TrayContext.Provider>;
  }

  // ========================================
  // 🔀 Hash Router
  // ========================================
  const RouterContext = createContext(null);
  const useRouter = () => useContext(RouterContext);

  function parseHash() {
    const raw = (window.location.hash || '#/').replace(/^#/, '');
    const [path, qs = ''] = raw.split('?');
    const query = {};
    new URLSearchParams(qs).forEach((v, k) => { query[k] = v; });
    return { path: path || '/', query };
  }

  function Router({ children }) {
    const [route, setRoute] = useState(parseHash());
    useEffect(() => {
      const onHash = () => setRoute(parseHash());
      window.addEventListener('hashchange', onHash);
      if (!window.location.hash) window.location.hash = '#/';
      return () => window.removeEventListener('hashchange', onHash);
    }, []);
    const navigate = useCallback((to) => {
      if (!to.startsWith('#')) to = '#' + to;
      if (window.location.hash !== to) window.location.hash = to;
      window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
    }, []);
    return (
      <RouterContext.Provider value={{ ...route, navigate }}>
        {children}
      </RouterContext.Provider>
    );
  }

  function Link({ to, children, className = '', onClick, ariaLabel }) {
    const { navigate } = useRouter();
    const handle = (e) => { e.preventDefault(); onClick?.(e); navigate(to); };
    return <a href={'#' + to} onClick={handle} className={className} aria-label={ariaLabel}>{children}</a>;
  }

  function matchRoute(path) {
    if (path === '/' || path === '') return { name: 'home', params: {} };
    let m = path.match(/^\/category\/([^/]+)$/);
    if (m) return { name: 'category', params: { slug: decodeURIComponent(m[1]) } };
    m = path.match(/^\/ingredient\/([^/]+)$/);
    if (m) return { name: 'ingredient', params: { slug: decodeURIComponent(m[1]) } };
    if (path === '/compare') return { name: 'compare', params: {} };
    if (path === '/search')  return { name: 'search',  params: {} };
    return { name: 'notfound', params: {} };
  }

  // ========================================
  // 🖼️ 이미지
  // ========================================
  function IngredientImage({ ingredient }) {
    const [errored, setErrored] = useState(false);
    if (!ingredient.image_url || errored) {
      return (
        <div className="fallback flex flex-col items-center justify-center" aria-label={ingredient.name_ko}>
          <span className="text-5xl mb-1" aria-hidden>{ingredient.emoji || '🥣'}</span>
          <span className="meta text-mute">{ingredient.name_en}</span>
        </div>
      );
    }
    return (
      <img
        src={ingredient.image_url}
        alt={`${ingredient.name_ko} (${ingredient.name_en})`}
        onError={() => setErrored(true)}
        loading="lazy"
      />
    );
  }

  // ========================================
  // 🧭 Sidebar
  // ========================================
  function Sidebar() {
    const { path } = useRouter();
    const match = matchRoute(path);
    const activeCategorySlug =
      match.name === 'category'   ? match.params.slug :
      match.name === 'ingredient' ? (getIngredient(match.params.slug)?.category) :
      null;
    const isHome    = match.name === 'home';
    const isCompare = match.name === 'compare';
    const isSearch  = match.name === 'search';

    // 모바일/태블릿(<1024px)에서만 동작하는 햄버거 드로어 상태
    const [mobileOpen, setMobileOpen] = useState(false);
    // 라우트 바뀌면 메뉴 닫기
    useEffect(() => { setMobileOpen(false); }, [path]);

  // ========================================
  // 🪧 콘텐츠 상단 (작은 🔍 + 우측 메뉴 텍스트)
  // ========================================
  // StageHeader — 좌측 🔍 아이콘(우측 검색에 포커스) + 우측 항상 보이는 인라인 검색
  // (rightLabel/rightTo/onRightClick props는 더 이상 사용하지 않지만 기존 호출부 호환을 위해 시그니처는 유지)
  function StageHeader() {
    const [q, setQ] = useState('');
    const [open, setOpen] = useState(false);
    const { navigate, path } = useRouter();
    const results = useMemo(() => searchIngredients(q), [q]);
    const wrapRef = useRef(null);
    const inputRef = useRef(null);

    // 바깥 클릭 시 드롭다운 닫기
    useEffect(() => {
      const onDoc = (e) => {
        if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
      };
      document.addEventListener('mousedown', onDoc);
      return () => document.removeEventListener('mousedown', onDoc);
    }, []);

    // 라우트 바뀌면 입력 비우고 드롭다운 닫기
    useEffect(() => { setOpen(false); setQ(''); }, [path]);

    const submit = (e) => {
      e?.preventDefault?.();
      if (!q.trim()) return;
      navigate(`/search?q=${encodeURIComponent(q.trim())}`);
      setOpen(false);
    };

    return (
      <div className="flex items-center justify-end mb-10 sm:mb-14 gap-4" ref={wrapRef}>
        {/* 우측: 항상 보이는 인라인 검색 (편안한 UI) */}
        <div className="relative w-full max-w-[300px] sm:max-w-[360px]">
          <form onSubmit={submit}>
            <div className="flex items-center gap-2 border-b border-ink pb-2 transition-all focus-within:pb-[7px] focus-within:border-b-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" className="text-ink shrink-0">
                <circle cx="9" cy="9" r="5.5"/>
                <path d="M13 13 L20 20"/>
              </svg>
              <input
                ref={inputRef}
                type="search"
                value={q}
                onChange={(e) => { setQ(e.target.value); setOpen(true); }}
                onFocus={() => setOpen(true)}
                placeholder="재료 검색 — 박력분, baking-soda…"
                className="w-full bg-transparent outline-none text-sm placeholder:text-mute font-sans tracking-tight"
                aria-label="재료 검색"
              />
              {q && (
                <button
                  type="button"
                  onClick={() => { setQ(''); inputRef.current?.focus(); }}
                  className="text-mute hover:text-ink text-xs shrink-0"
                  aria-label="검색어 지우기"
                >
                  ✕
                </button>
              )}
            </div>
          </form>

          {/* 라이브 드롭다운 */}
          {open && q.trim() && (
            <div className="absolute right-0 left-0 top-[38px] bg-white border border-line z-40 max-h-[360px] overflow-auto no-scrollbar">
              {results.length === 0 ? (
                <div className="meta text-mute p-4">일치하는 재료가 없습니다 — "{q}"</div>
              ) : (
                <ul>
                  {results.map(r => (
                    <li key={r.slug}>
                      <button
                        type="button"
                        onClick={() => { navigate(`/ingredient/${r.slug}`); setOpen(false); setQ(''); }}
                        className="w-full text-left py-2.5 px-3 flex items-center gap-3 hover:bg-soft transition"
                      >
                        <span className="w-10 h-10 bg-soft overflow-hidden shrink-0 block">
                          <IngredientImage ingredient={r} />
                        </span>
                        <span className="min-w-0 flex-1">
                          <span className="block text-sm text-ink truncate">
                            {highlight(r.name_ko, q)} <span className="meta text-mute ml-1">{r.name_en}</span>
                          </span>
                          <span className="block text-xs text-ash truncate mt-0.5">{r.summary}</span>
                        </span>
                      </button>
                    </li>
                  ))}
                  <li className="border-t border-line">
                    <button
                      type="button"
                      onClick={submit}
                      className="w-full text-left py-2.5 px-3 meta text-ink hover:bg-soft transition"
                    >
                      "{q}" 전체 결과 보기 →
                    </button>
                  </li>
                </ul>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ========================================
  // 🛒 Floating 비교 트레이 (미니멀 검정)
  // ========================================
  function CompareTray() {
    const tray = useTray();
    const { navigate, path } = useRouter();
    if (tray.ids.length === 0) return null;
    if (path === '/compare') return null;
    const goCompare = () => navigate(`/compare?ids=${tray.ids.join(',')}`);

    return (
      <div className="fixed bottom-0 right-0 z-40 m-4 sm:m-6 bg-ink text-white p-4 w-[260px] sm:w-[300px]">
        <div className="flex items-center justify-between mb-3">
          <span className="meta text-white/70">Tray — {tray.ids.length}/3</span>
          <button onClick={tray.clear} className="meta text-white/60 hover:text-white">CLEAR</button>
        </div>
        <ul className="flex gap-2 mb-3">
          {tray.ids.map(id => {
            const ing = getIngredient(id);
            if (!ing) return null;
            return (
              <li key={id} className="relative flex-1 min-w-0">
                <div className="aspect-square bg-soft overflow-hidden">
                  <IngredientImage ingredient={ing} />
                </div>
                <div className="meta text-white/80 truncate mt-1">{ing.name_en}</div>
                <button
                  onClick={() => tray.remove(id)}
                  aria-label={`${ing.name_ko} 빼기`}
                  className="absolute top-1 right-1 bg-white text-ink w-5 h-5 text-[10px] leading-none flex items-center justify-center"
                >✕</button>
              </li>
            );
          })}
          {Array.from({ length: Math.max(0, 2 - tray.ids.length) }).map((_, i) => (
            <li key={`ph-${i}`} className="flex-1">
              <div className="aspect-square border border-dashed border-white/40 flex items-center justify-center text-white/40 text-lg">＋</div>
              <div className="meta text-white/40 mt-1">EMPTY</div>
            </li>
          ))}
        </ul>
        <button
          onClick={goCompare}
          disabled={tray.ids.length < 2}
          className={`w-full py-2.5 text-sm tracking-wide ${tray.ids.length < 2 ? 'bg-white/20 text-white/40 cursor-not-allowed' : 'bg-white text-ink hover:bg-mute2'}`}
        >
          {tray.ids.length < 2 ? '2 OR MORE TO COMPARE' : `COMPARE ${tray.ids.length} →`}
        </button>
      </div>
    );
  }

          <div className="lg:col-span-8 aspect-square bg-soft overflow-hidden">
            <IngredientImage ingredient={ing} />
          </div>
          <aside className="lg:col-span-4 border-t lg:border-t-0 lg:border-l border-line pt-6 lg:pt-0 lg:pl-6">
            <div className="meta text-mute mb-3">Plate</div>
            <div className="display text-2xl mb-1.5"><b>{ing.name_ko}</b></div>
            <div className="meta text-mute italic">{ing.name_en}{ing.name_zh && ` · ${ing.name_zh}`}</div>
            <p className="text-sm text-ash mt-4 leading-relaxed">{ing.summary}</p>
          </aside>
        </section>

        {/* 9개 항목 row */}
        <section>
          <div className="meta text-mute mb-4">Specifications · 정보 항목</div>
          <ul>
            {sections.map((s, i) => (
              <li key={s.key} className="border-t border-line last:border-b grid grid-cols-12 gap-4 py-6 sm:py-8">
                <div className="col-span-12 sm:col-span-4">
                  <div className="meta text-mute mb-1">{String(i + 1).padStart(2, '0')} · {s.title}</div>
                  <div className="display text-lg sm:text-xl"><b>{s.ko}</b></div>
                </div>
                <p className="col-span-12 sm:col-span-8 text-[15px] text-ash leading-7 whitespace-pre-line">{ing[s.key]}</p>
              </li>
            ))}
          </ul>
        </section>

        {cat && (
          <section className="mt-20 border-t border-line pt-8">
            <div className="meta text-mute mb-4">More in {cat.en}</div>
            <div className="gallery">
              {INGREDIENTS.filter(i => i.category === cat.slug && i.slug !== ing.slug).slice(0, 4).map((other, i) => (
                <IngredientTile key={other.slug} ing={other} index={i} />
              ))}
            </div>
          </section>
        )}
      </main>
    );
  }

  // ========================================
  // 📄 Page: Compare
  // ========================================
  function ComparePage({ ids }) {
    const tray = useTray();
    const { navigate } = useRouter();

    const list = useMemo(() => {
      const raw = (ids || tray.ids.join(',')).split(',').map(s => s.trim()).filter(Boolean);
      const uniq = [...new Set(raw)].slice(0, 3);
      return uniq.map(getIngredient).filter(Boolean);
    }, [ids, tray.ids]);

    if (list.length === 0) {
      return (
        <main className="fade-up">
          <StageHeader />
          <div className="mb-10">
            <div className="meta text-mute mb-2">Side by Side</div>
            <h1 className="display text-[40px] sm:text-[64px]"><span className="text-mute">Compare:</span> <b>Empty.</b></h1>
            <p className="mt-5 text-ash max-w-xl text-[15px] leading-7">아직 비교에 담긴 재료가 없습니다. 재료 상세에서 “＋ ADD TO COMPARE”를 눌러보세요.</p>
          </div>
          <div className="meta text-mute mb-4">Suggested presets</div>
          <ul className="grid grid-cols-1 sm:grid-cols-2 gap-x-10 gap-y-8">
            {COMPARE_PRESETS.map((preset, i) => {
              const ings = preset.ids.map(getIngredient).filter(Boolean);
              return (
                <li key={preset.title}>
                  <Link to={`/compare?ids=${preset.ids.join(',')}`} className="block group">
                    <div className="flex gap-1 mb-3">
                      {ings.map(ing => (
                        <div key={ing.slug} className="flex-1 aspect-square bg-soft overflow-hidden">
                          <IngredientImage ingredient={ing} />
                        </div>
                      ))}
                    </div>
                    <div className="meta text-mute">Feat. {String(i + 1).padStart(2, '0')}</div>
                    <h3 className="display text-xl mt-1"><b>{preset.title}</b></h3>
                    <p className="text-sm text-ash mt-1">{preset.subtitle}</p>
                  </Link>
                </li>
              );
            })}
          </ul>
        </main>
      );
    }

    const removeFromCompare = (slug) => {
      const next = list.map(i => i.slug).filter(s => s !== slug);
      if (next.length === 0) navigate('/');
      else navigate(`/compare?ids=${next.join(',')}`);
    };

    const fieldRows = [
      { key: 'name',                title: '01 · NAME',            ko: '이름' },
      { key: 'summary',             title: '02 · ONE-LINER',       ko: '한 줄 정체' },
      { key: 'image',               title: '03 · PHOTO',           ko: '사진' },
      { key: 'role',                title: '04 · ROLE',            ko: '베이킹에서의 역할' },
      { key: 'similar_ingredients', title: '05 · DIFFERENCE',      ko: '비슷한 재료와의 차이' },
      { key: 'common_mistakes',     title: '06 · COMMON MISTAKE',  ko: '초보자 자주 하는 실수' },
      { key: 'substitutes',         title: '07 · SUBSTITUTE',      ko: '대체 가능 여부' },
      { key: 'storage',             title: '08 · STORAGE',         ko: '보관법' },
      { key: 'where_to_buy',        title: '09 · WHERE TO BUY',    ko: '한국 구매처' },
    ];

    const renderCell = (ing, key) => {
      if (key === 'name') {
        return (
          <div>
            <div className="display text-lg"><b>{ing.name_ko}</b></div>
            <div className="meta text-mute italic mt-0.5">{ing.name_en}</div>
            {ing.name_zh && <div className="meta text-mute mt-0.5">{ing.name_zh}</div>}
          </div>
        );
      }
      if (key === 'image') {
        return (
          <div className="aspect-square bg-soft overflow-hidden">
            <IngredientImage ingredient={ing} />
          </div>
        );
      }
      return <p className="text-[14px] text-ash leading-7 whitespace-pre-line">{ing[key]}</p>;
    };

    const cols = list.length;

    return (
      <main className="fade-up">
        <StageHeader />

        <div className="mb-10 sm:mb-14">
          <div className="meta text-mute mb-2">Side by Side · 비교 모드</div>
          <h1 className="display text-[40px] sm:text-[64px] lg:text-[80px]">
            <span className="text-mute">Compare:</span> <b>{cols} ingredients.</b>
          </h1>
          <p className="mt-5 text-ash max-w-2xl text-[15px] leading-7">{cols}개의 재료를 9개 항목으로 정리했습니다. 데스크탑은 가로 표, 모바일은 항목별 세로 카드.</p>
        </div>

        {/* === 데스크탑(≥lg): 가로 grid 표 === */}
        <div className="hidden lg:block compare-grid no-scrollbar -mx-10 px-10">
          <div className="grid border-t border-b border-ink py-4 mb-0" style={{ gridTemplateColumns: `200px repeat(${cols}, minmax(220px, 1fr))`, minWidth: `${200 + cols * 240}px` }}>
            <div className="meta text-mute">Field</div>
            {list.map(ing => (
              <div key={ing.slug} className="pl-4 flex items-start justify-between gap-3">
                <div>
                  <Link to={`/ingredient/${ing.slug}`} className="display text-base hover:underline underline-offset-4"><b>{ing.name_ko}</b></Link>
                  <div className="meta text-mute italic mt-0.5">{ing.name_en}</div>
                </div>
                <button onClick={() => removeFromCompare(ing.slug)} className="meta text-mute hover:text-ink shrink-0">✕</button>
              </div>
            ))}
          </div>

          {fieldRows.map((row) => (
            <div
              key={row.key}
              className="grid border-b border-line py-6"
              style={{ gridTemplateColumns: `200px repeat(${cols}, minmax(220px, 1fr))`, minWidth: `${200 + cols * 240}px` }}
            >
              <div>
                <div className="meta text-mute mb-1">{row.title}</div>
                <div className="display text-base"><b>{row.ko}</b></div>
              </div>
              {list.map(ing => (
                <div key={ing.slug + row.key} className="pl-4">
                  {renderCell(ing, row.key)}
                </div>
              ))}
            </div>
          ))}
        </div>

        {/* === 모바일(<lg): 항목별 세로 카드 === */}
        <div className="lg:hidden">
          {/* 상단 칩: 비교 중인 재료 목록 + 빼기 */}
          <div className="border-t border-b border-ink py-4 mb-2 flex flex-wrap items-baseline gap-x-5 gap-y-2.5">
            <span className="meta text-mute">Comparing</span>
            {list.map(ing => (
              <div key={ing.slug} className="flex items-baseline gap-1.5">
                <Link to={`/ingredient/${ing.slug}`} className="display text-base hover:underline underline-offset-4"><b>{ing.name_ko}</b></Link>
                <button
                  onClick={() => removeFromCompare(ing.slug)}
                  aria-label={`${ing.name_ko} 빼기`}
                  className="text-mute hover:text-ink text-sm"
                >✕</button>
              </div>
            ))}
          </div>

          {/* 9개 항목 각각을 세로 섹션으로 — 항목별로 재료들 stacked */}
          {fieldRows.map((row) => (
            <section key={row.key} className="border-b border-line py-6">
              <div className="meta text-mute mb-1">{row.title}</div>
              <h3 className="display text-lg mb-4"><b>{row.ko}</b></h3>

              {row.key === 'name' ? (
                /* 이름은 칩에 이미 보이므로 짧게 한 줄 요약 */
                <ul className="space-y-2">
                  {list.map(ing => (
                    <li key={ing.slug} className="text-sm text-ash">
                      <span className="display text-ink mr-2"><b>{ing.name_ko}</b></span>
                      <span className="meta text-mute italic">{ing.name_en}</span>
                      {ing.name_zh && <span className="meta text-mute ml-1">· {ing.name_zh}</span>}
                    </li>
                  ))}
                </ul>
              ) : row.key === 'image' ? (
                /* 사진은 3열 작은 썸네일로 한눈에 비교 */
                <ul className="grid grid-cols-3 gap-2">
                  {list.map(ing => (
                    <li key={ing.slug}>
                      <div className="aspect-square bg-soft overflow-hidden">
                        <IngredientImage ingredient={ing} />
                      </div>
                      <div className="meta text-mute mt-1.5 truncate">{ing.name_en}</div>
                    </li>
                  ))}
                </ul>
              ) : (
                /* 그 외 항목 — 재료 이름 라벨 + 본문 */
                <ul className="space-y-4">
                  {list.map(ing => (
                    <li key={ing.slug} className="border-l-2 border-line pl-3.5">
                      <div className="display text-sm mb-1.5">
                        <b>{ing.name_ko}</b> <span className="meta text-mute italic ml-1">{ing.name_en}</span>
                      </div>
                      <p className="text-[14px] text-ash leading-7 whitespace-pre-line">{ing[row.key]}</p>
                    </li>
                  ))}
                </ul>
              )}
            </section>
          ))}
        </div>

        <div className="mt-10">
          <Link to="/" className="meta underline underline-offset-4">← Back to Index</Link>
        </div>
      </main>
    );
  }

  // ========================================
  // 📄 Page: Search
  // ========================================
  function SearchPage({ q }) {
    const { navigate } = useRouter();
    const [text, setText] = useState(q || '');
    useEffect(() => { setText(q || ''); }, [q]);
    const results = useMemo(() => searchIngredients(text), [text]);

    const grouped = useMemo(() => {
      const map = {};
      results.forEach(r => { (map[r.category] = map[r.category] || []).push(r); });
      return map;
    }, [results]);

    const submit = (e) => {
      e.preventDefault();
      if (!text.trim()) return;
      navigate(`/search?q=${encodeURIComponent(text.trim())}`);
    };

    return (
      <main className="fade-up">
        <StageHeader />

        <div className="mb-10 sm:mb-14">
          <div className="meta text-mute mb-2">Search · 검색</div>
          <h1 className="display text-[40px] sm:text-[64px] lg:text-[80px]">
            <span className="text-mute">Search:</span> <b>"{text || '—'}".</b>
          </h1>
          <p className="mt-5 text-ash text-[15px]">{text ? `${results.length}개의 재료가 일치합니다.` : '검색어를 입력해 보세요.'}</p>

          <form onSubmit={submit} className="mt-7 max-w-xl">
            <input
              type="search"
              value={text}
              onChange={(e) => setText(e.target.value)}
              placeholder="박력분, baking-soda…"
              className="search-input"
              aria-label="다시 검색"
            />
          </form>
        </div>

        {!text ? (
          <div className="meta text-mute">검색어를 입력하면 결과가 표시됩니다.</div>
        ) : results.length === 0 ? (
          <div className="border border-line py-16 text-center">
            <div className="meta text-mute">NO RESULT</div>
            <p className="text-sm text-ash mt-2">일치하는 재료가 없습니다. 카테고리에서 둘러보세요.</p>
            <div className="mt-5 flex justify-center gap-4 flex-wrap meta">
              {CATEGORIES.slice(0, 3).map(c => (
                <Link key={c.slug} to={`/category/${c.slug}`} className="underline underline-offset-4 text-ink">{c.en}</Link>
              ))}
            </div>
          </div>
        ) : (
          <div>
            {CATEGORIES.filter(c => grouped[c.slug]?.length).map(c => (
              <section key={c.slug} className="mb-12">
                <div className="flex items-baseline justify-between border-b border-ink pb-3 mb-4">
                  <div className="display text-xl sm:text-2xl"><b>{c.en}</b> <span className="text-mute">— {c.name}</span></div>
                  <div className="meta text-mute">{grouped[c.slug].length} match</div>
                </div>
                <ul>
                  {grouped[c.slug].map(r => (
                    <li key={r.slug} className="border-b border-line">
                      <Link to={`/ingredient/${r.slug}`} className="flex gap-4 sm:gap-6 py-4 hover:bg-soft transition">
                        <div className="w-16 h-16 sm:w-20 sm:h-20 bg-soft overflow-hidden shrink-0">
                          <IngredientImage ingredient={r} />
                        </div>
                        <div className="min-w-0 flex-1">
                          <div className="display text-base sm:text-lg"><b>{highlight(r.name_ko, text)}</b> <span className="meta text-mute italic ml-1">{highlight(r.name_en, text)}</span></div>
                          <p className="text-sm text-ash mt-1.5 line-clamp-2 leading-relaxed">{highlight(r.summary, text)}</p>
                        </div>
                        <span className="text-ink text-xl shrink-0 self-center hidden sm:inline">→</span>
                      </Link>
                    </li>
                  ))}
                </ul>
              </section>
            ))}
          </div>
        )}
      </main>
    );
  }

  function NotFoundPage() {
    return (
      <main className="fade-up">
        <StageHeader />
        <div className="meta text-mute mb-2">404</div>
        <h1 className="display text-[40px] sm:text-[64px]"><b>Not found.</b></h1>
        <Link to="/" className="meta underline underline-offset-4 inline-block mt-6">← Back to Index</Link>
      </main>
    );
  }

  // ========================================
  // 🚀 App
  // ========================================
  function Routes() {
    const { path, query } = useRouter();
    const route = matchRoute(path);
    switch (route.name) {
      case 'home':       return <HomePage />;
      case 'category':   return <CategoryPage slug={route.params.slug} />;
      case 'ingredient': return <IngredientPage slug={route.params.slug} />;
      case 'compare':    return <ComparePage ids={query.ids} />;
      case 'search':     return <SearchPage q={query.q || ''} />;
      default:           return <NotFoundPage />;
    }
  }

  function App() {
    // tick: 외부에서 realtime 이벤트로 increment → App 트리 강제 리렌더.
    const [tick, setTick] = useState(0);
    useEffect(function () {
      window.__bakingDictForceRefresh = function () { setTick(function (n) { return n + 1; }); };
      return function () { delete window.__bakingDictForceRefresh; };
    }, []);
    return (
      <Router>
        <TrayProvider>
          <div className="bg-paper text-ink min-h-screen" data-tick={tick}>
            <Sidebar />
            <div className="stage">
              <Routes />
            </div>
            <CompareTray />
          </div>
        </TrayProvider>
      </Router>
    );
  }

  // Bootstrap — fetch ingredients from Supabase, then mount.
  // INGREDIENTS is module-scoped; .push() mutates the shared reference used by
  // utilities (getIngredient/categoryCount/searchIngredients/...).
  //
  // NOTE: written as a .then() chain on purpose — babel-standalone's preset-env
  // would otherwise downlevel async/await to regenerator-runtime, which is not
  // loaded on this page.
  var __api = window.bakingDictApi;
  var __pending = __api
    ? __api.fetchIngredients()
    : Promise.reject(new Error('supabase 클라이언트가 로드되지 않았습니다 (lib/supabase-client.js)'));
  __pending
    .then(function (rows) {
      INGREDIENTS.push.apply(INGREDIENTS, rows);
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);

      // Realtime — 관리자가 토글하면 새로고침 없이 즉시 반영.
      // 이벤트가 오면 다시 fetch (RLS+필터로 is_visible=true만 보장)하고,
      // INGREDIENTS 배열을 in-place로 교체한 뒤 App을 강제 리렌더.
      if (__api && __api.subscribeIngredients) {
        var refetchPending = false;
        __api.subscribeIngredients(function () {
          if (refetchPending) return;     // 짧은 시간에 여러 이벤트 묶기
          refetchPending = true;
          setTimeout(function () {
            refetchPending = false;
            __api.fetchIngredients()
              .then(function (latest) {
                INGREDIENTS.length = 0;
                INGREDIENTS.push.apply(INGREDIENTS, latest);
                if (window.__bakingDictForceRefresh) window.__bakingDictForceRefresh();
              })
              .catch(function (err) {
                console.warn('[realtime] refetch failed', err);
              });
          }, 100);
        });
      }
    })
    .catch(function (e) {
      console.error('[bootstrap] failed to load ingredients', e);
      // Build DOM nodes instead of innerHTML so any HTML/script in error
      // messages can never be parsed and executed.
      var root = document.getElementById('root');
      while (root.firstChild) root.removeChild(root.firstChild);
      var wrap = document.createElement('div');
      wrap.setAttribute('style', 'min-height:60vh;display:flex;align-items:center;justify-content:center;font-family:Pretendard,sans-serif;color:#600;flex-direction:column;gap:8px');
      var head = document.createElement('div');
      head.textContent = '재료 데이터를 불러오지 못했습니다.';
      var detail = document.createElement('div');
      detail.setAttribute('style', 'font-size:12px;color:#9A9A9A');
      detail.textContent = e && e.message ? e.message : String(e);
      wrap.appendChild(head);
      wrap.appendChild(detail);
      root.appendChild(wrap);
    });
  </script>
</body>
