        radial-gradient(120% 140% at 0% 0%, rgba(91,91,214,0.10) 0%, rgba(91,91,214,0) 55%),

        radial-gradient(120% 140% at 0% 0%, rgba(91,91,214,0.18) 0%, rgba(91,91,214,0) 55%),
        radial-gradient(80% 100% at 100% 0%, rgba(167,139,250,0.18) 0%, rgba(167,139,250,0) 60%);

      background:
        radial-gradient(60% 60% at 80% 10%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 60%),
        radial-gradient(40% 40% at 10% 90%, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0) 60%),

<body class="bg-[#F7F8FB] dark:bg-[#0B0D12] text-slate-800 dark:text-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    // ========================================
    // 🎨 Design System
    // ========================================
    function Button({ variant = 'primary', size = 'md', className = '', children, ...rest }) {
      const base = 'inline-flex items-center justify-center gap-2 rounded-lg font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-brand-500 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-brand-500 hover:bg-brand-600 text-white',
        secondary: 'bg-slate-100 hover:bg-slate-200 text-slate-700 dark:bg-slate-800 dark:hover:bg-slate-700 dark:text-slate-100 border border-slate-200 dark:border-slate-700',
        ghost: 'bg-transparent hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-200',
        outline: 'bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 dark:bg-slate-900 dark:hover:bg-slate-800 dark:text-slate-200 dark:border-slate-700',
        danger: 'bg-rose-600 hover:bg-rose-700 text-white',
        gradient: 'text-white bg-brand-500 hover:bg-brand-600',
      };
      const sizes = { sm: 'px-3 py-1.5 text-xs', md: 'px-4 py-2 text-sm', lg: 'px-5 py-2.5 text-sm' };
      return (
        <button className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} {...rest}>
          {children}
        </button>
      );
    }

    function Input({ label, error, className = '', ...rest }) {
      return (
        <label className="block">
          {label && <span className="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1.5">{label}</span>}
          <input
            className={`w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2 text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500/40 focus:border-brand-500 ${className}`}
            {...rest}
          />
          {error && <span className="block text-xs text-rose-500 mt-1">{error}</span>}
        </label>
      );
    }

    function Select({ className = '', children, ...rest }) {
      return (
        <select
          className={`rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2 text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-500/40 focus:border-brand-500 ${className}`}
          {...rest}
        >
          {children}
        </select>
      );
    }

    function Card({ className = '', children }) {
      return (
        <div className={`rounded-2xl bg-white dark:bg-slate-900 border border-slate-200/70 dark:border-slate-800 shadow-sm card-hover ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ tone = 'slate', children }) {
      const tones = {
        slate:   'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300',
        indigo:  'bg-brand-50 text-brand-700 dark:bg-brand-900/30 dark:text-brand-200',
        rose:    'bg-rose-50 text-rose-700 dark:bg-rose-900/30 dark:text-rose-300',
        amber:   'bg-amber-50 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300',
        emerald: 'bg-emerald-50 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-300',
        violet:  'bg-violet-50 text-violet-700 dark:bg-violet-900/30 dark:text-violet-300',
        sky:     'bg-sky-50 text-sky-700 dark:bg-sky-900/30 dark:text-sky-300',
      };
      return (
        <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-[11px] font-medium ${tones[tone]}`}>
          {children}
        </span>
      );
    }

    function SourceTag({ children }) {
      return (
        <span className="text-[10px] uppercase tracking-wider font-semibold text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-800 rounded px-1.5 py-0.5">
          {children}
        </span>
      );
    }

    // ========================================
    // 🌗 Theme Toggle Hook
    // ========================================
    function useDarkMode() {
      const [dark, setDark] = useState(() => {
        const saved = localStorage.getItem('pad_theme');
        if (saved) return saved === 'dark';
        return window.matchMedia('(prefers-color-scheme: dark)').matches;
      });
      useEffect(() => {
        const root = document.documentElement;
        if (dark) root.classList.add('dark');
        else root.classList.remove('dark');
        localStorage.setItem('pad_theme', dark ? 'dark' : 'light');
      }, [dark]);
      return [dark, setDark];
    }

    // ========================================
    // 🕒 Live Clock
    // ========================================
    function useNow() {
      const [now, setNow] = useState(new Date());
      useEffect(() => {
        const id = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(id);
      }, []);
      return now;
    }

    function formatKST(d) {
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mi = String(d.getMinutes()).padStart(2, '0');
      const ss = String(d.getSeconds()).padStart(2, '0');
      return `${yyyy}.${mm}.${dd} (${days[d.getDay()]}) ${hh}:${mi}:${ss} KST`;
    }

    function formatDateLong(d) {
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
    }

    // ========================================
    // 🔐 Auth (localStorage + Web Crypto SHA-256 + salt)
    // ========================================
    const ACCOUNTS_KEY = 'pad_accounts_v1';
    const SESSION_KEY = 'pad_session_v1';
    const DEMO_EMAIL = 'demo@griff.co.kr';
    const DEMO_PW = 'demo1234';
    const SESSION_TTL = 24 * 60 * 60 * 1000;        // 24h
    const REMEMBER_TTL = 30 * 24 * 60 * 60 * 1000;  // 30d

    function toHex(buf) {
      return Array.from(new Uint8Array(buf))
        .map((b) => b.toString(16).padStart(2, '0'))
        .join('');
    }
    function makeSalt() {
      const a = new Uint8Array(16);
      crypto.getRandomValues(a);
      return toHex(a.buffer);
    }
    async function hashPw(pw, salt) {
      const data = new TextEncoder().encode(`${salt}::${pw}`);
      const buf = await crypto.subtle.digest('SHA-256', data);
      return toHex(buf);
    }

    function loadAccounts() {
      try { return JSON.parse(localStorage.getItem(ACCOUNTS_KEY) || '{}'); }
      catch { return {}; }
    }
    function saveAccounts(a) {
      localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(a));
    }
    function loadSession() {
      try {
        const s = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
        if (s && s.expiresAt && s.expiresAt > Date.now()) return s;
      } catch {}
      localStorage.removeItem(SESSION_KEY);
      return null;
    }
    function saveSession(s) {
      localStorage.setItem(SESSION_KEY, JSON.stringify(s));
    }
    function clearSession() {
      localStorage.removeItem(SESSION_KEY);
    }

    async function ensureDemoSeed() {
      const accs = loadAccounts();
      if (accs[DEMO_EMAIL]) return;
      const salt = makeSalt();
      const hash = await hashPw(DEMO_PW, salt);
      accs[DEMO_EMAIL] = {
        name: '데모',
        salt, hash,
        createdAt: Date.now(),
      };
      saveAccounts(accs);
    }

    async function signUpAccount({ email, password, name }) {
      const accs = loadAccounts();
      if (accs[email]) {
        const err = new Error('이미 가입된 이메일이에요. 로그인 탭으로 이동해 주세요.');
        err.code = 'EXISTS';
        throw err;
      }
      const salt = makeSalt();
      const hash = await hashPw(password, salt);
      accs[email] = {
        name: (name || '').trim() || email.split('@')[0],
        salt, hash,
        createdAt: Date.now(),
      };
      saveAccounts(accs);
    }

    async function signInAccount({ email, password, remember }) {
      const accs = loadAccounts();
      const acc = accs[email];
      if (!acc) {
        const err = new Error('가입되지 않은 이메일이에요. 회원가입을 먼저 진행해 주세요.');
        err.code = 'NO_ACCOUNT';
        throw err;
      }
      const hash = await hashPw(password, acc.salt);
      if (hash !== acc.hash) {
        const err = new Error('비밀번호가 일치하지 않아요.');
        err.code = 'BAD_PW';
        throw err;
      }
      const ttl = remember ? REMEMBER_TTL : SESSION_TTL;
      const session = {
        email,
        name: acc.name,
        loggedInAt: Date.now(),
        expiresAt: Date.now() + ttl,
        remember: !!remember,
      };
      saveSession(session);
      return session;
    }

    function isValidEmail(s) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s || '');
    }

    // ========================================
    // 🔐 Login Page (split layout · Loanza CRM 스타일)
    // ========================================
    function LoginPage({ onLogin }) {
      const [mode, setMode] = useState('signin'); // 'signin' | 'signup'
      const [email, setEmail] = useState('');
      const [pw, setPw] = useState('');
      const [pw2, setPw2] = useState('');
      const [name, setName] = useState('');
      const [remember, setRemember] = useState(true);
      const [err, setErr] = useState('');
      const [loading, setLoading] = useState(false);

      useEffect(() => { ensureDemoSeed(); }, []);

      const switchMode = (m) => {
        setMode(m);
        setErr('');
        setPw(''); setPw2('');
      };

      const submit = async (e) => {
        e?.preventDefault();
        setErr('');
        const emailNorm = email.trim().toLowerCase();
        if (!isValidEmail(emailNorm)) {
          setErr('이메일 형식이 올바르지 않아요. (예: name@example.com)');
          return;
        }
        if (mode === 'signup') {
          if (pw.length < 8) {
            setErr('비밀번호는 8자 이상으로 설정해 주세요.');
            return;
          }
          if (pw !== pw2) {
            setErr('비밀번호 확인이 일치하지 않아요.');
            return;
          }
        } else {
          if (pw.length === 0) {
            setErr('비밀번호를 입력해 주세요.');
            return;
          }
        }
        setLoading(true);
        try {
          if (mode === 'signup') {
            await signUpAccount({ email: emailNorm, password: pw, name });
          }
          const session = await signInAccount({ email: emailNorm, password: pw, remember });
          onLogin(session);
        } catch (e2) {
          setErr(e2.message || '로그인에 실패했어요. 잠시 후 다시 시도해 주세요.');
        } finally {
          setLoading(false);
        }
      };

      const fillDemo = () => {
        setMode('signin');
        setEmail(DEMO_EMAIL);
        setPw(DEMO_PW);
        setErr('');
      };

      return (
        <div className="min-h-screen grid md:grid-cols-2 bg-[#F7F8FB] dark:bg-[#0B0D12]">
          {/* Left · Hero (desktop only) */}
          <div className="hidden md:flex flex-col justify-between p-10 lg:p-14 text-white login-pattern relative overflow-hidden">
            <div className="flex items-center gap-2 relative z-10">
              <div className="w-9 h-9 rounded-lg bg-white/15 backdrop-blur flex items-center justify-center">
                <span className="text-lg">✨</span>
              </div>
              <span className="font-semibold text-sm tracking-wide">AI Dashboard</span>
            </div>

            <div className="relative z-10 max-w-md">
              <h2 className="text-3xl lg:text-4xl font-bold leading-tight tracking-tight">
                나만의 AI 대시보드<br/>
                <span className="text-white/80">매일 5분의 인사이트</span>
              </h2>
              <p className="mt-5 text-sm text-white/80 leading-relaxed">
                Notion 일정 · 지출 · 날씨를 한 화면에 모으고,
                AI가 매일 아침 당신에게 필요한 한 마디를 건네드려요.
              </p>

              <div className="mt-10 grid grid-cols-3 gap-3 max-w-sm">
                {[
                  { k: '📅', l: 'Notion 일정' },
                  { k: '💸', l: '지출 추적' },
                  { k: '🌤️', l: '실시간 날씨' },
                ].map((it) => (
                  <div key={it.l} className="rounded-xl bg-white/10 backdrop-blur border border-white/15 px-3 py-3 text-center">
                    <div className="text-2xl">{it.k}</div>
                    <div className="text-[11px] mt-1 text-white/85">{it.l}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="relative z-10 text-[11px] text-white/60">
              © 2026 Personal AI Dashboard
            </div>
          </div>

          {/* Right · Form */}
          <div className="flex items-center justify-center p-6 sm:p-10">
            <div className="w-full max-w-md fade-up">
              <div className="md:hidden flex items-center gap-2 mb-6">
                <div className="w-9 h-9 rounded-lg bg-brand-500 flex items-center justify-center text-white">✨</div>
                <span className="font-semibold">AI Dashboard</span>
              </div>

              <h1 className="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100">
                {mode === 'signup' ? '계정 만들기' : '다시 만나서 반가워요 👋'}
              </h1>
              <p className="mt-2 text-sm text-slate-500 dark:text-slate-400">
                {mode === 'signup'
                  ? '몇 가지만 입력하면 바로 시작할 수 있어요.'
                  : '오늘의 일정, 지출, 날씨를 한 화면에서 확인해보세요.'}
              </p>

              <Card className="mt-7 p-7">
                <div className="grid grid-cols-2 gap-1 mb-5 p-1 bg-slate-100 dark:bg-slate-800 rounded-lg">
                  <button
                    type="button"
                    onClick={() => switchMode('signin')}
                    className={`py-2 text-xs font-medium rounded-md transition ${
                      mode === 'signin'
                        ? 'bg-white dark:bg-slate-900 text-brand-600 dark:text-brand-300 shadow-sm'
                        : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'
                    }`}
                  >
                    로그인
                  </button>
                  <button
                    type="button"
                    onClick={() => switchMode('signup')}
                    className={`py-2 text-xs font-medium rounded-md transition ${
                      mode === 'signup'
                        ? 'bg-white dark:bg-slate-900 text-brand-600 dark:text-brand-300 shadow-sm'
                        : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'
                    }`}
                  >
                    회원가입
                  </button>
                </div>

                <form onSubmit={submit} noValidate className="space-y-4">
                  {mode === 'signup' && (
                    <Input
                      label="이름 (선택)"
                      type="text"
                      placeholder="홍길동"
                      value={name}
                      onChange={(e) => setName(e.target.value)}
                      autoComplete="name"
                    />
                  )}
                  <Input
                    label="이메일"
                    type="email"
                    placeholder="you@example.com"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    autoComplete="email"
                  />
                  <Input
                    label="비밀번호"
                    type="password"
                    placeholder={mode === 'signup' ? '8자 이상' : '••••••••'}
                    value={pw}
                    onChange={(e) => setPw(e.target.value)}
                    autoComplete={mode === 'signup' ? 'new-password' : 'current-password'}
                  />
                  {mode === 'signup' && (
                    <Input
                      label="비밀번호 확인"
                      type="password"
                      placeholder="다시 한 번 입력"
                      value={pw2}
                      onChange={(e) => setPw2(e.target.value)}
                      autoComplete="new-password"
                    />
                  )}

                  {mode === 'signin' && (
                    <label className="flex items-center gap-2 text-xs text-slate-600 dark:text-slate-400 select-none cursor-pointer">
                      <input
                        type="checkbox"
                        checked={remember}
                        onChange={(e) => setRemember(e.target.checked)}
                        className="w-4 h-4 accent-brand-500 cursor-pointer"
                      />
                      로그인 유지 (30일)
                    </label>
                  )}

                  {err && (
                    <div className="text-xs text-rose-600 dark:text-rose-300 bg-rose-50 dark:bg-rose-900/20 border border-rose-200 dark:border-rose-900/40 rounded-lg px-3 py-2">
                      ⚠ {err}
                    </div>
                  )}

                  <Button type="submit" variant="primary" size="lg" className="w-full" disabled={loading}>
                    {loading
                      ? (mode === 'signup' ? '가입 중...' : '로그인 중...')
                      : (mode === 'signup' ? '회원가입 후 시작' : '이메일로 로그인')}
                  </Button>
                </form>

                <div className="my-5 flex items-center gap-3 text-[11px] text-slate-400">
                  <div className="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
                  <span>데모로 빠르게 보기</span>
                  <div className="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
                </div>

                <Button variant="outline" size="lg" className="w-full" onClick={fillDemo} disabled={loading} type="button">
                  🚀 데모 계정 자동 입력
                </Button>

                <p className="mt-4 text-[11px] text-center text-slate-500 dark:text-slate-400 leading-relaxed">
                  계정 정보는 <span className="font-mono">localStorage</span>에 SHA-256 + salt 해시로 저장돼요.<br/>
                  데모 계정: <span className="font-mono text-brand-600 dark:text-brand-300">{DEMO_EMAIL}</span> / <span className="font-mono text-brand-600 dark:text-brand-300">{DEMO_PW}</span>
                </p>
              </Card>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 📝 Notion 일정 데이터 모듈
    // ========================================
    const KST_FMT = new Intl.DateTimeFormat('ko-KR', {
      timeZone: 'Asia/Seoul',
      month: 'numeric', day: 'numeric',
      hour: '2-digit', minute: '2-digit', hour12: false,
    });
    const KST_DATETIME_FMT = new Intl.DateTimeFormat('ko-KR', {
      timeZone: 'Asia/Seoul',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', hour12: false,
    });

    const CATEGORY_TONE = {
      '업무': 'indigo', '미팅': 'amber', '약속': 'rose',
      '개인': 'emerald', '기념일': 'rose', '기타': 'slate',
    };

    function notionToTodo(t) {
      const startKst = t.startUtc ? KST_FMT.format(new Date(t.startUtc)) : '-';
      const endKst = t.endUtc ? KST_FMT.format(new Date(t.endUtc)) : null;
      return {
        id: t.id,
        text: t.title,
        category: t.category || '기타',
        status: t.status || '시작 전',
        location: t.location || '',
        memo: t.memo || '',
        startKst, endKst,
        startUtc: t.startUtc,
        url: t.url,
        done: t.status === '완료',
      };
    }

    const FALLBACK_TODOS = [
      { id: 'fb-1', text: '(오프라인) PRD 리뷰', category: '업무', status: '시작 전',
        location: '-', memo: '', startKst: '-', endKst: null, done: false },
    ];

    function useNotionTasks() {
      const [todos, setTodos] = useState([]);
      const [syncedAt, setSyncedAt] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [source, setSource] = useState(null); // 'live' | 'snapshot' | 'fallback'

      const load = useCallback(async () => {
        setLoading(true); setError(null);
        // 1) 실시간 백엔드 시도
        try {
          const res = await fetch('/api/notion/tasks', { cache: 'no-store' });
          if (res.ok) {
            const data = await res.json();
            setTodos((data.tasks || []).map(notionToTodo));
            setSyncedAt(data.syncedAt || null);
            setSource('live');
            setLoading(false);
            return;
          }
          // 503 (NOTION_TOKEN 미설정) 또는 502 → snapshot 으로 fallback
          if (res.status !== 503 && res.status !== 502 && res.status !== 404) {
            throw new Error('백엔드 HTTP ' + res.status);
          }
        } catch (e) {
          // 네트워크 오류 또는 백엔드 미가동 → 정적 JSON 시도
        }
        // 2) 정적 JSON snapshot
        try {
          const res = await fetch('./notion-tasks.json', { cache: 'no-cache' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();
          setTodos((data.tasks || []).map(notionToTodo));
          setSyncedAt(data.syncedAt || null);
          setSource('snapshot');
        } catch (e) {
          console.warn('Notion 데이터 로드 실패:', e);
          setTodos(FALLBACK_TODOS);
          setError(e.message || String(e));
          setSource('fallback');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { load(); }, [load]);
      return { todos, setTodos, syncedAt, loading, error, source, refetch: load };
    }

    // ========================================

              <button
                type="button"
                onClick={() => {}}
                className="text-xs text-brand-600 dark:text-brand-300 hover:underline"
              >
                전체 보기

            </div>
          </div>

          {/* 테이블 헤더 */}

            <span>시간</span>

          <ul className="row-divider max-h-[420px] overflow-y-auto scrollbar-thin">

    function useExpenses() {
      const [expenses, setExpenses] = useState([]);
      const [budget, setBudget] = useState(50000);
      const [syncedAt, setSyncedAt] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const load = useCallback(async () => {
        setLoading(true); setError(null);
        try {
          const res = await fetch('./expenses.json', { cache: 'no-cache' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();
          setExpenses(data.data || []);
          if (typeof data.budget === 'number') setBudget(data.budget);
          setSyncedAt(data.syncedAt || null);
        } catch (e) {
          console.warn('지출 데이터 로드 실패, fallback:', e);
          setExpenses(FALLBACK_EXPENSES);
          setError(e.message || String(e));
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { load(); }, [load]);
      return { expenses, setExpenses, budget, syncedAt, loading, error, refetch: load };
    }

    const CATEGORY_ICON = { 식비: '🍱', 교통: '🚇', 카페: '☕', 기타: '🧾' };

      const [category, setCategory] = useState('식비');
      const [itemLabel, setItemLabel] = useState('');

      const total = useMemo(() => expenses.reduce((s, e) => s + e.amount, 0), [expenses]);
      const remaining = Math.max(0, budget - total);

      const byCat = useMemo(() => {
        const m = { 식비: 0, 교통: 0, 카페: 0, 기타: 0 };

          ...expenses,
          {

            amount: n,
            category,
            label: itemLabel.trim() || '직접 추가',

    const KOREAN_CITIES = {
      서울: { lat: 37.5665, lon: 126.9780 },
      남양주: { lat: 37.6360, lon: 127.2165 },
      성남: { lat: 37.4201, lon: 127.1267 },
      수원: { lat: 37.2636, lon: 127.0286 },
      고양: { lat: 37.6584, lon: 126.8320 },
      인천: { lat: 37.4563, lon: 126.7052 },
      부산: { lat: 35.1796, lon: 129.0756 },
      대구: { lat: 35.8714, lon: 128.6014 },
      대전: { lat: 36.3504, lon: 127.3845 },
      광주: { lat: 35.1595, lon: 126.8526 },
      강릉: { lat: 37.7519, lon: 128.8761 },
      제주: { lat: 33.4996, lon: 126.5312 },
    };

    function pm25ToGrade(pm25) {
      if (pm25 == null || isNaN(pm25)) return '보통';
      if (pm25 <= 15) return '좋음';
      if (pm25 <= 35) return '보통';
      if (pm25 <= 75) return '나쁨';
      return '매우 나쁨';
    }

    async function fetchOpenMeteo(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,precipitation,weather_code&hourly=temperature_2m,weather_code,precipitation_probability&forecast_days=1&timezone=Asia%2FSeoul`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Open-Meteo HTTP ' + res.status);
      return res.json();
    }
    async function fetchAirQuality(lat, lon) {
      try {
        const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=european_aqi,pm2_5,pm10`;
        const res = await fetch(url);
        if (!res.ok) return null;
        return res.json();
      } catch { return null; }
    }
    async function reverseGeocode(lat, lon) {
      // 1) 우리 백엔드 프록시 (User-Agent 헤더 안전하게 보내기 위함)
      try {
        const r = await fetch(`/api/geocode/reverse?lat=${lat}&lon=${lon}`);
        if (r.ok) {
          const j = await r.json();
          if (j.cityName) return j.cityName;
        }
      } catch {}
      // 2) Nominatim 직접 호출 fallback
      try {
        const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ko&zoom=10`;
        const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
        if (!res.ok) return null;
        const j = await res.json();
        const a = j.address || {};
        return a.city || a.town || a.county || a.province || a.state || a.country || null;
      } catch { return null; }
    }

    function parseWeather(forecast, air, cityName) {
      const cur = forecast.current || {};
      const hourly = forecast.hourly || {};
      const times = hourly.time || [];
      const code = cur.weather_code ?? 0;
      const wmo = WMO_CODE[code] || { label: '알 수 없음', icon: '🌡️' };
      const temp = Math.round(cur.temperature_2m ?? 0);

      // 현재 시각 이후 첫 hourly 인덱스
      const now = Date.now();
      let idx = times.findIndex((t) => new Date(t).getTime() > now);
      if (idx < 0) idx = 0;
      const rain = hourly.precipitation_probability?.[idx] ?? 0;

      // 5칸 시간대 예보
      const hourlyArr = [];
      for (let i = idx; i < idx + 5 && i < times.length; i++) {
        const d = new Date(times[i]);
        const h = `${d.getHours()}시`;
        const t = Math.round(hourly.temperature_2m?.[i] ?? 0);
        const c = hourly.weather_code?.[i] ?? code;
        const ic = (WMO_CODE[c] || wmo).icon;
        hourlyArr.push({ h, t, i: ic });
      }

      const pm25 = air?.current?.pm2_5;
      return {
        cityName: cityName || '현재 위치',
        temp,
        status: wmo.label,
        icon: wmo.icon,
        rain,
        dust: pm25ToGrade(pm25),
        pm25: pm25 != null ? Math.round(pm25) : null,
        humidity: cur.relative_humidity_2m != null ? Math.round(cur.relative_humidity_2m) : null,
        hourly: hourlyArr,
      };
    }

    function useWeather() {
      const [weather, setWeather] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [source, setSource] = useState('loading'); // 'gps' | 'manual' | 'fallback' | 'coords' | 'loading'
      const [manualCity, setManualCity] = useState('남양주');
      const [permission, setPermission] = useState('prompt'); // 'granted'|'denied'|'prompt'|'unsupported'
      const [fetchedAt, setFetchedAt] = useState(null);

      const loadFor = useCallback(async (lat, lon, cityName, src) => {
        setLoading(true); setError(null);
        try {
          const [forecast, air] = await Promise.all([
            fetchOpenMeteo(lat, lon),
            fetchAirQuality(lat, lon),
          ]);
          let name = cityName;
          if (!name && (src === 'gps' || src === 'coords')) name = await reverseGeocode(lat, lon);
          setWeather(parseWeather(forecast, air, name));
          setSource(src);
          setFetchedAt(new Date());
        } catch (e) {
          setError(e.message || String(e));
        } finally {
          setLoading(false);
        }
      }, []);

      const requestGeo = useCallback(() => {
        if (!navigator.geolocation) {
          setPermission('unsupported');
          const c = KOREAN_CITIES[manualCity];
          loadFor(c.lat, c.lon, manualCity, 'fallback');
          return;
        }
        setLoading(true);
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            setPermission('granted');
            loadFor(pos.coords.latitude, pos.coords.longitude, null, 'gps');
          },
          (err) => {
            // 1=denied, 2=unavailable, 3=timeout
            setPermission(err.code === 1 ? 'denied' : 'prompt');
            const c = KOREAN_CITIES[manualCity];
            loadFor(c.lat, c.lon, manualCity, 'fallback');
          },
          { timeout: 8000, maximumAge: 5 * 60 * 1000, enableHighAccuracy: false }
        );
      }, [loadFor, manualCity]);

      const changeCity = useCallback((city) => {
        setManualCity(city);
        const c = KOREAN_CITIES[city];
        if (c) loadFor(c.lat, c.lon, city, 'manual');
      }, [loadFor]);

      const setCoords = useCallback((lat, lon) => {
        loadFor(lat, lon, null, 'coords');
      }, [loadFor]);

      useEffect(() => { requestGeo(); /* eslint-disable-next-line */ }, []);

      return { weather, loading, error, source, manualCity, changeCity, requestGeo, setCoords, permission, fetchedAt };
    }

        source === 'manual' ? `🏙️ 수동 선택 (${manualCity})` :

            </div>
            <div className="flex flex-col gap-1.5 items-end shrink-0">
              <button
                onClick={requestGeo}
                disabled={loading}
                className="text-[11px] px-2 py-1 rounded-md bg-brand-50 dark:bg-brand-500/10 text-brand-600 dark:text-brand-300 hover:bg-brand-100 dark:hover:bg-brand-500/20 disabled:opacity-50"
                title="브라우저 위치 권한 사용"
              >
                {loading ? '⏳ 갱신 중' : '📍 내 위치'}
              </button>
              <Select value={manualCity} onChange={(e) => changeCity(e.target.value)}>
                {Object.keys(KOREAN_CITIES).map((c) => <option key={c} value={c}>{c}</option>)}
              </Select>
            </div>
          </div>

          <div className="flex items-center gap-5 mb-6">
            <div className="text-6xl leading-none">{w.icon}</div>
            <div className="min-w-0">
              <div className="text-4xl font-bold tracking-tight num-xl text-slate-900 dark:text-slate-100">{w.temp}°C</div>
              <div className="text-sm text-slate-500 dark:text-slate-400 mt-0.5">{w.status}</div>
              <div className="flex items-center gap-1.5 mt-2 flex-wrap">
                <Badge tone="indigo">강수 {w.rain}%</Badge>
                <Badge tone={dustTone}>미세먼지 {w.dust}{w.pm25 != null ? ` (${w.pm25}㎍/㎥)` : ''}</Badge>

          <div className="grid grid-cols-5 gap-2">
            {w.hourly.map((h, idx) => (
              <div
                key={idx}
                className="text-center rounded-lg bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-800 py-3 px-1"
              >
                <div className="text-[11px] text-slate-500">{h.h}</div>
                <div className="text-2xl my-1">{h.i}</div>
                <div className="text-sm font-semibold num-xl text-slate-700 dark:text-slate-200">{h.t}°</div>

            ))}
            {w.hourly.length === 0 && (

            )}
          </div>

          {/* 권한 거부 안내 */}
          {permission === 'denied' && (

              🚫 브라우저가 위치 접근을 차단했어요. 주소창 자물쇠 → "위치 허용" 으로 바꾸거나, 도시 선택 / 좌표 직접 입력을 사용하세요.

          {/* 좌표 직접 입력 */}
          <div className="mt-3 flex items-center justify-between gap-2">

    // ========================================
    // 🤖 AI Briefing (로직 보존, 카드 비주얼만 화이트 톤으로)
    // ========================================
    function buildBriefing({ user, todos, expenses, budget, weather }) {
      const w = weather; // null 가능
      const total = expenses.reduce((s, e) => s + e.amount, 0);
      const ratio = total / budget;
      // 시작 전 + (업무·미팅) 카테고리를 "우선처리" 로 간주
      const highTodos = todos.filter(
        (t) => !t.done && (t.category === '업무' || t.category === '미팅')
      );
      const remaining = todos.filter((t) => !t.done).length;
      const todayKst = new Date().toLocaleDateString('ko-KR', { timeZone: 'Asia/Seoul' });
      const todayItems = todos.filter((t) => {
        if (!t.startUtc || t.done) return false;
        const d = new Date(t.startUtc).toLocaleDateString('ko-KR', { timeZone: 'Asia/Seoul' });
        return d === todayKst;
      });

      const lines = [];
      const name = (user || '').split('@')[0] || '여러분';
      const greet = (() => {
        const h = new Date().getHours();
        if (h < 11) return '좋은 아침이에요';
        if (h < 17) return '활기찬 오후예요';
        if (h < 21) return '저녁 무렵이네요';
        return '늦은 시간까지 수고 많으세요';
      })();
      lines.push(`${greet}, ${name}님 ☀️`);

      if (w) {
        if (w.rain >= 40 || (w.status || '').includes('비')) {
          lines.push(`오늘 ${w.cityName}는 ${w.status}, 강수확률 ${w.rain}%예요. ☂️ 우산을 꼭 챙기세요.`);
        } else {
          lines.push(`오늘 ${w.cityName}는 ${w.status}, 기온 ${w.temp}°C로 활동하기 좋아요.`);
        }
        if (w.dust && (w.dust.includes('나쁨'))) {
          lines.push(`미세먼지가 ${w.dust}이에요. 외출 시 마스크 착용을 권해드려요. 😷`);
        }
      }

      if (todayItems.length > 0) {
        const sample = todayItems
          .slice(0, 2)
          .map((t) => `「${t.text}${t.startKst !== '-' ? ` · ${t.startKst.split(' ').slice(-1)[0]}` : ''}」`)
          .join(', ');
        lines.push(`오늘 Notion 일정 ${todayItems.length}건이 잡혀 있어요 — ${sample}. 지각 없이 챙기세요.`);
      } else if (highTodos.length > 0) {
        const sample = highTodos
          .slice(0, 2)
          .map((t) => `「${t.text}」`)
          .join(', ');
        lines.push(`업무·미팅 미완료 ${highTodos.length}건 — ${sample} 부터 정리해봐요.`);
      } else if (remaining > 0) {
        lines.push(`남은 일정 ${remaining}건. 천천히 하나씩 진행해봐요.`);
      } else {
        lines.push(`모든 일정을 마치셨네요! 잘 쉬어가는 시간도 중요해요. 🎉`);
      }

      if (ratio >= 0.8) {
        lines.push(`오늘 지출이 예산의 ${Math.round(ratio * 100)}%예요. 🚨 점심은 도시락이나 집밥으로 절약을 추천해요.`);
      } else if (ratio >= 0.6) {
        lines.push(`지출이 예산의 ${Math.round(ratio * 100)}%까지 왔어요. 🟡 카페 한 잔은 줄이는 게 어떨까요?`);
      } else {
        lines.push(`지출은 예산의 ${Math.round(ratio * 100)}% 수준으로 안정적이에요. 👍`);
      }

      lines.push(`오늘도 응원할게요. 한 발씩, 꾸준히. ✨`);
      return lines.join('\n');
    }

    function Typewriter({ text }) {
      const [shown, setShown] = useState('');
      useEffect(() => {
        setShown('');
        if (!text) return;
        let i = 0;
        const id = setInterval(() => {
          i += 2;
          setShown(text.slice(0, i));
          if (i >= text.length) clearInterval(id);
        }, 18);
        return () => clearInterval(id);
      }, [text]);
      return (
        <pre className="whitespace-pre-wrap font-sans text-sm leading-7 text-slate-700 dark:text-slate-200">{shown}<span className="inline-block w-1.5 h-4 align-middle bg-brand-500/70 ml-0.5 animate-pulse rounded-sm"></span></pre>
      );
    }

    // Pollinations.ai 무료 LLM API (키 불필요) — 익명 GET endpoint
    function validateAIResponse(txt) {
      if (!txt || txt.length < 30) return '응답이 너무 짧아요';
      if (/deprecat|pollinations\.ai|important notice|enter\.pollinations|migrate to|api key required/i.test(txt)) {
        return 'AI 서비스 안내 메시지';
      }
      const koreanChars = (txt.match(/[가-힯]/g) || []).length;
      if (koreanChars < 10) return '한국어 응답이 아니에요';
      return null; // ok
    }

    async function tryPollinationsModel(prompt, sys, model, signal) {
      const params = new URLSearchParams({ system: sys, seed: String(Date.now() % 100000) });
      if (model) params.set('model', model);
      const url = `https://text.pollinations.ai/${encodeURIComponent(prompt)}?${params.toString()}`;
      const res = await fetch(url, { signal });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const txt = (await res.text()).trim();
      const reason = validateAIResponse(txt);
      if (reason) throw new Error(reason);
      return txt;
    }

    async function callPollinationsLLM(prompt, signal) {
      const sys = '당신은 한국어 AI 비서입니다. 5~7줄의 자연스러운 한국어 브리핑을 작성하세요. 이모지를 적절히 사용하되, 마크다운/헤더/리스트 기호는 절대 사용하지 마세요. 반드시 한국어로만 답하세요.';
      const models = ['openai', 'mistral', null]; // null = 기본값
      let lastErr;
      for (const m of models) {
        try {
          return await tryPollinationsModel(prompt, sys, m, signal);
        } catch (e) {
          lastErr = e;
          if (e.name === 'AbortError') throw e;
        }
      }
      throw lastErr || new Error('모든 모델 시도 실패');
    }

    function buildAIPrompt({ user, userName, todos, expenses, budget, weather }) {
      const name = userName || (user || '').split('@')[0] || '사용자';
      const total = expenses.reduce((s, e) => s + e.amount, 0);
      const ratio = Math.round((total / budget) * 100);
      const todayKst = new Date().toLocaleDateString('ko-KR', { timeZone: 'Asia/Seoul' });
      const todayItems = todos.filter((t) => {
        if (!t.startUtc || t.done) return false;
        return new Date(t.startUtc).toLocaleDateString('ko-KR', { timeZone: 'Asia/Seoul' }) === todayKst;
      });
      const highTodos = todos.filter(
        (t) => !t.done && (t.category === '업무' || t.category === '미팅')
      );
      const itemsLine = todayItems.length > 0
        ? todayItems.map((t) => `- ${t.text} (${t.startKst || '시간 미정'}, ${t.location || '장소 미정'})`).join('\n')
        : highTodos.length > 0
          ? highTodos.slice(0, 3).map((t) => `- ${t.text} (미완료, ${t.category})`).join('\n')
          : '- 오늘 잡힌 일정이 없어요';
      const wLine = weather
        ? `${weather.cityName}, ${weather.status}, 기온 ${weather.temp}°C, 강수확률 ${weather.rain}%, 미세먼지 ${weather.dust}${weather.humidity != null ? `, 습도 ${weather.humidity}%` : ''}`
        : '날씨 정보 없음';
      return [
        `사용자 이름: ${name}`,
        `현재 시각: ${new Intl.DateTimeFormat('ko-KR', { timeZone: 'Asia/Seoul', dateStyle: 'full', timeStyle: 'short' }).format(new Date())}`,
        `날씨: ${wLine}`,
        `오늘 일정/할 일:\n${itemsLine}`,
        `오늘 지출: ${total.toLocaleString()}원 / 예산 ${budget.toLocaleString()}원 (사용률 ${ratio}%)`,
        ``,
        `위 데이터를 보고 ${name}님에게 따뜻하고 구체적인 "오늘의 브리핑"을 5~7줄로 작성해주세요. 비/강수확률 높으면 우산, 미세먼지 나쁨이면 마스크, 예산 사용률 60%↑면 절약 권고, 오늘 일정 있으면 구체적으로 호명해주세요.`,
      ].join('\n');
    }

    function BriefingCard({ user, userName, todos, expenses, budget, weather }) {
      const [text, setText] = useState('');
      const [updatedAt, setUpdatedAt] = useState(null);
      const [loading, setLoading] = useState(false);
      const [engine, setEngine] = useState(null); // 'ai' | 'rule' | null
      const abortRef = useRef(null);

      const generate = useCallback(async () => {
        if (abortRef.current) abortRef.current.abort();
        const ac = new AbortController();
        abortRef.current = ac;
        const timeoutId = setTimeout(() => ac.abort(), 12000);

        setLoading(true);
        setText('');
        setEngine(null);
        try {
          const prompt = buildAIPrompt({ user, userName, todos, expenses, budget, weather });
          const aiText = await callPollinationsLLM(prompt, ac.signal);
          setText(aiText);
          setEngine('ai');
        } catch (e) {
          // 실패 시 규칙 기반 fallback
          const fallback = buildBriefing({ user, todos, expenses, budget, weather });
          setText(fallback);
          setEngine('rule');
        } finally {
          clearTimeout(timeoutId);
          setUpdatedAt(new Date());
          setLoading(false);
        }
      }, [user, userName, todos, expenses, budget, weather]);

      // mount + todos/weather 변동 시 자동 재생성
      useEffect(() => { generate(); /* eslint-disable-next-line */ }, [todos.length, weather?.cityName, weather?.temp]);

      const today = new Date();

      return (
        <Card className="p-6 sm:p-7 ai-accent overflow-hidden relative">
          <div className="flex items-center justify-between gap-3 flex-wrap mb-4">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-full bg-gradient-to-br from-brand-500 to-violet-500 flex items-center justify-center text-white text-base shadow-sm">
                🤖
              </div>
              <div>
                <div className="flex items-center gap-2">
                  <h2 className="text-base font-semibold text-slate-900 dark:text-slate-100">AI Assistant</h2>
                  {engine === 'ai' && <Badge tone="emerald">Pollinations LLM</Badge>}
                  {engine === 'rule' && <Badge tone="amber">규칙 fallback</Badge>}
                  {!engine && <Badge tone="indigo">대기</Badge>}
                </div>
                <p className="text-[11px] text-slate-500 dark:text-slate-400 mt-0.5">
                  {formatDateLong(today)} · 오늘의 브리핑
                </p>
              </div>
            </div>
            <div className="flex items-center gap-3">
              <span className="text-[11px] text-slate-400">
                {updatedAt ? `갱신: ${formatKST(updatedAt).split(' ').slice(-2).join(' ')}` : '대기 중'}
              </span>
              <Button
                variant="primary"
                size="sm"
                onClick={generate}
                disabled={loading}
              >
                {loading ? '생성 중…' : '✨ 새로 생성'}
              </Button>
            </div>
          </div>

          <div className="rounded-xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 p-5 min-h-[160px]">
            {loading ? (
              <div className="flex items-center gap-2 text-slate-400 text-sm">
                <span className="w-2 h-2 bg-brand-500 rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></span>
                <span className="w-2 h-2 bg-brand-500 rounded-full animate-bounce" style={{ animationDelay: '120ms' }}></span>
                <span className="w-2 h-2 bg-brand-500 rounded-full animate-bounce" style={{ animationDelay: '240ms' }}></span>
                <span className="ml-2">AI가 데이터를 분석 중이에요...</span>
              </div>
            ) : (
              <Typewriter text={text} />
            )}
          </div>
        </Card>
      );
    }

    // ========================================
    // 🧭 Sidebar (lg+)
    // ========================================
    function Sidebar({ user, userName, onLogout }) {
      const [active, setActive] = useState('overview');
      const items = [
        { id: 'overview', icon: '🏠', label: 'Overview' },
        { id: 'schedule', icon: '📅', label: '일정' },
        { id: 'spending', icon: '💸', label: '지출' },
        { id: 'weather',  icon: '🌤️', label: '날씨' },
        { id: 'ai',       icon: '🤖', label: 'AI Assistant' },
        { id: 'integrations', icon: '🔌', label: '통합' },
        { id: 'settings', icon: '⚙️', label: '설정' },
      ];
      const initial = (userName || user || '?').charAt(0).toUpperCase();
      return (
        <aside className="hidden lg:flex w-60 shrink-0 flex-col bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 sticky top-0 h-screen">
          <div className="px-5 py-5 flex items-center gap-2">
            <div className="w-8 h-8 rounded-lg bg-brand-500 flex items-center justify-center text-white">
              <span className="text-base">✨</span>
            </div>
            <span className="font-semibold text-slate-900 dark:text-slate-100 text-sm">AI Dashboard</span>
          </div>
          <div className="px-3 mt-2 mb-2 label-xs text-slate-400">메뉴</div>
          <nav className="flex-1 px-3 space-y-0.5">
            {items.map((it) => {
              const isActive = active === it.id;
              return (
                <button
                  key={it.id}
                  onClick={() => setActive(it.id)}
                  className={`group w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition relative ${
                    isActive
                      ? 'bg-brand-50 dark:bg-brand-500/10 text-brand-700 dark:text-brand-200 font-medium'
                      : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/60'
                  }`}
                >
                  {isActive && <span className="absolute left-0 top-1.5 bottom-1.5 w-1 rounded-r bg-brand-500"></span>}
                  <span className="text-base">{it.icon}</span>
                  <span>{it.label}</span>
                </button>
              );
            })}
          </nav>

          <div className="m-3 p-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50/60 dark:bg-slate-800/40">
            <div className="flex items-center gap-2.5">
              <div className="w-9 h-9 rounded-full bg-gradient-to-br from-brand-500 to-violet-500 flex items-center justify-center text-white text-sm font-bold">
                {initial}
              </div>
              <div className="min-w-0 flex-1">
                <div className="text-xs font-semibold text-slate-800 dark:text-slate-100 truncate">{userName || '사용자'}</div>
                <div className="text-[11px] text-slate-500 truncate">{user}</div>
              </div>
            </div>
            <button
              onClick={onLogout}
              className="mt-2.5 w-full text-[11px] text-slate-500 hover:text-rose-500 transition py-1 rounded-md hover:bg-white dark:hover:bg-slate-900"
            >
              로그아웃 →
            </button>
          </div>
        </aside>
      );
    }

    // ========================================
    // 🧭 Topbar
    // ========================================
    function Topbar({ user, userName, dark, setDark, onLogout }) {
      const initial = (userName || user || '?').charAt(0).toUpperCase();
      return (
        <header className="sticky top-0 z-20 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-b border-slate-200 dark:border-slate-800">
          <div className="h-16 px-5 sm:px-8 flex items-center gap-3">
            {/* Mobile logo */}
            <div className="flex lg:hidden items-center gap-2">
              <div className="w-8 h-8 rounded-lg bg-brand-500 flex items-center justify-center text-white">✨</div>
              <span className="font-semibold text-sm">AI Dashboard</span>
            </div>

            {/* Search */}
            <div className="flex-1 max-w-md hidden sm:block">
              <div className="relative">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🔍</span>
                <input
                  type="text"
                  placeholder="검색..."
                  className="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 pl-9 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/40 focus:border-brand-500"
                />
              </div>
            </div>

            <div className="ml-auto flex items-center gap-2 sm:gap-3">
              <button
                className="relative w-9 h-9 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 flex items-center justify-center transition"
                aria-label="알림"
                title="알림"
              >
                <span className="text-sm">🔔</span>
                <span className="absolute top-2 right-2 w-2 h-2 rounded-full bg-rose-500"></span>
              </button>
              <button
                onClick={() => setDark(!dark)}
                className="w-9 h-9 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 flex items-center justify-center transition"
                aria-label="테마 토글"
                title="테마 전환"
              >
                <span>{dark ? '🌙' : '☀️'}</span>
              </button>
              <div className="hidden md:flex items-center gap-2">
                <div className="w-9 h-9 rounded-full bg-gradient-to-br from-brand-500 to-violet-500 flex items-center justify-center text-white text-xs font-bold">
                  {initial}
                </div>
              </div>
              <button onClick={onLogout} className="lg:hidden text-xs text-slate-500 hover:text-rose-500 px-2 py-1">
                로그아웃
              </button>
            </div>
          </div>
        </header>
      );
    }

    // ========================================
    // 📊 KPI Tile
    // ========================================
    function KpiTile({ label, value, suffix, hint, trend, icon, iconBg, progress }) {
      const trendCls = trend?.dir === 'up'
        ? 'text-emerald-600 dark:text-emerald-400'
        : trend?.dir === 'down'
          ? 'text-rose-600 dark:text-rose-400'
          : 'text-slate-400';
      const trendArrow = trend?.dir === 'up' ? '▲' : trend?.dir === 'down' ? '▼' : '–';
      return (
        <Card className="p-5">
          <div className="flex items-start justify-between gap-3">
            <span className="label-xs text-slate-400">{label}</span>
            <div className={`w-9 h-9 rounded-lg flex items-center justify-center text-base ${iconBg || 'bg-brand-50 dark:bg-brand-500/10'}`}>
              {icon}
            </div>
          </div>
          <div className="mt-3 flex items-baseline gap-1.5">
            <span className="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100 num-xl">
              {value}
            </span>
            {suffix && <span className="text-sm text-slate-500">{suffix}</span>}
          </div>
          <div className="mt-2 flex items-center justify-between text-xs">
            <span className="text-slate-500 truncate">{hint}</span>
            {trend && (
              <span className={`font-medium ${trendCls}`}>
                {trendArrow} {trend.value}
              </span>
            )}
          </div>
          {typeof progress === 'number' && (
            <div className="mt-3 w-full h-1.5 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
              <div
                className="h-full bg-brand-500 transition-all duration-500"
                style={{ width: `${Math.min(100, Math.max(0, progress))}%` }}
              ></div>
            </div>
          )}
        </Card>
      );
    }

    // ========================================
    // 🏠 Dashboard
    // ========================================
    function Dashboard({ user, userName, onLogout, dark, setDark }) {
      const notion = useNotionTasks();
      const { todos, setTodos, syncedAt, loading, error, source: notionSource, refetch } = notion;
      const expensesState = useExpenses();
      const { expenses, setExpenses, budget, syncedAt: expSyncedAt, loading: expLoading, error: expError, refetch: expRefetch } = expensesState;
      const weatherState = useWeather();
      const { weather: w } = weatherState;

      // KPI 계산 (todos / expenses 기반)
      const todayKst = new Date().toLocaleDateString('ko-KR', { timeZone: 'Asia/Seoul' });
      const todayItems = todos.filter((t) => {
        if (!t.startUtc) return false;
        const d = new Date(t.startUtc).toLocaleDateString('ko-KR', { timeZone: 'Asia/Seoul' });
        return d === todayKst;
      });
      const todayDone = todayItems.filter((t) => t.done).length;
      const totalCount = todos.length;
      const doneCount = todos.filter((t) => t.done).length;
      const completionPct = totalCount === 0 ? 0 : Math.round((doneCount / totalCount) * 100);
      const expenseTotal = expenses.reduce((s, e) => s + e.amount, 0);
      const expensePct = budget > 0 ? Math.round((expenseTotal / budget) * 100) : 0;

      const greetName = (userName || (user || '').split('@')[0] || '여러분');

      return (
        <div className="min-h-screen flex bg-[#F7F8FB] dark:bg-[#0B0D12]">
          <Sidebar user={user} userName={userName} onLogout={onLogout} />

          <div className="flex-1 min-w-0 flex flex-col">
            <Topbar user={user} userName={userName} dark={dark} setDark={setDark} onLogout={onLogout} />

            <main className="flex-1 px-5 sm:px-8 py-6 space-y-6">
              {/* Page heading */}
              <div className="fade-up">
                <h1 className="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100">
                  안녕하세요, {greetName}님 👋
                </h1>
                <p className="mt-1 text-sm text-slate-500 dark:text-slate-400">
                  오늘의 일정 · 지출 · 날씨를 한눈에 살펴보세요.
                </p>
              </div>

              {/* KPI Row */}
              <div className="grid grid-cols-2 lg:grid-cols-4 gap-6 fade-up">
                <KpiTile
                  label="오늘 일정"
                  value={todayItems.length}
                  suffix="건"
                  hint={`총 ${todayItems.length}건 중 ${todayDone}건 완료`}
                  trend={{ dir: 'up', value: '12%' }}
                  icon="📅"
                  iconBg="bg-brand-50 dark:bg-brand-500/10"
                />
                <KpiTile
                  label="이번 주 완료율"
                  value={completionPct}
                  suffix="%"
                  hint={`${doneCount}/${totalCount} 완료`}
                  trend={{ dir: 'up', value: '8%' }}
                  icon="✅"
                  iconBg="bg-emerald-50 dark:bg-emerald-500/10"
                  progress={completionPct}
                />
                <KpiTile
                  label="오늘 지출"
                  value={expenseTotal.toLocaleString()}
                  suffix="원"
                  hint={`예산의 ${expensePct}%`}
                  trend={{ dir: expensePct >= 60 ? 'down' : 'up', value: expensePct >= 60 ? '5%' : '3%' }}
                  icon="💸"
                  iconBg="bg-amber-50 dark:bg-amber-500/10"
                />
                <KpiTile
                  label={w ? `${w.cityName} 날씨` : '날씨'}
                  value={w ? `${w.temp}°` : '—'}
                  suffix={w ? w.status : '불러오는 중'}
                  hint={w ? `강수 ${w.rain}% · 미세 ${w.dust}` : 'Open-Meteo API'}
                  icon={w ? w.icon : '🌤️'}
                  iconBg="bg-sky-50 dark:bg-sky-500/10"
                />
              </div>

              {/* AI Briefing (full width) */}
              <div className="fade-up">
                <BriefingCard
                  user={user}
                  userName={userName}
                  todos={todos}
                  expenses={expenses}
                  budget={budget}
                  weather={w}
                />
              </div>

              {/* Notion 일정 (2/3) + 날씨 (1/3) */}
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 fade-up">
                <div className="lg:col-span-2">
                  <TodoWidget
                    todos={todos}
                    setTodos={setTodos}
                    syncedAt={syncedAt}
                    loading={loading}
                    error={error}
                    onRefetch={refetch}
                    source={notionSource}
                  />
                </div>
                <div>
                  <WeatherWidget {...weatherState} />
                </div>
              </div>

              {/* 지출 (full width) */}
              <div className="fade-up">
                <SpendingWidget
                  expenses={expenses}
                  setExpenses={setExpenses}
                  budget={budget}
                  syncedAt={expSyncedAt}
                  loading={expLoading}
                  error={expError}
                  onRefetch={expRefetch}
                />
              </div>

              <footer className="text-center text-[11px] text-slate-400 py-6">
                Notion · Open-Meteo · Pollinations LLM 모두 실 API 연동 · React 18 + Tailwind
              </footer>
            </main>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const [dark, setDark] = useDarkMode();
      const [session, setSession] = useState(() => {
        // URL hash 가 #logout 이면 진입 즉시 모든 세션 비움
        if (typeof window !== 'undefined' && window.location.hash === '#logout') {
          try { clearSession(); } catch (_) {}
          localStorage.removeItem('pad_user');
          history.replaceState(null, '', window.location.pathname);
          return null;
        }
        return loadSession();
      });

      // 구버전 키 정리 + 데모 계정 시드 (앱 시작 1회)
      useEffect(() => {
        localStorage.removeItem('pad_user');
        ensureDemoSeed();
      }, []);

      // 세션 만료 자동 감지 (1분 간격)
      useEffect(() => {
        if (!session) return;
        const id = setInterval(() => {
          if (session.expiresAt <= Date.now()) {
            clearSession();
            setSession(null);
          }
        }, 60 * 1000);
        return () => clearInterval(id);
      }, [session]);

      const handleLogin = (newSession) => setSession(newSession);
      const handleLogout = () => {
        clearSession();
        setSession(null);
      };

      if (!session) return <LoginPage onLogin={handleLogin} />;
      return (
        <Dashboard
          user={session.email}
          userName={session.name}
          onLogout={handleLogout}
          dark={dark}
          setDark={setDark}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
