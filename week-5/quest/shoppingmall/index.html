<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5월의 풍경 — Coffee &amp; Brewers</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cg fill='none' stroke='%23111' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='22' cy='11' r='4.5'/%3E%3Cpath d='M3 25 L11 17 L16 21 L22 16 L29 23'/%3E%3C/g%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Pretendard Variable"', 'Pretendard', 'Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            page: '#ffffff',
            ink: '#111111',
            sub: '#888888',
            soft: '#f6f6f4',
            line: '#ececec',
          },
        },
      },
    };
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="/env.js"></script>
  <style>
    html, body { background: #ffffff; color: #111111; }
    body {
      min-height: 100vh;
      font-family: 'Pretendard Variable', Pretendard, Inter, system-ui, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.005em;
    }
    .display { font-family: 'Pretendard Variable', Pretendard, sans-serif; font-weight: 500; letter-spacing: -0.02em; }
    .num-mono { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

    .fade-in { animation: fadeIn 0.25s ease-out; }
    @keyframes fadeIn { from {opacity:0; transform: translateY(2px);} to {opacity:1; transform: translateY(0);} }

    /* Inputs */
    .in {
      background: #fff;
      border: 0; border-bottom: 1px solid #d8d8d2;
      padding: 10px 0; font-size: 14px; color: #111;
      outline: none; transition: border-color .15s ease; width: 100%;
      border-radius: 0;
    }
    .in:focus { border-bottom-color: #111; }
    .in::placeholder { color: #b5b5af; }

    /* Buttons (very flat, kurasu/cafict 톤) */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 12.5px; letter-spacing: 0.08em; font-weight: 500; text-transform: uppercase;
      padding: 13px 20px; border: 1px solid #111; background: #111; color: #fff;
      transition: background .15s ease, color .15s ease, border-color .15s ease;
      cursor: pointer; border-radius: 0;
    }
    .btn:hover:not(:disabled) { background: #fff; color: #111; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-line  { background: #fff; color: #111; border: 1px solid #111; }
    .btn-line:hover:not(:disabled) { background: #111; color: #fff; }
    .btn-quiet { background: transparent; color: #111; border: 1px solid transparent; padding: 8px 0; }
    .btn-quiet:hover:not(:disabled) { color: #7a7a7a; }
    .btn-sm { padding: 9px 14px; font-size: 11px; }
    .btn-icon { padding: 6px 10px; min-width: 32px; font-size: 14px; line-height: 1; }
    .btn-w { width: 100%; }

    /* Top nav link */
    .nav-link {
      font-size: 12.5px; font-weight: 500;
      color: #111; transition: color .15s ease;
      letter-spacing: 0;
    }
    .nav-link:hover { color: #7a7a7a; }

    /* product card — no border, big image, hover dim */
    .pcard { display: block; cursor: default; }
    .pcard-img {
      aspect-ratio: 1/1; background: #f4f4f0; overflow: hidden;
      position: relative;
    }
    .pcard-img img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .55s ease, opacity .25s ease;
    }
    .pcard:hover .pcard-img img { transform: scale(1.03); }
    .pcard-add {
      position: absolute; left: 12px; right: 12px; bottom: 12px;
      opacity: 0; transform: translateY(4px);
      transition: opacity .2s ease, transform .2s ease;
    }
    .pcard:hover .pcard-add { opacity: 1; transform: translateY(0); }

    /* mobile: 항상 보이게 */
    @media (max-width: 640px) {
      .pcard-add { opacity: 1; transform: none; }
    }

    .badge-soldout {
      position: absolute; top: 12px; left: 12px;
      background: #fff; color: #111;
      font-size: 10.5px; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 4px 8px;
      border: 1px solid #111;
    }

    /* toast */
    .toast {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
      background: #111; color: #fff;
      padding: 12px 20px; font-size: 12.5px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      z-index: 60; animation: fadeIn .2s ease-out;
    }

    /* drawer */
    .drawer-bg {
      position: fixed; inset: 0; background: rgba(17,17,17,0.4);
      z-index: 70; animation: fadeIn .15s ease;
    }
    .drawer {
      position: fixed; right: 0; top: 0; bottom: 0; width: min(440px, 92vw);
      background: #fff; z-index: 71;
      display: flex; flex-direction: column;
      animation: slideIn .22s ease-out;
      box-shadow: -10px 0 40px -16px rgba(0,0,0,.18);
    }
    @keyframes slideIn { from {transform: translateX(20px); opacity: 0;} to {transform: translateX(0); opacity: 1;} }

    .uppercase-label { letter-spacing: 0.18em; text-transform: uppercase; font-size: 10.5px; color: #7a7a7a; }
    .hairline { height: 1px; background: #eeeeea; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useCallback, useRef, createContext, useContext } = React;

    // ───────── Supabase ─────────
    const ENV = window.__ENV || {};
    const sb = (ENV.SUPABASE_URL && ENV.SUPABASE_ANON_KEY
                && !ENV.SUPABASE_URL.includes('YOUR-PROJECT-REF'))
      ? supabase.createClient(ENV.SUPABASE_URL, ENV.SUPABASE_ANON_KEY)
      : null;

    // ───────── localStorage fallback ─────────
    const LS_CART = 'shop_cart_v1';
    const lsLoad = (k) => { try { return JSON.parse(localStorage.getItem(k) || '[]'); } catch { return []; } };
    const lsSave = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

    const SEED_PRODUCTS = [
      { id:'11111111-1111-1111-1111-111111111101', name:'에티오피아 예가체프 게샤',  price:18000,
        image_url:'https://images.unsplash.com/photo-1599639957043-f3aa5c986398?w=800&h=800&fit=crop&auto=format',
        description:'꽃향과 베르가못 시트러스. 5월 아침의 상쾌함.' },
      { id:'11111111-1111-1111-1111-111111111102', name:'콜롬비아 우일라 슈프리모', price:16500,
        image_url:'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=800&h=800&fit=crop&auto=format',
        description:'균형잡힌 단맛과 캐러멜 피니쉬.' },
      { id:'11111111-1111-1111-1111-111111111103', name:'케냐 키리냐가 AA',         price:19500,
        image_url:'https://images.unsplash.com/photo-1442550528053-c431ecb55509?w=800&h=800&fit=crop&auto=format',
        description:'블랙베리, 자몽의 진한 산미.' },
      { id:'11111111-1111-1111-1111-111111111104', name:'브라질 세하도 피베리',     price:14500,
        image_url:'https://images.unsplash.com/photo-1494314671902-399b18174975?w=800&h=800&fit=crop&auto=format',
        description:'초콜릿과 견과 풍미. 데일리 블렌드.' },
      { id:'11111111-1111-1111-1111-111111111105', name:'5월의 풍경 블렌드 250g',   price:17000,
        image_url:'https://images.unsplash.com/photo-1497636577773-f1231844b336?w=800&h=800&fit=crop&auto=format',
        description:'갓 깎은 잔디, 벚꽃이 진 자리.' },
      { id:'11111111-1111-1111-1111-111111111106', name:'핸드드립 드리퍼 — 도자기',  price:32000,
        image_url:'https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=800&h=800&fit=crop&auto=format',
        description:'미세한 곡선의 흰 도자기 드리퍼.' },
      { id:'11111111-1111-1111-1111-111111111107', name:'향원 머그 — 차콜 그레이',   price:22000,
        image_url:'https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?w=800&h=800&fit=crop&auto=format',
        description:'두툼한 손잡이, 320ml.' },
      { id:'11111111-1111-1111-1111-111111111108', name:'서버 + 드립포트 세트',     price:58000,
        image_url:'https://images.unsplash.com/photo-1485808191679-5f86510681a2?w=800&h=800&fit=crop&auto=format',
        description:'유리 서버 500ml · 매트 블랙 드립포트 1L.' },
    ];

    const isCacheError = (e) => {
      const msg = String(e?.message || e?.code || '');
      return /PGRST002|schema cache|503|Failed to fetch|NetworkError/i.test(msg);
    };
    const newId = () => 'local_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

    // ───────── Data ─────────
    const Data = {
      mode: 'unknown',
      async listProducts() {
        if (sb) {
          try {
            const { data, error } = await sb.from('products')
              .select('id, name, price, image_url, description')
              .order('created_at', { ascending: true });
            if (error) throw error;
            this.mode = 'live';
            return data && data.length ? data : SEED_PRODUCTS;
          } catch (e) { if (!isCacheError(e)) throw e; }
        }
        this.mode = 'local'; return SEED_PRODUCTS;
      },
      async listCart(userId) {
        if (!userId) return [];
        if (sb) {
          try {
            const { data, error } = await sb.from('cart')
              .select('id, product_id, quantity, created_at')
              .eq('user_id', userId).order('created_at', { ascending: false });
            if (error) throw error;
            this.mode = 'live'; return data || [];
          } catch (e) { if (!isCacheError(e)) throw e; }
        }
        this.mode = 'local';
        return lsLoad(LS_CART).filter(r => r.user_id === userId);
      },
      async addToCart(userId, productId) {
        if (sb) {
          try {
            const { data: ex } = await sb.from('cart').select('id, quantity')
              .eq('user_id', userId).eq('product_id', productId).maybeSingle();
            if (ex) {
              const { data, error } = await sb.from('cart').update({ quantity: ex.quantity + 1 })
                .eq('id', ex.id).select().single();
              if (error) throw error;
              this.mode = 'live'; return data;
            } else {
              const { data, error } = await sb.from('cart')
                .insert({ user_id: userId, product_id: productId, quantity: 1 })
                .select().single();
              if (error) throw error;
              this.mode = 'live'; return data;
            }
          } catch (e) { if (!isCacheError(e)) throw e; }
        }
        const all = lsLoad(LS_CART);
        const f = all.find(r => r.user_id === userId && r.product_id === productId);
        if (f) { f.quantity += 1; lsSave(LS_CART, all); this.mode = 'local'; return f; }
        const row = { id: newId(), user_id: userId, product_id: productId, quantity: 1, created_at: new Date().toISOString() };
        all.unshift(row); lsSave(LS_CART, all); this.mode = 'local'; return row;
      },
      async setQuantity(cartId, qty) {
        if (qty < 1) return this.removeFromCart(cartId);
        if (sb && !String(cartId).startsWith('local_')) {
          try {
            const { data, error } = await sb.from('cart').update({ quantity: qty })
              .eq('id', cartId).select().single();
            if (error) throw error;
            this.mode = 'live'; return data;
          } catch (e) { if (!isCacheError(e)) throw e; }
        }
        const all = lsLoad(LS_CART);
        const i = all.findIndex(r => r.id === cartId);
        if (i >= 0) { all[i].quantity = qty; lsSave(LS_CART, all); }
        this.mode = 'local'; return all[i];
      },
      async removeFromCart(cartId) {
        if (sb && !String(cartId).startsWith('local_')) {
          try {
            const { error } = await sb.from('cart').delete().eq('id', cartId);
            if (error) throw error;
            this.mode = 'live'; return;
          } catch (e) { if (!isCacheError(e)) throw e; }
        }
        lsSave(LS_CART, lsLoad(LS_CART).filter(r => r.id !== cartId));
        this.mode = 'local';
      },
    };

    // ───────── 유틸 ─────────
    const fmt = (n) => Number(n || 0).toLocaleString('ko-KR');
    const nameOf = (email = '') => {
      const at = email.indexOf('@'); return at > 0 ? email.slice(0, at) : email || '익명';
    };

    // ───────── Logo (SVG) ─────────
    // 산 + 해 — 5월의 풍경을 표현하는 미니멀 심볼
    const Logo = ({ size = 22, withText = true, className = '' }) => (
      <span className={`inline-flex items-center gap-2 ${className}`}>
        <svg
          width={size} height={size}
          viewBox="0 0 32 32" fill="none"
          stroke="currentColor" strokeWidth="1.6"
          strokeLinecap="round" strokeLinejoin="round"
          aria-hidden="true"
        >
          {/* 해/달 */}
          <circle cx="22" cy="11" r="4.5" />
          {/* 산 능선 */}
          <path d="M3 25 L11 17 L16 21 L22 16 L29 23" />
        </svg>
        {withText && (
          <span className="display tracking-tight" style={{ fontSize: 'inherit', lineHeight: 1 }}>
            5월의 풍경
          </span>
        )}
      </span>
    );

    // ───────── 토스트 ─────────
    const ToastCtx = createContext(() => {});
    const useToast = () => useContext(ToastCtx);
    function ToastProvider({ children }) {
      const [msg, setMsg] = useState(null);
      const tref = useRef(null);
      const push = useCallback((t) => {
        setMsg(t); clearTimeout(tref.current);
        tref.current = setTimeout(() => setMsg(null), 2200);
      }, []);
      return (
        <ToastCtx.Provider value={push}>
          {children}
          {msg && <div className="toast">{msg}</div>}
        </ToastCtx.Provider>
      );
    }

    // ───────── Auth Drawer ─────────
    function AuthDrawer({ open, onClose }) {
      const [mode, setMode] = useState('login');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [busy, setBusy] = useState(false);
      const [error, setError] = useState(null);
      const [info, setInfo] = useState(null);
      const toast = useToast();

      useEffect(() => { if (!open) { setError(null); setInfo(null); } }, [open]);

      // Auth 분리 — 같은 Supabase 프로젝트 공유 시 user pool 격리용
      // 사용자가 입력한 kim@gmail.com → DB 에는 kim+shop@gmail.com 로 저장
      // (Gmail/Naver 등은 + 를 무시하므로 메일은 원래 함으로 정상 도착)
      const APP_NS = 'shop';
      const nsEmail = (raw) => {
        const e = raw.trim().toLowerCase();
        const at = e.lastIndexOf('@');
        if (at < 0) return e;
        const local = e.slice(0, at), domain = e.slice(at + 1);
        if (local.endsWith('+' + APP_NS)) return e;
        return `${local}+${APP_NS}@${domain}`;
      };

      const submit = async () => {
        setError(null); setInfo(null);
        if (!email.trim()) { setError('이메일을 입력해 주세요.'); return; }
        if (mode !== 'reset') {
          if (!password) { setError('비밀번호를 입력해 주세요.'); return; }
          if (password.length < 6) { setError('비밀번호는 6자 이상.'); return; }
        }
        setBusy(true);
        try {
          const e = nsEmail(email);
          if (mode === 'signup') {
            const { data, error } = await sb.auth.signUp({
              email: e,
              password,
              options: { emailRedirectTo: window.location.origin + '/' },
            });
            if (error) throw error;
            if (!data.session) setInfo('가입 메일을 확인해 주세요.');
            else { toast('Welcome'); onClose(); }
          } else if (mode === 'reset') {
            const { error } = await sb.auth.resetPasswordForEmail(e, {
              redirectTo: window.location.origin + '/',
            });
            if (error) throw error;
            setInfo('재설정 링크를 메일로 보냈어요. 메일을 확인해 주세요.');
          } else {
            const { error } = await sb.auth.signInWithPassword({ email: e, password });
            if (error) throw error;
            toast('Signed in'); onClose();
          }
        } catch (e) {
          setError(e.message || '요청 실패');
        } finally { setBusy(false); }
      };

      if (!open) return null;
      return (
        <>
          <div className="drawer-bg" onClick={onClose} />
          <aside className="drawer">
            <div className="px-8 pt-6 pb-5 flex items-center justify-between">
              <div className="uppercase-label">Account</div>
              <button onClick={onClose} className="btn btn-quiet" aria-label="닫기">CLOSE</button>
            </div>
            <div className="hairline mx-8" />

            <div className="px-8 py-7 flex-1 overflow-auto">
              <h2 className="display text-3xl mb-1">
                {mode === 'signup' ? '계정 만들기'
                  : mode === 'reset'  ? '비밀번호 재설정'
                  : '다시 만나서 반가워요'}
              </h2>
              <p className="text-sm text-sub mb-6">
                {mode === 'signup'  ? '이메일과 비밀번호로 가입할 수 있습니다.'
                  : mode === 'reset' ? '가입한 이메일로 재설정 링크를 보내드려요.'
                  : '가입한 이메일로 로그인하세요.'}
              </p>

              <div className="space-y-5">
                <div>
                  <label className="uppercase-label block mb-1.5">Email</label>
                  <input className="in" type="email" value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    placeholder="you@example.com" autoComplete="email" />
                </div>
                {mode !== 'reset' && (
                  <div>
                    <label className="uppercase-label block mb-1.5">Password</label>
                    <input className="in" type="password" value={password}
                      onChange={(e) => setPassword(e.target.value)}
                      placeholder="6자 이상"
                      autoComplete={mode === 'signup' ? 'new-password' : 'current-password'}
                      onKeyDown={(e) => e.key === 'Enter' && submit()} />
                  </div>
                )}

                {error && <div className="text-xs text-red-600">⚠ {error}</div>}
                {info  && <div className="text-xs text-ink bg-soft px-2 py-1.5 inline-block">✦ {info}</div>}

                <button className="btn btn-w mt-2" onClick={submit} disabled={busy}>
                  {busy ? 'Processing…'
                    : mode === 'signup' ? 'Create account'
                    : mode === 'reset'  ? 'Send reset link'
                    : 'Sign in'}
                </button>

                {mode === 'login' && (
                  <button
                    type="button"
                    onClick={() => { setMode('reset'); setError(null); setInfo(null); }}
                    className="btn btn-quiet text-xs w-full"
                  >
                    비밀번호를 잊으셨나요?
                  </button>
                )}

                <button
                  type="button"
                  onClick={() => { setMode(mode === 'signup' ? 'login' : 'signup'); setError(null); setInfo(null); }}
                  className="btn btn-quiet text-xs w-full"
                >
                  {mode === 'signup'
                    ? '이미 계정이 있으신가요? 로그인'
                    : mode === 'reset' ? '로그인으로 돌아가기'
                    : '계정이 없으신가요? 가입하기'}
                </button>

                <p className="text-[11px] text-sub leading-relaxed pt-4">
                  로그인하면 장바구니가 계정에 안전하게 저장됩니다.<br/>
                  비로그인 상태에서도 상품 목록은 자유롭게 둘러보실 수 있어요.
                </p>
              </div>
            </div>
          </aside>
        </>
      );
    }

    // ───────── Cart Drawer ─────────
    function CartDrawer({ open, onClose, user, productsMap, items, onChange }) {
      const toast = useToast();

      const total = useMemo(() => items.reduce((s, it) => {
        const p = productsMap[it.product_id]; if (!p) return s;
        return s + p.price * it.quantity;
      }, 0), [items, productsMap]);

      const updateQty = async (it, qty) => {
        try { await Data.setQuantity(it.id, qty); onChange(); }
        catch (e) { toast('Failed: ' + e.message); }
      };
      const removeItem = async (it) => {
        try { await Data.removeFromCart(it.id); onChange(); toast('Removed'); }
        catch (e) { toast('Failed: ' + e.message); }
      };

      if (!open) return null;
      return (
        <>
          <div className="drawer-bg" onClick={onClose} />
          <aside className="drawer">
            <div className="px-8 pt-6 pb-5 flex items-center justify-between">
              <div className="uppercase-label">Your bag</div>
              <button onClick={onClose} className="btn btn-quiet">CLOSE</button>
            </div>
            <div className="hairline mx-8" />

            <div className="flex-1 overflow-auto px-8 py-6">
              {items.length === 0 ? (
                <div className="text-center py-20">
                  <div className="display text-2xl">장바구니가 비어 있습니다</div>
                  <p className="text-sm text-sub mt-3">마음에 드는 한 잔을 골라 담아보세요.</p>
                </div>
              ) : (
                <ul className="space-y-6">
                  {items.map(it => {
                    const p = productsMap[it.product_id];
                    if (!p) return (
                      <li key={it.id} className="text-xs text-sub flex justify-between">
                        <span>알 수 없는 상품 · {it.quantity}</span>
                        <button onClick={() => removeItem(it)} className="underline">Remove</button>
                      </li>
                    );
                    return (
                      <li key={it.id} className="flex gap-4 fade-in">
                        <div className="w-24 h-24 bg-soft shrink-0 overflow-hidden">
                          {p.image_url && <img src={p.image_url} alt={p.name} className="w-full h-full object-cover" />}
                        </div>
                        <div className="flex-1 min-w-0">
                          <h4 className="text-sm leading-snug">{p.name}</h4>
                          <div className="num-mono text-xs text-sub mt-1">₩ {fmt(p.price)}</div>
                          <div className="flex items-center justify-between gap-2 mt-3">
                            <div className="inline-flex items-center" style={{border: '1px solid #111'}}>
                              <button onClick={() => updateQty(it, it.quantity - 1)} className="btn btn-quiet btn-icon !border-0" aria-label="감소">−</button>
                              <span className="num-mono px-3 text-sm min-w-[28px] text-center">{it.quantity}</span>
                              <button onClick={() => updateQty(it, it.quantity + 1)} className="btn btn-quiet btn-icon !border-0" aria-label="증가">+</button>
                            </div>
                            <button onClick={() => removeItem(it)} className="text-[11px] text-sub hover:text-ink underline">Remove</button>
                          </div>
                        </div>
                        <div className="num-mono text-sm whitespace-nowrap">
                          ₩ {fmt(p.price * it.quantity)}
                        </div>
                      </li>
                    );
                  })}
                </ul>
              )}
            </div>

            {items.length > 0 && (
              <>
                <div className="hairline mx-8" />
                <div className="px-8 py-6 bg-white">
                  <div className="flex items-baseline justify-between mb-1">
                    <span className="uppercase-label">Subtotal</span>
                    <span className="num-mono text-2xl">₩ {fmt(total)}</span>
                  </div>
                  <p className="text-[11px] text-sub mt-1 mb-4">결제 시 배송비/세금이 추가될 수 있습니다.</p>
                  <button className="btn btn-w" onClick={() => toast('결제는 준비 중입니다')}>
                    Checkout
                  </button>
                </div>
              </>
            )}
          </aside>
        </>
      );
    }

    // ───────── Product Card ─────────
    function ProductCard({ product, user, onAddToCart, onAuthRequired }) {
      const [busy, setBusy] = useState(false);
      const handleAdd = async () => {
        if (!user) { onAuthRequired(); return; }
        setBusy(true);
        try { await onAddToCart(product); }
        finally { setBusy(false); }
      };
      return (
        <article className="pcard fade-in">
          <div className="pcard-img">
            {product.image_url
              ? <img src={product.image_url} alt={product.name} loading="lazy" />
              : <div className="w-full h-full grid place-items-center text-sub text-xs">No image</div>}
            {/* hover quick-add */}
            <div className="pcard-add">
              <button
                onClick={handleAdd}
                disabled={busy}
                className="btn btn-w"
              >
                {busy ? 'Adding…' : (user ? 'Add to bag' : 'Sign in to buy')}
              </button>
            </div>
          </div>
          <div className="pt-4 pb-2 text-center">
            <h3 className="text-[13px] font-normal leading-snug">{product.name}</h3>
            <div className="num-mono text-[13px] mt-1.5 text-ink">₩ {fmt(product.price)}</div>
          </div>
        </article>
      );
    }

    // ───────── App ─────────
    function App() {
      const [session, setSession] = useState(undefined);
      const [products, setProducts] = useState([]);
      const [cart, setCart] = useState([]);
      const [authOpen, setAuthOpen] = useState(false);
      const [cartOpen, setCartOpen] = useState(false);
      const [loading, setLoading] = useState(true);
      const [dataMode, setDataMode] = useState('unknown');
      const toast = useToast();

      const user = session?.user || null;

      useEffect(() => {
        // URL hash 가 #logout 이면 진입 즉시 모든 세션 비움
        if (window.location.hash === '#logout') {
          try { sb && sb.auth.signOut({ scope: 'local' }); } catch (_) {}
          Object.keys(localStorage).forEach((k) => {
            if (k.startsWith('sb-') || k.includes('supabase')) localStorage.removeItem(k);
          });
          history.replaceState(null, '', window.location.pathname);
          window.location.reload();
          return;
        }
        if (!sb) { setSession(null); return; }
        sb.auth.getSession().then(({ data }) => setSession(data.session || null));
        const { data: sub } = sb.auth.onAuthStateChange(async (evt, s) => {
          setSession(s || null);
          // 비밀번호 재설정 메일 링크로 들어온 경우 → 새 비번 입력 받기
          if (evt === 'PASSWORD_RECOVERY') {
            const np = window.prompt('새 비밀번호를 입력해 주세요 (6자 이상)');
            if (np && np.length >= 6) {
              const { error } = await sb.auth.updateUser({ password: np });
              if (error) alert('재설정 실패: ' + error.message);
              else {
                alert('비밀번호가 재설정됐어요. 자동으로 로그인됩니다.');
                history.replaceState(null, '', window.location.pathname); // hash 제거
              }
            }
          }
        });
        return () => sub.subscription.unsubscribe();
      }, []);

      const loadProducts = useCallback(async () => {
        try {
          const list = await Data.listProducts();
          setProducts(list);
          setDataMode(Data.mode);
        } catch (e) {
          console.error(e);
        } finally { setLoading(false); }
      }, []);

      const loadCart = useCallback(async () => {
        if (!user) { setCart([]); return; }
        try {
          const list = await Data.listCart(user.id);
          setCart(list);
          setDataMode(Data.mode);
        } catch (e) { console.error(e); }
      }, [user]);

      useEffect(() => { loadProducts(); }, [loadProducts]);
      useEffect(() => { loadCart(); }, [loadCart]);

      const addToCart = async (product) => {
        try {
          await Data.addToCart(user.id, product.id);
          await loadCart();
          setDataMode(Data.mode);
          toast('Added to bag');
        } catch (e) { toast('Failed: ' + e.message); }
      };

      const productsMap = useMemo(() => {
        const m = {}; for (const p of products) m[p.id] = p; return m;
      }, [products]);

      const cartCount = useMemo(() => cart.reduce((s, it) => s + it.quantity, 0), [cart]);

      const logout = async () => {
        await sb.auth.signOut();
        setCart([]); toast('Signed out');
      };

      if (!sb) {
        return (
          <div className="max-w-xl mx-auto p-10">
            <h1 className="display text-3xl">환경 설정이 필요해요</h1>
            <p className="text-sub text-sm mt-3">
              <code>.env</code>에 <code>SUPABASE_URL</code>과 <code>SUPABASE_ANON_KEY</code>를 입력 후 서버를 재시작 해주세요.
            </p>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col">
          {/* Header — 미니멀 (cafict 톤) */}
          <header className="border-b border-line bg-white sticky top-0 z-40">
            <div className="max-w-[1280px] mx-auto px-6 sm:px-10 h-[68px] flex items-center justify-between gap-6 relative">
              {/* logo */}
              <a href="/" className="text-[19px]" aria-label="5월의 풍경 — 홈">
                <Logo size={24} />
              </a>
              {/* nav (가운데) */}
              <nav className="hidden md:flex items-center gap-8 absolute left-1/2 -translate-x-1/2">
                <a href="#shop" className="nav-link">SHOP</a>
                <a href="#shop" className="nav-link">ABOUT</a>
                <a href="#shop" className="nav-link">JOURNAL</a>
              </nav>
              {/* utilities */}
              <div className="flex items-center gap-5 text-[12.5px]">
                {user ? (
                  <button onClick={logout} className="nav-link">LOGOUT</button>
                ) : (
                  <button onClick={() => setAuthOpen(true)} className="nav-link">LOGIN</button>
                )}
                <button
                  onClick={() => user ? setCartOpen(true) : setAuthOpen(true)}
                  className="nav-link"
                  aria-label="장바구니"
                >
                  CART ({cartCount})
                </button>
              </div>
            </div>
          </header>

          {/* Mode banner */}
          {dataMode === 'local' && (
            <div className="bg-soft border-b border-line">
              <div className="max-w-[1280px] mx-auto px-6 sm:px-10 py-2 text-[11.5px] text-sub flex items-center justify-between gap-3 flex-wrap">
                <span>Temp local mode — Supabase API가 깨어나는 중. 회복되면 자동 전환됩니다.</span>
                <button onClick={() => location.reload()} className="nav-link">RETRY</button>
              </div>
            </div>
          )}

          {/* Products grid — 곧장 그리드, Hero 없음 */}
          <main className="max-w-[1280px] mx-auto px-6 sm:px-10 pt-12 pb-24 flex-1">
            {loading ? (
              <div className="py-16 text-center text-sm text-sub">Loading…</div>
            ) : products.length === 0 ? (
              <div className="py-20 text-center">
                <div className="display text-2xl">No items</div>
              </div>
            ) : (
              <div className="grid grid-cols-2 lg:grid-cols-4 gap-x-6 gap-y-12">
                {products.map(p => (
                  <ProductCard
                    key={p.id}
                    product={p}
                    user={user}
                    onAddToCart={addToCart}
                    onAuthRequired={() => { setAuthOpen(true); toast('Please sign in'); }}
                  />
                ))}
              </div>
            )}
          </main>

          {/* Footer — 단순 한 줄 */}
          <footer className="border-t border-line">
            <div className="max-w-[1280px] mx-auto px-6 sm:px-10 py-8 flex items-center justify-between flex-wrap gap-3 text-[11.5px] text-sub">
              <span className="inline-flex items-center gap-2 text-[13px] text-ink">
                <Logo size={18} />
              </span>
              <span className="num-mono">© 2026 · Coffee &amp; Brewers</span>
            </div>
          </footer>

          <AuthDrawer open={authOpen} onClose={() => setAuthOpen(false)} />
          <CartDrawer
            open={cartOpen}
            onClose={() => setCartOpen(false)}
            user={user}
            productsMap={productsMap}
            items={cart}
            onChange={loadCart}
          />
        </div>
      );
    }

    function Root() {
      return (
        <ToastProvider>
          <App />
        </ToastProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
