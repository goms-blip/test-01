<html lang="ko">
<head>

  <style>
    html, body { background: #ffffff; color: #111111; }
    body {
      min-height: 100vh;
      font-family: 'Pretendard Variable', Pretendard, Inter, system-ui, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.005em;
    }
    .display { font-family: 'Pretendard Variable', Pretendard, sans-serif; font-weight: 500; letter-spacing: -0.02em; }
    .num-mono { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

    .fade-in { animation: fadeIn 0.25s ease-out; }
    @keyframes fadeIn { from {opacity:0; transform: translateY(2px);} to {opacity:1; transform: translateY(0);} }

    /* Inputs */
    .in {
      background: #fff;
      border: 0; border-bottom: 1px solid #d8d8d2;
      padding: 10px 0; font-size: 14px; color: #111;
      outline: none; transition: border-color .15s ease; width: 100%;
      border-radius: 0;
    }
    .in:focus { border-bottom-color: #111; }
    .in::placeholder { color: #b5b5af; }

    .in-box {
      background: #fff;
      border: 1px solid #d8d8d2;
      padding: 10px 12px; font-size: 14px; color: #111;
      outline: none; transition: border-color .15s ease; width: 100%;
      border-radius: 0;
    }
    .in-box:focus { border-color: #111; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 12.5px; letter-spacing: 0.08em; font-weight: 500; text-transform: uppercase;
      padding: 13px 20px; border: 1px solid #111; background: #111; color: #fff;
      transition: background .15s ease, color .15s ease, border-color .15s ease;
      cursor: pointer; border-radius: 0;
    }
    .btn:hover:not(:disabled) { background: #fff; color: #111; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-line  { background: #fff; color: #111; border: 1px solid #111; }
    .btn-line:hover:not(:disabled) { background: #111; color: #fff; }
    .btn-quiet { background: transparent; color: #111; border: 1px solid transparent; padding: 8px 0; }
    .btn-quiet:hover:not(:disabled) { color: #7a7a7a; }
    .btn-sm { padding: 9px 14px; font-size: 11px; }
    .btn-icon { padding: 6px 10px; min-width: 32px; font-size: 14px; line-height: 1; }
    .btn-w { width: 100%; }
    .btn-danger { background: #fff; color: #c0392b; border: 1px solid #c0392b; }
    .btn-danger:hover:not(:disabled) { background: #c0392b; color: #fff; }

    /* Top nav link */
    .nav-link {
      font-size: 12.5px; font-weight: 500;
      color: #111; transition: color .15s ease;
      letter-spacing: 0;
    }
    .nav-link:hover { color: #7a7a7a; }
    .nav-link.active { color: #c0392b; }

    /* product card */
    .pcard { display: block; cursor: default; }
    .pcard-img {
      aspect-ratio: 1/1; background: #f4f4f0; overflow: hidden;
      position: relative;
    }
    .pcard-img img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .55s ease, opacity .25s ease;
    }
    .pcard:hover .pcard-img img { transform: scale(1.03); }
    .pcard-add {
      position: absolute; left: 12px; right: 12px; bottom: 12px;
      opacity: 0; transform: translateY(4px);
      transition: opacity .2s ease, transform .2s ease;
    }
    .pcard:hover .pcard-add { opacity: 1; transform: translateY(0); }

    @media (max-width: 640px) { .pcard-add { opacity: 1; transform: none; } }

    .badge-soldout {
      position: absolute; top: 12px; left: 12px;
      background: #fff; color: #111;
      font-size: 10.5px; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 4px 8px;
      border: 1px solid #111;
    }

    /* toast */
    .toast {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
      background: #111; color: #fff;
      padding: 12px 20px; font-size: 12.5px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      z-index: 60; animation: fadeIn .2s ease-out;
    }

    /* drawer */
    .drawer-bg {
      position: fixed; inset: 0; background: rgba(17,17,17,0.4);
      z-index: 70; animation: fadeIn .15s ease;
    }
    .drawer {
      position: fixed; right: 0; top: 0; bottom: 0; width: min(440px, 92vw);
      background: #fff; z-index: 71;
      display: flex; flex-direction: column;
      animation: slideIn .22s ease-out;
      box-shadow: -10px 0 40px -16px rgba(0,0,0,.18);
    }
    @keyframes slideIn { from {transform: translateX(20px); opacity: 0;} to {transform: translateX(0); opacity: 1;} }

    .uppercase-label { letter-spacing: 0.18em; text-transform: uppercase; font-size: 10.5px; color: #7a7a7a; }
    .hairline { height: 1px; background: #eeeeea; }

    /* admin uploader */
    .uploader {
      border: 1.5px dashed #d8d8d2; background: #fafaf7;
      aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; cursor: pointer; transition: border-color .15s ease, background .15s ease;
      position: relative; overflow: hidden;
    }
    .uploader:hover, .uploader.drag { border-color: #111; background: #fff; }
    .uploader img { width: 100%; height: 100%; object-fit: cover; }
    .uploader .ph { color: #888; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }

    /* admin table */
    .a-row { display: grid; grid-template-columns: 56px 1fr 100px 80px 80px 120px; gap: 12px; align-items: center; padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 13px; }
    .a-row.head { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #888; background: #fafaf7; }
    .a-row .thumb { width: 56px; height: 56px; background: #f4f4f0; overflow: hidden; }
    .a-row .thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* mypage order card */
    .order-card { border: 1px solid #ececec; padding: 18px 20px; }
    .status-badge {
      display: inline-block; padding: 2px 8px; font-size: 10.5px; letter-spacing: 0.1em;
      text-transform: uppercase; border: 1px solid;
    }
    .status-paid { color: #2c6e49; border-color: #2c6e49; }
    .status-pending { color: #b58900; border-color: #b58900; }
    .status-failed { color: #c0392b; border-color: #c0392b; }
    .status-canceled { color: #888; border-color: #888; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useCallback, useRef, createContext, useContext } = React;

    // ───────── Supabase / Toss ─────────
    const ENV = window.__ENV || {};
    const sb = (ENV.SUPABASE_URL && ENV.SUPABASE_ANON_KEY
                && !ENV.SUPABASE_URL.includes('YOUR-PROJECT-REF'))
      ? supabase.createClient(ENV.SUPABASE_URL, ENV.SUPABASE_ANON_KEY)
      : null;
    const TOSS_CLIENT_KEY = ENV.TOSS_CLIENT_KEY || '';

    // 관리자 화이트리스트 (서버 RLS 와 동일하게 유지)
    const ADMIN_EMAILS = new Set([
      'seunghun.oh@griff.co.kr',
      'seunghun.oh+shop@griff.co.kr',
    ]);
    const isAdminUser = (u) => !!u && ADMIN_EMAILS.has((u.email || '').toLowerCase());

    // ───────── localStorage fallback ─────────
    const LS_CART = 'shop_cart_v1';
    const lsLoad = (k) => { try { return JSON.parse(localStorage.getItem(k) || '[]'); } catch { return []; } };
    const lsSave = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

    // SEED — 로컬 fallback 용. 옵션은 schema_options.sql 시드와 동일하게.
    //  · 분쇄도 4 종 (가격 차등 없음, 200g 기준 동일)
    //  · 용량 4 종 (200g 기준 ±, multiplier: 100g 0.55 · 200g 1.0 · 500g 2.3 · 1kg 4.3)
    const GRIND_OPT = {
      name: '분쇄도',
      choices: [
        { label: '홀빈',       delta: 0 },
        { label: '핸드드립',   delta: 0 },
        { label: '에스프레소', delta: 0 },
        { label: '모카프레소', delta: 0 },
      ],
    };
    // 200g 가 base. 100g 는 -%, 500g/1kg 는 + 차등. 100원 단위로 round.
    const sizeOpt = (base) => ({
      name: '용량',
      choices: [
        { label: '200g', delta: 0 },
        { label: '100g', delta: Math.round(base * -0.45 / 100) * 100 },
        { label: '500g', delta: Math.round(base *  1.30 / 100) * 100 },
        { label: '1kg',  delta: Math.round(base *  3.30 / 100) * 100 },
      ],
    });
    const beanOptions = (base) => [sizeOpt(base), GRIND_OPT];

    const SEED_PRODUCTS = [
      { id:'11111111-1111-1111-1111-111111111101', name:'에티오피아 예가체프 게샤',  price:18000,
        image_url:'https://images.unsplash.com/photo-1599639957043-f3aa5c986398?w=800&h=800&fit=crop&auto=format',
        description:'꽃향과 베르가못 시트러스. 5월 아침의 상쾌함.', options: beanOptions(18000) },
      { id:'11111111-1111-1111-1111-111111111102', name:'콜롬비아 우일라 슈프리모', price:16500,
        image_url:'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=800&h=800&fit=crop&auto=format',
        description:'균형잡힌 단맛과 캐러멜 피니쉬.', options: beanOptions(16500) },
      { id:'11111111-1111-1111-1111-111111111103', name:'케냐 키리냐가 AA',         price:19500,
        image_url:'https://images.unsplash.com/photo-1442550528053-c431ecb55509?w=800&h=800&fit=crop&auto=format',
        description:'블랙베리, 자몽의 진한 산미.', options: beanOptions(19500) },
      { id:'11111111-1111-1111-1111-111111111104', name:'브라질 세하도 피베리',     price:14500,
        image_url:'https://images.unsplash.com/photo-1494314671902-399b18174975?w=800&h=800&fit=crop&auto=format',
        description:'초콜릿과 견과 풍미. 데일리 블렌드.', options: beanOptions(14500) },
      { id:'11111111-1111-1111-1111-111111111105', name:'5월의 풍경 블렌드',         price:17000,
        image_url:'https://images.unsplash.com/photo-1497636577773-f1231844b336?w=800&h=800&fit=crop&auto=format',
        description:'갓 깎은 잔디, 벚꽃이 진 자리.', options: beanOptions(17000) },
      { id:'11111111-1111-1111-1111-111111111106', name:'핸드드립 드리퍼 — 도자기',  price:32000,
        image_url:'https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=800&h=800&fit=crop&auto=format',
        description:'미세한 곡선의 흰 도자기 드리퍼.', options: null },
      { id:'11111111-1111-1111-1111-111111111107', name:'향원 머그',                price:22000,
        image_url:'https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?w=800&h=800&fit=crop&auto=format',
        description:'두툼한 손잡이, 320ml.',
        options: [
          { name:'색상', choices: [
            { label:'차콜 그레이', delta: 0 },
            { label:'아이보리',   delta: 0 },
            { label:'올리브',     delta: 2000 },
          ]},
        ]},
      { id:'11111111-1111-1111-1111-111111111108', name:'서버 + 드립포트 세트',     price:58000,
        image_url:'https://images.unsplash.com/photo-1485808191679-5f86510681a2?w=800&h=800&fit=crop&auto=format',
        description:'유리 서버 500ml · 매트 블랙 드립포트 1L.', options: null },
    ];

    const isCacheError = (e) => {
      const msg = String(e?.message || e?.code || '');
      return /PGRST002|schema cache|503|Failed to fetch|NetworkError/i.test(msg);
    };
    // Postgres 42703 = column does not exist
    const isColumnMissingError = (e) =>
      String(e?.code || '') === '42703' ||
      /does not exist/i.test(String(e?.message || ''));
    const newId = () => 'local_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

    // ───────── Data 레이어 ─────────
    const Data = {
      mode: 'unknown',

      // schema_options.sql 미적용 환경에서도 옵션 UI 가 보이도록,
      // DB 가 옵션 컬럼을 안 갖고 있으면 SEED 의 옵션으로 보강(merge).
      // 마이그 후엔 live options 가 우선.
      _mergeSeedOptions(p) {
        if (p && !p.options) {
          const seed = SEED_PRODUCTS.find(s => s.id === p.id);
          if (seed && seed.options) {
            return { ...p, options: seed.options, _optsFromSeed: true };
          }
        }
        return p;
      },

      async listProducts() {
        if (sb) {
          try {
            // '*' 로 가져와 stock/category/options 등 신규 컬럼 부재 시에도 안전.
            const { data, error } = await sb.from('products')
              .select('*')
              .order('created_at', { ascending: true });
            if (error) throw error;
            this.mode = 'live';
            const list = (data && data.length) ? data : SEED_PRODUCTS;
            return list.map(p => this._mergeSeedOptions(p));
          } catch (e) { if (!isCacheError(e)) throw e; }
        }
        this.mode = 'local'; return SEED_PRODUCTS;
      },

      // 마이그 전 환경에서도 카트 동작하도록 — selected_options 컬럼 부재 시 select 에서 제외
      async listCart(userId) {
        if (!userId) return [];
        if (sb) {
          for (const cols of ['id, product_id, quantity, selected_options, created_at',
                              'id, product_id, quantity, created_at']) {
            try {
              const { data, error } = await sb.from('cart')
                .select(cols).eq('user_id', userId)
                .order('created_at', { ascending: false });
              if (error) throw error;
              this.mode = 'live'; return data || [];
            } catch (e) {
              if (isColumnMissingError(e)) continue;       // 컬럼 부재 → 다음 SELECT 로
              if (!isCacheError(e)) throw e;
              break;
            }
          }
        }
        this.mode = 'local';
        return lsLoad(LS_CART).filter(r => r.user_id === userId);
      },

      // 카트의 selected_options 컬럼 사용 가능 여부 (한 번 감지 후 캐시).
      // null = unknown, true = 사용 가능, false = 컬럼 부재 (마이그 전)
      _cartHasOptions: null,

      // selectedOptions: { '용량':'500g', ... } 또는 null
      // qty: 추가량 (기본 1) — 디테일 페이지 수량 스테퍼에서 N 개 한 번에 담을 때 사용
      async addToCart(userId, productId, selectedOptions = null, qty = 1) {
        const optKey = optionsKey(selectedOptions);
        if (sb) {
          try {
            // 1) 같은 product 의 기존 라인 찾기 (옵션 컬럼 부재 시 select 줄임)
            let rows = null;
            for (const cols of ['id, quantity, selected_options', 'id, quantity']) {
              const r = await sb.from('cart').select(cols)
                .eq('user_id', userId).eq('product_id', productId);
              if (r.error) {
                if (isColumnMissingError(r.error)) { this._cartHasOptions = false; continue; }
                throw r.error;
              }
              if (cols.includes('selected_options')) this._cartHasOptions = true;
              rows = r.data; break;
            }

            const ex = (rows || []).find(r => {
              // 옵션 컬럼이 없으면 옵션 dedup 불가 — 같은 product 면 무조건 같은 행으로 취급
              if (this._cartHasOptions === false) return true;
              return optionsKey(r.selected_options) === optKey;
            });

            if (ex) {
              const { data, error } = await sb.from('cart')
                .update({ quantity: ex.quantity + qty })
                .eq('id', ex.id).select().single();
              if (error) throw error;
              this.mode = 'live';
              return { ...data, _droppedOptions: this._cartHasOptions === false && !!selectedOptions };
            }

            // 2) 신규 INSERT — selected_options 컬럼이 없으면 키 자체 제외
            const payload = { user_id: userId, product_id: productId, quantity: qty };
            if (selectedOptions && this._cartHasOptions !== false) {
              payload.selected_options = selectedOptions;
            }
            let { data, error } = await sb.from('cart').insert(payload).select().single();
            if (error && isColumnMissingError(error)) {
              // 첫 시도에서 컬럼 부재 감지 못 한 케이스 — selected_options 빼고 재시도
              this._cartHasOptions = false;
              delete payload.selected_options;
              ({ data, error } = await sb.from('cart').insert(payload).select().single());
            }
            if (error) throw error;
            this.mode = 'live';
            return { ...data, _droppedOptions: this._cartHasOptions === false && !!selectedOptions };
          } catch (e) {
            if (isCacheError(e)) {
              // local fallback 으로 떨어짐
            } else { throw e; }
          }
        }
        // local fallback
        const all = lsLoad(LS_CART);
        const f = all.find(r => r.user_id === userId && r.product_id === productId
                              && optionsKey(r.selected_options) === optKey);
        if (f) { f.quantity += qty; lsSave(LS_CART, all); this.mode = 'local'; return f; }
        const row = { id: newId(), user_id: userId, product_id: productId, quantity: qty,
                      selected_options: selectedOptions, created_at: new Date().toISOString() };
        all.unshift(row); lsSave(LS_CART, all); this.mode = 'local'; return row;
      },

      async getProduct(productId) {
        if (!sb) return SEED_PRODUCTS.find(p => p.id === productId) || null;
        try {
          const { data, error } = await sb.from('products').select('*').eq('id', productId).maybeSingle();
          if (error) throw error;
          return this._mergeSeedOptions(data);
        } catch (e) {
          if (isCacheError(e)) return SEED_PRODUCTS.find(p => p.id === productId) || null;
          throw e;
        }
      },

      async setQuantity(cartId, qty) {
        if (qty < 1) return this.removeFromCart(cartId);
        if (sb && !String(cartId).startsWith('local_')) {
          try {
            const { data, error } = await sb.from('cart').update({ quantity: qty })
              .eq('id', cartId).select().single();
            if (error) throw error;
            this.mode = 'live'; return data;
          } catch (e) { if (!isCacheError(e)) throw e; }
        }
        const all = lsLoad(LS_CART);
        const i = all.findIndex(r => r.id === cartId);
        if (i >= 0) { all[i].quantity = qty; lsSave(LS_CART, all); }
        this.mode = 'local'; return all[i];
      },

      async removeFromCart(cartId) {
        if (sb && !String(cartId).startsWith('local_')) {
          try {
            const { error } = await sb.from('cart').delete().eq('id', cartId);
            if (error) throw error;
            this.mode = 'live'; return;
          } catch (e) { if (!isCacheError(e)) throw e; }
        }
        lsSave(LS_CART, lsLoad(LS_CART).filter(r => r.id !== cartId));
        this.mode = 'local';
      },

      // 결제 성공 후 — 주문에 들어간 cart 라인을 id 기준으로 제거
      async clearCartByIds(cartIds) {
        if (!cartIds || cartIds.length === 0) return;
        if (!sb) {
          const set = new Set(cartIds);
          lsSave(LS_CART, lsLoad(LS_CART).filter(r => !set.has(r.id)));
          return;
        }
        await sb.from('cart').delete().in('id', cartIds);
      },

      // ── 관리자 CRUD ──
      async adminCreateProduct(p) {
        if (!sb) throw new Error('Supabase 연결이 필요합니다.');
        const { data, error } = await sb.from('products').insert(p).select().single();
        if (error) throw error;
        return data;
      },
      async adminUpdateProduct(id, patch) {
        if (!sb) throw new Error('Supabase 연결이 필요합니다.');
        const { data, error } = await sb.from('products').update(patch).eq('id', id).select().single();
        if (error) throw error;
        return data;
      },
      async adminDeleteProduct(id) {
        if (!sb) throw new Error('Supabase 연결이 필요합니다.');
        const { error } = await sb.from('products').delete().eq('id', id);
        if (error) throw error;
      },

      // ── 주문 ──
      async createPendingOrder(userId, items, productsMap) {
        if (!sb) throw new Error('주문에는 Supabase 연결이 필요합니다.');
        // 옵션별 단가 적용된 합계
        const lineRows = items.map(it => {
          const p = productsMap[it.product_id];
          const unit = computeOptionPrice(p, it.selected_options);
          return {
            product_id: it.product_id,
            product_name: p?.name || '(unknown)',
            unit_price: unit,
            quantity: it.quantity,
            selected_options: it.selected_options || null,
          };
        });
        const total = lineRows.reduce((s, r) => s + r.unit_price * r.quantity, 0);

        const orderNo = 'ord_' + crypto.randomUUID().replace(/-/g, '');
        const { data: order, error } = await sb.from('orders')
          .insert({ user_id: userId, order_no: orderNo, total_price: total, status: 'pending' })
          .select().single();
        if (error) throw error;

        // order_items.selected_options 컬럼 부재 환경에서도 동작하도록 자가 회복.
        // 1차: selected_options 포함 INSERT → 컬럼 부재면 2차로 빼고 재시도.
        const allNullOpts = lineRows.every(r => !r.selected_options);
        const buildRows = (withOptions) => lineRows.map(r => {
          const { selected_options, ...rest } = r;
          const row = { ...rest, order_id: order.id };
          if (withOptions && !allNullOpts) row.selected_options = selected_options || null;
          return row;
        });
        let { error: itemErr } = await sb.from('order_items').insert(buildRows(true));
        if (itemErr && isColumnMissingError(itemErr)) {
          ({ error: itemErr } = await sb.from('order_items').insert(buildRows(false)));
        }
        if (itemErr) throw itemErr;
        return { ...order, total, sourceCartIds: items.map(it => it.id) };
      },

      async listMyOrders(userId) {
        if (!sb || !userId) return [];
        for (const sel of [
          'id, order_no, total_price, status, paid_at, created_at, payment_key, order_items(id, product_name, unit_price, quantity, selected_options)',
          'id, order_no, total_price, status, paid_at, created_at, payment_key, order_items(id, product_name, unit_price, quantity)',
        ]) {
          const { data, error } = await sb.from('orders').select(sel)
            .eq('user_id', userId).order('created_at', { ascending: false });
          if (!error) return data || [];
          if (!isColumnMissingError(error)) throw error;
        }
        return [];
      },

      async getOrderByOrderNo(orderNo) {
        if (!sb) return null;
        for (const sel of [
          'id, order_no, total_price, status, paid_at, payment_key, order_items(id, product_id, product_name, unit_price, quantity, selected_options)',
          'id, order_no, total_price, status, paid_at, payment_key, order_items(id, product_id, product_name, unit_price, quantity)',
        ]) {
          const { data, error } = await sb.from('orders').select(sel)
            .eq('order_no', orderNo).maybeSingle();
          if (!error) return data;
          if (!isColumnMissingError(error)) throw error;
        }
        return null;
      },
    };

    // ───────── ImageKit 업로드 ─────────
    async function uploadImageToImageKit(file, folder = '/shoppingmall') {
      // 1) 서버에서 인증 토큰 발급
      const r = await fetch('/api/imagekit-auth');
      if (!r.ok) throw new Error('imagekit auth failed: ' + r.status);
      const auth = await r.json();
      // 2) ImageKit Upload API 직접 호출
      const fd = new FormData();
      fd.append('file', file);
      fd.append('fileName', file.name);
      fd.append('publicKey', auth.publicKey);
      fd.append('signature', auth.signature);
      fd.append('expire', String(auth.expire));
      fd.append('token', auth.token);
      fd.append('folder', folder);
      fd.append('useUniqueFileName', 'true');
      const up = await fetch('https://upload.imagekit.io/api/v1/files/upload', {
        method: 'POST', body: fd,
      });
      if (!up.ok) throw new Error('upload failed: ' + (await up.text()));
      const j = await up.json();
      return j.url;
    }

    // ───────── 라우터 (pathname 기반) ─────────
    function useRoute() {
      const get = () => ({
        path: window.location.pathname,
        search: new URLSearchParams(window.location.search),
      });
      const [route, setRoute] = useState(get);
      useEffect(() => {
        const onPop = () => setRoute(get());
        window.addEventListener('popstate', onPop);
        // navigate() 가 dispatchEvent 하는 커스텀 이벤트
        window.addEventListener('app:navigate', onPop);
        return () => {
          window.removeEventListener('popstate', onPop);
          window.removeEventListener('app:navigate', onPop);
        };
      }, []);
      return route;
    }
    function navigate(path) {
      if (window.location.pathname + window.location.search === path) return;
      window.history.pushState({}, '', path);
      window.dispatchEvent(new Event('app:navigate'));
    }
    function NavLink({ to, children, className = 'nav-link', activePaths = [] }) {
      const route = useRoute();
      const active = route.path === to || activePaths.includes(route.path);
      return (
        <a href={to} className={className + (active ? ' active' : '')}
           onClick={(e) => { e.preventDefault(); navigate(to); }}>
          {children}
        </a>
      );
    }

    // ───────── 유틸 ─────────
    const fmt = (n) => Number(n || 0).toLocaleString('ko-KR');
    const nameOf = (email = '') => {
      const at = email.indexOf('@'); return at > 0 ? email.slice(0, at) : email || '익명';
    };
    const fmtDate = (iso) => {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    };

    // ───────── 옵션 헬퍼 ─────────
    // products.options 형태:
    //   [{ name: '용량', choices: [{label:'250g', delta:0}, {label:'500g', delta:13000}] }, ...]
    // selectedOptions 형태:
    //   { '용량': '500g', '분쇄도': '핸드드립' }

    const hasOptions = (product) =>
      Array.isArray(product?.options) && product.options.length > 0;

    // 옵션이 있는 상품의 기본 선택값 (각 옵션의 첫 choice)
    const defaultSelectedOptions = (product) => {
      if (!hasOptions(product)) return null;
      const sel = {};
      for (const opt of product.options) {
        const first = opt.choices?.[0];
        if (first) sel[opt.name] = first.label;
      }
      return sel;
    };

    // 단가 = base + Σ delta
    const computeOptionPrice = (product, selectedOptions) => {
      let p = Number(product?.price || 0);
      if (!hasOptions(product) || !selectedOptions) return p;
      for (const opt of product.options) {
        const label = selectedOptions[opt.name];
        if (!label) continue;
        const choice = opt.choices?.find(c => c.label === label);
        if (choice) p += Number(choice.delta || 0);
      }
      return p;
    };

    // dedup 키 — 키 알파벳 정렬한 JSON. NULL 도 빈 객체로 통일
    const optionsKey = (selectedOptions) => {
      const obj = selectedOptions || {};
      const keys = Object.keys(obj).sort();
      const norm = {};
      for (const k of keys) norm[k] = obj[k];
      return JSON.stringify(norm);
    };

    // 옵션을 사람이 읽기 좋은 한 줄 문자열로
    const formatOptions = (selectedOptions) => {
      if (!selectedOptions) return '';
      const parts = [];
      for (const k of Object.keys(selectedOptions)) parts.push(`${k}: ${selectedOptions[k]}`);
      return parts.join(' · ');
    };

    // ───────── Auth Drawer ─────────
    function AuthDrawer({ open, onClose }) {
      const [mode, setMode] = useState('login');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [busy, setBusy] = useState(false);
      const [error, setError] = useState(null);
      const [info, setInfo] = useState(null);
      const toast = useToast();

      useEffect(() => { if (!open) { setError(null); setInfo(null); } }, [open]);

      const APP_NS = 'shop';
      const nsEmail = (raw) => {
        const e = raw.trim().toLowerCase();
        const at = e.lastIndexOf('@');
        if (at < 0) return e;
        const local = e.slice(0, at), domain = e.slice(at + 1);
        if (local.endsWith('+' + APP_NS)) return e;
        return `${local}+${APP_NS}@${domain}`;
      };

      const submit = async () => {
        setError(null); setInfo(null);
        if (!email.trim()) { setError('이메일을 입력해 주세요.'); return; }
        if (mode !== 'reset') {
          if (!password) { setError('비밀번호를 입력해 주세요.'); return; }
          if (password.length < 6) { setError('비밀번호는 6자 이상.'); return; }
        }
        setBusy(true);
        try {
          const e = nsEmail(email);
          if (mode === 'signup') {
            const { data, error } = await sb.auth.signUp({
              email: e, password,
              options: { emailRedirectTo: window.location.origin + '/' },
            });
            if (error) throw error;
            if (!data.session) setInfo('가입 메일을 확인해 주세요.');
            else { toast('Welcome'); onClose(); }
          } else if (mode === 'reset') {
            const { error } = await sb.auth.resetPasswordForEmail(e, {
              redirectTo: window.location.origin + '/',
            });
            if (error) throw error;
            setInfo('재설정 링크를 메일로 보냈어요. 메일을 확인해 주세요.');
          } else {
            const { error } = await sb.auth.signInWithPassword({ email: e, password });
            if (error) throw error;
            toast('Signed in'); onClose();
          }
        } catch (e) {
          setError(e.message || '요청 실패');
        } finally { setBusy(false); }
      };

      if (!open) return null;
      return (
        <>
          <div className="drawer-bg" onClick={onClose} />
          <aside className="drawer">
            <div className="px-8 pt-6 pb-5 flex items-center justify-between">
              <div className="uppercase-label">Account</div>
              <button onClick={onClose} className="btn btn-quiet" aria-label="닫기">CLOSE</button>
            </div>
            <div className="hairline mx-8" />

            <div className="px-8 py-7 flex-1 overflow-auto">
              <h2 className="display text-3xl mb-1">
                {mode === 'signup' ? '계정 만들기'
                  : mode === 'reset'  ? '비밀번호 재설정'
                  : '다시 만나서 반가워요'}
              </h2>
              <p className="text-sm text-sub mb-6">
                {mode === 'signup'  ? '이메일과 비밀번호로 가입할 수 있습니다.'
                  : mode === 'reset' ? '가입한 이메일로 재설정 링크를 보내드려요.'
                  : '가입한 이메일로 로그인하세요.'}
              </p>

              <div className="space-y-5">
                <div>
                  <label className="uppercase-label block mb-1.5">Email</label>
                  <input className="in" type="email" value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    placeholder="you@example.com" autoComplete="email" />
                </div>
                {mode !== 'reset' && (
                  <div>
                    <label className="uppercase-label block mb-1.5">Password</label>
                    <input className="in" type="password" value={password}
                      onChange={(e) => setPassword(e.target.value)}
                      placeholder="6자 이상"
                      autoComplete={mode === 'signup' ? 'new-password' : 'current-password'}
                      onKeyDown={(e) => e.key === 'Enter' && submit()} />
                  </div>
                )}

                {error && <div className="text-xs text-red-600">⚠ {error}</div>}
                {info  && <div className="text-xs text-ink bg-soft px-2 py-1.5 inline-block">✦ {info}</div>}

                <button className="btn btn-w mt-2" onClick={submit} disabled={busy}>
                  {busy ? 'Processing…'
                    : mode === 'signup' ? 'Create account'
                    : mode === 'reset'  ? 'Send reset link'
                    : 'Sign in'}
                </button>

                {mode === 'login' && (
                  <button type="button"
                    onClick={() => { setMode('reset'); setError(null); setInfo(null); }}

                <button type="button"

    function ProductDetailPage({ productId, user, products, onAuthRequired, refreshCart, openCart }) {
      const toast = useToast();
      // 1) 캐시된 products 에서 우선 찾고, 없으면 API
      const cached = products.find(p => p.id === productId);
      const [product, setProduct] = useState(cached || null);
      const [loading, setLoading] = useState(!cached);
      const [selected, setSelected] = useState(() => defaultSelectedOptions(cached));
      const [qty, setQty] = useState(1);
      const [busy, setBusy] = useState(false);

      useEffect(() => {
        if (cached) return;
        Data.getProduct(productId).then(p => {
          setProduct(p);
          setSelected(defaultSelectedOptions(p));
          setLoading(false);
        }).catch(e => { console.error(e); setLoading(false); });
      }, [productId]);

      // products 캐시가 늦게 들어오는 경우
      useEffect(() => {
        if (cached && !product) {
          setProduct(cached);
          setSelected(defaultSelectedOptions(cached));
        }
      }, [cached?.id]);

      if (loading) return (
        <main className="max-w-[1100px] mx-auto px-6 py-20 text-center text-sm text-sub">Loading…</main>
      );
      if (!product) return (
        <main className="max-w-[720px] mx-auto px-6 py-20 text-center">
          <h2 className="display text-3xl mb-3">상품을 찾을 수 없습니다</h2>
          <button className="btn mt-6" onClick={() => navigate('/')}>홈으로</button>
        </main>
      );

      const unit = computeOptionPrice(product, selected);
      const optionful = hasOptions(product);

      const setOption = (name, label) =>
        setSelected(s => ({ ...(s || {}), [name]: label }));

      const addBag = async () => {
        if (!user) { onAuthRequired(); return; }
        if (optionful) {
          // 모든 옵션이 선택됐는지 검증 (default 가 깔리므로 보통 OK)
          for (const opt of product.options) {
            if (!selected || !selected[opt.name]) {
              toast(`${opt.name} 을 선택해 주세요`); return;
            }
          }
        }
        setBusy(true);
        try {
          const r = await Data.addToCart(user.id, product.id, optionful ? selected : null, qty);
          await refreshCart();
          if (r && r._droppedOptions) {
            toast('Added (DB 마이그 전 — 옵션 정보 미저장)');
          } else {
            toast('Added to bag');
          }
          openCart && openCart();
        } catch (e) {
          console.error(e);
          toast('Failed: ' + (e.message || e.code || 'unknown'));
        } finally { setBusy(false); }
      };

      return (
        <main className="max-w-[1180px] mx-auto px-6 sm:px-10 pt-10 pb-24">
          <button onClick={() => navigate('/')} className="btn btn-quiet text-[11px] mb-6">← 모든 상품</button>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-10 lg:gap-16">
            <div className="bg-soft" style={{ aspectRatio: '1 / 1' }}>
              {product.image_url
                ? <img src={product.image_url} alt={product.name} className="w-full h-full object-cover" />
                : <div className="w-full h-full grid place-items-center text-sub text-xs">No image</div>}
            </div>

            <div>
              {product.category && (
                <div className="uppercase-label mb-3">{product.category}</div>
              )}
              <h1 className="display text-3xl sm:text-4xl mb-3 leading-tight">{product.name}</h1>
              <div className="num-mono text-2xl mb-6">₩ {fmt(unit)}</div>
              {product.description && (
                <p className="text-sm text-sub leading-relaxed mb-8 whitespace-pre-line">{product.description}</p>
              )}

              {optionful && (
                <div className="space-y-6 mb-8 border-t border-line pt-8">
                  {product.options.map(opt => (
                    <OptionRadioGroup
                      key={opt.name}
                      option={opt}
                      value={selected ? selected[opt.name] : undefined}
                      onChange={(label) => setOption(opt.name, label)}
                      basePrice={product.price}
                    />
                  ))}
                </div>
              )}

              <div className="flex items-center gap-5 mb-6">
                <span className="uppercase-label">Qty</span>
                <QuantityStepper value={qty} onChange={setQty} />
                <span className="num-mono text-sm text-sub ml-auto">합계 ₩ {fmt(unit * qty)}</span>
              </div>

              <button className="btn btn-w" onClick={addBag} disabled={busy}>
                {busy ? 'Adding…' : (user ? 'Add to bag' : 'Sign in to buy')}
              </button>

              <p className="text-[11px] text-sub mt-4 leading-relaxed">
                {optionful
                  ? '옵션 조합별로 별개 라인으로 담깁니다. 동일 옵션 조합 재담기 시 수량 +1.'
                  : '옵션이 없는 상품입니다. 동일 상품 재담기 시 수량 +1.'}
              </p>
            </div>
          </div>
        </main>
      );
    }

    // ───────── Admin · 옵션 편집기 ─────────
    function OptionsEditor({ value, onChange }) {
      // value: [{ name, choices: [{ label, delta }] }] | null
      const opts = value || [];
      const setOpts = (next) => onChange(next.length ? next : null);
      const update = (i, patch) => setOpts(opts.map((o, idx) => idx === i ? { ...o, ...patch } : o));
      const remove = (i) => setOpts(opts.filter((_, idx) => idx !== i));
      const add = () => setOpts([...opts, { name: '', choices: [{ label: '', delta: 0 }] }]);

      const updateChoice = (oi, ci, patch) => {
        const chs = opts[oi].choices.map((c, idx) => idx === ci ? { ...c, ...patch } : c);
        update(oi, { choices: chs });
      };
      const addChoice = (oi) => {
        update(oi, { choices: [...opts[oi].choices, { label: '', delta: 0 }] });
      };
      const removeChoice = (oi, ci) => {
        update(oi, { choices: opts[oi].choices.filter((_, idx) => idx !== ci) });
      };

      return (
        <div className="space-y-4">
          {opts.map((o, oi) => (
            <div key={oi} className="border border-line p-3 bg-soft/40">
              <div className="flex items-center gap-2 mb-2">
                <input
                  className="in"
                  placeholder="옵션 이름 (예: 분쇄도)"
                  value={o.name}
                  onChange={(e) => update(oi, { name: e.target.value })}
                />
                <button type="button" className="btn btn-quiet text-[11px]" onClick={() => remove(oi)}>옵션 삭제</button>
              </div>
              <div className="space-y-1.5">
                {o.choices.map((c, ci) => (
                  <div key={ci} className="flex items-center gap-2">
                    <input
                      className="in-box"
                      style={{ flex: '2 1 0' }}
                      placeholder="선택지 라벨 (예: 핸드드립)"
                      value={c.label}
                      onChange={(e) => updateChoice(oi, ci, { label: e.target.value })}
                    />
                    <span className="text-[11px] text-sub">+₩</span>
                    <input
                      className="in-box num-mono"
                      style={{ flex: '1 1 0', width: 80 }}
                      type="number"
                      placeholder="0"
                      value={c.delta}
                      onChange={(e) => updateChoice(oi, ci, { delta: parseInt(e.target.value || '0', 10) })}
                    />
                    <button type="button" className="btn btn-quiet text-[11px]" onClick={() => removeChoice(oi, ci)}>×</button>
                  </div>
                ))}
                <button type="button" className="btn btn-quiet text-[11px]" onClick={() => addChoice(oi)}>+ 선택지 추가</button>
              </div>
            </div>
          ))}
          <button type="button" className="btn btn-line btn-sm" onClick={add}>+ 옵션 추가</button>
          {opts.length === 0 && (
            <p className="text-[11px] text-sub">옵션 없는 상품은 카드 호버 시 즉시 담기 가능. 옵션을 추가하면 디테일 페이지에서 선택 후 담깁니다.</p>
          )}
        </div>
      );
    }

    // ───────── Page: Admin (상품 CRUD + 이미지 업로드) ─────────
    function AdminPage({ user, products, refresh }) {
      const toast = useToast();
      const [form, setForm] = useState({
        name: '', price: '', stock: '', category: '', description: '', image_url: '', options: null,
      });
      const [editingId, setEditingId] = useState(null);
      const [uploading, setUploading] = useState(false);
      const [drag, setDrag] = useState(false);
      const [busy, setBusy] = useState(false);
      const fileInputRef = useRef(null);

      const reset = () => {
        setForm({ name:'', price:'', stock:'', category:'', description:'', image_url:'', options: null });
        setEditingId(null);
      };

      const startEdit = (p) => {
        setEditingId(p.id);
        setForm({
          name: p.name || '',
          price: String(p.price || ''),
          stock: p.stock == null ? '' : String(p.stock),
          category: p.category || '',
          description: p.description || '',
          image_url: p.image_url || '',
          options: p.options || null,
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleFile = async (file) => {
        if (!file) return;
        if (!file.type.startsWith('image/')) { toast('이미지 파일만 가능'); return; }
        if (file.size > 8 * 1024 * 1024) { toast('8MB 이하만 가능'); return; }
        setUploading(true);
        try {
          const url = await uploadImageToImageKit(file);
          setForm(f => ({ ...f, image_url: url }));
          toast('Uploaded');
        } catch (e) {
          console.error(e); toast('Upload failed');
        } finally { setUploading(false); }
      };

      const onDrop = (e) => {
        e.preventDefault(); setDrag(false);
        const f = e.dataTransfer?.files?.[0]; if (f) handleFile(f);
      };

      const submit = async (e) => {
        e.preventDefault();
        const price = parseInt(form.price, 10);
        if (!form.name.trim() || !Number.isFinite(price) || price < 0) {
          toast('이름·가격 확인'); return;
        }
        // options 정합성 — name 비어있거나 choices 가 0 인 옵션은 자동 제거
        let cleanOptions = null;
        if (Array.isArray(form.options) && form.options.length) {
          cleanOptions = form.options
            .map(o => ({
              name: (o.name || '').trim(),
              choices: (o.choices || [])
                .filter(c => (c.label || '').trim())
                .map(c => ({ label: c.label.trim(), delta: parseInt(c.delta || 0, 10) || 0 })),
            }))
            .filter(o => o.name && o.choices.length);
          if (!cleanOptions.length) cleanOptions = null;
        }

        const payload = {
          name: form.name.trim(),
          price,
          stock: form.stock ? parseInt(form.stock, 10) : null,
          category: form.category.trim() || null,
          description: form.description.trim() || null,
          image_url: form.image_url || null,
          options: cleanOptions,
        };
        setBusy(true);
        try {
          if (editingId) {
            await Data.adminUpdateProduct(editingId, payload);
            toast('Updated');
          } else {
            await Data.adminCreateProduct(payload);
            toast('Created');
          }
          reset();
          await refresh();
        } catch (err) {
          console.error(err); toast('Failed: ' + (err.message || 'unknown'));
        } finally { setBusy(false); }
      };

      const remove = async (p) => {
        if (!confirm(`"${p.name}" 삭제할까요?`)) return;
        try {
          await Data.adminDeleteProduct(p.id);
          toast('Deleted');
          await refresh();
          if (editingId === p.id) reset();
        } catch (err) {
          toast('Failed: ' + (err.message || 'unknown'));
        }
      };

      if (!user) {
        return (
          <main className="max-w-[720px] mx-auto px-6 py-20 text-center">
            <h2 className="display text-3xl mb-3">로그인이 필요합니다</h2>
            <p className="text-sm text-sub">관리자 페이지는 로그인 후 접근할 수 있어요.</p>
          </main>
        );
      }
      if (!isAdminUser(user)) {
        return (
          <main className="max-w-[720px] mx-auto px-6 py-20 text-center">
            <h2 className="display text-3xl mb-3">권한이 없습니다</h2>
            <p className="text-sm text-sub">관리자 화이트리스트 이메일만 접근할 수 있습니다.</p>
            <p className="text-xs text-sub mt-2 num-mono">로그인 계정: {user.email}</p>
          </main>
        );
      }

      return (
        <main className="max-w-[1100px] mx-auto px-6 sm:px-10 pt-10 pb-24">
          <div className="flex items-baseline justify-between mb-8">
            <h1 className="display text-3xl">관리자 · 상품</h1>
            <span className="uppercase-label">{products.length} items</span>
          </div>

          {/* 등록/수정 폼 */}
          <form onSubmit={submit} className="grid grid-cols-1 md:grid-cols-[260px_1fr] gap-8 border border-line p-6 mb-12">
            <div>
              <label className="uppercase-label block mb-2">Image</label>
              <div
                className={'uploader ' + (drag ? 'drag' : '')}
                onClick={() => fileInputRef.current?.click()}
                onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
                onDragLeave={() => setDrag(false)}
                onDrop={onDrop}
              >
                {form.image_url
                  ? <img src={form.image_url} alt="preview" />
                  : <div className="ph">{uploading ? 'Uploading…' : 'Drop / Click'}</div>}
              </div>
              <input ref={fileInputRef} type="file" accept="image/*" hidden
                onChange={(e) => handleFile(e.target.files?.[0])} />
              {form.image_url && (
                <button type="button" className="btn btn-quiet text-[11px] mt-2"
                  onClick={() => setForm(f => ({ ...f, image_url: '' }))}>
                  이미지 지우기
                </button>
              )}
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-5">
              <div className="sm:col-span-2">
                <label className="uppercase-label block mb-1.5">Name</label>
                <input className="in" value={form.name}
                  onChange={(e) => setForm(f => ({ ...f, name: e.target.value }))}
                  placeholder="에티오피아 예가체프…" required />
              </div>
              <div>
                <label className="uppercase-label block mb-1.5">Price (₩)</label>
                <input className="in num-mono" type="number" min="0" value={form.price}
                  onChange={(e) => setForm(f => ({ ...f, price: e.target.value }))}
                  placeholder="18000" required />
              </div>
              <div>
                <label className="uppercase-label block mb-1.5">Stock (선택)</label>
                <input className="in num-mono" type="number" min="0" value={form.stock}
                  onChange={(e) => setForm(f => ({ ...f, stock: e.target.value }))}
                  placeholder="비워두면 무제한" />
              </div>
              <div className="sm:col-span-2">
                <label className="uppercase-label block mb-1.5">Category (선택)</label>
                <input className="in" value={form.category}
                  onChange={(e) => setForm(f => ({ ...f, category: e.target.value }))}
                  placeholder="원두 / 도구 / 머그…" />
              </div>
              <div className="sm:col-span-2">
                <label className="uppercase-label block mb-1.5">Description</label>
                <textarea className="in-box" rows="3" value={form.description}
                  onChange={(e) => setForm(f => ({ ...f, description: e.target.value }))}
                  placeholder="상품 설명을 입력하세요." />
              </div>

              <div className="sm:col-span-2 pt-2">
                <label className="uppercase-label block mb-2">Options (가격 차등 가능)</label>
                <OptionsEditor
                  value={form.options}
                  onChange={(v) => setForm(f => ({ ...f, options: v }))}
                />
              </div>

              <div className="sm:col-span-2 flex gap-3 pt-2">
                <button className="btn" disabled={busy || uploading}>
                  {busy ? '저장 중…' : (editingId ? 'Update' : 'Create')}
                </button>
                {editingId && (
                  <button type="button" className="btn btn-line" onClick={reset}>
                    Cancel
                  </button>
                )}
                <span className="text-[11px] text-sub self-center ml-auto">
                  이미지는 ImageKit 에 업로드되고 URL 만 DB 에 저장됩니다.
                </span>
              </div>
            </div>
          </form>

          {/* 상품 목록 */}
          <div className="border border-line">
            <div className="a-row head">
              <span></span>
              <span>Name</span>
              <span>Price</span>
              <span>Stock</span>
              <span>Category</span>
              <span>Actions</span>
            </div>
            {products.map(p => {
              const optCount = Array.isArray(p.options) ? p.options.length : 0;
              return (
                <div className="a-row" key={p.id}>
                  <div className="thumb">
                    {p.image_url
                      ? <img src={p.image_url} alt={p.name} />
                      : null}
                  </div>
                  <div className="truncate">
                    {p.name}
                    {optCount > 0 && (
                      <span className="ml-2 text-[10px] text-sub uppercase tracking-wider">opt × {optCount}</span>
                    )}
                  </div>
                  <div className="num-mono">₩ {fmt(p.price)}</div>
                  <div className="num-mono text-sub">{p.stock == null ? '∞' : p.stock}</div>
                  <div className="text-sub">{p.category || '—'}</div>
                  <div className="flex gap-2">
                    <button className="btn btn-line btn-sm" onClick={() => startEdit(p)}>EDIT</button>
                    <button className="btn btn-danger btn-sm" onClick={() => remove(p)}>DEL</button>
                  </div>
                </div>
              );
            })}
            {products.length === 0 && (
              <div className="p-10 text-center text-sm text-sub">상품이 없습니다.</div>
            )}
          </div>
        </main>
      );
    }

    // ───────── Page: Checkout (Toss 위젯) ─────────
    function CheckoutPage({ user, cart, productsMap, refresh }) {
      const toast = useToast();
      const [creating, setCreating] = useState(false);
      const [order, setOrder] = useState(null);   // pending order
      const [widgetsObj, setWidgetsObj] = useState(null);
      const [renderingPM, setRenderingPM] = useState(false);
      const [requesting, setRequesting] = useState(false);
      const widgetsContainerRef = useRef({ method: null, agreement: null });
      const renderedRef = useRef(false);

      const items = cart.filter(it => productsMap[it.product_id]);
      const total = useMemo(() => items.reduce((s, it) => {
        const p = productsMap[it.product_id];
        return p ? s + computeOptionPrice(p, it.selected_options) * it.quantity : s;
      }, 0), [items, productsMap]);

      // 1) pending order 생성 (한번만)
      useEffect(() => {
        if (!user || items.length === 0 || order) return;
        setCreating(true);
        Data.createPendingOrder(user.id, items, productsMap)
          .then(o => {
            setOrder(o);
            // 결제 성공 시 정확한 cart 라인만 삭제하기 위해 sessionStorage 보관
            try {
              sessionStorage.setItem(
                'shop_order_cart_ids:' + o.order_no,
                JSON.stringify(o.sourceCartIds || [])
              );
            } catch {}
          })
          .catch(err => { console.error(err); toast('주문 생성 실패: ' + err.message); })
          .finally(() => setCreating(false));
        // user / cart 변동 시 1회 시도. items 가 매 렌더 새 배열이라 deps 최소화.
      }, [user?.id, cart.length]);

      // 2) Toss 위젯 마운트
      useEffect(() => {
        if (!order || !TOSS_CLIENT_KEY || renderedRef.current) return;
        if (typeof window.TossPayments !== 'function') {
          toast('토스 SDK 로드 실패'); return;
        }
        renderedRef.current = true;
        setRenderingPM(true);
        (async () => {
          try {
            const tossPayments = window.TossPayments(TOSS_CLIENT_KEY);
            const widgets = tossPayments.widgets({ customerKey: user.id });
            await widgets.setAmount({ currency: 'KRW', value: order.total });
            await Promise.all([
              widgets.renderPaymentMethods({ selector: '#pm-widget', variantKey: 'DEFAULT' }),
              widgets.renderAgreement({ selector: '#agree-widget', variantKey: 'AGREEMENT' }),
            ]);
            setWidgetsObj(widgets);
          } catch (e) {
            console.error(e); toast('위젯 렌더 실패: ' + e.message);
          } finally { setRenderingPM(false); }
        })();
      }, [order]);

      const requestPayment = async () => {
        if (!widgetsObj || !order) return;
        setRequesting(true);
        try {
          await widgetsObj.requestPayment({
            orderId: order.order_no,
            orderName: items.length === 1
              ? productsMap[items[0].product_id].name
              : `${productsMap[items[0].product_id].name} 외 ${items.length - 1}건`,
            successUrl: window.location.origin + '/checkout/success',
            failUrl: window.location.origin + '/checkout/fail',
            customerEmail: user.email,
            customerName: nameOf(user.email),
          });
          // requestPayment 는 redirect — 여기 도달 X
        } catch (e) {
          console.error(e); toast('결제 요청 실패: ' + e.message);
          setRequesting(false);
        }
      };

      if (!user) {
        return (
          <main className="max-w-[720px] mx-auto px-6 py-20 text-center">
            <h2 className="display text-3xl mb-3">로그인이 필요합니다</h2>
            <button className="btn mt-6" onClick={() => navigate('/')}>홈으로</button>
          </main>
        );
      }
      if (items.length === 0) {
        return (
          <main className="max-w-[720px] mx-auto px-6 py-20 text-center">
            <h2 className="display text-3xl mb-3">장바구니가 비어 있습니다</h2>
            <button className="btn mt-6" onClick={() => navigate('/')}>쇼핑하러 가기</button>
          </main>
        );
      }

      return (
        <main className="max-w-[1100px] mx-auto px-6 sm:px-10 pt-10 pb-24 grid grid-cols-1 lg:grid-cols-[1fr_360px] gap-10">
          <div>
            <h1 className="display text-3xl mb-8">결제</h1>

            <section className="mb-8">
              <h2 className="uppercase-label mb-4">Order summary</h2>
              <ul className="space-y-3 border-y border-line py-4">
                {items.map(it => {
                  const p = productsMap[it.product_id];
                  const unit = computeOptionPrice(p, it.selected_options);
                  const optsLine = formatOptions(it.selected_options);
                  return (
                    <li key={it.id} className="flex items-center gap-4 text-sm">
                      <div className="w-14 h-14 bg-soft overflow-hidden shrink-0">
                        {p.image_url && <img src={p.image_url} alt="" className="w-full h-full object-cover" />}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="truncate">{p.name}</div>
                        {optsLine && <div className="text-[11px] text-sub truncate">{optsLine}</div>}
                      </div>
                      <span className="num-mono text-sub">× {it.quantity}</span>
                      <span className="num-mono w-24 text-right">₩ {fmt(unit * it.quantity)}</span>
                    </li>
                  );
                })}
              </ul>
            </section>

            {creating && <div className="text-sm text-sub py-4">주문 생성 중…</div>}

            {order && (
              <>
                <section className="mb-6">
                  <h2 className="uppercase-label mb-4">결제 수단</h2>
                  <div id="pm-widget" />
                  {renderingPM && <div className="text-sm text-sub py-4">위젯 로딩…</div>}
                </section>
                <section className="mb-8">
                  <div id="agree-widget" />
                </section>
              </>
            )}
          </div>

          <aside className="lg:sticky lg:top-[88px] lg:self-start">
            <div className="border border-line p-6">
              <div className="flex items-baseline justify-between mb-1">
                <span className="uppercase-label">Total</span>
                <span className="num-mono text-2xl">₩ {fmt(total)}</span>
              </div>
              {order && (
                <div className="text-[11px] text-sub num-mono mt-1 break-all">order: {order.order_no}</div>
              )}
              <button className="btn btn-w mt-6" onClick={requestPayment}
                disabled={!widgetsObj || requesting}>
                {requesting ? '결제 진행 중…' : 'Pay with Toss'}
              </button>
              <button className="btn btn-line btn-w mt-2" onClick={() => navigate('/')}>
                Continue shopping
              </button>
              <p className="text-[11px] text-sub mt-4 leading-relaxed">
                테스트 키로 운영 중입니다. 실제 결제는 발생하지 않습니다.<br/>
                테스트 카드: 4330-1234-1234-1234 (모든 CVC/만료 OK)
              </p>
            </div>
          </aside>
        </main>
      );
    }

    // ───────── Page: Checkout Success ─────────
    function CheckoutSuccessPage({ user, refresh }) {
      const toast = useToast();
      const [state, setState] = useState({ phase: 'confirming', error: null, info: null });

      useEffect(() => {
        const sp = new URLSearchParams(window.location.search);
        const paymentKey = sp.get('paymentKey');
        const orderId = sp.get('orderId');
        const amount = sp.get('amount');

        if (!paymentKey || !orderId || !amount) {
          setState({ phase: 'error', error: '결제 정보가 없습니다.' });
          return;
        }
        if (!user) {
          setState({ phase: 'error', error: '로그인 세션이 만료되었습니다. 다시 로그인해 주세요.' });
          return;
        }

        (async () => {
          try {
            const { data: sess } = await sb.auth.getSession();
            const accessToken = sess?.session?.access_token;
            if (!accessToken) throw new Error('access_token 없음 — 다시 로그인해 주세요.');

            const res = await fetch('/api/toss-confirm', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ paymentKey, orderId, amount, accessToken }),
            });
            const j = await res.json();
            if (!res.ok) {
              setState({ phase: 'error', error: j.message || j.detail || j.error });
              return;
            }
            // 결제 성공 → 정확히 주문에 들어간 cart 라인만 제거
            try {
              const raw = sessionStorage.getItem('shop_order_cart_ids:' + orderId);
              const cartIds = raw ? JSON.parse(raw) : [];
              if (cartIds.length) await Data.clearCartByIds(cartIds);
              sessionStorage.removeItem('shop_order_cart_ids:' + orderId);
            } catch (e) { console.warn('cart clear failed', e); }

            await refresh();
            setState({ phase: 'ok', info: { orderId, paymentKey, method: j.method, amount } });
            toast('결제 완료');
          } catch (e) {
            setState({ phase: 'error', error: e.message });
          }
        })();
      }, [user?.id]);

      return (
        <main className="max-w-[640px] mx-auto px-6 py-20 text-center">
          {state.phase === 'confirming' && (
            <>
              <h1 className="display text-3xl mb-3">결제 승인 중…</h1>
              <p className="text-sm text-sub">잠시만 기다려 주세요.</p>
            </>
          )}
          {state.phase === 'ok' && (
            <>
              <div className="display text-5xl mb-3">✓</div>
              <h1 className="display text-3xl mb-3">결제가 완료되었습니다</h1>
              <p className="text-sm text-sub">주문 번호와 결제 영수증은 마이페이지에서 확인하실 수 있어요.</p>
              <div className="mt-8 inline-block text-left bg-soft p-5 num-mono text-xs">
                <div>order: {state.info.orderId}</div>
                <div>amount: ₩ {fmt(state.info.amount)}</div>
                {state.info.method && <div>method: {state.info.method}</div>}
              </div>
              <div className="mt-8 flex gap-2 justify-center">
                <button className="btn" onClick={() => navigate('/mypage')}>주문 내역 보기</button>
                <button className="btn btn-line" onClick={() => navigate('/')}>홈으로</button>
              </div>
            </>
          )}
          {state.phase === 'error' && (
            <>
              <div className="display text-5xl mb-3" style={{ color: '#c0392b' }}>✗</div>
              <h1 className="display text-3xl mb-3">결제 실패</h1>
              <p className="text-sm text-sub">{state.error || '알 수 없는 오류'}</p>
              <div className="mt-8 flex gap-2 justify-center">
                <button className="btn" onClick={() => navigate('/checkout')}>다시 시도</button>
                <button className="btn btn-line" onClick={() => navigate('/')}>홈으로</button>
              </div>
            </>
          )}
        </main>
      );
    }

    // ───────── Page: Checkout Fail ─────────
    function CheckoutFailPage() {
      const sp = new URLSearchParams(window.location.search);
      const code = sp.get('code');
      const message = sp.get('message');
      return (
        <main className="max-w-[640px] mx-auto px-6 py-20 text-center">
          <div className="display text-5xl mb-3" style={{ color: '#c0392b' }}>✗</div>
          <h1 className="display text-3xl mb-3">결제가 취소되었거나 실패했습니다</h1>
          {message && <p className="text-sm text-sub">{message}</p>}
          {code && <p className="text-[11px] text-sub mt-2 num-mono">code: {code}</p>}
          <div className="mt-8 flex gap-2 justify-center">
            <button className="btn" onClick={() => navigate('/checkout')}>다시 시도</button>
            <button className="btn btn-line" onClick={() => navigate('/')}>홈으로</button>
          </div>
        </main>
      );
    }

    // ───────── Page: My Page (주문 내역) ─────────
    function MyPage({ user }) {
      const [orders, setOrders] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        if (!user) return;
        Data.listMyOrders(user.id)
          .then(setOrders)
          .catch(e => setError(e.message));
      }, [user?.id]);

      if (!user) {
        return (
          <main className="max-w-[720px] mx-auto px-6 py-20 text-center">
            <h2 className="display text-3xl mb-3">로그인이 필요합니다</h2>
            <button className="btn mt-6" onClick={() => navigate('/')}>홈으로</button>
          </main>
        );
      }

      return (
        <main className="max-w-[860px] mx-auto px-6 sm:px-10 pt-10 pb-24">
          <div className="flex items-baseline justify-between mb-8">
            <h1 className="display text-3xl">My orders</h1>
            <span className="uppercase-label">{user.email}</span>
          </div>

          {error && <div className="text-sm text-red-600 py-4">⚠ {error}</div>}
          {orders === null && <div className="text-sm text-sub py-4">Loading…</div>}
          {orders && orders.length === 0 && (
            <div className="py-20 text-center">
              <div className="display text-2xl">아직 주문이 없습니다</div>
              <button className="btn mt-6" onClick={() => navigate('/')}>쇼핑하러 가기</button>
            </div>
          )}

          <div className="space-y-5">
            {(orders || []).map(o => (
              <div key={o.id} className="order-card">
                <div className="flex items-baseline justify-between flex-wrap gap-2 mb-3">
                  <div>
                    <span className={'status-badge status-' + o.status}>{o.status}</span>
                    <span className="ml-3 text-[12px] text-sub">{fmtDate(o.paid_at || o.created_at)}</span>
                  </div>
                  <span className="num-mono text-lg">₩ {fmt(o.total_price)}</span>
                </div>
                <div className="text-[11px] text-sub num-mono break-all mb-3">{o.order_no}</div>
                <ul className="space-y-1.5 text-sm">
                  {(o.order_items || []).map(it => {
                    const optsLine = formatOptions(it.selected_options);
                    return (
                      <li key={it.id} className="flex justify-between gap-3">
                        <div className="min-w-0">
                          <div className="truncate">{it.product_name} <span className="text-sub">× {it.quantity}</span></div>
                          {optsLine && <div className="text-[11px] text-sub truncate">{optsLine}</div>}
                        </div>
                        <span className="num-mono text-sub whitespace-nowrap">₩ {fmt(it.unit_price * it.quantity)}</span>
                      </li>
                    );
                  })}
                </ul>
              </div>
            ))}
          </div>
        </main>
      );
    }

    // ───────── App Shell ─────────
    function App() {
      const [session, setSession] = useState(undefined);
      const [products, setProducts] = useState([]);
      const [cart, setCart] = useState([]);
      const [authOpen, setAuthOpen] = useState(false);
      const [cartOpen, setCartOpen] = useState(false);
      const [loading, setLoading] = useState(true);
      const [dataMode, setDataMode] = useState('unknown');
      const toast = useToast();
      const route = useRoute();

      const user = session?.user || null;
      const admin = isAdminUser(user);

      useEffect(() => {
        if (window.location.hash === '#logout') {
          try { sb && sb.auth.signOut({ scope: 'local' }); } catch (_) {}
          Object.keys(localStorage).forEach((k) => {
            if (k.startsWith('sb-') || k.includes('supabase')) localStorage.removeItem(k);
          });
          history.replaceState(null, '', window.location.pathname);
          window.location.reload();
          return;
        }
        if (!sb) { setSession(null); return; }
        sb.auth.getSession().then(({ data }) => setSession(data.session || null));
        const { data: sub } = sb.auth.onAuthStateChange(async (evt, s) => {
          setSession(s || null);
          if (evt === 'PASSWORD_RECOVERY') {
            const np = window.prompt('새 비밀번호를 입력해 주세요 (6자 이상)');
            if (np && np.length >= 6) {
              const { error } = await sb.auth.updateUser({ password: np });
              if (error) alert('재설정 실패: ' + error.message);
              else {
                alert('비밀번호가 재설정됐어요. 자동으로 로그인됩니다.');
                history.replaceState(null, '', window.location.pathname);
              }
            }
          }
        });
        return () => sub.subscription.unsubscribe();
      }, []);

      const loadProducts = useCallback(async () => {
        try {
          const list = await Data.listProducts();
          setProducts(list);
          setDataMode(Data.mode);
        } catch (e) { console.error(e); }
        finally { setLoading(false); }
      }, []);

      const loadCart = useCallback(async () => {
        if (!user) { setCart([]); return; }
        try {
          const list = await Data.listCart(user.id);
          setCart(list);
          setDataMode(Data.mode);
        } catch (e) { console.error(e); }
      }, [user]);

      useEffect(() => { loadProducts(); }, [loadProducts]);
      useEffect(() => { loadCart(); }, [loadCart]);

      // 옵션 없는 상품의 카드 hover Quick add 전용
      const quickAdd = async (product) => {
        try {
          await Data.addToCart(user.id, product.id, null, 1);
          await loadCart();
          setDataMode(Data.mode);
          toast('Added to bag');
        } catch (e) { toast('Failed: ' + e.message); }
      };

      const productsMap = useMemo(() => {
        const m = {}; for (const p of products) m[p.id] = p; return m;
      }, [products]);
      const cartCount = useMemo(() => cart.reduce((s, it) => s + it.quantity, 0), [cart]);

      const logout = async () => {
        await sb.auth.signOut();
        setCart([]); toast('Signed out');
        if (route.path !== '/') navigate('/');
      };

      if (!sb) {
        return (
          <div className="max-w-xl mx-auto p-10">
            <h1 className="display text-3xl">환경 설정이 필요해요</h1>
            <p className="text-sub text-sm mt-3">
              <code>.env</code> 에 <code>SUPABASE_URL</code> 과 <code>SUPABASE_ANON_KEY</code> 를 입력 후 서버를 재시작 해주세요.
            </p>
          </div>
        );
      }

      // 라우팅
      let page;
      const productMatch = route.path.match(/^\/products\/(.+)$/);
      if (productMatch) {
        page = <ProductDetailPage
          productId={productMatch[1]}
          user={user}
          products={products}
          refreshCart={loadCart}
          openCart={() => setCartOpen(true)}
          onAuthRequired={() => { setAuthOpen(true); toast('Please sign in'); }}
        />;
      } else {
        switch (route.path) {
          case '/admin':
            page = <AdminPage user={user} products={products} refresh={loadProducts} />;
            break;
          case '/checkout':
            page = <CheckoutPage user={user} cart={cart} productsMap={productsMap} refresh={loadCart} />;
            break;
          case '/checkout/success':
            page = <CheckoutSuccessPage user={user} refresh={loadCart} />;
            break;
          case '/checkout/fail':
            page = <CheckoutFailPage />;
            break;
          case '/mypage':
            page = <MyPage user={user} />;
            break;
          default:
            page = <HomePage user={user} products={products} loading={loading}
              onQuickAdd={quickAdd}
              onAuthRequired={() => { setAuthOpen(true); toast('Please sign in'); }} />;
        }
      }

      return (
        <div className="min-h-screen flex flex-col">
          <header className="border-b border-line bg-white sticky top-0 z-40">
            <div className="max-w-[1280px] mx-auto px-6 sm:px-10 h-[68px] flex items-center justify-between gap-6 relative">
              <a href="/" className="text-[19px]" aria-label="홈"
                 onClick={(e) => { e.preventDefault(); navigate('/'); }}>
                <Logo size={24} />
              </a>
              <nav className="hidden md:flex items-center gap-8 absolute left-1/2 -translate-x-1/2">
                <NavLink to="/">SHOP</NavLink>
                {user && <NavLink to="/mypage">MY ORDERS</NavLink>}
                {admin && <NavLink to="/admin">ADMIN</NavLink>}
              </nav>
              <div className="flex items-center gap-5 text-[12.5px]">
                {user ? (
                  <button onClick={logout} className="nav-link">LOGOUT</button>
                ) : (
                  <button onClick={() => setAuthOpen(true)} className="nav-link">LOGIN</button>
                )}
                <button
                  onClick={() => user ? setCartOpen(true) : setAuthOpen(true)}
                  className="nav-link"
                  aria-label="장바구니"
                >
                  CART ({cartCount})
                </button>
              </div>
            </div>
          </header>

          {dataMode === 'local' && (
            <div className="bg-soft border-b border-line">
              <div className="max-w-[1280px] mx-auto px-6 sm:px-10 py-2 text-[11.5px] text-sub flex items-center justify-between gap-3 flex-wrap">
                <span>Temp local mode — Supabase API가 깨어나는 중. 회복되면 자동 전환됩니다.</span>
                <button onClick={() => location.reload()} className="nav-link">RETRY</button>
              </div>
            </div>
          )}

          {page}

          <footer className="border-t border-line">
            <div className="max-w-[1280px] mx-auto px-6 sm:px-10 py-8 flex items-center justify-between flex-wrap gap-3 text-[11.5px] text-sub">
              <span className="inline-flex items-center gap-2 text-[13px] text-ink">
                <Logo size={18} />
              </span>
              <span className="num-mono">© 2026 · Coffee &amp; Brewers</span>
            </div>
          </footer>

          <AuthDrawer open={authOpen} onClose={() => setAuthOpen(false)} />
          <CartDrawer
            open={cartOpen}
            onClose={() => setCartOpen(false)}
            productsMap={productsMap}
            items={cart}
            onChange={loadCart}
          />
        </div>
      );
    }

    function Root() {
      return (
        <ToastProvider>
          <App />
        </ToastProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
