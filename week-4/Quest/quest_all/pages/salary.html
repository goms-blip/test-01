<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>너 얼마 벌고 얼마나 써? — QUEST</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/assets/css/common.css" />
  <style>
    .layout { display: grid; grid-template-columns: 380px 1fr; gap: 48px; align-items: flex-start; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; gap: 32px; } }
    .panel { border: 1px solid var(--line); padding: 24px; background: #fff; }
    .panel h3 { font-size: 14px; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 16px; color: var(--ink-muted); }

    .stat-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 0;
      border: 1px solid var(--line);
      background: #fff;
    }
    .stat-grid .item { padding: 24px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
    .stat-grid .item:nth-child(2n) { border-right: none; }
    .stat-grid .item:nth-last-child(-n+2) { border-bottom: none; }
    .stat-grid .label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 8px; }
    .stat-grid .num { font-size: 24px; font-weight: 800; letter-spacing: -0.01em; }
    @media (max-width: 480px) { .stat-grid { grid-template-columns: 1fr; } .stat-grid .item { border-right: none; } .stat-grid .item:nth-last-child(2) { border-bottom: 1px solid var(--line); } }

    .my-pos {
      border: 1px solid var(--ink); padding: 24px; background: var(--ink); color: #fff;
      margin-bottom: 24px;
    }
    .my-pos .label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; opacity: .7; margin-bottom: 8px; }
    .my-pos .num { font-size: 32px; font-weight: 800; line-height: 1.2; }
    .my-pos p { margin-top: 8px; opacity: .8; font-size: 13px; }

    .bar-row { margin-bottom: 16px; }
    .bar-row .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; font-size: 13px; }
    .bar-row .head .name { font-weight: 600; }
    .bar-row .head .val { color: var(--ink-muted); }
    .bar-track { height: 8px; background: var(--bg-soft); position: relative; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--ink); transition: width .6s ease; }

    .table {
      width: 100%; border-collapse: collapse; font-size: 14px;
    }
    .table th, .table td { padding: 12px 8px; text-align: left; border-bottom: 1px solid var(--line); }
    .table th { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-muted); }
    .table td.num { text-align: right; font-variant-numeric: tabular-nums; }

    .section-title { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); margin: 24px 0 12px; }

    details summary { cursor: pointer; padding: 12px 0; border-top: 1px solid var(--line); font-weight: 600; font-size: 14px; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    details summary::after { content: '＋'; float: right; }
    details[open] summary::after { content: '−'; }
  </style>
</head>
<body>
  <div data-quest-header></div>

  <section class="page-head">
    <div class="container">
      <div class="crumb">Stats · 03</div>
      <h1>너 얼마 벌고 얼마나 써?</h1>
      <p>익명으로 월급과 지출을 입력하고 직군·연차별 평균과 본인의 백분위를 확인해보세요. 입력값은 개인 식별 없이 통계용으로만 사용됩니다.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="layout">
        <!-- INPUT -->
        <aside>
          <div class="panel">
            <h3>내 데이터 입력</h3>
            <form id="form">
              <div class="form-group">
                <label class="label" for="income">월급 (원)</label>
                <input id="income" class="input" type="number" min="0" placeholder="3000000" required />
              </div>
              <div class="form-group">
                <label class="label" for="expenses">월 총 지출 (원)</label>
                <input id="expenses" class="input" type="number" min="0" placeholder="2000000" required />
              </div>
              <div class="form-group">
                <label class="label">직군</label>
                <div class="chips" id="jobChips"></div>
              </div>
              <div class="form-group">
                <label class="label" for="years">연차</label>
                <input id="years" class="input" type="number" min="0" max="60" placeholder="3" required />
              </div>

              <details>
                <summary>카테고리별 지출 (선택)</summary>
                <div id="catExp" style="margin-top: 12px;"></div>
              </details>

              <button type="submit" class="btn btn-block" id="saveBtn" style="margin-top: 16px;">저장하고 비교하기</button>
            </form>
          </div>

          <div class="panel" style="margin-top: 24px;">
            <h3>필터</h3>
            <div class="form-group">
              <label class="label">직군</label>
              <select id="filterJob" class="select">
                <option value="">전체</option>
              </select>
            </div>
            <div class="form-group">
              <label class="label" for="filterExp">연차</label>
              <input id="filterExp" class="input" type="number" min="0" max="60" placeholder="비워두면 전체" />
            </div>
            <button id="applyFilter" class="btn btn-outline btn-block">필터 적용</button>
          </div>
        </aside>

        <!-- RESULT -->
        <div>
          <div id="myPos"></div>

          <div class="stat-grid" id="overall"></div>

          <div class="section-title">직군별 평균</div>
          <div style="border: 1px solid var(--line); background: #fff; padding: 20px;">
            <table class="table" id="byJobTable">
              <thead><tr><th>직군</th><th>n</th><th class="num">평균 월급</th><th class="num">평균 지출</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>

          <div class="section-title">카테고리별 평균 지출</div>
          <div style="border: 1px solid var(--line); background: #fff; padding: 20px;" id="byCat"></div>

          <div class="section-title">연차별 평균</div>
          <div style="border: 1px solid var(--line); background: #fff; padding: 20px;">
            <table class="table" id="byExpTable">
              <thead><tr><th>연차</th><th>n</th><th class="num">평균 월급</th><th class="num">평균 지출</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div data-quest-footer></div>

  <script src="/assets/js/common.js"></script>
  <script>
    Quest.mount('salary');

    const state = { meta: null, selectedJob: '', filterJob: '', filterExp: null, lastIncome: null, lastExpenses: null };

    const $form = document.getElementById('form');
    const $income = document.getElementById('income');
    const $expenses = document.getElementById('expenses');
    const $years = document.getElementById('years');
    const $jobChips = document.getElementById('jobChips');
    const $catExp = document.getElementById('catExp');
    const $saveBtn = document.getElementById('saveBtn');
    const $filterJob = document.getElementById('filterJob');
    const $filterExp = document.getElementById('filterExp');
    const $applyFilter = document.getElementById('applyFilter');
    const $myPos = document.getElementById('myPos');
    const $overall = document.getElementById('overall');
    const $byJobBody = document.querySelector('#byJobTable tbody');
    const $byExpBody = document.querySelector('#byExpTable tbody');
    const $byCat = document.getElementById('byCat');

    async function loadMeta() {
      const meta = await Quest.api('/api/salary/meta');
      state.meta = meta;
      $jobChips.innerHTML = meta.job_categories.map(j =>
        `<button type="button" class="chip" data-job="${Quest.escapeHtml(j)}">${Quest.escapeHtml(j)}</button>`
      ).join('');
      $jobChips.querySelectorAll('.chip').forEach(b => {
        b.onclick = () => {
          state.selectedJob = b.dataset.job;
          $jobChips.querySelectorAll('.chip').forEach(x => x.classList.toggle('active', x === b));
        };
      });
      $filterJob.innerHTML = '<option value="">전체</option>' +
        meta.job_categories.map(j => `<option value="${Quest.escapeHtml(j)}">${Quest.escapeHtml(j)}</option>`).join('');
      $catExp.innerHTML = meta.expense_keys.map(k => `
        <div class="form-group">
          <label class="label" for="exp_${k}">${meta.expense_labels[k]}</label>
          <input id="exp_${k}" class="input" type="number" min="0" placeholder="0" />
        </div>
      `).join('');
    }

    async function loadStats() {
      const params = new URLSearchParams();
      if (state.filterJob) params.set('job', state.filterJob);
      if (state.filterExp !== null && state.filterExp !== '') params.set('experience', state.filterExp);
      if (state.lastIncome !== null) params.set('income', state.lastIncome);
      if (state.lastExpenses !== null) params.set('expenses', state.lastExpenses);
      try {
        const data = await Quest.api(`/api/salary/stats${params.toString() ? '?' + params : ''}`);
        renderStats(data);
      } catch (e) { Quest.toast(e.message, 'error'); }
    }

    function renderStats(d) {
      // My position
      if (d.mine && (d.mine.income_percentile_in_group !== null || d.mine.expenses_percentile_in_group !== null)) {
        $myPos.innerHTML = `
          <div class="my-pos">
            <div class="label">My Position</div>
            <div class="num">월급 상위 ${d.mine.income_percentile_in_group !== null ? (100 - d.mine.income_percentile_in_group).toFixed(1) : '-'}%</div>
            <p>월 지출 상위 ${d.mine.expenses_percentile_in_group !== null ? (100 - d.mine.expenses_percentile_in_group).toFixed(1) : '-'}% · 그룹 내 위치</p>
          </div>
        `;
      } else { $myPos.innerHTML = ''; }

      // Overall
      const o = d.overall || {};
      $overall.innerHTML = `
        <div class="item"><div class="label">표본 수</div><div class="num">${o.total ?? 0}명</div></div>
        <div class="item"><div class="label">평균 월급</div><div class="num">${Quest.fmtMoney(o.avg_income)}</div></div>
        <div class="item"><div class="label">중앙값 월급</div><div class="num">${Quest.fmtMoney(o.median_income)}</div></div>
        <div class="item"><div class="label">평균 지출</div><div class="num">${Quest.fmtMoney(o.avg_expenses)}</div></div>
      `;

      // By job
      if (!d.by_job?.length) {
        $byJobBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color: var(--ink-muted);">데이터가 없습니다</td></tr>';
      } else {
        $byJobBody.innerHTML = d.by_job.map(r => `
          <tr>
            <td>${Quest.escapeHtml(r.job_category)}</td>
            <td>${r.n}</td>
            <td class="num">${Quest.fmtMoney(r.avg_income)}</td>
            <td class="num">${Quest.fmtMoney(r.avg_expenses)}</td>
          </tr>
        `).join('');
      }

      // By exp
      if (!d.by_experience?.length) {
        $byExpBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color: var(--ink-muted);">데이터가 없습니다</td></tr>';
      } else {
        $byExpBody.innerHTML = d.by_experience.map(r => `
          <tr>
            <td>${r.experience_years}년차</td>
            <td>${r.n}</td>
            <td class="num">${Quest.fmtMoney(r.avg_income)}</td>
            <td class="num">${Quest.fmtMoney(r.avg_expenses)}</td>
          </tr>
        `).join('');
      }

      // Categories — bar chart
      const meta = state.meta;
      const cat = d.by_category || {};
      const max = Math.max(1, ...meta.expense_keys.map(k => Number(cat[k] || 0)));
      $byCat.innerHTML = meta.expense_keys.map(k => {
        const v = Number(cat[k] || 0);
        const pct = (v / max) * 100;
        return `
          <div class="bar-row">
            <div class="head"><span class="name">${meta.expense_labels[k]}</span><span class="val">${Quest.fmtMoney(v)}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          </div>
        `;
      }).join('');
    }

    $form.addEventListener('submit', async e => {
      e.preventDefault();
      const income = Number($income.value);
      const expenses = Number($expenses.value);
      const years = Number($years.value);
      if (!state.selectedJob) { Quest.toast('직군을 선택해주세요', 'error'); return; }

      const category_expenses = {};
      state.meta.expense_keys.forEach(k => {
        const v = document.getElementById('exp_' + k)?.value;
        if (v !== '' && v !== undefined && Number(v) >= 0) category_expenses[k] = Number(v);
      });

      $saveBtn.disabled = true; $saveBtn.textContent = '저장 중…';
      try {
        await Quest.api('/api/salary', { method: 'POST', body: {
          monthly_income: income, monthly_expenses: expenses,
          job_category: state.selectedJob, experience_years: years,
          category_expenses,
        }});
        Quest.toast('저장되었습니다');
        state.lastIncome = income;
        state.lastExpenses = expenses;
        await loadStats();
      } catch (e) { Quest.toast(e.message, 'error'); }
      finally { $saveBtn.disabled = false; $saveBtn.textContent = '저장하고 비교하기'; }
    });

    $applyFilter.addEventListener('click', () => {
      state.filterJob = $filterJob.value;
      state.filterExp = $filterExp.value === '' ? null : Number($filterExp.value);
      loadStats();
    });

    (async () => { await loadMeta(); await loadStats(); })();
  </script>
</body>
</html>
