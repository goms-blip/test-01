<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>무브 · MOVE — 익명 고민/칭찬 게시판</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Pretendard Variable"', 'Pretendard', 'Inter', 'system-ui', 'sans-serif'],
            display: ['"Pretendard Variable"', 'Pretendard', 'Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            page: '#fafaf7',
            ink: '#111111',
            sub: '#5b5b5b',
            line: '#e5e5e0',
            neon: '#d4ff00',
          },
        },
      },
    };
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body { background: #fafaf7; color: #111; }
    body {
      min-height: 100vh;
      font-family: 'Pretendard Variable', Pretendard, 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .display {
      font-family: 'Pretendard Variable', Pretendard, 'Inter', system-ui, sans-serif;
      font-weight: 800;
      letter-spacing: -0.035em;
    }
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from {opacity:0; transform: translateY(2px);} to {opacity:1; transform: translateY(0);} }

    /* Like pop animation */
    @keyframes likePop { 0%{transform:scale(1)} 40%{transform:scale(1.18)} 100%{transform:scale(1)} }
    .like-pop { animation: likePop 0.28s ease-out; }

    .hl-top    { border-top: 1px solid #e5e5e0; }
    .hl-bottom { border-bottom: 1px solid #e5e5e0; }

    .in {
      background: transparent;
      border: 1px solid #e5e5e0;
      padding: 10px 12px;
      font-size: 14px;
      color: #111;
      outline: none;
      transition: border-color .15s ease;
    }
    .in:focus { border-color: #111; }
    .in::placeholder { color: #b2b2ab; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 13px; letter-spacing: 0.04em; font-weight: 600;
      padding: 12px 20px; border: 1px solid #111; background: #111; color: #fafaf7;
      transition: background .15s ease, color .15s ease, transform .08s ease;
      cursor: pointer;
    }
    .btn:hover:not(:disabled) { background: #fafaf7; color: #111; }
    .btn:active:not(:disabled) { transform: translateY(1px); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-accent {
      background: #d4ff00; color: #111; border-color: #111;
    }
    .btn-accent:hover:not(:disabled) { background: #111; color: #d4ff00; }

    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; font-size: 12px; font-weight: 500;
      border: 1px solid #e5e5e0; background: transparent; color: #111;
      cursor: pointer; transition: all .15s ease;
    }
    .chip:hover { border-color: #111; }
    .chip[aria-pressed="true"] {
      background: #111; color: #fafaf7; border-color: #111;
    }

    /* Like button */
    .like {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px; border: 1px solid #e5e5e0; background: transparent;
      font-weight: 600; color: #111; cursor: pointer;
      transition: border-color .15s ease, background .15s ease;
    }
    .like:hover { border-color: #111; background: #fff; }
    .like.on {
      background: #d4ff00; border-color: #111; color: #111;
    }

    /* Category accent dot */
    .dot { width: 7px; height: 7px; border-radius: 9999px; display: inline-block; }

    .num-mono { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    const API = '/api';
    const CATEGORIES = ['고민', '칭찬', '응원', '기타'];
    const CATEGORY_META = {
      '고민': { color: '#6b7280', blurb: 'Confession' },
      '칭찬': { color: '#d4ff00', blurb: 'Compliment' },
      '응원': { color: '#22c55e', blurb: 'Cheer' },
      '기타': { color: '#a1a1aa', blurb: 'Etc' },
    };
    const SORTS = [
      { key: 'recent', label: '최신순' },
      { key: 'likes',  label: '공감순' },
    ];

    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok || body.success === false) {
        throw new Error(body.message || `요청 실패 (${res.status})`);
      }
      return body;
    }

    function pad(n, w = 2) { return String(n).padStart(w, '0'); }

    function timeAgo(iso) {
      const t = new Date(iso).getTime();
      const diff = Math.max(0, Date.now() - t);
      const m = Math.floor(diff / 60000);
      if (m < 1)  return '방금 전';
      if (m < 60) return `${m}분 전`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}시간 전`;
      const d = Math.floor(h / 24);
      if (d < 7)  return `${d}일 전`;
      const dt = new Date(iso);
      return `${dt.getFullYear()}.${pad(dt.getMonth()+1)}.${pad(dt.getDate())}`;
    }

    // LocalStorage — remember which posts the current browser has already liked
    const LIKED_KEY = 'mv_liked_posts';
    function getLikedSet() {
      try { return new Set(JSON.parse(localStorage.getItem(LIKED_KEY) || '[]')); }
      catch { return new Set(); }
    }
    function saveLikedSet(set) {
      try { localStorage.setItem(LIKED_KEY, JSON.stringify([...set])); } catch {}
    }

    function CategoryTag({ name }) {
      const meta = CATEGORY_META[name] || CATEGORY_META['기타'];
      return (
        <span className="inline-flex items-center gap-1.5 text-[11px] font-medium text-ink">
          <span className="dot" style={{ background: meta.color, outline: '1px solid #111' }}></span>
          {name}
        </span>
      );
    }

    // =================== Composer ===================

    function Composer({ onCreated }) {
      const [category, setCategory] = useState('');
      const [content, setContent] = useState('');
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState(null);
      const taRef = useRef(null);

      const submit = async () => {
        setError(null);
        const body = content.trim();
        if (!category) { setError('카테고리를 선택해주세요'); return; }
        if (!body)     { setError('내용을 입력해주세요'); return; }
        setSaving(true);
        try {
          const res = await api(`${API}/posts`, {
            method: 'POST',
            body: JSON.stringify({ category, content: body }),
          });
          onCreated(res.data);
          setContent('');
          setCategory('');
          taRef.current?.focus();
        } catch (e) { setError(e.message); }
        finally { setSaving(false); }
      };

      const len = content.length;
      const over = len > 2000;

      return (
        <section className="mb-12">
          <div className="flex items-end justify-between mb-4">
            <h2 className="text-2xl sm:text-3xl font-bold tracking-tight">
              오늘, 당신의 마음은 어떤가요
            </h2>
            <span className="text-xs text-sub hidden sm:inline">
              익명 · 로그인 불필요
            </span>
          </div>

          <div className="border border-line bg-white">
            <div className="px-5 pt-5">
              <div className="flex flex-wrap gap-2">
                {CATEGORIES.map(c => (
                  <button
                    key={c}
                    className="chip"
                    aria-pressed={category === c}
                    onClick={() => setCategory(category === c ? '' : c)}
                  >
                    <span className="dot" style={{ background: CATEGORY_META[c].color, outline: '1px solid currentColor' }}></span>
                    {c}
                  </button>
                ))}
              </div>
            </div>
            <textarea
              ref={taRef}
              value={content}
              onChange={(e) => setContent(e.target.value)}
              placeholder="누구에게도 못한 이야기, 고마움, 응원의 말… 무엇이든 괜찮아요."
              rows={5}
              className="w-full px-5 py-4 mt-3 bg-transparent resize-y focus:outline-none text-[15px] leading-relaxed placeholder:text-[#b2b2ab]"
              aria-label="내용"
            />
            <div className="px-5 py-3 hl-top flex items-center justify-between gap-3">
              <div className="text-xs text-sub">
                <span className={over ? 'text-red-600 font-semibold' : ''}>
                  {len.toLocaleString()}
                </span>
                <span className="text-[#b2b2ab]"> / 2,000</span>
              </div>
              <div className="flex items-center gap-2">
                {error && <span className="text-xs text-red-600">⚠ {error}</span>}
                <button
                  className="btn btn-accent"
                  onClick={submit}
                  disabled={saving || over || !content.trim() || !category}
                >
                  {saving ? '등록 중…' : '익명으로 게시하기 →'}
                </button>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // =================== Post Card ===================

    function PostCard({ post, liked, onLike, onDelete, index }) {
      const [popping, setPopping] = useState(false);
      const meta = CATEGORY_META[post.category] || CATEGORY_META['기타'];

      const handleLike = async () => {
        if (liked) return;
        setPopping(true);
        setTimeout(() => setPopping(false), 320);
        onLike(post.id);
      };

      return (
        <article className="fade-in group relative bg-white border border-line p-5 sm:p-6 hover:border-ink transition">
          <header className="flex items-center justify-between text-xs text-sub">
            <div className="flex items-center gap-3">
              <span className="num-mono text-[#b2b2ab]">N° {pad(index + 1, 3)}</span>
              <CategoryTag name={post.category} />
            </div>
            <span className="num-mono">{timeAgo(post.created_at)}</span>
          </header>

          <p className="mt-4 whitespace-pre-wrap break-words text-[15px] leading-relaxed text-ink">
            {post.content}
          </p>

          <footer className="mt-5 flex items-center justify-between">
            <button
              onClick={handleLike}
              className={`like ${liked ? 'on' : ''}`}
              aria-pressed={liked}
              aria-label="공감하기"
              disabled={liked}
            >
              <span className={popping ? 'like-pop inline-block' : 'inline-block'}>♥</span>
              <span className="num-mono">{Number(post.likes).toLocaleString()}</span>
              <span className="text-xs font-medium opacity-80">공감</span>
            </button>
            <button
              onClick={() => onDelete(post.id)}
              className="opacity-0 group-hover:opacity-100 transition text-xs text-sub hover:text-red-600"
              aria-label="삭제"
              title="게시글 삭제"
            >
              삭제
            </button>
          </footer>
        </article>
      );
    }

    // =================== Board ===================

    function Board() {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [sort, setSort] = useState('recent');
      const [filter, setFilter] = useState('');
      const [liked, setLiked] = useState(() => getLikedSet());

      const fetchPosts = useCallback(async () => {
        setLoading(true);
        try {
          const params = new URLSearchParams();
          params.set('sort', sort);
          if (filter) params.set('category', filter);
          const res = await api(`${API}/posts?${params.toString()}`);
          setItems(res.data || []);
          setError(null);
        } catch (e) { setError(e.message); }
        finally { setLoading(false); }
      }, [sort, filter]);

      useEffect(() => { fetchPosts(); }, [fetchPosts]);

      const handleCreated = (post) => {
        setItems(prev => sort === 'recent' ? [post, ...prev] : [post, ...prev]);
      };

      const handleLike = async (id) => {
        // optimistic
        setItems(prev => prev.map(p => p.id === id ? { ...p, likes: Number(p.likes) + 1 } : p));
        const next = new Set(liked); next.add(id); setLiked(next); saveLikedSet(next);
        try {
          const res = await api(`${API}/posts/${id}/like`, { method: 'POST' });
          setItems(prev => prev.map(p => p.id === id ? res.data : p));
        } catch (e) {
          // rollback
          setItems(prev => prev.map(p => p.id === id ? { ...p, likes: Math.max(0, Number(p.likes) - 1) } : p));
          const rb = new Set(liked); rb.delete(id); setLiked(rb); saveLikedSet(rb);
          setError(e.message);
        }
      };

      const handleDelete = async (id) => {
        if (!window.confirm('이 게시글을 삭제할까요? 되돌릴 수 없어요.')) return;
        try {
          await api(`${API}/posts/${id}`, { method: 'DELETE' });
          setItems(prev => prev.filter(p => p.id !== id));
        } catch (e) { setError(e.message); }
      };

      const stats = useMemo(() => {
        const total = items.length;
        const likes = items.reduce((s, p) => s + Number(p.likes || 0), 0);
        const byCat = {};
        for (const p of items) byCat[p.category] = (byCat[p.category] || 0) + 1;
        return { total, likes, byCat };
      }, [items]);

      return (
        <div>
          <Composer onCreated={handleCreated} />

          {/* Toolbar */}
          <div className="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-5 hl-bottom pb-4">
            <div>
              <h2 className="text-2xl font-bold tracking-tight">게시판</h2>
              <p className="text-xs text-sub mt-1">
                전체 <span className="num-mono font-medium text-ink">{stats.total.toLocaleString()}</span>건 · 누적 공감 <span className="num-mono font-medium text-ink">{stats.likes.toLocaleString()}</span>
              </p>
            </div>

            <div className="flex flex-wrap gap-2 items-center">
              <div className="flex">
                {SORTS.map(s => (
                  <button
                    key={s.key}
                    onClick={() => setSort(s.key)}
                    aria-pressed={sort === s.key}
                    className="chip"
                    style={sort === s.key ? undefined : {}}
                  >
                    {s.label}
                  </button>
                ))}
              </div>
              <span className="mx-1 text-line">│</span>
              <button
                onClick={() => setFilter('')}
                aria-pressed={filter === ''}
                className="chip"
              >
                전체
              </button>
              {CATEGORIES.map(c => (
                <button
                  key={c}
                  onClick={() => setFilter(filter === c ? '' : c)}
                  aria-pressed={filter === c}
                  className="chip"
                >
                  <span className="dot" style={{ background: CATEGORY_META[c].color, outline: '1px solid currentColor' }}></span>
                  {c}
                  {stats.byCat[c] ? <span className="num-mono opacity-70 ml-1">{stats.byCat[c]}</span> : null}
                </button>
              ))}
            </div>
          </div>

          {error && (
            <div className="mb-5 px-4 py-3 border border-red-300 bg-red-50 text-sm text-red-700 flex items-start gap-3">
              <span className="shrink-0">⚠</span>
              <span>{error}</span>
            </div>
          )}

          {loading ? (
            <div className="py-16 text-center text-sm text-sub">불러오는 중…</div>
          ) : items.length === 0 ? (
            <div className="py-20 text-center border border-line bg-white">
              <div className="text-3xl font-bold tracking-tight text-ink">아직 아무 이야기도 없어요</div>
              <p className="mt-3 text-sm text-sub">
                {filter ? '조건에 맞는 글이 아직 없어요. 필터를 바꾸거나 첫 글을 남겨보세요.' : '첫 익명 이야기를 적어보세요.'}
              </p>
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {items.map((p, i) => (
                <PostCard
                  key={p.id}
                  post={p}
                  index={i}
                  liked={liked.has(p.id)}
                  onLike={handleLike}
                  onDelete={handleDelete}
                />
              ))}
            </div>
          )}
        </div>
      );
    }

    // =================== App ===================

    function App() {
      const now = new Date();
      const stamp = `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}`;

      return (
        <div className="min-h-screen">
          {/* Topbar */}
          <div className="hl-bottom bg-page">
            <div className="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between text-[11px] text-sub">
              <span className="font-semibold tracking-wider text-ink">MOVE / 무브</span>
              <span className="hidden sm:inline">익명 고민 · 칭찬 · 응원 게시판</span>
              <span className="num-mono">{stamp}</span>
            </div>
          </div>

          {/* Masthead */}
          <header className="max-w-5xl mx-auto px-6 pt-14 pb-12">
            <div className="flex items-start justify-between flex-wrap gap-8">
              <div className="max-w-xl">
                <div className="text-xs tracking-[0.22em] text-sub uppercase">
                  Anonymous · Confession · Compliment
                </div>
                <h1 className="display mt-5 text-5xl sm:text-6xl md:text-7xl leading-[0.98]">
                  마음을 움직이는<br/>
                  익명의 한 줄
                </h1>
                <p className="mt-6 text-[15px] text-sub leading-relaxed">
                  누군가의 작은 고민, 누군가의 따뜻한 칭찬. <br className="hidden sm:inline"/>
                  이름 없이 남기고, 이름 없이 공감하세요.
                </p>
              </div>
              <div className="grid grid-cols-2 gap-x-10 gap-y-3 border border-line p-5 bg-white">
                <div>
                  <div className="text-[10.5px] tracking-wider uppercase text-sub">Stack</div>
                  <div className="text-sm mt-1">React · Express 5</div>
                </div>
                <div>
                  <div className="text-[10.5px] tracking-wider uppercase text-sub">DB</div>
                  <div className="text-sm mt-1">Supabase · PG</div>
                </div>
                <div>
                  <div className="text-[10.5px] tracking-wider uppercase text-sub">Build</div>
                  <div className="text-sm mt-1">v1 · 2026.04</div>
                </div>
                <div>
                  <div className="text-[10.5px] tracking-wider uppercase text-sub">Access</div>
                  <div className="text-sm mt-1">Anonymous</div>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-6 pb-16">
            <Board />
          </main>

          <footer className="hl-top">
            <div className="max-w-5xl mx-auto px-6 py-6 flex items-center justify-between text-[11px] text-sub flex-wrap gap-3">
              <span>© MOVE — Anonymous Board / 2026</span>
              <span>모든 글은 익명으로 저장되며, 개인정보는 수집하지 않습니다.</span>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
