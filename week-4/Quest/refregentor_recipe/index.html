<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refri-Manager — 냉장고 & 레시피</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ecfeff 0%, #eef2ff 50%, #fdf2f8 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from {opacity:0; transform: translateY(-4px);} to {opacity:1; transform: translateY(0);} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    const API = '/api';
    const CATEGORIES = ['육류', '채소', '유제품', '곡물', '조미료', '기타'];
    const CATEGORY_META = {
      '육류':   { icon: '🥩', pill: 'bg-red-100 text-red-700 border-red-200' },
      '채소':   { icon: '🥬', pill: 'bg-green-100 text-green-700 border-green-200' },
      '유제품': { icon: '🥛', pill: 'bg-sky-100 text-sky-700 border-sky-200' },
      '곡물':   { icon: '🌾', pill: 'bg-amber-100 text-amber-700 border-amber-200' },
      '조미료': { icon: '🧂', pill: 'bg-purple-100 text-purple-700 border-purple-200' },
      '기타':   { icon: '📦', pill: 'bg-gray-100 text-gray-700 border-gray-200' },
    };

    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok || body.success === false) {
        throw new Error(body.message || `요청 실패 (${res.status})`);
      }
      return body;
    }

    function dDayLabel(expiry) {
      if (!expiry) return null;
      const today = new Date(); today.setHours(0,0,0,0);
      const e = new Date(expiry); e.setHours(0,0,0,0);
      const diff = Math.round((e - today) / 86400000);
      if (diff < 0)  return { text: `D+${-diff} 경과`, tone: 'bg-red-500 text-white' };
      if (diff === 0) return { text: 'D-DAY', tone: 'bg-orange-500 text-white' };
      if (diff <= 3)  return { text: `D-${diff}`, tone: 'bg-amber-400 text-amber-900' };
      if (diff <= 7)  return { text: `D-${diff}`, tone: 'bg-yellow-100 text-yellow-800 border border-yellow-200' };
      return { text: `D-${diff}`, tone: 'bg-gray-100 text-gray-600 border border-gray-200' };
    }

    function Button({ variant = 'primary', size = 'md', disabled, onClick, className = '', type = 'button', children, ...rest }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-indigo-600 hover:bg-indigo-700 text-white focus:ring-indigo-400',
        secondary: 'bg-white hover:bg-gray-50 text-gray-800 border border-gray-200 focus:ring-gray-300',
        danger: 'bg-red-500 hover:bg-red-600 text-white focus:ring-red-300',
        ghost: 'bg-transparent hover:bg-gray-100 text-gray-700 focus:ring-gray-300',
      };
      const sizes = { sm: 'text-xs px-2.5 py-1.5', md: 'text-sm px-4 py-2' };
      return (
        <button type={type} disabled={disabled} onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} {...rest}>
          {children}
        </button>
      );
    }

    function Modal({ open, onClose, title, children, footer }) {
      useEffect(() => {
        if (!open) return;
        const h = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', h);
        return () => window.removeEventListener('keydown', h);
      }, [open, onClose]);
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40" onClick={onClose}>
          <div className="fade-in bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col" onClick={(e) => e.stopPropagation()}>
            <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
              <h2 className="text-lg font-bold text-gray-800">{title}</h2>
              <button onClick={onClose} className="w-8 h-8 rounded-full hover:bg-gray-100 text-gray-500" aria-label="닫기">×</button>
            </div>
            <div className="px-6 py-4 overflow-y-auto flex-1">{children}</div>
            {footer && <div className="px-6 py-3 border-t border-gray-100 bg-gray-50 rounded-b-2xl flex justify-end gap-2">{footer}</div>}
          </div>
        </div>
      );
    }

    // =================== Ingredients Tab ===================

    function IngredientsTab() {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [saving, setSaving] = useState(false);

      const [name, setName] = useState('');
      const [category, setCategory] = useState('');
      const [expiryDate, setExpiryDate] = useState('');

      const [search, setSearch] = useState('');
      const [debouncedSearch, setDebouncedSearch] = useState('');
      const [categoryFilter, setCategoryFilter] = useState('');

      useEffect(() => {
        const t = setTimeout(() => setDebouncedSearch(search.trim()), 300);
        return () => clearTimeout(t);
      }, [search]);

      const fetchItems = useCallback(async (q, cat) => {
        setLoading(true);
        try {
          const params = new URLSearchParams();
          if (q) params.set('q', q);
          if (cat) params.set('category', cat);
          const qs = params.toString();
          const body = await api(`${API}/ingredients${qs ? '?' + qs : ''}`);
          setItems(body.data || []);
          setError(null);
        } catch (e) { setError(e.message); }
        finally { setLoading(false); }
      }, []);

      useEffect(() => { fetchItems(debouncedSearch, categoryFilter); }, [debouncedSearch, categoryFilter, fetchItems]);

      const handleAdd = async () => {
        const n = name.trim();
        if (!n || saving) return;
        setSaving(true);
        try {
          const body = await api(`${API}/ingredients`, {
            method: 'POST',
            body: JSON.stringify({ name: n, category: category || null, expiry_date: expiryDate || null }),
          });
          setItems(prev => [body.data, ...prev]);
          setName(''); setCategory(''); setExpiryDate('');
          setError(null);
        } catch (e) { setError(e.message); }
        finally { setSaving(false); }
      };

      const handleDelete = async (id) => {
        if (!window.confirm('이 재료를 삭제할까요?')) return;
        try {
          await api(`${API}/ingredients/${id}`, { method: 'DELETE' });
          setItems(prev => prev.filter(x => x.id !== id));
          setError(null);
        } catch (e) { setError(e.message); }
      };

      const counts = useMemo(() => {
        const c = {};
        for (const it of items) c[it.category || '기타'] = (c[it.category || '기타'] || 0) + 1;
        return c;
      }, [items]);

      return (
        <div>
          <div className="bg-white rounded-2xl shadow-md p-5 mb-6">
            <h3 className="font-bold text-gray-800 mb-3">➕ 재료 추가</h3>
            <div className="grid grid-cols-1 sm:grid-cols-12 gap-2">
              <input
                type="text"
                value={name}
                onChange={(e) => setName(e.target.value)}
                onKeyDown={(e) => { if (e.key === 'Enter' && name.trim()) handleAdd(); }}
                placeholder="재료명 (예: 양파)"
                className="sm:col-span-5 px-3 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-300"
                aria-label="재료명"
              />
              <select
                value={category}
                onChange={(e) => setCategory(e.target.value)}
                className="sm:col-span-3 px-3 py-2 rounded-lg border border-gray-200 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300"
                aria-label="카테고리"
              >
                <option value="">카테고리</option>
                {CATEGORIES.map(c => <option key={c} value={c}>{CATEGORY_META[c].icon} {c}</option>)}
              </select>
              <input
                type="date"
                value={expiryDate}
                onChange={(e) => setExpiryDate(e.target.value)}
                className="sm:col-span-3 px-3 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-300"
                aria-label="유통기한"
              />
              <Button onClick={handleAdd} disabled={!name.trim() || saving} className="sm:col-span-1">
                {saving ? '...' : '추가'}
              </Button>
            </div>
          </div>

          <div className="bg-white rounded-2xl shadow-md p-3 mb-4 flex flex-col sm:flex-row items-stretch sm:items-center gap-2">
            <div className="flex-1 flex items-center gap-2">
              <span className="pl-2 text-gray-500">🔎</span>
              <input
                type="text"
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                placeholder="재료명 검색..."
                className="flex-1 px-2 py-2 focus:outline-none text-sm"
                aria-label="검색"
              />
            </div>
            <div className="flex flex-wrap gap-1">
              <button
                onClick={() => setCategoryFilter('')}
                className={`text-xs px-2.5 py-1 rounded-full border ${categoryFilter === '' ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-gray-100 text-gray-700 border-gray-200'}`}
              >
                전체
              </button>
              {CATEGORIES.map(c => (
                <button
                  key={c}
                  onClick={() => setCategoryFilter(categoryFilter === c ? '' : c)}
                  className={`text-xs px-2.5 py-1 rounded-full border transition ${categoryFilter === c ? 'bg-indigo-600 text-white border-indigo-600' : CATEGORY_META[c].pill}`}
                >
                  {CATEGORY_META[c].icon} {c}
                </button>
              ))}
            </div>
          </div>

          {error && (
            <div className="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-sm text-red-700">
              ⚠️ {error}
            </div>
          )}

          {loading ? (
            <div className="text-center py-12 text-gray-400 text-sm">불러오는 중...</div>
          ) : items.length === 0 ? (
            <div className="text-center py-16 text-gray-500">
              <div className="text-5xl mb-3">🧊</div>
              <p className="font-medium">{debouncedSearch || categoryFilter ? '조건에 맞는 재료가 없어요' : '아직 등록된 재료가 없어요'}</p>
              <p className="mt-1 text-sm text-gray-400">위 폼에서 첫 재료를 추가해 보세요</p>
            </div>
          ) : (
            <>
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                {items.map(it => {
                  const meta = CATEGORY_META[it.category] || CATEGORY_META['기타'];
                  const dday = dDayLabel(it.expiry_date);
                  return (
                    <div key={it.id} className="fade-in group relative bg-white rounded-xl shadow-sm hover:shadow-md border border-gray-100 p-3 transition">
                      <div className="flex items-start justify-between">
                        <div className="text-2xl">{meta.icon}</div>
                        <button
                          onClick={() => handleDelete(it.id)}
                          className="opacity-0 group-hover:opacity-100 transition text-xs px-2 py-0.5 rounded-md bg-red-50 hover:bg-red-100 text-red-600"
                          aria-label="삭제"
                        >
                          삭제
                        </button>
                      </div>
                      <div className="mt-1 font-semibold text-gray-800 break-words">{it.name}</div>
                      <div className="mt-1.5 flex flex-wrap gap-1">
                        {it.category && (
                          <span className={`text-[10px] px-1.5 py-0.5 rounded-full border font-medium ${meta.pill}`}>
                            {it.category}
                          </span>
                        )}
                        {dday && (
                          <span className={`text-[10px] px-1.5 py-0.5 rounded-full font-semibold ${dday.tone}`}>
                            {dday.text}
                          </span>
                        )}
                      </div>
                      {it.expiry_date && (
                        <div className="mt-1 text-[10px] text-gray-400">유통기한 {it.expiry_date}</div>
                      )}
                    </div>
                  );
                })}
              </div>
              <div className="mt-4 flex flex-wrap gap-2 text-xs text-gray-500">
                {Object.entries(counts).map(([c, n]) => (
                  <span key={c} className="px-2 py-0.5 rounded-full bg-gray-100">{CATEGORY_META[c]?.icon} {c} {n}</span>
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    // =================== Recipes Tab ===================

    function RecipeCard({ recipe, onOpen }) {
      return (
        <button
          onClick={() => onOpen(recipe)}
          className="fade-in text-left bg-white rounded-xl shadow-sm hover:shadow-lg border border-gray-100 p-5 transition"
        >
          <div className="flex items-start justify-between gap-2">
            <h3 className="font-bold text-gray-800 text-lg break-words">{recipe.title}</h3>
            <span className="text-2xl shrink-0">🍳</span>
          </div>
          {recipe.ingredients?.length > 0 && (
            <div className="mt-2 flex flex-wrap gap-1">
              {recipe.ingredients.slice(0, 5).map((ing, i) => (
                <span key={i} className="text-[11px] px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-700 border border-indigo-100">
                  {ing}
                </span>
              ))}
              {recipe.ingredients.length > 5 && (
                <span className="text-[11px] px-2 py-0.5 text-gray-500">+{recipe.ingredients.length - 5}</span>
              )}
            </div>
          )}
          {recipe.steps && (
            <p className="mt-2 text-sm text-gray-600 line-clamp-2 whitespace-pre-line">{recipe.steps}</p>
          )}
          <div className="mt-3 text-xs text-gray-400">
            {new Date(recipe.created_at).toLocaleDateString('ko-KR')}
          </div>
        </button>
      );
    }

    function RecipesTab() {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [saving, setSaving] = useState(false);

      const [title, setTitle] = useState('');
      const [ingredientsText, setIngredientsText] = useState('');
      const [steps, setSteps] = useState('');

      const [search, setSearch] = useState('');
      const [debouncedSearch, setDebouncedSearch] = useState('');
      const [selected, setSelected] = useState(null);
      const [editing, setEditing] = useState(false);
      const [editTitle, setEditTitle] = useState('');
      const [editIngredientsText, setEditIngredientsText] = useState('');
      const [editSteps, setEditSteps] = useState('');
      const [editSaving, setEditSaving] = useState(false);

      const [aiOpen, setAiOpen] = useState(false);
      const [aiLoading, setAiLoading] = useState(false);
      const [aiError, setAiError] = useState(null);
      const [aiResult, setAiResult] = useState(null);
      const [aiSaving, setAiSaving] = useState(false);

      useEffect(() => {
        const t = setTimeout(() => setDebouncedSearch(search.trim()), 300);
        return () => clearTimeout(t);
      }, [search]);

      const fetchItems = useCallback(async (q) => {
        setLoading(true);
        try {
          const url = q ? `${API}/recipes?q=${encodeURIComponent(q)}` : `${API}/recipes`;
          const body = await api(url);
          setItems(body.data || []);
          setError(null);
        } catch (e) { setError(e.message); }
        finally { setLoading(false); }
      }, []);

      useEffect(() => { fetchItems(debouncedSearch); }, [debouncedSearch, fetchItems]);

      const handleAdd = async () => {
        const t = title.trim();
        if (!t || saving) return;
        setSaving(true);
        try {
          const ingredients = ingredientsText
            .split(/[,\n]/)
            .map(s => s.trim())
            .filter(Boolean);
          const body = await api(`${API}/recipes`, {
            method: 'POST',
            body: JSON.stringify({ title: t, ingredients, steps }),
          });
          setItems(prev => [body.data, ...prev]);
          setTitle(''); setIngredientsText(''); setSteps('');
          setError(null);
        } catch (e) { setError(e.message); }
        finally { setSaving(false); }
      };

      const handleDelete = async (id) => {
        if (!window.confirm('이 레시피를 삭제할까요?')) return;
        try {
          await api(`${API}/recipes/${id}`, { method: 'DELETE' });
          setItems(prev => prev.filter(x => x.id !== id));
          setSelected(null);
          setError(null);
        } catch (e) { setError(e.message); }
      };

      const startEdit = () => {
        if (!selected) return;
        setEditTitle(selected.title);
        setEditIngredientsText((selected.ingredients || []).join(', '));
        setEditSteps(selected.steps || '');
        setEditing(true);
      };

      const saveEdit = async () => {
        if (!selected || editSaving) return;
        const t = editTitle.trim();
        if (!t) { setError('제목은 비워둘 수 없습니다'); return; }
        setEditSaving(true);
        try {
          const ingredients = editIngredientsText
            .split(/[,\n]/).map(s => s.trim()).filter(Boolean);
          const patch = {};
          if (t !== selected.title) patch.title = t;
          if (JSON.stringify(ingredients) !== JSON.stringify(selected.ingredients || [])) patch.ingredients = ingredients;
          if (editSteps !== (selected.steps || '')) patch.steps = editSteps;
          if (Object.keys(patch).length === 0) { setEditing(false); return; }
          const body = await api(`${API}/recipes/${selected.id}`, {
            method: 'PATCH',
            body: JSON.stringify(patch),
          });
          setItems(prev => prev.map(x => x.id === body.data.id ? body.data : x));
          setSelected(body.data);
          setEditing(false);
          setError(null);
        } catch (e) { setError(e.message); }
        finally { setEditSaving(false); }
      };

      const cancelEdit = () => setEditing(false);

      const requestAiSuggest = async () => {
        setAiLoading(true);
        setAiError(null);
        setAiResult(null);
        setAiOpen(true);
        try {
          const body = await api(`${API}/recipes/suggest`, {
            method: 'POST',
            body: JSON.stringify({ days_within: 7 }),
          });
          setAiResult(body.data);
        } catch (e) { setAiError(e.message); }
        finally { setAiLoading(false); }
      };

      const saveAiRecipe = async () => {
        if (!aiResult || aiSaving) return;
        setAiSaving(true);
        try {
          const body = await api(`${API}/recipes`, {
            method: 'POST',
            body: JSON.stringify({
              title: aiResult.title,
              ingredients: aiResult.ingredients,
              steps: aiResult.steps,
            }),
          });
          setItems(prev => [body.data, ...prev]);
          setAiOpen(false);
          setAiResult(null);
          setError(null);
        } catch (e) { setAiError(e.message); }
        finally { setAiSaving(false); }
      };

      return (
        <div>
          <div className="mb-6 flex items-center justify-between gap-3 p-4 rounded-2xl bg-gradient-to-r from-indigo-500 to-pink-500 text-white shadow-md">
            <div>
              <div className="font-bold text-base">🤖 AI 추천 레시피</div>
              <div className="text-xs text-white/80 mt-0.5">유통기한이 임박한 재료(7일 이내)로 1인분 레시피를 제안합니다</div>
            </div>
            <button
              onClick={requestAiSuggest}
              className="shrink-0 px-3 py-2 rounded-lg bg-white/20 hover:bg-white/30 text-white text-sm font-semibold backdrop-blur transition"
            >
              추천 받기
            </button>
          </div>

          <div className="bg-white rounded-2xl shadow-md p-5 mb-6">
            <h3 className="font-bold text-gray-800 mb-3">✍️ 새 레시피</h3>
            <input
              type="text"
              value={title}
              onChange={(e) => setTitle(e.target.value)}
              placeholder="요리명 (예: 김치볶음밥)"
              className="w-full px-3 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-300 font-medium"
              aria-label="요리명"
            />
            <input
              type="text"
              value={ingredientsText}
              onChange={(e) => setIngredientsText(e.target.value)}
              placeholder="필요 재료 (쉼표 또는 줄바꿈으로 구분) — 예: 김치, 밥, 계란, 참기름"
              className="mt-2 w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
              aria-label="재료"
            />
            <textarea
              value={steps}
              onChange={(e) => setSteps(e.target.value)}
              placeholder="조리법 (단계별로 줄바꿈해서 작성, Markdown 가능)"
              rows={5}
              className="mt-2 w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-y"
              aria-label="조리법"
            />
            <div className="mt-2 flex justify-end">
              <Button onClick={handleAdd} disabled={!title.trim() || saving}>
                {saving ? '저장 중...' : '레시피 저장'}
              </Button>
            </div>
          </div>

          <div className="bg-white rounded-2xl shadow-md p-3 mb-4 flex items-center gap-2">
            <span className="pl-2 text-gray-500">🔎</span>
            <input
              type="text"
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              placeholder="요리명 또는 재료로 검색..."
              className="flex-1 px-2 py-2 focus:outline-none text-sm"
              aria-label="검색"
            />
            {search && (
              <button
                onClick={() => setSearch('')}
                className="text-xs px-2.5 py-1 rounded-full bg-indigo-100 hover:bg-indigo-200 text-indigo-800"
              >
                "{search}" ×
              </button>
            )}
          </div>

          {error && (
            <div className="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-sm text-red-700">
              ⚠️ {error}
            </div>
          )}

          {loading ? (
            <div className="text-center py-12 text-gray-400 text-sm">불러오는 중...</div>
          ) : items.length === 0 ? (
            <div className="text-center py-16 text-gray-500">
              <div className="text-5xl mb-3">🍽️</div>
              <p className="font-medium">{debouncedSearch ? '검색 결과가 없어요' : '아직 저장된 레시피가 없어요'}</p>
              <p className="mt-1 text-sm text-gray-400">{debouncedSearch ? '다른 키워드로 검색해 보세요' : '위에서 첫 레시피를 저장해 보세요'}</p>
            </div>
          ) : (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              {items.map(r => <RecipeCard key={r.id} recipe={r} onOpen={setSelected} />)}
            </div>
          )}

          <Modal
            open={!!selected}
            onClose={() => { setSelected(null); setEditing(false); }}
            title={editing ? '레시피 편집' : selected?.title}
            footer={selected && (
              editing ? (
                <>
                  <Button variant="secondary" onClick={cancelEdit} disabled={editSaving}>취소</Button>
                  <Button variant="primary" onClick={saveEdit} disabled={editSaving || !editTitle.trim()}>
                    {editSaving ? '저장 중...' : '저장'}
                  </Button>
                </>
              ) : (
                <>
                  <Button variant="secondary" onClick={() => setSelected(null)}>닫기</Button>
                  <Button variant="ghost" onClick={startEdit}>✏️ 편집</Button>
                  <Button variant="danger" onClick={() => handleDelete(selected.id)}>삭제</Button>
                </>
              )
            )}
          >
            {selected && !editing && (
              <div className="space-y-4">
                <section>
                  <h3 className="text-sm font-bold text-gray-700 mb-2">🥕 필요 재료</h3>
                  {selected.ingredients?.length > 0 ? (
                    <div className="flex flex-wrap gap-1.5">
                      {selected.ingredients.map((ing, i) => (
                        <span key={i} className="px-2.5 py-1 rounded-full bg-indigo-50 text-indigo-700 border border-indigo-100 text-sm">
                          {ing}
                        </span>
                      ))}
                    </div>
                  ) : (
                    <p className="text-sm text-gray-400">재료가 등록되어 있지 않아요</p>
                  )}
                </section>
                <section>
                  <h3 className="text-sm font-bold text-gray-700 mb-2">📝 조리법</h3>
                  {selected.steps ? (
                    <pre className="whitespace-pre-wrap break-words font-sans text-sm text-gray-800 leading-relaxed bg-gray-50 rounded-lg p-4 border border-gray-100">{selected.steps}</pre>
                  ) : (
                    <p className="text-sm text-gray-400">조리법이 비어있어요</p>
                  )}
                </section>
                <div className="text-xs text-gray-400">
                  작성일: {new Date(selected.created_at).toLocaleString('ko-KR')}
                </div>
              </div>
            )}
            {selected && editing && (
              <div className="space-y-3">
                <div>
                  <label className="block text-xs font-semibold text-gray-600 mb-1">요리명</label>
                  <input
                    type="text"
                    value={editTitle}
                    onChange={(e) => setEditTitle(e.target.value)}
                    className="w-full px-3 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-300"
                  />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-gray-600 mb-1">필요 재료 (쉼표 또는 줄바꿈으로 구분)</label>
                  <input
                    type="text"
                    value={editIngredientsText}
                    onChange={(e) => setEditIngredientsText(e.target.value)}
                    className="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
                  />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-gray-600 mb-1">조리법</label>
                  <textarea
                    value={editSteps}
                    onChange={(e) => setEditSteps(e.target.value)}
                    rows={8}
                    className="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-y"
                  />
                </div>
              </div>
            )}
          </Modal>

          <Modal
            open={aiOpen}
            onClose={() => { setAiOpen(false); setAiResult(null); setAiError(null); }}
            title="🤖 AI 추천 레시피"
            footer={(
              <>
                <Button variant="secondary" onClick={() => { setAiOpen(false); setAiResult(null); setAiError(null); }}>닫기</Button>
                {aiResult && (
                  <>
                    <Button variant="ghost" onClick={requestAiSuggest} disabled={aiLoading}>
                      {aiLoading ? '재추천 중...' : '🎲 다시 추천'}
                    </Button>
                    <Button variant="primary" onClick={saveAiRecipe} disabled={aiSaving}>
                      {aiSaving ? '저장 중...' : '내 레시피로 저장'}
                    </Button>
                  </>
                )}
              </>
            )}
          >
            {aiLoading && (
              <div className="flex items-center justify-center py-12">
                <div className="text-center">
                  <div className="text-5xl mb-3 animate-pulse">🍳</div>
                  <p className="text-sm text-gray-600">유통기한 임박 재료로 레시피를 뽑는 중...</p>
                </div>
              </div>
            )}
            {aiError && !aiLoading && (
              <div className="px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-sm text-red-700">
                ⚠️ {aiError}
              </div>
            )}
            {aiResult && !aiLoading && (
              <div className="space-y-4">
                <div className="px-4 py-2 rounded-lg bg-indigo-50 border border-indigo-100 text-xs text-indigo-800">
                  {aiResult.used_fallback
                    ? '유통기한이 임박한 재료가 없어서 최근 등록한 재료로 제안했어요'
                    : `유통기한 ${aiResult.days_within}일 이내 재료를 우선 활용했어요`}
                  {aiResult.source_ingredients?.length > 0 && (
                    <div className="mt-1 text-[11px] opacity-80">
                      참고 재료: {aiResult.source_ingredients.join(', ')}
                    </div>
                  )}
                </div>
                <h3 className="text-lg font-bold text-gray-800">{aiResult.title}</h3>
                <section>
                  <h4 className="text-sm font-bold text-gray-700 mb-2">🥕 필요 재료</h4>
                  <div className="flex flex-wrap gap-1.5">
                    {aiResult.ingredients.map((ing, i) => (
                      <span key={i} className="px-2.5 py-1 rounded-full bg-indigo-50 text-indigo-700 border border-indigo-100 text-sm">
                        {ing}
                      </span>
                    ))}
                  </div>
                </section>
                <section>
                  <h4 className="text-sm font-bold text-gray-700 mb-2">📝 조리법</h4>
                  <pre className="whitespace-pre-wrap break-words font-sans text-sm text-gray-800 leading-relaxed bg-gray-50 rounded-lg p-4 border border-gray-100">{aiResult.steps}</pre>
                </section>
              </div>
            )}
          </Modal>
        </div>
      );
    }

    // =================== Root App ===================

    function App() {
      const [tab, setTab] = useState('ingredients');

      return (
        <div className="min-h-screen px-4 py-8 sm:py-12">
          <div className="max-w-6xl mx-auto">
            <header className="mb-6 text-center">
              <h1 className="text-3xl sm:text-4xl font-bold text-gray-800 tracking-tight">
                🧊 Refri-Manager
              </h1>
              <p className="mt-2 text-sm text-gray-500">냉장고 재료와 나만의 레시피를 한 곳에서 관리하세요</p>
            </header>

            <div className="bg-white/70 backdrop-blur rounded-2xl shadow-sm p-1 mb-6 flex gap-1 max-w-md mx-auto" role="tablist">
              {[
                { key: 'ingredients', label: '🥬 재료' },
                { key: 'recipes',     label: '🍳 레시피' },
              ].map(t => (
                <button
                  key={t.key}
                  role="tab"
                  aria-selected={tab === t.key}
                  onClick={() => setTab(t.key)}
                  className={`flex-1 py-2.5 rounded-xl text-sm font-semibold transition ${
                    tab === t.key ? 'bg-indigo-600 text-white shadow' : 'text-gray-600 hover:bg-white'
                  }`}
                >
                  {t.label}
                </button>
              ))}
            </div>

            {tab === 'ingredients' ? <IngredientsTab /> : <RecipesTab />}

            <footer className="mt-12 text-center text-xs text-gray-400">
              Supabase PostgreSQL · Express 5 · React 18
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
