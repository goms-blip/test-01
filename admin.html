                className={`px-4 py-2.5 text-sm font-semibold border-b-2 -mb-px transition ${tab === k ? 'border-accent-600 dark:border-accent-400 text-accent-700 dark:text-accent-300' : 'border-transparent text-ink-400 dark:text-ink-500 hover:text-ink-600 dark:hover:text-ink-300'}`}>
                {label}
              </button>
            ))}
          </div>

          {/* 탭 콘텐츠 */}
          {tab === 'sessions' && (
            proj.loading ? <LoadingBlock /> :
            proj.error ? <ErrorBanner error={proj.error} onRetry={proj.refetch} /> :
            proj.data ? <SessionsTab projectId={projectId} projectCode={proj.data.code} tracks={proj.data.tracks || []} sessions={proj.data.sessions || []} onChanged={() => proj.refetch().catch(() => {})} /> : null
          )}

          {tab === 'live' && (
            <div>
              <div className="flex justify-end mb-3">
                {livePolls.length > 0 && <Button variant="secondary" size="sm" onClick={async () => { try { await api.exportProjectPolls(projectId); toast.success('전체 Poll 엑셀 다운로드를 시작합니다.'); } catch (e) { toast.error(e.message); } }}>프로젝트 전체 엑셀</Button>}
              </div>
              {polls.loading && <LoadingBlock />}
              {polls.error && <ErrorBanner error={polls.error} onRetry={reloadPolls} />}
              {polls.data && proj.data && (
                <SessionPollsTab
                  sessions={proj.data.sessions || []}
                  tracks={proj.data.tracks || []}
                  livePolls={livePolls}
                  onNewForSession={(sid) => openNew('live_event', sid)}
                  onNewProject={() => openNew('live_event')}
                  onAction={rowAction}
                  onResults={setResultsPoll}
                  rowBusyKey={rowBusyKey}
                />
              )}
            </div>
          )}

          {tab === 'newsletter' && (
            <NewsletterTab projectId={projectId} polls={newsletterPolls} loading={polls.loading} error={polls.error}
              onRetry={reloadPolls} onAction={rowAction} onResults={setResultsPoll} rowBusyKey={rowBusyKey}
              onNew={() => openNew('newsletter')} />
          )}

          {tab === 'survey' && (
            <SurveyTab projectId={projectId} sessions={proj.data?.sessions || []} newSurvey={newSurvey} onCloseNew={() => setNewSurvey(false)} />
          )}

          {tab === 'analysis' && <AnalysisTab projectId={projectId} polls={allPolls} sessions={proj.data?.sessions || []} />}

          {/* 프로젝트 수정 모달 */}
          {editProject && proj.data && (
            <ProjectFormModal project={proj.data} onClose={() => setEditProject(false)}
              onSaved={() => { setEditProject(false); proj.refetch().catch(() => {}); }} />
          )}

          {/* 프로젝트 삭제 확인 */}
          <ConfirmDialog open={deleteProjectOpen} title="프로젝트 삭제" tone="danger" confirmText="삭제"
            message={`"${proj.data?.name || ''}" 행사와 하위 세션·Poll·설문·응답이 모두 삭제됩니다. 되돌릴 수 없습니다.`}
            loading={deletingProject}
            onConfirm={doDeleteProject} onCancel={() => setDeleteProjectOpen(false)} />

          {/* Poll 생성/수정 모달 */}
          {editPoll && (
            <PollFormModal projectId={projectId} sessions={proj.data?.sessions || []}
              source={editSource} poll={editPoll.__new ? null : editPoll}
              initialSessionId={editPoll.__new ? (editPoll.session_id || '') : ''}
              onClose={() => setEditPoll(null)} onSaved={onSaved} />
          )}

          {/* 결과 슬라이드 패널 */}
          {resultsPoll && <ResultsPanel poll={resultsPoll} onClose={() => setResultsPoll(null)} onChanged={reloadPolls} />}

          {/* 삭제 확인 */}
          <ConfirmDialog open={!!confirm} title="Poll 삭제" tone="danger" confirmText="삭제"
            message={confirm ? `"${confirm.poll.title}" Poll을 삭제할까요? 수집된 응답도 함께 삭제되며 되돌릴 수 없습니다.` : ''}
            loading={busyAction === 'delete:' + confirm?.poll?.id}
            onConfirm={doDelete} onCancel={() => setConfirm(null)} />
        </AdminShellCrumbWrap>
      );
    }

    // crumbs를 상위 AdminShell에 전달하기 위한 컨텍스트
    const CrumbContext = createContext(() => {});
    function AdminShellCrumbWrap({ crumbs, children }) {
      const setCrumbs = useContext(CrumbContext);
      useEffect(() => { setCrumbs(crumbs); return () => setCrumbs(null); }, [JSON.stringify(crumbs)]);
      return children;
    }

    // ========================================
    // 📄 NEWSLETTER TAB
    // ========================================
    function NewsletterTab({ projectId, polls, loading, error, onRetry, onAction, onResults, rowBusyKey, onNew }) {
      const toast = useToast();
      const recip = useAsync(() => api.getRecipients(projectId), [projectId]);
      const [csvText, setCsvText] = useState('');
      const [importing, setImporting] = useState(false);
      const fileRef = useRef(null);

      const onFile = (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const reader = new FileReader();
        reader.onload = () => setCsvText(reader.result);
        reader.readAsText(f);
      };
      const doImport = async () => {
        if (!csvText.trim()) { toast.error('CSV 내용을 입력하거나 파일을 선택해주세요.'); return; }
        setImporting(true);
        try {
          const r = await api.importRecipients(projectId, csvText.trim());
          toast.success(`${r.imported ?? (r.recipients?.length || 0)}명의 참석자를 추가했습니다.`);
          setCsvText(''); if (fileRef.current) fileRef.current.value = '';
          recip.refetch().catch(() => {});
        } catch (e) { toast.error(e.message); }
        finally { setImporting(false); }
      };
      const copyShare = (code) => {
        const url = `${window.location.origin}/poll/${code}`;
        navigator.clipboard?.writeText(url).then(() => toast.success('공유 링크를 복사했습니다.'), () => toast.error('복사에 실패했습니다.'));
      };

      return (
        <div className="grid lg:grid-cols-3 gap-5">
          {/* 좌: 뉴스레터 Poll 목록 */}
          <div className="lg:col-span-2 space-y-2.5">
            {loading && <LoadingBlock />}
            {error && <ErrorBanner error={error} onRetry={onRetry} />}
            {!loading && !error && polls.length === 0 && <Card><EmptyState icon="mail" title="뉴스레터 Poll이 없습니다" desc="행사 후 이메일로 발송할 설문을 만들어보세요." action={<Button onClick={onNew}>+ 뉴스레터 Poll 만들기</Button>} /></Card>}
            {polls.map(p => (
              <div key={p.id}>
                <PollRow poll={p} onAction={onAction} onResults={onResults} busyAction={rowBusyKey(p)} />
                <div className="flex justify-end mt-1 pr-1">
                  <button onClick={() => copyShare(p.code)} className="text-xs text-accent-600 dark:text-accent-300 font-medium hover:underline">공유 링크 복사</button>
                </div>
              </div>
            ))}
          </div>

          {/* 우: 참석자 / CSV / 링크 */}
          <div className="space-y-4">
            <Card className="p-5">
              <h3 className="font-bold text-ink-800 dark:text-ink-100 text-sm mb-1">참석자 CSV 업로드</h3>
              <p className="text-xs text-ink-400 dark:text-ink-500 mb-3">형식: <code className="bg-ink-100 dark:bg-ink-800 px-1 rounded">email,name,company,title</code></p>
              <input ref={fileRef} type="file" accept=".csv,text/csv" onChange={onFile}
                className="block w-full text-xs text-ink-500 dark:text-ink-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:bg-accent-50 dark:file:bg-accent-950/50 file:text-accent-700 dark:file:text-accent-300 file:font-semibold file:text-xs hover:file:bg-accent-100 dark:hover:file:bg-accent-900/50 mb-2" />
              <Textarea rows={4} value={csvText} onChange={e => setCsvText(e.target.value)}
                placeholder={'email,name,company,title\nkim@acme.com,김민수,Acme,팀장'} className="font-mono text-xs" />
              <Button className="w-full mt-3" disabled={importing} onClick={doImport}>
                {importing && <Spinner className="w-4 h-4" />}참석자 가져오기
              </Button>
            </Card>

            <Card className="p-5">
              <div className="flex items-center justify-between mb-3">
                <h3 className="font-bold text-ink-800 dark:text-ink-100 text-sm">참석자 {recip.data ? `(${recip.data.length})` : ''}</h3>
                <Button variant="secondary" size="sm" onClick={async () => { try { await api.exportRecipientLinks(projectId); toast.success('개인별 링크 다운로드를 시작합니다.'); } catch (e) { toast.error(e.message); } }}>개인별 링크 다운로드</Button>
              </div>
              {recip.loading && <div className="space-y-2">{[0, 1, 2].map(i => <div key={i} className="sk h-9 rounded-lg bg-ink-100 dark:bg-ink-800" />)}</div>}
              {recip.error && <p className="text-xs text-rose-500 dark:text-rose-400">{recip.error.message}</p>}
              {recip.data && recip.data.length === 0 && <p className="text-xs text-ink-400 dark:text-ink-500 text-center py-4">등록된 참석자가 없습니다.</p>}
              {recip.data && recip.data.length > 0 && (
                <div className="max-h-72 overflow-y-auto scrollbar-thin -mx-1">
                  <table className="w-full text-xs">
                    <thead className="text-ink-400 dark:text-ink-500 text-left sticky top-0 bg-white dark:bg-ink-900">
                      <tr><th className="py-1.5 px-1 font-semibold">이름</th><th className="py-1.5 px-1 font-semibold">이메일</th><th className="py-1.5 px-1 font-semibold">회사</th></tr>
                    </thead>
                    <tbody>
                      {recip.data.map(r => (
                        <tr key={r.id} className="border-t border-ink-50 dark:border-ink-800">
                          <td className="py-1.5 px-1 font-medium text-ink-700 dark:text-ink-200 whitespace-nowrap">{r.name}</td>
                          <td className="py-1.5 px-1 text-ink-500 dark:text-ink-400 truncate max-w-[120px]">{r.email}</td>
                          <td className="py-1.5 px-1 text-ink-400 dark:text-ink-500 truncate max-w-[80px]">{r.company}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </Card>
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 ANALYSIS TAB  (PRD 5.6.3)
    // ========================================
    function AnalysisTab({ projectId, polls, sessions }) {
      const toast = useToast();
      const { data, loading, error, refetch } = useAsync(() => api.getAnalysis(projectId), [projectId]);
      // 세션별 집계 (문제 수 / 응답 수 / 진행중) — polls 기준. 세션 스케줄 순서 유지.
      const sessionRows = useMemo(() => {
        const stat = {};
        (polls || []).forEach(p => {
          const k = p.session_id || '__none';
          const st = stat[k] || (stat[k] = { name: p.session_name || '', polls: 0, responses: 0, live: 0 });
          st.polls++; st.responses += (p.response_count || 0); if (p.status === 'live') st.live++;
        });
        const sorted = sortSessionsBySchedule(sessions || []);
        const rows = sorted.filter(s => stat[s.id]).map(s => ({
          name: s.name, date: s.session_date, time: s.time_range, room: s.room, ...stat[s.id],
        }));
        if (stat['__none']) rows.push({ name: '세션 미지정', ...stat['__none'] });
        return rows;
      }, [polls, sessions]);
      if (loading) return <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">{Array.from({ length: 6 }).map((_, i) => <div key={i} className="sk h-28 rounded-2xl bg-ink-200 dark:bg-ink-800" />)}</div>;
      if (error) return <ErrorBanner error={error} onRetry={refetch} />;
      if (!data) return null;
      const cards = [
        { label: '전체 Poll 수', value: data.total_polls, icon: 'bar-chart', tone: 'indigo' },
        { label: '전체 응답 수', value: data.total_responses, icon: 'vote', tone: 'blue' },
        { label: '행사 중 응답', value: data.live_responses, icon: 'zap', tone: 'green' },
        { label: '뉴스레터 응답', value: data.newsletter_responses, icon: 'mail', tone: 'amber' },
        { label: '만족도 평균', value: data.avg_satisfaction != null ? `${Number(data.avg_satisfaction).toFixed(1)} / 5` : '-', icon: 'star', tone: 'amber' },
        { label: '상담 희망자', value: data.consult_count, icon: 'handshake', tone: 'rose' },
      ];
      const toneBg = {
        indigo: 'bg-accent-50 dark:bg-accent-950/50 text-accent-600 dark:text-accent-300',
        blue: 'bg-sky-50 dark:bg-sky-950/50 text-sky-600 dark:text-sky-300',
        green: 'bg-accent-50 dark:bg-accent-950/50 text-accent-600 dark:text-accent-300',
        amber: 'bg-amber-50 dark:bg-amber-950/50 text-amber-600 dark:text-amber-300',
        rose: 'bg-rose-50 dark:bg-rose-950/50 text-rose-600 dark:text-rose-300',
      };
      return (
        <div>
          <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {cards.map(c => (
              <Card key={c.label} className="p-5 fade-up">
                <div className="flex items-center justify-between">
                  <span className={`w-10 h-10 rounded-xl flex items-center justify-center ${toneBg[c.tone]}`}><Icon name={c.icon} className="w-5 h-5" /></span>
                </div>
                <div className="text-2xl font-extrabold text-ink-800 dark:text-ink-100 mt-3 tabular-nums">{c.value ?? 0}</div>
                <div className="text-sm text-ink-400 dark:text-ink-500 font-medium mt-0.5">{c.label}</div>
              </Card>
            ))}
          </div>
          <Card className="p-5 mt-4 fade-up">
            <div className="flex items-center justify-between gap-3">
              <div>
                <div className="text-sm text-ink-400 dark:text-ink-500 font-medium">관심 주제 1위</div>
                <div className="text-lg font-bold text-ink-800 dark:text-ink-100 mt-0.5">{data.top_topic || '집계된 데이터 없음'}</div>
              </div>
              <span className="w-12 h-12 rounded-2xl bg-accent-50 dark:bg-accent-950/50 text-accent-600 dark:text-accent-300 flex items-center justify-center"><Icon name="award" className="w-6 h-6" /></span>
            </div>
          </Card>

          {/* 세션별 분석 */}
          <Card className="p-5 mt-4 fade-up">
            <h3 className="font-bold text-ink-800 dark:text-ink-100 text-sm mb-3">세션별 분석</h3>
            {sessionRows.length === 0 ? (
              <p className="text-xs text-ink-400 dark:text-ink-500 text-center py-4">아직 문제(Poll)가 연결된 세션이 없습니다.</p>
            ) : (
              <div className="overflow-x-auto scrollbar-thin -mx-1">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="text-ink-400 dark:text-ink-500 text-left border-b border-ink-100 dark:border-ink-800">
                      <th className="font-semibold py-2 px-2">세션</th>
                      <th className="font-semibold py-2 px-2 text-right tabular-nums">문제</th>
                      <th className="font-semibold py-2 px-2 text-right tabular-nums">응답</th>
                      <th className="font-semibold py-2 px-2 text-right">진행중</th>
                    </tr>
                  </thead>
                  <tbody>
                    {sessionRows.map((r, i) => (
                      <tr key={i} className="border-b border-ink-50 dark:border-ink-800/50 last:border-0">
                        <td className="py-2 px-2">
                          <div className="font-semibold text-ink-800 dark:text-ink-100">{r.name || '이름 없음'}</div>
                          {(r.date || r.time || r.room) && <div className="text-xs text-ink-400 dark:text-ink-500">{[r.date, r.time, r.room].filter(Boolean).join(' · ')}</div>}
                        </td>
                        <td className="py-2 px-2 text-right tabular-nums text-ink-700 dark:text-ink-200">{r.polls}</td>
                        <td className="py-2 px-2 text-right tabular-nums font-bold text-ink-800 dark:text-ink-100">{r.responses}</td>
                        <td className="py-2 px-2 text-right">{r.live > 0 ? <Badge tone="green">진행중 {r.live}</Badge> : <span className="text-xs text-ink-300 dark:text-ink-600">-</span>}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </Card>

          <div className="flex flex-wrap gap-2 mt-5">
            <Button onClick={async () => { try { await api.exportProjectPolls(projectId); toast.success('프로젝트 전체 엑셀 다운로드를 시작합니다.'); } catch (e) { toast.error(e.message); } }}>프로젝트 전체 엑셀</Button>
            <Button variant="secondary" onClick={async () => { try { await api.exportProjectSummary(projectId); toast.success('분석 요약 엑셀 다운로드를 시작합니다.'); } catch (e) { toast.error(e.message); } }}>분석 요약 엑셀</Button>
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 POLL FORM MODAL  (생성/수정 — PRD 5.2.1)
    // ========================================
    const POLL_TYPES = [
      { value: 'single_choice', label: '단일 선택 (객관식)' },
      { value: 'multiple_choice', label: '복수 선택 (객관식)' },
      { value: 'rating', label: '5점 척도' },
      { value: 'short_text', label: '주관식 (서술형)' },
    ];

    function PollFormModal({ projectId, sessions, source, poll, initialSessionId, onClose, onSaved }) {
      const toast = useToast();
      const editing = !!poll;
      const isNewsletter = source === 'newsletter';
      const init = poll || {};
      const [form, setForm] = useState({
        title: init.title || '',
        question: init.question || '',
        poll_type: init.poll_type || 'single_choice',
        session_id: init.session_id || initialSessionId || '',
        is_public: init.is_public !== undefined ? init.is_public : true,
        show_results: init.show_results !== undefined ? init.show_results : true,
        allow_multiple_answers: init.allow_multiple_answers || false,
        start_status: init.status === 'live' ? 'live' : 'draft',
        starts_at: toLocalInput(init.starts_at),
        ends_at: toLocalInput(init.ends_at),
        internal_memo: init.internal_memo || '',
      });
      const [options, setOptions] = useState(
        (init.options && init.options.length)
          ? init.options.map((o, i) => ({ label: o.label, value: o.value || '', sort_order: o.sort_order ?? i + 1 }))
          : [{ label: '', value: '', sort_order: 1 }, { label: '', value: '', sort_order: 2 }]
      );
      const [errors, setErrors] = useState({});
      const [saving, setSaving] = useState(false);

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const isChoice = form.poll_type === 'single_choice' || form.poll_type === 'multiple_choice';

      // 복수 선택 유형 변경 시 allow_multiple_answers 자동 동기화
      useEffect(() => {
        if (form.poll_type === 'multiple_choice') set('allow_multiple_answers', true);
        else if (form.poll_type === 'single_choice') set('allow_multiple_answers', false);
        // eslint-disable-next-line
      }, [form.poll_type]);

      const addOption = () => setOptions(o => [...o, { label: '', value: '', sort_order: o.length + 1 }]);
      const removeOption = (i) => setOptions(o => o.filter((_, idx) => idx !== i).map((x, idx) => ({ ...x, sort_order: idx + 1 })));
      const moveOption = (i, dir) => setOptions(o => {
        const ni = i + dir;
        if (ni < 0 || ni >= o.length) return o;
        const copy = [...o];
        [copy[i], copy[ni]] = [copy[ni], copy[i]];
        return copy.map((x, idx) => ({ ...x, sort_order: idx + 1 }));
      });
      const setOpt = (i, k, v) => setOptions(o => o.map((x, idx) => idx === i ? { ...x, [k]: v } : x));

      const validate = () => {
        const e = {};
        if (!form.title.trim()) e.title = 'Poll 제목을 입력해주세요.';
        if (!form.question.trim()) e.question = '질문 문구를 입력해주세요.';
        if (isChoice) {
          const filled = options.filter(o => o.label.trim());
          if (filled.length < 2) e.options = '선택지는 최소 2개 이상 입력해주세요.';
        }
        if (isNewsletter && form.starts_at && form.ends_at && new Date(form.ends_at) <= new Date(form.starts_at)) {
          e.ends_at = '종료 시점은 시작 시점 이후여야 합니다.';
        }
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const submit = async () => {
        if (!validate()) { toast.error('입력값을 확인해주세요.'); return; }
        setSaving(true);
        const payloadOptions = isChoice
          ? options.filter(o => o.label.trim()).map((o, i) => ({ label: o.label.trim(), value: (o.value || '').trim() || slugify(o.label, i), sort_order: i + 1 }))
          : [];
        const body = {
          title: form.title.trim(),
          question: form.question.trim(),
          poll_type: form.poll_type,
          session_id: form.session_id || null,
          source_type: source,
          is_public: form.is_public,
          show_results: form.show_results,
          allow_multiple_answers: form.poll_type === 'multiple_choice',
          options: payloadOptions,
          starts_at: isNewsletter && form.starts_at ? new Date(form.starts_at).toISOString() : null,
          ends_at: isNewsletter && form.ends_at ? new Date(form.ends_at).toISOString() : null,
          internal_memo: form.internal_memo.trim(),
        };
        try {
          if (editing) {
            await api.updatePoll(poll.id, body);
            // 시작 상태 변경 처리 (draft<->live)
            if (!isNewsletter) {
              if (form.start_status === 'live' && poll.status !== 'live') await api.startPoll(poll.id);
              if (form.start_status === 'draft' && poll.status === 'live') await api.closePoll(poll.id);
            }
            toast.success('Poll을 수정했습니다.');
          } else {
            const created = await api.createPoll(projectId, body);
            if (!isNewsletter && form.start_status === 'live' && created?.id) await api.startPoll(created.id);
            toast.success('Poll을 생성했습니다.');
          }
          onSaved();
        } catch (e) { toast.error(e.message); }
        finally { setSaving(false); }
      };

      return (
        <Modal isOpen onClose={onClose} size="lg"
          title={`${editing ? 'Poll 수정' : (isNewsletter ? '뉴스레터 Poll 만들기' : 'Poll 만들기')}`}
          footer={<>
            <Button variant="ghost" onClick={onClose} disabled={saving}>취소</Button>
            <Button onClick={submit} disabled={saving}>{saving && <Spinner className="w-4 h-4" />}{editing ? '저장' : '생성'}</Button>
          </>}>
          <div className="space-y-5">
            <Field label="Poll 제목" required error={errors.title}>
              <Input value={form.title} error={errors.title} placeholder="예: 키노트 라이브 투표" onChange={e => set('title', e.target.value)} />
            </Field>
            <Field label="질문 문구" required error={errors.question}>
              <Textarea rows={2} value={form.question} error={errors.question} placeholder="참석자에게 보여질 질문" onChange={e => set('question', e.target.value)} />
            </Field>

            <div className="grid sm:grid-cols-2 gap-4">
              <Field label="유형" required>
                <Select value={form.poll_type} onChange={e => set('poll_type', e.target.value)}>
                  {POLL_TYPES.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                </Select>
              </Field>
              <Field label="연결 대상" hint="세션을 선택하지 않으면 프로젝트 전체에 연결됩니다.">
                <Select value={form.session_id} onChange={e => set('session_id', e.target.value)}>
                  <option value="">프로젝트 전체</option>
                  {sessions.map(s => <option key={s.id} value={s.id}>{s.name}{s.speaker ? ` · ${s.speaker}` : ''}</option>)}
                </Select>
              </Field>
            </div>

            {/* 선택지 (객관식일 때만) */}
            {isChoice && (
              <div>
                <div className="flex items-center justify-between mb-1.5">
                  <span className="text-sm font-semibold text-ink-700 dark:text-ink-200">선택지<span className="text-rose-500 dark:text-rose-400 ml-0.5">*</span></span>
                  <Button variant="ghost" size="sm" onClick={addOption}>+ 선택지 추가</Button>
                </div>
                {errors.options && <p className="text-xs text-rose-500 dark:text-rose-400 mb-1.5">{errors.options}</p>}
                <div className="space-y-2">
                  {options.map((o, i) => (
                    <div key={i} className="flex items-center gap-1.5">
                      <span className="w-6 text-center text-xs text-ink-400 dark:text-ink-500 font-semibold">{i + 1}</span>
                      <Input className="flex-1" value={o.label} placeholder={`선택지 ${i + 1}`} onChange={e => setOpt(i, 'label', e.target.value)} />
                      <div className="flex flex-col">
                        <button type="button" aria-label="위로 이동" onClick={() => moveOption(i, -1)} disabled={i === 0} className="w-6 h-4 flex items-center justify-center text-ink-400 dark:text-ink-500 hover:text-accent-600 dark:hover:text-accent-300 disabled:opacity-30"><Icon name="chevron-up" className="w-3.5 h-3.5" /></button>
                        <button type="button" aria-label="아래로 이동" onClick={() => moveOption(i, 1)} disabled={i === options.length - 1} className="w-6 h-4 flex items-center justify-center text-ink-400 dark:text-ink-500 hover:text-accent-600 dark:hover:text-accent-300 disabled:opacity-30"><Icon name="chevron-down" className="w-3.5 h-3.5" /></button>
                      </div>
                      <button type="button" onClick={() => removeOption(i)} disabled={options.length <= 1} className="w-7 h-7 rounded-lg text-rose-400 dark:text-rose-300 hover:bg-rose-50 dark:hover:bg-rose-950/40 disabled:opacity-30 text-lg leading-none">×</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {form.poll_type === 'rating' && <div className="text-xs text-ink-400 dark:text-ink-500 bg-ink-50 dark:bg-ink-800/60 rounded-xl px-3.5 py-2.5">5점 척도형은 1~5점 응답을 자동 수집합니다. 별도 선택지 입력이 필요 없습니다.</div>}
            {form.poll_type === 'short_text' && <div className="text-xs text-ink-400 dark:text-ink-500 bg-ink-50 dark:bg-ink-800/60 rounded-xl px-3.5 py-2.5">주관식형은 참석자가 자유롭게 텍스트를 입력합니다. 선택지 입력이 필요 없습니다.</div>}

            {/* 토글들 */}
            <div className="space-y-3 bg-ink-50 dark:bg-ink-800/60 rounded-xl p-4">
              <Toggle checked={form.is_public} onChange={v => set('is_public', v)} label="공개 여부" desc="참석자가 코드/링크로 접근할 수 있습니다." />
              <div className="border-t border-ink-200/70 dark:border-ink-700/70" />
              <Toggle checked={form.show_results} onChange={v => set('show_results', v)} label="결과 공개" desc="참석자에게 실시간 결과를 보여줍니다." />
            </div>

            {/* 시작 상태 (live_event) / 응답 기간 (newsletter) */}
            {!isNewsletter ? (
              <Field label="시작 상태">
                <div className="flex gap-2">
                  {[['draft', '준비 중 (draft)'], ['live', '즉시 시작 (live)']].map(([v, l]) => (
                    <button key={v} type="button" onClick={() => set('start_status', v)}
                      className={`flex-1 px-3 py-2.5 rounded-xl border text-sm font-semibold transition ${form.start_status === v ? 'border-accent-600 dark:border-accent-400 bg-accent-50 dark:bg-accent-950/40 text-accent-700 dark:text-accent-300' : 'border-ink-200 dark:border-ink-700 text-ink-500 dark:text-ink-400 hover:border-ink-300 dark:hover:border-ink-600'}`}>
                      {l}
                    </button>
                  ))}
                </div>
              </Field>
            ) : (
              <div className="grid sm:grid-cols-2 gap-4">
                <Field label="응답 시작" hint="비워두면 즉시 시작">
                  <Input type="datetime-local" value={form.starts_at} onChange={e => set('starts_at', e.target.value)} />
                </Field>
                <Field label="응답 종료" error={errors.ends_at} hint="비워두면 무기한">
                  <Input type="datetime-local" value={form.ends_at} error={errors.ends_at} onChange={e => set('ends_at', e.target.value)} />
                </Field>
              </div>
            )}

            <Field label="내부 메모" hint="운영자에게만 보이는 메모입니다.">
              <Textarea rows={2} value={form.internal_memo} placeholder="(선택)" onChange={e => set('internal_memo', e.target.value)} />
            </Field>
          </div>
        </Modal>
      );
    }

    function toLocalInput(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return '';
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function slugify(s, i) {
      const base = s.trim().toLowerCase().replace(/[^a-z0-9가-힣]+/g, '_').replace(/^_|_$/g, '');
      return base || `opt_${i + 1}`;
    }

    // ========================================
    // 📄 SURVEY TAB  (묶음 설문 목록 — PRD 10.x)
    // ========================================
    function SurveyTab({ projectId, sessions, newSurvey, onCloseNew }) {
      const toast = useToast();
      const { data, loading, error, refetch } = useAsync(() => api.getSurveys(projectId), [projectId]);
      const [busyAction, setBusyAction] = useState(null); // 'act:id'
      const [editSurvey, setEditSurvey] = useState(null); // survey row (full fetch handled in modal)
      const [resultsSurvey, setResultsSurvey] = useState(null);
      const [confirm, setConfirm] = useState(null); // survey to delete
      const [genDate, setGenDate] = useState(null); // 생성 중인 날짜

      const reload = () => refetch().catch(() => {});

      // 세션 날짜 목록 (날짜순) — 기본폼 생성 버튼용
      const dates = useMemo(() => {
        const seen = new Map();
        (sessions || []).forEach(s => { if (s.session_date && !seen.has(s.session_date)) seen.set(s.session_date, sessionSortKey(s).dateKey); });
        return [...seen.entries()].sort((a, b) => a[1] - b[1]).map(e => e[0]);
      }, [sessions]);
      const sessionCountByDate = (d) => (sessions || []).filter(s => s.session_date === d).length;

      const generateDay = async (date) => {
        setGenDate(date);
        try {
          const r = await api.generateDaySurvey(projectId, date);
          toast.success(`${date} 기본 설문을 만들었습니다. (문항 ${r.question_count ?? ''}개)`);
          reload();
        } catch (e) { toast.error(e.message); }
        finally { setGenDate(null); }
      };

      const handleAction = async (act, s) => {
        if (act === 'edit') { setEditSurvey(s); return; }
        if (act === 'delete') { setConfirm(s); return; }
        if (act === 'results') { setResultsSurvey(s); return; }
        const key = act + ':' + s.id;
        setBusyAction(key);
        try {
          if (act === 'start') { await api.startSurvey(s.id); toast.success('설문을 시작했습니다.'); }
          else if (act === 'close') { await api.closeSurvey(s.id); toast.success('설문을 종료했습니다.'); }
          else if (act === 'toggleResults') { await api.updateSurvey(s.id, { show_results: !s.show_results }); toast.success(s.show_results ? '결과를 비공개로 전환했습니다.' : '결과를 공개했습니다.'); }
          else if (act === 'export') { await api.exportSurvey(s.id); toast.success('엑셀 다운로드를 시작합니다.'); }
          if (act !== 'export') reload();
        } catch (e) { toast.error(e.message); }
        finally { setBusyAction(null); }
      };
      const busyKey = (s) => {
        const k = busyAction || '';
        return k.endsWith(':' + s.id) ? k.split(':')[0] : null;
      };

      const doDelete = async () => {
        const s = confirm;
        setBusyAction('delete:' + s.id);
        try { await api.deleteSurvey(s.id); toast.success('설문을 삭제했습니다.'); reload(); setConfirm(null); }
        catch (e) { toast.error(e.message); }
        finally { setBusyAction(null); }
      };

      const surveys = data || [];

      return (
        <div>
          {/* 세션 기반 기본 설문 폼 자동 생성 (날짜별) */}
          {dates.length > 0 && (
            <Card className="p-5 mb-5">
              <div className="flex items-center gap-2 mb-1">
                <span className="w-8 h-8 rounded-xl bg-emerald-50 dark:bg-emerald-950/50 text-emerald-600 dark:text-emerald-300 flex items-center justify-center"><Icon name="inbox" className="w-4 h-4" /></span>
                <h3 className="font-bold text-ink-800 dark:text-ink-100 text-sm">세션 평가 설문 기본폼 생성</h3>
              </div>
              <p className="text-xs text-ink-400 dark:text-ink-500 mb-3">
                날짜를 고르면 그날 전체 세션의 <b>난이도·만족도(1~5)</b> 문항 + <b>이름·이메일·연락처</b> 입력란이 있는 설문이 자동 생성됩니다. 생성 후 문항은 자유롭게 수정할 수 있어요.
              </p>
              <div className="flex flex-wrap gap-2">
                {dates.map((d, i) => (
                  <Button key={d} variant="secondary" disabled={genDate === d} onClick={() => generateDay(d)}>
                    {genDate === d ? <Spinner className="w-4 h-4" /> : <Icon name="plus" className="w-4 h-4" />}
                    {i + 1}일차 · {d} 기본폼 생성 ({sessionCountByDate(d)}세션)
                  </Button>
                ))}
              </div>
            </Card>
          )}

          {loading && <LoadingBlock />}
          {error && <ErrorBanner error={error} onRetry={reload} />}
          {data && surveys.length === 0 && (
            <Card><EmptyState icon="list-checks" title="등록된 설문이 없습니다"
              desc="만족도·관심주제·상담희망을 한 번에 묻는 묶음 설문을 만들어보세요."
              action={<Button onClick={() => setEditSurvey({ __new: true })}><Icon name="plus" className="w-4 h-4" />설문 만들기</Button>} />
            </Card>
          )}
          {data && surveys.length > 0 && (
            <div className="space-y-2.5">
              {surveys.map(s => (
                <SurveyRow key={s.id} survey={s} busyAction={busyKey(s)} onAction={handleAction} />
              ))}
            </div>
          )}

          {/* 생성 모달 (상단 + 설문 만들기 버튼) */}
          {newSurvey && (
            <SurveyFormModal projectId={projectId} survey={null}
              onClose={onCloseNew} onSaved={() => { onCloseNew(); reload(); }} />
          )}
          {/* 빈 상태 내부 버튼으로 연 생성 모달 */}
          {editSurvey && editSurvey.__new && (
            <SurveyFormModal projectId={projectId} survey={null}
              onClose={() => setEditSurvey(null)} onSaved={() => { setEditSurvey(null); reload(); }} />
          )}
          {/* 수정 모달 */}
          {editSurvey && !editSurvey.__new && (
            <SurveyFormModal projectId={projectId} survey={editSurvey}
              onClose={() => setEditSurvey(null)} onSaved={() => { setEditSurvey(null); reload(); }} />
          )}

          {/* 결과 패널 */}
          {resultsSurvey && <SurveyResultsPanel survey={resultsSurvey} onClose={() => setResultsSurvey(null)} onChanged={reload} />}

          {/* 삭제 확인 */}
          <ConfirmDialog open={!!confirm} title="설문 삭제" tone="danger" confirmText="삭제"
            message={confirm ? `"${confirm.title}" 설문과 모든 문항·응답이 삭제됩니다. 되돌릴 수 없습니다.` : ''}
            loading={busyAction === 'delete:' + confirm?.id}
            onConfirm={doDelete} onCancel={() => setConfirm(null)} />
        </div>
      );
    }

    // 설문 목록의 한 행
    function SurveyRow({ survey, busyAction, onAction }) {
      const toast = useToast();
      const isLive = survey.status === 'live';
      const isClosed = survey.status === 'closed';
      const Btn = ({ act, children, variant = 'subtle' }) => (
        <Button size="sm" variant={variant} disabled={busyAction === act} onClick={() => onAction(act, survey)}>
          {busyAction === act && <Spinner className="w-3.5 h-3.5" />}{children}
        </Button>
      );
      const copyShare = () => {
        const url = `${window.location.origin}/#/survey/${survey.code}`;
        navigator.clipboard?.writeText(url).then(() => toast.success('공유 링크를 복사했습니다.'), () => toast.error('복사에 실패했습니다.'));
      };
      return (
        <div className="border border-ink-100 dark:border-ink-800 rounded-xl p-4 hover:border-ink-200 dark:hover:border-ink-700 transition bg-white dark:bg-ink-900">
          <div className="flex flex-col lg:flex-row lg:items-center gap-3">
            <div className="min-w-0 flex-1">
              <div className="flex flex-wrap items-center gap-2 mb-1">
                <StatusBadge status={survey.status} />
                {survey.source_type === 'newsletter' ? <Badge tone="amber">뉴스레터</Badge> : <Badge tone="indigo">행사 현장</Badge>}
                {survey.show_results ? <Badge tone="accent">결과 공개</Badge> : <Badge tone="slate">결과 비공개</Badge>}
              </div>
              <div className="font-semibold text-ink-800 dark:text-ink-100 truncate">{survey.title}</div>
              {survey.intro && <div className="text-sm text-ink-500 dark:text-ink-400 truncate">{survey.intro}</div>}
            </div>
            <div className="flex items-center gap-4 shrink-0">
              <div className="text-center px-2">
                <div className="text-base font-extrabold text-ink-800 dark:text-ink-100 tabular-nums">{survey.question_count ?? 0}</div>
                <div className="text-[11px] text-ink-400 dark:text-ink-500">문항</div>
              </div>
              <div className="text-center px-2">
                <div className="text-base font-extrabold text-ink-800 dark:text-ink-100 tabular-nums">{survey.response_count ?? 0}</div>
                <div className="text-[11px] text-ink-400 dark:text-ink-500">응답</div>
              </div>
            </div>
          </div>
          <div className="flex flex-wrap gap-1.5 mt-3 pt-3 border-t border-ink-50 dark:border-ink-800">
            <Button size="sm" variant="secondary" onClick={() => onAction('results', survey)}>결과보기</Button>
            {isLive
              ? <Btn act="close" variant="danger">종료</Btn>
              : <Btn act="start" variant="success">{isClosed ? '재시작' : '시작'}</Btn>}
            <Btn act="toggleResults">{survey.show_results ? '결과 비공개' : '결과 공개'}</Btn>
            <Btn act="edit">수정</Btn>
            <Btn act="delete" variant="danger">삭제</Btn>
            <Btn act="export">엑셀</Btn>
            <Button size="sm" variant="ghost" onClick={copyShare}>공유링크 복사</Button>
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 SURVEY FORM MODAL (설문 빌더 — PRD 10.6)
    // ========================================
    function makeQuestion(poll_type = 'single_choice') {
      const base = { question: '', poll_type };
      if (poll_type === 'single_choice' || poll_type === 'multiple_choice') {
        base.options = [{ label: '' }, { label: '' }];
      }
      return base;
    }

    function SurveyFormModal({ projectId, survey, onClose, onSaved }) {
      const toast = useToast();
      const editing = !!survey;
      // 수정 시 문항을 포함한 상세를 별도 조회 (목록 응답엔 questions 없음)
      const detail = useAsync(() => editing ? api.getSurvey(survey.id) : Promise.resolve(null), [survey?.id]);
      const [form, setForm] = useState({
        title: '', intro: '', source_type: 'newsletter', show_results: true, status: 'draft',
      });
      const [questions, setQuestions] = useState([makeQuestion('rating')]);
      const [hydrated, setHydrated] = useState(!editing);
      const [errors, setErrors] = useState({});
      const [saving, setSaving] = useState(false);
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      // 수정 모드: 상세 로드되면 폼/문항 채우기
      useEffect(() => {
        if (!editing) return;
        const d = detail.data;
        if (!d || hydrated) return;
        setForm({
          title: d.title || '', intro: d.intro || '',
          source_type: d.source_type || 'newsletter',
          show_results: !!d.show_results,
          status: d.status === 'live' ? 'live' : 'draft',
        });
        setQuestions((d.questions && d.questions.length ? d.questions : [makeQuestion('rating')]).map(q => ({
          question: q.question || '',
          poll_type: q.poll_type || 'single_choice',
          options: (q.options && q.options.length) ? q.options.map(o => ({ label: o.label, value: o.value })) : [{ label: '' }, { label: '' }],
        })));
        setHydrated(true);
      }, [detail.data]);

      // 문항 조작
      const addQuestion = () => setQuestions(qs => [...qs, makeQuestion('single_choice')]);
      const removeQuestion = (i) => setQuestions(qs => qs.filter((_, idx) => idx !== i));
      const moveQuestion = (i, dir) => setQuestions(qs => {
        const ni = i + dir;
        if (ni < 0 || ni >= qs.length) return qs;
        const c = [...qs]; [c[i], c[ni]] = [c[ni], c[i]]; return c;
      });
      const setQ = (i, patch) => setQuestions(qs => qs.map((q, idx) => {
        if (idx !== i) return q;
        const next = { ...q, ...patch };
        // 유형 전환 시 선택지 초기화/제거
        if (patch.poll_type) {
          const isChoice = patch.poll_type === 'single_choice' || patch.poll_type === 'multiple_choice';
          if (isChoice && (!next.options || !next.options.length)) next.options = [{ label: '' }, { label: '' }];
          if (!isChoice) delete next.options;
        }
        return next;
      }));
      const addOpt = (qi) => setQuestions(qs => qs.map((q, idx) => idx === qi ? { ...q, options: [...(q.options || []), { label: '' }] } : q));
      const removeOpt = (qi, oi) => setQuestions(qs => qs.map((q, idx) => idx === qi ? { ...q, options: q.options.filter((_, j) => j !== oi) } : q));
      const setOptLabel = (qi, oi, val) => setQuestions(qs => qs.map((q, idx) => idx === qi ? { ...q, options: q.options.map((o, j) => j === oi ? { ...o, label: val } : o) } : q));

      const validate = () => {
        const e = {};
        if (!form.title.trim()) e.title = '설문 제목을 입력해주세요.';
        const qErrs = {};
        questions.forEach((q, i) => {
          if (!q.question.trim()) qErrs[i] = '질문 문구를 입력해주세요.';
          else if ((q.poll_type === 'single_choice' || q.poll_type === 'multiple_choice')) {
            const filled = (q.options || []).filter(o => o.label.trim());
            if (filled.length < 2) qErrs[i] = '선택지를 최소 2개 입력해주세요.';
          }
        });
        if (questions.length === 0) e.questions = '문항을 최소 1개 추가해주세요.';
        e.q = qErrs;
        setErrors(e);
        return !e.title && !e.questions && Object.keys(qErrs).length === 0;
      };

      const submit = async () => {
        if (!validate()) { toast.error('입력값을 확인해주세요.'); return; }
        setSaving(true);
        const body = {
          title: form.title.trim(),
          intro: form.intro.trim() || null,
          source_type: form.source_type,
          is_public: true,
          show_results: form.show_results,
          status: form.status,
          questions: questions.map(q => {
            const isChoice = q.poll_type === 'single_choice' || q.poll_type === 'multiple_choice';
            return {
              question: q.question.trim(),
              poll_type: q.poll_type,
              options: isChoice
                ? (q.options || []).filter(o => o.label.trim()).map((o, i) => ({ label: o.label.trim(), value: (o.value || '').trim() || slugify(o.label, i) }))
                : [],
            };
          }),
        };
        try {
          if (editing) { await api.updateSurvey(survey.id, body); toast.success('설문을 수정했습니다.'); }
          else { await api.createSurvey(projectId, body); toast.success('설문을 생성했습니다.'); }
          onSaved();
        } catch (e) { toast.error(e.message); }
        finally { setSaving(false); }
      };

      const loadingDetail = editing && detail.loading && !hydrated;

      return (
        <Modal isOpen onClose={onClose} size="xl" title={editing ? '설문 수정' : '설문 만들기'}
          footer={<>
            <Button variant="ghost" onClick={onClose} disabled={saving}>취소</Button>
            <Button onClick={submit} disabled={saving || loadingDetail}>{saving && <Spinner className="w-4 h-4" />}{editing ? '저장' : '생성'}</Button>
          </>}>
          {loadingDetail ? <LoadingBlock rows={4} /> : (
            <div className="space-y-5">
              {/* 설문 메타 */}
              <Field label="설문 제목" required error={errors.title}>
                <Input value={form.title} error={errors.title} autoFocus placeholder="예: 웨비나 만족도 설문"
                  onChange={e => { set('title', e.target.value); }} />
              </Field>
              <Field label="안내문" hint="설문 상단에 표시되는 안내 문구입니다.">
                <Textarea rows={2} value={form.intro} placeholder="(선택) 참여자에게 보여질 안내문" onChange={e => set('intro', e.target.value)} />
              </Field>
              <div className="grid sm:grid-cols-2 gap-4">
                <Field label="발송 유형">
                  <Select value={form.source_type} onChange={e => set('source_type', e.target.value)}>
                    <option value="newsletter">뉴스레터 (행사 후)</option>
                    <option value="live_event">행사 현장 (라이브)</option>
                  </Select>
                </Field>
                <Field label="시작 상태">
                  <Select value={form.status} onChange={e => set('status', e.target.value)}>
                    <option value="draft">준비 중 (draft)</option>
                    <option value="live">즉시 시작 (live)</option>
                  </Select>
                </Field>
              </div>
              <div className="bg-ink-50 dark:bg-ink-800/60 rounded-xl p-4">
                <Toggle checked={form.show_results} onChange={v => set('show_results', v)} label="결과 공개" desc="응답자에게 실시간 결과를 보여줍니다." />
              </div>

              {/* 문항 빌더 */}
              <div>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-sm font-bold text-ink-700 dark:text-ink-200">문항 <span className="text-ink-400 dark:text-ink-500 font-medium">({questions.length})</span></span>
                  <Button variant="secondary" size="sm" onClick={addQuestion}><Icon name="plus" className="w-4 h-4" />문항 추가</Button>
                </div>
                {errors.questions && <p className="text-xs text-rose-500 dark:text-rose-400 mb-2">{errors.questions}</p>}
                <div className="space-y-3">
                  {questions.map((q, i) => {
                    const isChoice = q.poll_type === 'single_choice' || q.poll_type === 'multiple_choice';
                    const qErr = errors.q && errors.q[i];
                    return (
                      <div key={i} className="border border-ink-200 dark:border-ink-700 rounded-xl p-4 bg-ink-50/40 dark:bg-ink-800/30">
                        <div className="flex items-start gap-2 mb-3">
                          <span className="w-6 h-6 rounded-lg bg-accent-100 dark:bg-accent-950/50 text-accent-700 dark:text-accent-300 flex items-center justify-center text-xs font-bold shrink-0 mt-1">{i + 1}</span>
                          <div className="flex-1 min-w-0 space-y-3">
                            <Input value={q.question} error={qErr} placeholder="질문 문구를 입력하세요"
                              onChange={e => setQ(i, { question: e.target.value })} />
                            <Select value={q.poll_type} onChange={e => setQ(i, { poll_type: e.target.value })} className="sm:max-w-xs">
                              {POLL_TYPES.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                            </Select>
                            {isChoice && (
                              <div className="space-y-2">
                                {(q.options || []).map((o, oi) => (
                                  <div key={oi} className="flex items-center gap-1.5">
                                    <span className="w-5 text-center text-xs text-ink-400 dark:text-ink-500 font-semibold">{oi + 1}</span>
                                    <Input className="flex-1" value={o.label} placeholder={`선택지 ${oi + 1}`} onChange={e => setOptLabel(i, oi, e.target.value)} />
                                    <button type="button" onClick={() => removeOpt(i, oi)} disabled={(q.options || []).length <= 1}
                                      className="w-7 h-7 rounded-lg text-rose-400 dark:text-rose-300 hover:bg-rose-50 dark:hover:bg-rose-950/40 disabled:opacity-30 text-lg leading-none">×</button>
                                  </div>
                                ))}
                                <Button variant="ghost" size="sm" onClick={() => addOpt(i)}>+ 선택지 추가</Button>
                              </div>
                            )}
                            {q.poll_type === 'rating' && <p className="text-xs text-ink-400 dark:text-ink-500 bg-ink-100/70 dark:bg-ink-800/60 rounded-lg px-3 py-2">1~5점 척도로 자동 수집됩니다. 선택지 입력이 필요 없습니다.</p>}
                            {q.poll_type === 'short_text' && <p className="text-xs text-ink-400 dark:text-ink-500 bg-ink-100/70 dark:bg-ink-800/60 rounded-lg px-3 py-2">참여자가 자유롭게 텍스트를 입력합니다.</p>}
                            {qErr && <p className="text-xs text-rose-500 dark:text-rose-400">{qErr}</p>}
                          </div>
                          <div className="flex flex-col items-center gap-0.5 shrink-0">
                            <button type="button" aria-label="위로" onClick={() => moveQuestion(i, -1)} disabled={i === 0}
                              className="w-7 h-6 flex items-center justify-center text-ink-400 dark:text-ink-500 hover:text-accent-600 dark:hover:text-accent-300 disabled:opacity-30"><Icon name="chevron-up" className="w-4 h-4" /></button>
                            <button type="button" aria-label="아래로" onClick={() => moveQuestion(i, 1)} disabled={i === questions.length - 1}
                              className="w-7 h-6 flex items-center justify-center text-ink-400 dark:text-ink-500 hover:text-accent-600 dark:hover:text-accent-300 disabled:opacity-30"><Icon name="chevron-down" className="w-4 h-4" /></button>
                            <button type="button" aria-label="문항 삭제" onClick={() => removeQuestion(i)} disabled={questions.length <= 1}
                              className="w-7 h-6 flex items-center justify-center text-rose-400 dark:text-rose-300 hover:bg-rose-50 dark:hover:bg-rose-950/40 rounded-lg disabled:opacity-30"><Icon name="trash" className="w-4 h-4" /></button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
        </Modal>
      );
    }

    // ========================================
    // 📄 SURVEY RESULTS PANEL (문항별 집계 + 폴링)
    // ========================================
    function SurveyResultsPanel({ survey, onClose, onChanged }) {
      const toast = useToast();
      const surveyId = survey.id;
      const { data, loading, error, refetch } = useAsync(() => api.getSurveyResults(surveyId), [surveyId]);
      const [exporting, setExporting] = useState(false);

      // 폴링 (패널 열려있을 때만, cleanup 으로 정지)
      useEffect(() => {
        let id, stopped = false;
        const tick = () => {
          if (stopped) return;
          refetch(true).catch(() => {}).finally(() => { if (!stopped) id = setTimeout(tick, POLL_INTERVAL); });
        };
        id = setTimeout(tick, POLL_INTERVAL);
        return () => { stopped = true; clearTimeout(id); };
      }, [surveyId, refetch]);

      const doExport = async () => {
        setExporting(true);
        try { await api.exportSurvey(surveyId); toast.success('설문 응답 엑셀 다운로드를 시작합니다.'); }
        catch (e) { toast.error(e.message); }
        finally { setExporting(false); }
      };

      const sv = data?.survey || survey;

      return (
        <div className="fixed inset-0 z-50">
          <div className="absolute inset-0 bg-ink-950/50 backdrop-blur-sm" onClick={onClose} />
          <div className="absolute top-0 right-0 h-full w-full max-w-xl bg-ink-50 dark:bg-ink-950 shadow-2xl slide-in flex flex-col">
            {/* 헤더 */}
            <div className="bg-white dark:bg-ink-900 border-b border-ink-100 dark:border-ink-800 px-5 py-4 flex items-start justify-between gap-3">
              <div className="min-w-0">
                <div className="flex items-center gap-2 mb-1">
                  <StatusBadge status={sv.status} />
                  <span className="inline-flex items-center gap-1 text-xs text-accent-600 dark:text-accent-300"><span className="w-1.5 h-1.5 rounded-full bg-accent-500 dark:bg-accent-400 animate-ping" />실시간</span>
                </div>
                <h2 className="font-bold text-ink-800 dark:text-ink-100 leading-snug truncate">{sv.title}</h2>
                {sv.intro && <p className="text-sm text-ink-500 dark:text-ink-400 truncate">{sv.intro}</p>}
              </div>
              <button onClick={onClose} className="w-8 h-8 rounded-lg text-ink-400 dark:text-ink-500 hover:bg-ink-100 dark:hover:bg-ink-800 text-xl leading-none shrink-0">×</button>
            </div>

            {/* 본문 */}
            <div className="flex-1 overflow-y-auto scrollbar-thin p-5 space-y-4">
              {loading && <LoadingBlock rows={3} />}
              {error && <ErrorBanner error={error} onRetry={() => refetch()} />}
              {data && (
                <>
                  <Card className="p-4 flex items-center justify-between">
                    <div>
                      <div className="text-3xl font-extrabold text-ink-800 dark:text-ink-100 tabular-nums">{data.total_responses ?? 0}</div>
                      <div className="text-sm text-ink-400 dark:text-ink-500 font-medium">총 응답 수</div>
                    </div>
                    <Badge tone="slate">{(data.questions || []).length}문항</Badge>
                  </Card>
                  {(data.questions || []).map((q, qi) => (
                    <SurveyQuestionResult key={q.id ?? qi} question={q} index={qi} />
                  ))}
                  {(data.questions || []).length === 0 && (
                    <EmptyState icon="inbox" title="문항이 없습니다" desc="설문에 문항을 추가해주세요." />
                  )}
                </>
              )}
            </div>

            {/* 하단 액션 */}
            <div className="bg-white dark:bg-ink-900 border-t border-ink-100 dark:border-ink-800 px-5 py-3.5 flex items-center justify-end gap-2">
              <Button onClick={doExport} disabled={exporting}>{exporting && <Spinner className="w-4 h-4" />}응답 엑셀 다운로드</Button>
            </div>
          </div>
        </div>
      );
    }

    // 설문 문항별 결과 카드 (객관식 막대 / rating 평균·분포 / 주관식 리스트)
    const SURVEY_BAR_COLORS = ['bg-accent-600 dark:bg-accent-500', 'bg-accent-500 dark:bg-accent-400', 'bg-sky-500', 'bg-cyan-500', 'bg-teal-500', 'bg-accent-700 dark:bg-accent-300'];
    function SurveyQuestionResult({ question, index }) {
      const q = question;
      const isChoice = q.poll_type === 'single_choice' || q.poll_type === 'multiple_choice';
      // rating 분포: [{score,count,percent}] 객체배열 / [count,...] 숫자배열 / {1:n,...} 맵 모두 대응
      const distEntries = useMemo(() => {
        if (!q.distribution) return [];
        if (Array.isArray(q.distribution)) {
          return q.distribution.map((c, i) => (c && typeof c === 'object') ? [c.score ?? (i + 1), c.count ?? 0] : [i + 1, c]);
        }
        return [1, 2, 3, 4, 5].map(k => [k, q.distribution[k] ?? q.distribution[String(k)] ?? 0]);
      }, [q.distribution]);
      const maxDist = Math.max(1, ...distEntries.map(([, c]) => c));
      return (
        <Card className="p-5">
          <div className="flex items-start gap-2 mb-3">
            <span className="w-6 h-6 rounded-lg bg-ink-100 dark:bg-ink-800 text-ink-500 dark:text-ink-400 flex items-center justify-center text-xs font-bold shrink-0">{index + 1}</span>
            <div className="min-w-0">
              <h3 className="text-sm font-bold text-ink-800 dark:text-ink-100 leading-snug">{q.question}</h3>
              <div className="flex items-center gap-2 mt-1">
                <PollTypeBadge type={q.poll_type} />
                <span className="text-xs text-ink-400 dark:text-ink-500">{q.total_responses ?? 0}명 응답</span>
              </div>
            </div>
          </div>

          {/* 객관식: 막대 */}
          {isChoice && (
            <div className="space-y-3 mt-3">
              {(q.options || []).length === 0
                ? <p className="text-sm text-ink-400 dark:text-ink-500 text-center py-2">선택지가 없습니다.</p>
                : (q.options || []).map((o, i) => (
                  <div key={o.option_id ?? i}>
                    <div className="flex items-center justify-between mb-1.5">
                      <span className="text-sm font-medium text-ink-700 dark:text-ink-200">{o.label}</span>
                      <span className="text-sm tabular-nums"><span className="font-bold text-ink-900 dark:text-ink-50">{o.percent ?? 0}%</span><span className="text-ink-400 dark:text-ink-500 ml-1.5">{o.count ?? 0}표</span></span>
                    </div>
                    <div className="h-3 rounded-full bg-ink-100 dark:bg-ink-800 overflow-hidden">
                      <div className={`h-full rounded-full bar-anim ${SURVEY_BAR_COLORS[i % SURVEY_BAR_COLORS.length]}`} style={{ width: (o.percent ?? 0) + '%', transition: 'width .5s ease' }} />
                    </div>
                  </div>
                ))}
            </div>
          )}

          {/* rating: 평균 + 분포 */}
          {q.poll_type === 'rating' && (
            <div className="mt-3">
              <div className="flex items-baseline gap-2 mb-3">
                <span className="text-3xl font-extrabold text-accent-700 dark:text-accent-300 tabular-nums">{q.average_score != null ? Number(q.average_score).toFixed(1) : '-'}</span>
                <span className="text-sm text-ink-400 dark:text-ink-500">/ 5 평균</span>
              </div>
              <div className="space-y-2">
                {distEntries.map(([score, count]) => (
                  <div key={score} className="flex items-center gap-2">
                    <span className="w-8 text-xs font-semibold text-ink-500 dark:text-ink-400 shrink-0">{score}점</span>
                    <div className="flex-1 h-2.5 rounded-full bg-ink-100 dark:bg-ink-800 overflow-hidden">
                      <div className="h-full rounded-full bg-amber-500 dark:bg-amber-400 bar-anim" style={{ width: (count / maxDist * 100) + '%', transition: 'width .5s ease' }} />
                    </div>
                    <span className="w-8 text-right text-xs tabular-nums text-ink-500 dark:text-ink-400 shrink-0">{count}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 주관식: 응답 리스트 */}
          {q.poll_type === 'short_text' && (
            <div className="mt-3">
              {(q.text_answers && q.text_answers.length)
                ? (
                  <div className="space-y-2 max-h-64 overflow-y-auto scrollbar-thin">
                    {q.text_answers.map((t, i) => (
                      <div key={i} className="bg-ink-50 dark:bg-ink-800/60 rounded-xl px-3.5 py-2.5">
                        <p className="text-sm text-ink-700 dark:text-ink-200 leading-relaxed whitespace-pre-wrap">{typeof t === 'string' ? t : t.text}</p>
                        {t.submitted_at && <p className="text-[11px] text-ink-400 dark:text-ink-500 mt-1">{fmtTime(t.submitted_at)}</p>}
                      </div>
                    ))}
                  </div>
                )
                : <p className="text-sm text-ink-400 dark:text-ink-500 text-center py-3">아직 응답이 없습니다.</p>}
            </div>
          )}
        </Card>
      );
    }

    // ========================================
    // 📄 RESULTS PANEL  (슬라이드 패널 + 2~3초 폴링 — PRD 5.4.1 / 6.1)
    //   라우트 #/poll/:pollId/results 로도 진입 가능
    // ========================================
    const POLL_INTERVAL = 2500;

    function ResultsPanel({ poll, onClose, onChanged }) {
      const toast = useToast();
      const pollId = poll.id;
      const { data, loading, error, refetch } = useAsync(() => api.getPollResults(pollId), [pollId]);
      const [togglingShow, setTogglingShow] = useState(false);
      const [exporting, setExporting] = useState(false);

      // 폴링: 패널이 열려있을 때만 동작, cleanup 으로 정지
      useEffect(() => {
        let id, stopped = false;
        const tick = () => {
          if (stopped) return;
          refetch(true).catch(() => {}).finally(() => { if (!stopped) id = setTimeout(tick, POLL_INTERVAL); });
        };
        id = setTimeout(tick, POLL_INTERVAL);
        return () => { stopped = true; clearTimeout(id); };
      }, [pollId, refetch]);

      const pollData = data?.poll || poll;
      const showResults = pollData.show_results;

      const toggleShow = async () => {
        setTogglingShow(true);
        try {
          await api.updatePoll(pollId, { show_results: !showResults });
          await refetch(true);
          onChanged && onChanged();
          toast.success(showResults ? '결과를 비공개로 전환했습니다.' : '결과를 공개했습니다.');
        } catch (e) { toast.error(e.message); }
        finally { setTogglingShow(false); }
      };
      const doExport = async () => {
        setExporting(true);
        try { await api.exportPoll(pollId); toast.success('응답 엑셀 다운로드를 시작합니다.'); }
        catch (e) { toast.error(e.message); }
        finally { setExporting(false); }
      };

      const colors = ['bg-accent-600 dark:bg-accent-500', 'bg-accent-500 dark:bg-accent-400', 'bg-sky-500', 'bg-cyan-500', 'bg-teal-500', 'bg-accent-700 dark:bg-accent-300'];

      return (
        <div className="fixed inset-0 z-50">
          <div className="absolute inset-0 bg-ink-950/50 backdrop-blur-sm" onClick={onClose} />
          <div className="absolute top-0 right-0 h-full w-full max-w-xl bg-ink-50 dark:bg-ink-950 shadow-2xl slide-in flex flex-col">
            {/* 헤더 */}
            <div className="bg-white dark:bg-ink-900 border-b border-ink-100 dark:border-ink-800 px-5 py-4 flex items-start justify-between gap-3">
              <div className="min-w-0">
                <div className="flex items-center gap-2 mb-1">
                  <PollTypeBadge type={pollData.poll_type} />
                  <StatusBadge status={pollData.status} />
                  <span className="inline-flex items-center gap-1 text-xs text-accent-600 dark:text-accent-300"><span className="w-1.5 h-1.5 rounded-full bg-accent-500 dark:bg-accent-400 animate-ping" />실시간</span>
                </div>
                <h2 className="font-bold text-ink-800 dark:text-ink-100 leading-snug truncate">{pollData.title}</h2>
                <p className="text-sm text-ink-500 dark:text-ink-400 truncate">{pollData.question}</p>
                {pollData.session_name && <p className="text-xs text-ink-400 dark:text-ink-500 mt-0.5">{pollData.session_name}</p>}
              </div>
              <button onClick={onClose} className="w-8 h-8 rounded-lg text-ink-400 dark:text-ink-500 hover:bg-ink-100 dark:hover:bg-ink-800 text-xl leading-none shrink-0">×</button>
            </div>

            {/* 본문 */}
            <div className="flex-1 overflow-y-auto scrollbar-thin p-5 space-y-4">
              {loading && <LoadingBlock rows={3} />}
              {error && <ErrorBanner error={error} onRetry={() => refetch()} />}
              {data && (
                <>
                  <Card className="p-4 flex items-center justify-between">
                    <div>
                      <div className="text-3xl font-extrabold text-ink-800 dark:text-ink-100 tabular-nums">{data.total_responses ?? 0}</div>
                      <div className="text-sm text-ink-400 dark:text-ink-500 font-medium">총 응답 수</div>
                    </div>
                    {data.average_score != null && (
                      <div className="text-right">
                        <div className="text-3xl font-extrabold text-accent-700 dark:text-accent-300 tabular-nums">{Number(data.average_score).toFixed(1)}<span className="text-lg text-accent-300 dark:text-accent-700"> / 5</span></div>
                        <div className="text-sm text-ink-400 dark:text-ink-500 font-medium">평균 점수</div>
                      </div>
                    )}
                  </Card>

                  {/* 선택지별 / 척도형 막대 */}
                  {data.options && data.options.length > 0 && (
                    <Card className="p-5 space-y-4">
                      {data.options.map((o, i) => (
                        <div key={o.option_id ?? i}>
                          <div className="flex items-center justify-between mb-1.5">
                            <span className="text-sm font-medium text-ink-700 dark:text-ink-200">{o.label}</span>
                            <span className="text-sm tabular-nums"><span className="font-bold text-ink-900 dark:text-ink-50">{o.percent ?? 0}%</span><span className="text-ink-400 dark:text-ink-500 ml-1.5">{o.count ?? 0}표</span></span>
                          </div>
                          <div className="h-3 rounded-full bg-ink-100 dark:bg-ink-800 overflow-hidden">
                            <div className={`h-full rounded-full bar-anim ${colors[i % colors.length]}`} style={{ width: (o.percent ?? 0) + '%', transition: 'width .5s ease' }} />
                          </div>
                        </div>
                      ))}
                    </Card>
                  )}

                  {/* 주관식 응답 (최신순) */}
                  {data.text_answers && (
                    <Card className="p-5">
                      <h3 className="text-sm font-bold text-ink-700 dark:text-ink-200 mb-3">주관식 응답 <span className="text-ink-400 dark:text-ink-500 font-medium">({data.text_answers.length})</span></h3>
                      {data.text_answers.length === 0
                        ? <p className="text-sm text-ink-400 dark:text-ink-500 text-center py-4">아직 응답이 없습니다.</p>
                        : (
                          <div className="space-y-2 max-h-80 overflow-y-auto scrollbar-thin">
                            {data.text_answers.map((t, i) => (
                              <div key={i} className="bg-ink-50 dark:bg-ink-800/60 rounded-xl px-3.5 py-2.5">
                                <p className="text-sm text-ink-700 dark:text-ink-200 leading-relaxed whitespace-pre-wrap">{t.text}</p>
                                {t.submitted_at && <p className="text-[11px] text-ink-400 dark:text-ink-500 mt-1">{fmtTime(t.submitted_at)}</p>}
                              </div>
                            ))}
                          </div>
                        )}
                    </Card>
                  )}

                  {(!data.options || data.options.length === 0) && (!data.text_answers) && data.average_score == null && (
                    <EmptyState icon="inbox" title="아직 수집된 응답이 없습니다" desc="응답이 들어오면 실시간으로 표시됩니다." />
                  )}
                </>
              )}
            </div>

            {/* 하단 액션 */}
            <div className="bg-white dark:bg-ink-900 border-t border-ink-100 dark:border-ink-800 px-5 py-3.5 flex items-center justify-between gap-2">
              <Button variant={showResults ? 'subtle' : 'secondary'} disabled={togglingShow} onClick={toggleShow}>
                {togglingShow && <Spinner className="w-4 h-4" />}{showResults ? '결과 비공개로 전환' : '결과 공개'}
              </Button>
              <Button onClick={doExport} disabled={exporting}>{exporting && <Spinner className="w-4 h-4" />}응답 엑셀 다운로드</Button>
            </div>
          </div>
        </div>
      );
    }

    function fmtTime(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      const pad = n => String(n).padStart(2, '0');
      return `${d.getMonth() + 1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    // 라우트로 직접 진입한 결과 화면 (#/poll/:pollId/results)
    function ResultsRoute({ pollId, onLogout }) {
      const { data, loading, error } = useAsync(() => api.getPollResults(pollId), [pollId]);
      // ResultsPanel 은 poll 객체를 받아야 하므로 결과의 poll 을 사용
      const poll = data?.poll || { id: pollId, title: '결과', question: '', poll_type: 'single_choice', status: 'live', show_results: true };
      const [closed, setClosed] = useState(false);
      if (closed) { navigate('/'); return null; }
      return (
        <AdminShell onLogout={onLogout} crumbs={[{ label: '프로젝트', to: '/' }, { label: '결과 상세' }]}>
          {loading && <LoadingBlock />}
          {error && <ErrorBanner error={error} />}
          {data && <ResultsPanel poll={poll} onClose={() => setClosed(true)} />}
        </AdminShell>
      );
    }

    // ========================================
    // 🚀 APP
    // ========================================
    function App() {
      const [authed, setAuthed] = useState(!!getToken());
      const [crumbs, setCrumbs] = useState(null);
      const path = useHashRoute();

      // 401/403 시 로그아웃 처리 주입
      useEffect(() => { onUnauthorized = () => setAuthed(false); }, []);

      const logout = () => { clearToken(); setAuthed(false); navigate('/'); };

      if (!authed) return <LoginScreen onLogin={() => setAuthed(true)} />;

      // 라우팅
      let content, useShell = true;
      const mProject = path.match(/^\/project\/([^/?]+)/);
      const mResults = path.match(/^\/poll\/([^/?]+)\/results/);

      if (mResults) {
        return <ResultsRoute pollId={mResults[1]} onLogout={logout} />;
      } else if (mProject) {
        content = <ProjectDetail projectId={mProject[1]} />;
      } else {
        content = <ProjectsHome />;
      }

      // 프로젝트 상세가 아니면 crumbs 기본값 사용
      const effectiveCrumbs = mProject ? (crumbs || [{ label: '프로젝트', to: '/' }, { label: '...' }]) : [{ label: '프로젝트' }];

      return (
        <CrumbContext.Provider value={setCrumbs}>
          <AdminShell onLogout={logout} crumbs={effectiveCrumbs}>
            {content}
          </AdminShell>
        </CrumbContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <ToastProvider><App /></ToastProvider>
    );
  </script>
</body>
</html>
