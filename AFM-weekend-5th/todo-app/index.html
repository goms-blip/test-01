<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>todo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* System font stack for understated, clean typography */
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em;
    }

    /* Custom checkbox — minimal circle */
    .checkbox {
      width: 18px;
      height: 18px;
      border: 1.5px solid #d4d4d4;
      border-radius: 9999px;
      flex-shrink: 0;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background-color: #fff;
    }
    .checkbox:hover {
      border-color: #a3a3a3;
    }
    .checkbox.checked {
      background-color: #171717;
      border-color: #171717;
    }
    .checkbox.checked::after {
      content: '';
      width: 8px;
      height: 4px;
      border-left: 1.5px solid #fff;
      border-bottom: 1.5px solid #fff;
      transform: rotate(-45deg) translate(1px, -1px);
    }

    /* Hover-reveal delete */
    .todo-row .delete-btn {
      opacity: 0;
      transition: opacity 0.15s ease, color 0.15s ease;
    }
    .todo-row:hover .delete-btn {
      opacity: 1;
    }
    .delete-btn:hover {
      color: #525252 !important;
    }

    /* Subtle fade-in for new items */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-2px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .todo-row {
      animation: fadeIn 0.18s ease;
    }

    /* Pulsing dot for loading state */
    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50%      { opacity: 0.6; }
    }
    .loading-dot {
      animation: pulse 1.4s ease-in-out infinite;
    }

    /* Optimistic rows are slightly faded until server confirms */
    .todo-row.pending {
      opacity: 0.55;
    }

    /* Remove default focus ring, add subtle one */
    input:focus {
      outline: none;
    }

    /* Caret color matches accent */
    input::placeholder {
      color: #d4d4d4;
    }

    /* Auth form fields */
    .auth-field {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      transition: border-color 0.15s ease;
    }
    .auth-field:focus {
      border-color: #171717;
    }
    .auth-field:disabled {
      background: #fafafa;
      cursor: not-allowed;
    }

    /* Avatar in header */
    .avatar-chip {
      width: 28px;
      height: 28px;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
      background: #fafafa;
      border: 1px solid #f0f0f0;
    }
  </style>
</head>
<body class="bg-white text-neutral-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ========================================
    // Auth storage + API client
    // ========================================
    const TOKEN_KEY = 'todo_app_token';

    function getToken() {
      try { return localStorage.getItem(TOKEN_KEY); } catch { return null; }
    }
    function setToken(t) {
      try {
        if (t) localStorage.setItem(TOKEN_KEY, t);
        else   localStorage.removeItem(TOKEN_KEY);
      } catch {}
    }

    async function api(path, { method = 'GET', body, auth = true } = {}) {
      const headers = { 'Content-Type': 'application/json' };
      if (auth) {
        const t = getToken();
        if (t) headers['Authorization'] = 'Bearer ' + t;
      }
      const res = await fetch(path, {
        method,
        headers,
        body: body !== undefined ? JSON.stringify(body) : undefined,
      });
      const text = await res.text();
      const data = text ? JSON.parse(text) : null;
      if (!res.ok) {
        const err = new Error((data && data.error) || `Request failed (${res.status})`);
        err.status = res.status;
        throw err;
      }
      return data;
    }

    // ========================================
    // Constants
    // ========================================
    const FILTERS = [
      { key: 'all', label: 'All' },
      { key: 'active', label: 'Active' },
      { key: 'completed', label: 'Completed' },
    ];

    // ========================================
    // Atoms
    // ========================================
    function FilterTab({ active, label, onClick }) {
      return (
        <button
          onClick={onClick}
          className={
            'relative pb-1 text-sm transition-colors duration-200 ' +
            (active ? 'text-neutral-900' : 'text-neutral-400 hover:text-neutral-600')
          }
        >
          {label}
          <span
            className={
              'absolute left-0 right-0 -bottom-px h-px transition-all duration-200 ' +
              (active ? 'bg-neutral-900 opacity-100' : 'bg-transparent opacity-0')
            }
          />
        </button>
      );
    }

    function Checkbox({ checked, onChange, ariaLabel, disabled }) {
      return (
        <span
          role="checkbox"
          aria-checked={checked}
          aria-label={ariaLabel}
          aria-disabled={disabled}
          tabIndex={disabled ? -1 : 0}
          onClick={disabled ? undefined : onChange}
          onKeyDown={(e) => {
            if (disabled) return;
            if (e.key === ' ' || e.key === 'Enter') {
              e.preventDefault();
              onChange();
            }
          }}
          className={'checkbox ' + (checked ? 'checked' : '')}
          style={disabled ? { cursor: 'default' } : undefined}
        />
      );
    }

    // ========================================
    // Auth screen — login + signup tabs
    // ========================================
    function AuthScreen({ onAuthed }) {
      const [mode, setMode]           = useState('login'); // 'login' | 'signup'
      const [email, setEmail]         = useState('');
      const [password, setPassword]   = useState('');
      const [displayName, setName]    = useState('');
      const [emoji, setEmoji]         = useState('🙂');
      const [busy, setBusy]           = useState(false);
      const [err, setErr]             = useState(null);

      const switchMode = (m) => { setMode(m); setErr(null); };

      const onSubmit = async (e) => {
        e.preventDefault();
        setErr(null);
        setBusy(true);
        try {
          const path = mode === 'login' ? '/api/auth/login' : '/api/auth/signup';
          const body = mode === 'login'
            ? { email, password }
            : { email, password, display_name: displayName, avatar_emoji: emoji };
          const { token, user } = await api(path, { method: 'POST', body, auth: false });
          setToken(token);
          onAuthed(user);
        } catch (e2) {
          setErr(e2.message);
        } finally {
          setBusy(false);
        }
      };

      return (
        <main className="min-h-screen flex items-center justify-center px-6 py-12">
          <div className="w-full max-w-[360px]">
            <header className="mb-8 text-center">
              <h1 className="text-[28px] font-medium tracking-tight">todo</h1>
              <p className="mt-1 text-sm text-neutral-400">
                {mode === 'login' ? 'Welcome back.' : 'Create your account.'}
              </p>
            </header>

            <div className="mb-6 flex gap-6 justify-center text-sm">
              <button
                type="button"
                onClick={() => switchMode('login')}
                className={'pb-1 transition-colors ' +
                  (mode === 'login'
                    ? 'text-neutral-900 border-b border-neutral-900'
                    : 'text-neutral-400 hover:text-neutral-600')}
              >
                Log in
              </button>
              <button
                type="button"
                onClick={() => switchMode('signup')}
                className={'pb-1 transition-colors ' +
                  (mode === 'signup'
                    ? 'text-neutral-900 border-b border-neutral-900'
                    : 'text-neutral-400 hover:text-neutral-600')}
              >
                Sign up
              </button>
            </div>

            <form onSubmit={onSubmit} className="space-y-3">
              {mode === 'signup' && (
                <>
                  <div className="flex gap-2">
                    <input
                      type="text"
                      maxLength={4}
                      value={emoji}
                      onChange={(e) => setEmoji(e.target.value)}
                      placeholder="🙂"
                      className="auth-field text-center"
                      style={{ width: '52px' }}
                      aria-label="Avatar emoji"
                      disabled={busy}
                    />
                    <input
                      type="text"
                      value={displayName}
                      onChange={(e) => setName(e.target.value)}
                      placeholder="Display name"
                      className="auth-field"
                      required
                      maxLength={60}
                      disabled={busy}
                      autoComplete="name"
                    />
                  </div>
                </>
              )}
              <input
                type="email"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
                placeholder="Email"
                className="auth-field"
                required
                autoComplete="email"
                disabled={busy}
              />
              <input
                type="password"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                placeholder={mode === 'signup' ? 'Password (8+ chars)' : 'Password'}
                className="auth-field"
                required
                minLength={mode === 'signup' ? 8 : 1}
                autoComplete={mode === 'signup' ? 'new-password' : 'current-password'}
                disabled={busy}
              />

              {err && (
                <p className="text-xs text-red-400 text-center pt-1">{err}</p>
              )}

              <button
                type="submit"
                disabled={busy}
                className="w-full mt-2 py-2.5 rounded-lg bg-neutral-900 text-white text-sm font-medium hover:bg-neutral-700 transition-colors disabled:bg-neutral-300"
              >
                {busy
                  ? (mode === 'login' ? 'Signing in…' : 'Creating account…')
                  : (mode === 'login' ? 'Log in'      : 'Create account')}
              </button>
            </form>

            <p className="mt-8 text-center text-xs text-neutral-400">
              Demo: alice@example.com / alice1234
            </p>
          </div>
        </main>
      );
    }

    // ========================================
    // Header with current user + logout
    // ========================================
    function UserHeader({ user, onLogout }) {
      return (
        <div className="mb-6 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <span className="avatar-chip" aria-hidden="true">
              {user.avatar_emoji || '🙂'}
            </span>
            <span className="text-sm text-neutral-700">{user.display_name}</span>
          </div>
          <button
            onClick={onLogout}
            className="text-xs text-neutral-400 hover:text-neutral-700 transition-colors"
          >
            Log out
          </button>
        </div>
      );
    }

    // ========================================
    // Todo list
    // ========================================
    function TodoRow({ todo, onToggle, onDelete }) {
      const pending = !!todo._pending;
      return (
        <li className={'todo-row group flex items-center gap-3 py-3 ' + (pending ? 'pending' : '')}>
          <Checkbox
            checked={todo.completed}
            onChange={() => onToggle(todo.id)}
            ariaLabel={todo.completed ? 'Mark as active' : 'Mark as completed'}
            disabled={pending}
          />
          <span
            onClick={() => !pending && onToggle(todo.id)}
            className={
              'flex-1 select-none text-[15px] leading-6 transition-all duration-200 ' +
              (pending ? '' : 'cursor-pointer ') +
              (todo.completed ? 'line-through text-neutral-300' : 'text-neutral-800')
            }
          >
            {todo.text}
          </span>
          <button
            onClick={() => onDelete(todo.id)}
            aria-label="Delete task"
            disabled={pending}
            className="delete-btn text-neutral-300 text-lg leading-none w-5 h-5 flex items-center justify-center"
          >
            ×
          </button>
        </li>
      );
    }

    function TodoApp({ user, onLogout }) {
      const [todos, setTodos]     = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError]     = useState(null);
      const [filter, setFilter]   = useState('all');
      const [draft, setDraft]     = useState('');
      const inputRef = useRef(null);

      const handleApiError = useCallback((e) => {
        if (e.status === 401) {
          // why: token expired or revoked — bounce back to auth screen.
          onLogout();
          return;
        }
        setError(e.message);
      }, [onLogout]);

      // ---- Load todos ----
      useEffect(() => {
        let cancelled = false;
        (async () => {
          setLoading(true);
          try {
            const data = await api('/api/todos');
            if (cancelled) return;
            setTodos(data ?? []);
            setError(null);
          } catch (e) {
            if (cancelled) return;
            handleApiError(e);
            setTodos([]);
          } finally {
            if (!cancelled) setLoading(false);
          }
        })();
        return () => { cancelled = true; };
      }, [handleApiError]);

      // ---- Derived ----
      const remaining     = useMemo(() => todos.filter((t) => !t.completed).length, [todos]);
      const hasCompleted  = useMemo(() => todos.some((t) => t.completed), [todos]);
      const visibleTodos  = useMemo(() => {
        if (filter === 'active')    return todos.filter((t) => !t.completed);
        if (filter === 'completed') return todos.filter((t) => t.completed);
        return todos;
      }, [todos, filter]);

      // ---- Mutations (optimistic) ----
      const addTodo = useCallback(async () => {
        const text = draft.trim();
        if (!text) return;
        setDraft('');
        const tempId = (crypto?.randomUUID?.() ?? `tmp-${Date.now()}-${Math.random()}`);
        const optimistic = {
          id: tempId, text, completed: false,
          created_at: new Date().toISOString(), _pending: true,
        };
        setTodos((prev) => [...prev, optimistic]);
        try {
          const created = await api('/api/todos', { method: 'POST', body: { text } });
          setTodos((prev) => prev.map((t) => (t.id === tempId ? created : t)));
        } catch (e) {
          setTodos((prev) => prev.filter((t) => t.id !== tempId));
          handleApiError(e);
        }
      }, [draft, handleApiError]);

      const toggleTodo = useCallback(async (id) => {
        let prevValue = null;
        setTodos((prev) => prev.map((t) => {
          if (t.id !== id) return t;
          prevValue = t.completed;
          return { ...t, completed: !t.completed };
        }));
        try {
          await api(`/api/todos/${id}`, { method: 'PATCH', body: { completed: !prevValue } });
        } catch (e) {
          setTodos((prev) => prev.map((t) => (t.id === id ? { ...t, completed: prevValue } : t)));
          handleApiError(e);
        }
      }, [handleApiError]);

      const deleteTodo = useCallback(async (id) => {
        let snapshot;
        setTodos((prev) => { snapshot = prev; return prev.filter((t) => t.id !== id); });
        try {
          await api(`/api/todos/${id}`, { method: 'DELETE' });
        } catch (e) {
          setTodos(snapshot);
          handleApiError(e);
        }
      }, [handleApiError]);

      const clearCompleted = useCallback(async () => {
        let snapshot;
        setTodos((prev) => { snapshot = prev; return prev.filter((t) => !t.completed); });
        try {
          await api('/api/todos?completed=true', { method: 'DELETE' });
        } catch (e) {
          setTodos(snapshot);
          handleApiError(e);
        }
      }, [handleApiError]);

      const onKeyDown = (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          addTodo();
        }
      };

      const emptyMessage = useMemo(() => {
        if (loading) return null;
        if (todos.length === 0) return 'Nothing here yet. Add your first task above.';
        if (filter === 'active' && remaining === 0) return 'All done. Take a break.';
        if (filter === 'completed' && !hasCompleted) return 'No completed tasks yet.';
        return null;
      }, [todos.length, filter, remaining, hasCompleted, loading]);

      return (
        <main className="min-h-screen w-full flex justify-center px-6 pt-16 pb-16">
          <div className="w-full max-w-[520px]">
            <UserHeader user={user} onLogout={onLogout} />

            <header className="mb-10">
              <h1 className="text-[28px] font-medium tracking-tight text-neutral-900">todo</h1>
              <p className="mt-1 text-sm text-neutral-400">
                {new Date().toLocaleDateString('en-US', {
                  weekday: 'long', month: 'long', day: 'numeric',
                })}
              </p>
            </header>

            <div className="flex items-center gap-3 border-b border-neutral-200 pb-3 focus-within:border-neutral-400 transition-colors duration-200">
              <span className="text-neutral-300 text-lg leading-none select-none">+</span>
              <input
                ref={inputRef}
                type="text"
                value={draft}
                onChange={(e) => setDraft(e.target.value)}
                onKeyDown={onKeyDown}
                placeholder="What needs doing?"
                className="flex-1 bg-transparent text-[15px] text-neutral-900 placeholder-neutral-300 py-1"
                aria-label="New task"
              />
            </div>

            <div className="mt-8 flex items-center gap-6">
              {FILTERS.map((f) => (
                <FilterTab
                  key={f.key}
                  active={filter === f.key}
                  label={f.label}
                  onClick={() => setFilter(f.key)}
                />
              ))}
            </div>

            <ul className="mt-4 divide-y divide-neutral-100">
              {visibleTodos.map((todo) => (
                <TodoRow key={todo.id} todo={todo} onToggle={toggleTodo} onDelete={deleteTodo} />
              ))}
            </ul>

            {loading && (
              <p className="mt-10 text-center text-sm text-neutral-300 loading-dot">·</p>
            )}

            {emptyMessage && (
              <p className="mt-10 text-center text-sm text-neutral-300">{emptyMessage}</p>
            )}

            {error && (
              <p className="mt-6 text-center text-xs text-red-400">
                {error}{' '}
                <button
                  onClick={() => setError(null)}
                  className="underline underline-offset-2 hover:text-red-500"
                >
                  dismiss
                </button>
              </p>
            )}

            {!loading && todos.length > 0 && (
              <footer className="mt-10 flex items-center justify-between text-xs text-neutral-400">
                <span>{remaining} {remaining === 1 ? 'item' : 'items'} left</span>
                {hasCompleted ? (
                  <button
                    onClick={clearCompleted}
                    className="text-neutral-400 hover:text-neutral-700 transition-colors duration-150"
                  >
                    Clear completed
                  </button>
                ) : <span aria-hidden="true" />}
              </footer>
            )}
          </div>
        </main>
      );
    }

    // ========================================
    // App shell — auth gate
    // ========================================
    function App() {
      // 'booting' | 'anon' | 'authed'
      const [phase, setPhase] = useState('booting');
      const [user, setUser]   = useState(null);

      useEffect(() => {
        let cancelled = false;
        (async () => {
          if (!getToken()) { setPhase('anon'); return; }
          try {
            const me = await api('/api/auth/me');
            if (cancelled) return;
            setUser(me);
            setPhase('authed');
          } catch (e) {
            if (cancelled) return;
            setToken(null);
            setPhase('anon');
          }
        })();
        return () => { cancelled = true; };
      }, []);

      const onAuthed = useCallback((u) => {
        setUser(u);
        setPhase('authed');
      }, []);

      const onLogout = useCallback(() => {
        setToken(null);
        setUser(null);
        setPhase('anon');
      }, []);

      if (phase === 'booting') {
        return (
          <main className="min-h-screen flex items-center justify-center">
            <p className="text-sm text-neutral-300 loading-dot">·</p>
          </main>
        );
      }
      if (phase === 'anon') {
        return <AuthScreen onAuthed={onAuthed} />;
      }
      return <TodoApp user={user} onLogout={onLogout} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
