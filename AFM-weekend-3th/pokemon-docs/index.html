<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Pokémon Docs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ========================================
    // 📡 API Configuration
    // ========================================

    const API_BASE_URL = '/api';

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Card({ children, className = "" }) {
      return (
        <div className={`bg-white rounded-2xl shadow-md p-5 ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ label, color = "gray" }) {
      const colors = {
        fire: "bg-red-100 text-red-700",
        water: "bg-blue-100 text-blue-700",
        grass: "bg-green-100 text-green-700",
        electric: "bg-yellow-100 text-yellow-700",
        psychic: "bg-purple-100 text-purple-700",
        normal: "bg-gray-100 text-gray-700",
        poison: "bg-fuchsia-100 text-fuchsia-700",
      };
      return (
        <span className={`text-xs font-semibold px-2.5 py-1 rounded-full ${colors[color] || colors.normal}`}>
          {label}
        </span>
      );
    }

    // ========================================
    // 📄 Stat Bar Component
    // ========================================

    function StatBar({ label, value, max = 130 }) {
      const pct = Math.min((value / max) * 100, 100);
      const barColor = pct > 70 ? "bg-green-400" : pct > 40 ? "bg-yellow-400" : "bg-red-400";
      return (
        <div className="flex items-center gap-2 text-sm">
          <span className="w-12 text-gray-500 text-right">{label}</span>
          <div className="flex-1 bg-gray-200 rounded-full h-2.5">
            <div className={`${barColor} h-2.5 rounded-full transition-all duration-500`} style={{ width: `${pct}%` }} />
          </div>
          <span className="w-8 text-gray-700 font-medium">{value}</span>
        </div>
      );
    }

    // ========================================
    // 📄 Pokemon Card Component
    // ========================================

    function PokemonCard({ pokemon }) {
      return (
        <Card className="hover:shadow-lg transition-shadow duration-200">
          <div className="flex flex-col items-center">
            <img
              src={pokemon.image}
              alt={pokemon.name.ko}
              className="w-32 h-32 object-contain mb-3"
            />
            <p className="text-xs text-gray-400 mb-1">No.{String(pokemon.id).padStart(3, "0")}</p>
            <h3 className="text-lg font-bold text-gray-800">{pokemon.name.ko}</h3>
            <p className="text-xs text-gray-400 mb-2">{pokemon.name.en}</p>
            <div className="flex gap-1.5 mb-3">
              {pokemon.types.map((t) => (
                <Badge key={t.ko} label={t.ko} color={t.en} />
              ))}
            </div>
            <p className="text-xs text-gray-500 text-center mb-4 leading-relaxed">{pokemon.description}</p>
            <div className="w-full space-y-1.5">
              <StatBar label="HP" value={pokemon.stats.hp} />
              <StatBar label="공격" value={pokemon.stats.attack} />
              <StatBar label="방어" value={pokemon.stats.defense} />
              <StatBar label="스피드" value={pokemon.stats.speed} />
            </div>
          </div>
        </Card>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      const [pokemonList, setPokemonList] = useState([]);
      const [query, setQuery] = useState("");
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const fetchPokemon = useCallback(async (searchQuery) => {
        setLoading(true);
        setError(null);
        try {
          const url = searchQuery.trim()
            ? `${API_BASE_URL}/pokemon/search?q=${encodeURIComponent(searchQuery.trim())}`
            : `${API_BASE_URL}/pokemon`;
          const res = await fetch(url);
          const json = await res.json();
          if (json.success) {
            setPokemonList(json.data);
          } else {
            setError("데이터를 불러오지 못했습니다.");
          }
        } catch (err) {
          setError("서버에 연결할 수 없습니다.");
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        fetchPokemon("");
      }, [fetchPokemon]);

      useEffect(() => {
        const timer = setTimeout(() => {
          fetchPokemon(query);
        }, 300);
        return () => clearTimeout(timer);
      }, [query, fetchPokemon]);

      return (
        <div className="max-w-4xl mx-auto px-4 py-10">
          <header className="text-center mb-8">
            <h1 className="text-3xl font-extrabold text-gray-800 mb-1">My Pokémon Docs</h1>
            <p className="text-gray-500 text-sm">포켓몬 이름, 영문명, 타입으로 검색하세요</p>
          </header>

          <div className="max-w-md mx-auto mb-8">
            <input
              type="text"
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              placeholder="검색어 입력 (예: 피카츄, fire, 물)"
              className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm"
            />
          </div>

          {loading ? (
            <p className="text-center text-gray-400 py-16">로딩 중...</p>
          ) : error ? (
            <p className="text-center text-red-400 py-16">{error}</p>
          ) : pokemonList.length === 0 ? (
            <p className="text-center text-gray-400 py-16">검색 결과가 없습니다</p>
          ) : (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
              {pokemonList.map((p) => (
                <PokemonCard key={p.id} pokemon={p} />
              ))}
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
