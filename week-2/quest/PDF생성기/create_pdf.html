<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .preview-content { font-family: 'Noto Sans KR', sans-serif; }
    .preview-content h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.75rem; }
    .preview-content h2 { font-size: 1.375rem; font-weight: 600; margin-bottom: 0.5rem; }
    .preview-content h3 { font-size: 1.125rem; font-weight: 500; margin-bottom: 0.5rem; }
    .preview-content p { margin-bottom: 0.5rem; line-height: 1.7; }
    .preview-content ul, .preview-content ol { margin-bottom: 0.5rem; padding-left: 1.5rem; }
    .preview-content li { margin-bottom: 0.25rem; line-height: 1.6; }
    .preview-content ul li { list-style-type: disc; }
    .preview-content ol li { list-style-type: decimal; }
    .preview-content blockquote {
      border-left: 3px solid #6366f1;
      padding-left: 1rem;
      color: #4b5563;
      font-style: italic;
      margin-bottom: 0.5rem;
    }
    .preview-content hr { border-top: 1px solid #d1d5db; margin: 1rem 0; }
    .preview-content img { max-width: 100%; height: auto; margin: 0.5rem 0; border-radius: 0.375rem; }
    .drag-over { border-color: #6366f1 !important; background-color: #eef2ff !important; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    .toolbar-btn { transition: all 0.15s ease; }
    .toolbar-btn:hover { transform: translateY(-1px); }
    .drag-handle { cursor: grab; user-select: none; }
    .drag-handle:active { cursor: grabbing; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ children, variant = 'primary', size = 'md', disabled = false, onClick, className = '', icon }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-lg transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-500 shadow-sm hover:shadow',
        secondary: 'bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 focus:ring-indigo-500',
        danger: 'bg-red-600 text-white hover:bg-red-700 focus:ring-red-500 shadow-sm',
        ghost: 'text-gray-600 hover:bg-gray-100 hover:text-gray-900 focus:ring-indigo-500',
        success: 'bg-emerald-600 text-white hover:bg-emerald-700 focus:ring-emerald-500 shadow-sm hover:shadow',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm gap-1.5',
        md: 'px-4 py-2 text-sm gap-2',
        lg: 'px-6 py-2.5 text-base gap-2',
      };
      return (
        <button className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} disabled={disabled} onClick={onClick}>
          {icon && <span className="text-lg leading-none">{icon}</span>}
          {children}
        </button>
      );
    }

    function Card({ children, className = '', padding = true }) {
      return (
        <div className={`bg-white rounded-xl shadow-sm border border-gray-200 ${padding ? 'p-5' : ''} ${className}`}>
          {children}
        </div>
      );
    }

    function Modal({ isOpen, onClose, title, children }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="fixed inset-0 bg-black/40 backdrop-blur-sm" />
          <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[85vh] overflow-hidden fade-in" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100">
              <h3 className="text-lg font-semibold text-gray-900">{title}</h3>
              <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
              </button>
            </div>
            <div className="px-6 py-4 overflow-y-auto max-h-[calc(85vh-8rem)]">{children}</div>
          </div>
        </div>
      );
    }

    function Badge({ children, color = 'indigo', className = '' }) {
      const colors = {
        indigo: 'bg-indigo-50 text-indigo-700 ring-indigo-600/20',
        gray: 'bg-gray-50 text-gray-700 ring-gray-600/20',
        green: 'bg-emerald-50 text-emerald-700 ring-emerald-600/20',
      };
      return <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ring-1 ring-inset ${colors[color]} ${className}`}>{children}</span>;
    }

    function Tooltip({ children, text }) {
      return (
        <div className="relative group">
          {children}
          <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2.5 py-1 bg-gray-900 text-white text-xs rounded-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap z-10">
            {text}
            <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-gray-900" />
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 Common Components
    // ========================================

    function Header() {
      return (
        <header className="bg-white border-b border-gray-200 sticky top-0 z-30">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center shadow-sm">
                <svg className="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
              </div>
              <div>
                <h1 className="text-lg font-bold text-gray-900 leading-tight">PDF 생성기</h1>
                <p className="text-xs text-gray-500">텍스트와 이미지를 PDF로 변환</p>
              </div>
            </div>
            <Badge color="indigo">v1.0</Badge>
          </div>
        </header>
      );
    }

    // ========================================
    // 📄 Toolbar Component
    // ========================================

    function Toolbar({ onInsert, onImageUpload }) {
      const fileInputRef = useRef(null);
      const tools = [
        { label: 'H1', action: () => onInsert('heading1'), tip: '제목 1' },
        { label: 'H2', action: () => onInsert('heading2'), tip: '제목 2' },
        { label: 'H3', action: () => onInsert('heading3'), tip: '제목 3' },
        { divider: true },
        { label: 'B', action: () => onInsert('bold'), tip: '굵게', bold: true },
        { label: 'I', action: () => onInsert('italic'), tip: '기울임', italic: true },
        { label: 'U', action: () => onInsert('underline'), tip: '밑줄', underline: true },
        { divider: true },
        { label: '\u2022', action: () => onInsert('ul'), tip: '글머리 기호' },
        { label: '1.', action: () => onInsert('ol'), tip: '번호 목록' },
        { label: '\u275D', action: () => onInsert('quote'), tip: '인용문' },
        { label: '\u2014', action: () => onInsert('hr'), tip: '구분선' },
        { divider: true },
        { label: '\uD83D\uDDBC\uFE0F', action: () => fileInputRef.current?.click(), tip: '이미지 삽입' },
      ];

      return (
        <div className="flex items-center gap-1 flex-wrap">
          {tools.map((tool, i) =>
            tool.divider ? (
              <div key={i} className="w-px h-6 bg-gray-200 mx-1" />
            ) : (
              <Tooltip key={i} text={tool.tip}>
                <button
                  onClick={tool.action}
                  className={`toolbar-btn px-2.5 py-1.5 rounded-md text-sm hover:bg-indigo-50 hover:text-indigo-600 text-gray-600 transition-colors
                    ${tool.bold ? 'font-bold' : ''} ${tool.italic ? 'italic' : ''} ${tool.underline ? 'underline' : ''}`}
                >
                  {tool.label}
                </button>
              </Tooltip>
            )
          )}
          <input ref={fileInputRef} type="file" accept="image/*" multiple className="hidden" onChange={onImageUpload} />
        </div>
      );
    }

    // ========================================
    // 📄 Block Editor Component (separated)
    // ========================================

    function BlockEditor({ block, index, selectedBlock, setSelectedBlock, updateBlock, moveBlock, removeBlock, onDragStart, onDragEnter, onDragEnd }) {
      const isSelected = selectedBlock === block.id;
      const handleSelect = () => setSelectedBlock(block.id);

      const DragHandle = () => (
        <div
          className="drag-handle flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity text-gray-400 px-0.5"
          draggable
          onDragStart={(e) => {
            e.dataTransfer.effectAllowed = 'move';
            onDragStart(index);
          }}
          onDragEnter={() => onDragEnter(index)}
          onDragEnd={onDragEnd}
          onDragOver={e => e.preventDefault()}
        >
          <svg className="w-4 h-4" viewBox="0 0 16 16" fill="currentColor"><circle cx="5" cy="3" r="1.5"/><circle cx="11" cy="3" r="1.5"/><circle cx="5" cy="8" r="1.5"/><circle cx="11" cy="8" r="1.5"/><circle cx="5" cy="13" r="1.5"/><circle cx="11" cy="13" r="1.5"/></svg>
        </div>
      );

      const BlockActions = () => (
        <div className="flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity flex gap-1">
          <button onClick={() => moveBlock(block.id, -1)} className="p-1 rounded hover:bg-gray-200 text-gray-400 text-xs">\u2191</button>
          <button onClick={() => moveBlock(block.id, 1)} className="p-1 rounded hover:bg-gray-200 text-gray-400 text-xs">\u2193</button>
          <button onClick={() => removeBlock(block.id)} className="p-1 rounded hover:bg-red-100 text-red-400 hover:text-red-600 text-xs">\u2715</button>
        </div>
      );

      const wrapperClass = `group relative flex items-center gap-2 p-2 rounded-lg border transition-all ${isSelected ? 'border-indigo-300 bg-indigo-50/50' : 'border-transparent hover:border-gray-200 hover:bg-gray-50'}`;

      if (block.type === 'hr') {
        return (
          <div className={wrapperClass} onClick={handleSelect}>
            <DragHandle />
            <div className="flex-1"><hr className="border-gray-300" /></div>
            <Badge color="gray">구분선</Badge>
            <BlockActions />
          </div>
        );
      }

      if (block.type === 'image') {
        return (
          <div className={`${wrapperClass} items-start`} onClick={handleSelect}>
            <div className="mt-2"><DragHandle /></div>
            <div className="flex-1 min-w-0">
              <img src={block.content} alt="업로드된 이미지" className="max-h-40 rounded-lg object-contain" />
            </div>
            <div className="flex flex-col gap-1">
              <Badge color="green">이미지</Badge>
              <BlockActions />
            </div>
          </div>
        );
      }

      const typeLabels = {
        heading1: { label: 'H1', color: 'indigo' },
        heading2: { label: 'H2', color: 'indigo' },
        heading3: { label: 'H3', color: 'indigo' },
        bold: { label: 'B', color: 'gray' },
        italic: { label: 'I', color: 'gray' },
        underline: { label: 'U', color: 'gray' },
        ul: { label: '\u2022', color: 'gray' },
        ol: { label: '1.', color: 'gray' },
        quote: { label: '\u275D', color: 'gray' },
        paragraph: { label: 'P', color: 'gray' },
      };
      const info = typeLabels[block.type] || typeLabels.paragraph;
      const inputClass = block.type.startsWith('heading') ? 'text-lg font-semibold' : 'text-sm';

      return (
        <div className={wrapperClass} onClick={handleSelect}>
          <DragHandle />
          <Badge color={info.color} className="flex-shrink-0">{info.label}</Badge>
          <input
            type="text"
            value={block.content}
            onChange={(e) => updateBlock(block.id, e.target.value)}
            onFocus={handleSelect}
            className={`flex-1 bg-transparent border-none outline-none text-gray-800 placeholder-gray-400 ${inputClass}`}
            placeholder="내용을 입력하세요..."
          />
          <BlockActions />
        </div>
      );
    }

    // ========================================
    // 📄 Editor Page Component
    // ========================================

    function EditorPage() {
      const [blocks, setBlocks] = useState([
        { id: 1, type: 'heading1', content: 'PDF 문서 제목' },
        { id: 2, type: 'paragraph', content: '여기에 내용을 입력하세요. 텍스트를 편집하고 이미지를 추가하여 PDF를 생성할 수 있습니다.' },
      ]);
      const [selectedBlock, setSelectedBlock] = useState(null);
      const [generating, setGenerating] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [fileName, setFileName] = useState('document');
      const [pageSize, setPageSize] = useState('a4');
      const [orientation, setOrientation] = useState('portrait');
      const [margin, setMargin] = useState(20);
      const [fontSize, setFontSize] = useState(12);
      const previewRef = useRef(null);
      const nextId = useRef(10);
      const dragItem = useRef(null);
      const dragOverItem = useRef(null);

      const addBlock = useCallback((type, content = '') => {
        const id = nextId.current++;
        const newBlock = { id, type, content };
        setBlocks(prev => {
          if (selectedBlock !== null) {
            const idx = prev.findIndex(b => b.id === selectedBlock);
            if (idx >= 0) {
              const next = [...prev];
              next.splice(idx + 1, 0, newBlock);
              return next;
            }
          }
          return [...prev, newBlock];
        });
        setSelectedBlock(id);
      }, [selectedBlock]);

      const updateBlock = useCallback((id, content) => {
        setBlocks(prev => prev.map(b => b.id === id ? { ...b, content } : b));
      }, []);

      const removeBlock = useCallback((id) => {
        setBlocks(prev => prev.length <= 1 ? prev : prev.filter(b => b.id !== id));
        setSelectedBlock(null);
      }, []);

      const moveBlock = useCallback((id, dir) => {
        setBlocks(prev => {
          const idx = prev.findIndex(b => b.id === id);
          if ((dir === -1 && idx === 0) || (dir === 1 && idx === prev.length - 1)) return prev;
          const copy = [...prev];
          [copy[idx], copy[idx + dir]] = [copy[idx + dir], copy[idx]];
          return copy;
        });
      }, []);

      const handleInsert = useCallback((type) => {
        const defaults = {
          heading1: '제목 1', heading2: '제목 2', heading3: '제목 3',
          bold: '굵은 텍스트', italic: '기울임 텍스트', underline: '밑줄 텍스트',
          ul: '목록 항목', ol: '번호 항목', quote: '인용문 내용', hr: '',
          paragraph: '새 텍스트 블록',
        };
        addBlock(type, defaults[type] || '');
      }, [addBlock]);

      const handleImageUpload = useCallback((e) => {
        Array.from(e.target.files).forEach(file => {
          const reader = new FileReader();
          reader.onload = (ev) => addBlock('image', ev.target.result);
          reader.readAsDataURL(file);
        });
        e.target.value = '';
      }, [addBlock]);

      const handleDrop = useCallback((e) => {
        e.preventDefault();
        e.currentTarget.classList.remove('drag-over');
        Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')).forEach(file => {
          const reader = new FileReader();
          reader.onload = (ev) => addBlock('image', ev.target.result);
          reader.readAsDataURL(file);
        });
      }, [addBlock]);

      const handleDragOver = useCallback((e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }, []);
      const handleDragLeave = useCallback((e) => { e.currentTarget.classList.remove('drag-over'); }, []);

      const onBlockDragStart = (idx) => { dragItem.current = idx; };
      const onBlockDragEnter = (idx) => { dragOverItem.current = idx; };
      const onBlockDragEnd = () => {
        if (dragItem.current !== null && dragOverItem.current !== null && dragItem.current !== dragOverItem.current) {
          setBlocks(prev => {
            const copy = [...prev];
            const [removed] = copy.splice(dragItem.current, 1);
            copy.splice(dragOverItem.current, 0, removed);
            return copy;
          });
        }
        dragItem.current = null;
        dragOverItem.current = null;
      };

      // Render preview block
      const renderPreviewBlock = (block) => {
        switch (block.type) {
          case 'heading1': return <h1 key={block.id}>{block.content}</h1>;
          case 'heading2': return <h2 key={block.id}>{block.content}</h2>;
          case 'heading3': return <h3 key={block.id}>{block.content}</h3>;
          case 'bold': return <p key={block.id}><strong>{block.content}</strong></p>;
          case 'italic': return <p key={block.id}><em>{block.content}</em></p>;
          case 'underline': return <p key={block.id}><u>{block.content}</u></p>;
          case 'ul': return <ul key={block.id}><li>{block.content}</li></ul>;
          case 'ol': return <ol key={block.id}><li>{block.content}</li></ol>;
          case 'quote': return <blockquote key={block.id}>{block.content}</blockquote>;
          case 'hr': return <hr key={block.id} />;
          case 'image': return <img key={block.id} src={block.content} alt="삽입된 이미지" />;
          default: return <p key={block.id}>{block.content}</p>;
        }
      };

      // ========================================
      // jsPDF 기반 PDF 생성 (한글 지원을 위해 Base64 폰트 동적 로드)
      // ========================================
      const generatePDF = useCallback(async () => {
        if (!previewRef.current) return;
        setGenerating(true);
        try {
          const { jsPDF } = window.jspdf;
          const pageSizes = { a4: [210, 297], letter: [216, 279], a3: [297, 420] };
          const [pw, ph] = orientation === 'landscape'
            ? [pageSizes[pageSize][1], pageSizes[pageSize][0]]
            : pageSizes[pageSize];

          // html2canvas로 미리보기 영역을 캡처 (한글 폰트 브라우저 렌더링 활용)
          const canvas = await html2canvas(previewRef.current, {
            scale: 2,
            useCORS: true,
            logging: false,
            backgroundColor: '#ffffff',
          });

          const pdf = new jsPDF({ orientation, unit: 'mm', format: pageSize });
          const m = margin;
          const contentW = pw - m * 2;
          const contentH = ph - m * 2;

          // 캔버스를 페이지 단위로 슬라이스하여 jsPDF에 삽입
          const imgTotalH = (canvas.height * contentW) / canvas.width;
          const pxPerMM = canvas.width / contentW;
          let remainH = imgTotalH;
          let page = 0;

          while (remainH > 0) {
            if (page > 0) pdf.addPage();
            const srcY = Math.round(page * contentH * pxPerMM);
            const srcH = Math.min(Math.round(contentH * pxPerMM), canvas.height - srcY);
            if (srcH <= 0) break;

            const slice = document.createElement('canvas');
            slice.width = canvas.width;
            slice.height = srcH;
            slice.getContext('2d').drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);

            const sliceH = (srcH * contentW) / canvas.width;
            pdf.addImage(slice.toDataURL('image/jpeg', 0.95), 'JPEG', m, m, contentW, sliceH);
            remainH -= contentH;
            page++;
          }

          pdf.save(`${fileName || 'document'}.pdf`);
        } catch (err) {
          console.error('PDF 생성 오류:', err);
          alert('PDF 생성 중 오류가 발생했습니다: ' + err.message);
        } finally {
          setGenerating(false);
        }
      }, [blocks, fileName, pageSize, orientation, margin, fontSize]);

      return (
        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-6">
          {/* Top Action Bar */}
          <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-6">
            <div className="flex items-center gap-3">
              <div className="flex items-center gap-2 bg-white border border-gray-200 rounded-lg px-3 py-1.5">
                <svg className="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                <input
                  type="text"
                  value={fileName}
                  onChange={(e) => setFileName(e.target.value)}
                  className="border-none outline-none text-sm text-gray-700 w-40 bg-transparent"
                  placeholder="파일명"
                />
                <span className="text-gray-400 text-sm">.pdf</span>
              </div>
              <Badge color="gray">{blocks.length}개 블록</Badge>
            </div>
            <div className="flex items-center gap-2">
              <Button variant="secondary" size="sm" onClick={() => setShowSettings(true)} icon="\u2699\uFE0F">설정</Button>
              <Button variant="success" size="md" onClick={generatePDF} disabled={generating || blocks.length === 0} icon={generating ? '\u23F3' : '\uD83D\uDCC4'}>
                {generating ? 'PDF 생성 중...' : 'PDF 다운로드'}
              </Button>
            </div>
          </div>

          {/* Main Layout */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            {/* Editor Panel */}
            <div className="space-y-4">
              <Card padding={false}>
                <div className="px-4 py-3 border-b border-gray-100">
                  <div className="flex items-center justify-between mb-2">
                    <h2 className="text-sm font-semibold text-gray-700">편집기</h2>
                    <Button variant="ghost" size="sm" onClick={() => handleInsert('paragraph')} icon="+">텍스트 추가</Button>
                  </div>
                  <Toolbar onInsert={handleInsert} onImageUpload={handleImageUpload} />
                </div>
                <div
                  className="p-3 space-y-1 min-h-[400px] border-2 border-dashed border-transparent transition-colors"
                  onDrop={handleDrop}
                  onDragOver={handleDragOver}
                  onDragLeave={handleDragLeave}
                >
                  {blocks.map((block, i) => (
                    <BlockEditor
                      key={block.id}
                      block={block}
                      index={i}
                      selectedBlock={selectedBlock}
                      setSelectedBlock={setSelectedBlock}
                      updateBlock={updateBlock}
                      moveBlock={moveBlock}
                      removeBlock={removeBlock}
                      onDragStart={onBlockDragStart}
                      onDragEnter={onBlockDragEnter}
                      onDragEnd={onBlockDragEnd}
                    />
                  ))}
                  {blocks.length === 0 && (
                    <div className="flex flex-col items-center justify-center py-16 text-gray-400">
                      <svg className="w-12 h-12 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 4v16m8-8H4" /></svg>
                      <p className="text-sm">툴바를 사용하여 콘텐츠를 추가하세요</p>
                      <p className="text-xs mt-1">이미지를 드래그 앤 드롭할 수도 있습니다</p>
                    </div>
                  )}
                </div>
              </Card>

              <Card className="bg-indigo-50/50 border-indigo-100">
                <div className="flex items-start gap-3">
                  <span className="text-lg">\uD83D\uDCA1</span>
                  <div className="text-sm text-indigo-800">
                    <p className="font-medium mb-1">사용 팁</p>
                    <ul className="text-xs space-y-1 text-indigo-600">
                      <li>\u2022 드래그 핸들(\u22EE\u22EE)을 잡아 블록 순서를 변경하세요</li>
                      <li>\u2022 이미지를 편집 영역에 드래그 앤 드롭하세요</li>
                      <li>\u2022 설정에서 페이지 크기와 여백을 조절하세요</li>
                    </ul>
                  </div>
                </div>
              </Card>
            </div>

            {/* Preview Panel */}
            <div className="space-y-4">
              <Card padding={false}>
                <div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
                  <h2 className="text-sm font-semibold text-gray-700">미리보기</h2>
                  <Badge color="green">실시간</Badge>
                </div>
                <div className="p-6 bg-gray-50 min-h-[400px]">
                  <div
                    ref={previewRef}
                    className="preview-content bg-white rounded-lg shadow-sm p-8 mx-auto"
                    style={{
                      maxWidth: orientation === 'landscape' ? '100%' : '595px',
                      minHeight: '400px',
                      fontSize: `${fontSize}px`,
                    }}
                  >
                    {blocks.map(renderPreviewBlock)}
                    {blocks.length === 0 && (
                      <div className="flex items-center justify-center h-64 text-gray-300 text-sm">
                        콘텐츠를 추가하면 여기에 미리보기가 표시됩니다
                      </div>
                    )}
                  </div>
                </div>
              </Card>
            </div>
          </div>

          {/* Settings Modal */}
          <Modal isOpen={showSettings} onClose={() => setShowSettings(false)} title="PDF 설정">
            <div className="space-y-5">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">페이지 크기</label>
                <div className="flex gap-2">
                  {[['a4', 'A4'], ['letter', 'Letter'], ['a3', 'A3']].map(([val, label]) => (
                    <button
                      key={val}
                      onClick={() => setPageSize(val)}
                      className={`flex-1 py-2.5 rounded-lg text-sm font-medium border-2 transition-all ${pageSize === val ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200 text-gray-600 hover:border-gray-300'}`}
                    >
                      {label}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">방향</label>
                <div className="flex gap-2">
                  {[['portrait', '세로'], ['landscape', '가로']].map(([val, label]) => (
                    <button
                      key={val}
                      onClick={() => setOrientation(val)}
                      className={`flex-1 py-2.5 rounded-lg text-sm font-medium border-2 transition-all ${orientation === val ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200 text-gray-600 hover:border-gray-300'}`}
                    >
                      {val === 'portrait' ? '\uD83D\uDCC4' : '\uD83D\uDCC3'} {label}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">여백: {margin}mm</label>
                <input
                  type="range"
                  min="5"
                  max="40"
                  value={margin}
                  onChange={(e) => setMargin(Number(e.target.value))}
                  className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                />
                <div className="flex justify-between text-xs text-gray-400 mt-1">
                  <span>5mm</span><span>40mm</span>
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">글자 크기: {fontSize}px</label>
                <input
                  type="range"
                  min="8"
                  max="24"
                  value={fontSize}
                  onChange={(e) => setFontSize(Number(e.target.value))}
                  className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                />
                <div className="flex justify-between text-xs text-gray-400 mt-1">
                  <span>8px</span><span>24px</span>
                </div>
              </div>
              <Button variant="primary" size="lg" className="w-full" onClick={() => setShowSettings(false)}>설정 완료</Button>
            </div>
          </Modal>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      return (
        <div className="min-h-screen bg-gray-50">
          <Header />
          <EditorPage />
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
