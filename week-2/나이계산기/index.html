<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-lg p-6 sm:p-8 ${className}`}>
          {children}
        </div>
      );
    }

    function Input({ label, type = 'text', value, onChange, min, max, placeholder }) {
      return (
        <div className="flex flex-col gap-1">
          <label className="text-sm font-medium text-gray-600">{label}</label>
          <input
            type={type}
            value={value}
            onChange={onChange}
            min={min}
            max={max}
            placeholder={placeholder}
            className="border border-gray-300 rounded-lg px-4 py-2.5 text-center text-lg
                       focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent
                       transition-all"
          />
        </div>
      );
    }

    function Button({ children, onClick, variant = 'primary', className = '' }) {
      const base = 'px-6 py-3 rounded-lg font-semibold transition-all text-lg';
      const variants = {
        primary: 'bg-indigo-500 text-white hover:bg-indigo-600 active:bg-indigo-700',
        secondary: 'bg-gray-200 text-gray-700 hover:bg-gray-300',
      };
      return (
        <button onClick={onClick} className={`${base} ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      const [birthDate, setBirthDate] = useState('');
      const [result, setResult] = useState(null);

      function calculateAge() {
        if (!birthDate) return;

        const birth = new Date(birthDate);
        const today = new Date();

        if (birth > today) {
          setResult({ error: '미래 날짜는 입력할 수 없습니다.' });
          return;
        }

        let age = today.getFullYear() - birth.getFullYear();
        const monthDiff = today.getMonth() - birth.getMonth();
        const dayDiff = today.getDate() - birth.getDate();

        // 생일이 아직 안 지났으면 1살 빼기
        if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
          age--;
        }

        // 총 개월 수 계산
        let totalMonths = (today.getFullYear() - birth.getFullYear()) * 12
          + (today.getMonth() - birth.getMonth());
        if (dayDiff < 0) totalMonths--;

        // 총 일수 계산
        const totalDays = Math.floor((today - birth) / (1000 * 60 * 60 * 24));

        // 다음 생일까지 남은 일수
        const nextBirthday = new Date(today.getFullYear(), birth.getMonth(), birth.getDate());
        if (nextBirthday <= today) {
          nextBirthday.setFullYear(nextBirthday.getFullYear() + 1);
        }
        const daysUntilBirthday = Math.ceil((nextBirthday - today) / (1000 * 60 * 60 * 24));

        // 연 나이: 현재년도 - 출생년도
        const yearAge = today.getFullYear() - birth.getFullYear();

        // 세는 나이 (한국 나이): 연 나이 + 1
        const koreanAge = yearAge + 1;

        setResult({ age, yearAge, koreanAge, totalMonths, totalDays, daysUntilBirthday });
      }

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100 flex items-center justify-center p-4">
          <div className="w-full max-w-md">
            <h1 className="text-3xl sm:text-4xl font-bold text-center text-gray-800 mb-8">
              🎂 나이 계산기
            </h1>

            <Card>
              <div className="flex flex-col gap-5">
                <Input
                  label="생년월일"
                  type="date"
                  value={birthDate}
                  onChange={(e) => { setBirthDate(e.target.value); setResult(null); }}
                  max={new Date().toISOString().split('T')[0]}
                />

                <Button onClick={calculateAge} className="w-full">
                  계산하기
                </Button>

                {result && result.error && (
                  <p className="text-red-500 text-center font-medium">{result.error}</p>
                )}

                {result && !result.error && (
                  <div className="mt-2 space-y-4">
                    {/* 나이 3종 비교 */}
                    <div className="grid grid-cols-3 gap-3">
                      <div className="bg-indigo-50 rounded-xl p-4 text-center">
                        <p className="text-xs text-indigo-500 font-medium mb-1">만 나이</p>
                        <p className="text-3xl font-bold text-indigo-700">{result.age}<span className="text-base ml-0.5">세</span></p>
                        <p className="text-[10px] text-indigo-400 mt-1">국제 표준</p>
                      </div>
                      <div className="bg-amber-50 rounded-xl p-4 text-center">
                        <p className="text-xs text-amber-600 font-medium mb-1">연 나이</p>
                        <p className="text-3xl font-bold text-amber-700">{result.yearAge}<span className="text-base ml-0.5">세</span></p>
                        <p className="text-[10px] text-amber-400 mt-1">올해 - 출생연도</p>
                      </div>
                      <div className="bg-emerald-50 rounded-xl p-4 text-center">
                        <p className="text-xs text-emerald-600 font-medium mb-1">세는 나이</p>
                        <p className="text-3xl font-bold text-emerald-700">{result.koreanAge}<span className="text-base ml-0.5">세</span></p>
                        <p className="text-[10px] text-emerald-400 mt-1">한국식 나이</p>
                      </div>
                    </div>

                    {/* 설명 박스 */}
                    <div className="bg-gray-50 rounded-xl p-4 text-xs text-gray-500 space-y-1.5">
                      <p><span className="font-semibold text-indigo-600">만 나이</span> — 생일 기준, 2023년부터 법적 기준</p>
                      <p><span className="font-semibold text-amber-600">연 나이</span> — 현재년도 - 출생년도 (병역법 등)</p>
                      <p><span className="font-semibold text-emerald-600">세는 나이</span> — 태어나면 1살, 새해마다 +1</p>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div className="bg-gray-50 rounded-xl p-4 text-center">
                        <p className="text-xs text-gray-500 mb-1">총 개월 수</p>
                        <p className="text-xl font-bold text-gray-700">{result.totalMonths.toLocaleString()}<span className="text-sm ml-0.5">개월</span></p>
                      </div>
                      <div className="bg-gray-50 rounded-xl p-4 text-center">
                        <p className="text-xs text-gray-500 mb-1">총 일수</p>
                        <p className="text-xl font-bold text-gray-700">{result.totalDays.toLocaleString()}<span className="text-sm ml-0.5">일</span></p>
                      </div>
                    </div>

                    <div className="bg-pink-50 rounded-xl p-4 text-center">
                      <p className="text-xs text-pink-500 mb-1">다음 생일까지</p>
                      <p className="text-xl font-bold text-pink-600">
                        {result.daysUntilBirthday === 365 || result.daysUntilBirthday === 366
                          ? '🎉 오늘이 생일입니다!'
                          : `${result.daysUntilBirthday}일 남음`}
                      </p>
                    </div>
                  </div>
                )}
              </div>
            </Card>

            <p className="text-center text-gray-400 text-xs mt-6">
              오늘 날짜 기준으로 계산됩니다
            </p>
          </div>
        </div>
      );
    }

    // ========================================
    // 🔧 Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
