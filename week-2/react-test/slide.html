<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React CSS 테스트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* 커스텀 그라데이션 애니메이션 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 0.6s ease-out forwards;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      const [count, setCount] = useState(0);

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-900 to-slate-700 flex items-center justify-center p-4">
          <div className="fade-in max-w-md w-full space-y-6">

            {/* 1. h1 - 제목 */}
            <h1 className="text-4xl font-bold text-white text-center tracking-tight">
              React CSS 테스트
            </h1>

            {/* 2. p - 설명 텍스트 */}
            <p className="text-slate-300 text-center text-lg leading-relaxed">
              간단한 HTML 태그와 CSS 스타일 예제입니다.
            </p>

            {/* 3. div (카드) - 카운터 */}
            <div className="bg-white/10 backdrop-blur-md rounded-2xl p-6 border border-white/20 shadow-xl">
              <p className="text-6xl font-mono text-center text-emerald-400 font-bold">
                {count}
              </p>
              <div className="flex gap-3 mt-4 justify-center">
                <button
                  onClick={() => setCount(c => c - 1)}
                  className="px-5 py-2 bg-rose-500 hover:bg-rose-600 text-white rounded-lg font-medium transition-colors duration-200"
                >
                  - 감소
                </button>
                <button
                  onClick={() => setCount(0)}
                  className="px-5 py-2 bg-slate-500 hover:bg-slate-600 text-white rounded-lg font-medium transition-colors duration-200"
                >
                  초기화
                </button>
                <button
                  onClick={() => setCount(c => c + 1)}
                  className="px-5 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg font-medium transition-colors duration-200"
                >
                  + 증가
                </button>
              </div>
            </div>

            {/* 4. ul - 리스트 */}
            <ul className="bg-white/5 rounded-xl p-4 space-y-2 border border-white/10">
              <li className="text-slate-300 flex items-center gap-2">
                <span className="w-2 h-2 bg-emerald-400 rounded-full inline-block"></span>
                h1 - 제목 태그
              </li>
              <li className="text-slate-300 flex items-center gap-2">
                <span className="w-2 h-2 bg-blue-400 rounded-full inline-block"></span>
                p - 문단 태그
              </li>
              <li className="text-slate-300 flex items-center gap-2">
                <span className="w-2 h-2 bg-purple-400 rounded-full inline-block"></span>
                button - 버튼 태그
              </li>
              <li className="text-slate-300 flex items-center gap-2">
                <span className="w-2 h-2 bg-rose-400 rounded-full inline-block"></span>
                ul/li - 리스트 태그
              </li>
              <li className="text-slate-300 flex items-center gap-2">
                <span className="w-2 h-2 bg-amber-400 rounded-full inline-block"></span>
                img - 이미지 태그
              </li>
            </ul>

            {/* 5. img - 이미지 */}
            <img
              src="https://picsum.photos/400/200"
              alt="랜덤 샘플 이미지"
              className="w-full rounded-xl shadow-lg border border-white/10 hover:scale-[1.02] transition-transform duration-300"
            />

          </div>
        </div>
      );
    }

    // ========================================
    // 렌더링
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
