<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>색상 팔레트 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .color-swatch {
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .color-swatch:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    .copied {
      animation: pop 0.4s ease;
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback } = React;

    // ========================================
    // 🎨 색상 유틸리티
    // ========================================

    function hexToHSL(hex) {
      let r = parseInt(hex.slice(1, 3), 16) / 255;
      let g = parseInt(hex.slice(3, 5), 16) / 255;
      let b = parseInt(hex.slice(5, 7), 16) / 255;

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;

      if (max === min) {
        h = s = 0;
      } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }
      return { h: h * 360, s: s * 100, l: l * 100 };
    }

    function hslToHex(h, s, l) {
      h = ((h % 360) + 360) % 360;
      s = Math.max(0, Math.min(100, s)) / 100;
      l = Math.max(0, Math.min(100, l)) / 100;

      const a = s * Math.min(l, 1 - l);
      const f = (n) => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    function generatePalette(hex) {
      const { h, s, l } = hexToHSL(hex);

      // 어두운 색상 5개 (가장 어두운 것부터)
      const darks = [];
      for (let i = 5; i >= 1; i--) {
        const ratio = i / 6;
        const newL = l * (1 - ratio * 0.85);
        const newS = Math.min(100, s + (100 - s) * ratio * 0.15);
        darks.push(hslToHex(h, newS, newL));
      }

      // 밝은 색상 5개 (밝아지는 순서)
      const lights = [];
      for (let i = 1; i <= 5; i++) {
        const ratio = i / 6;
        const newL = l + (100 - l) * ratio * 0.9;
        const newS = Math.max(0, s * (1 - ratio * 0.4));
        lights.push(hslToHex(h, newS, newL));
      }

      return { darks, lights };
    }

    function getContrastColor(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.55 ? '#1f2937' : '#ffffff';
    }

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-lg p-6 sm:p-8 ${className}`}>
          {children}
        </div>
      );
    }

    function ColorSwatch({ color, label, onCopy }) {
      const [copied, setCopied] = useState(false);
      const textColor = getContrastColor(color);

      function handleClick() {
        navigator.clipboard.writeText(color.toUpperCase()).then(() => {
          setCopied(true);
          if (onCopy) onCopy(color);
          setTimeout(() => setCopied(false), 1200);
        });
      }

      return (
        <button
          onClick={handleClick}
          className={`color-swatch rounded-xl p-4 flex flex-col items-center justify-center
                     min-h-[80px] sm:min-h-[90px] cursor-pointer border-0 w-full ${copied ? 'copied' : ''}`}
          style={{ backgroundColor: color }}
        >
          {copied ? (
            <span className="text-sm font-bold" style={{ color: textColor }}>복사됨!</span>
          ) : (
            <>
              {label && <span className="text-[10px] font-medium opacity-70 mb-1" style={{ color: textColor }}>{label}</span>}
              <span className="text-sm font-mono font-bold" style={{ color: textColor }}>
                {color.toUpperCase()}
              </span>
            </>
          )}
        </button>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      const [selectedColor, setSelectedColor] = useState('#6366f1');
      const [hexInput, setHexInput] = useState('6366F1');
      const [hexError, setHexError] = useState('');
      const [toast, setToast] = useState('');

      function handleColorPicker(e) {
        setSelectedColor(e.target.value);
        setHexInput(e.target.value.slice(1).toUpperCase());
        setHexError('');
      }

      function handleHexInput(e) {
        // # 제거하고 hex 문자만 허용
        const val = e.target.value.replace(/[^0-9A-Fa-f]/g, '').slice(0, 6);
        setHexInput(val.toUpperCase());

        if (val.length === 6) {
          setSelectedColor('#' + val.toLowerCase());
          setHexError('');
        } else if (val.length > 0) {
          setHexError('6자리를 입력하세요 (예: FF5733)');
        } else {
          setHexError('');
        }
      }

      function handlePreset(c) {
        setSelectedColor(c);
        setHexInput(c.slice(1).toUpperCase());
        setHexError('');
      }

      const palette = generatePalette(selectedColor);

      const handleCopy = useCallback((color) => {
        setToast(`${color.toUpperCase()} 복사됨`);
        setTimeout(() => setToast(''), 1500);
      }, []);

      const presetColors = [
        '#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4',
        '#3b82f6', '#6366f1', '#8b5cf6', '#ec4899', '#64748b',
      ];

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-100 via-gray-50 to-zinc-100 py-8 px-4">
          {/* 토스트 */}
          {toast && (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-2.5
                           rounded-full shadow-xl text-sm font-medium z-50 transition-all">
              {toast}
            </div>
          )}

          <div className="w-full max-w-2xl mx-auto">
            <h1 className="text-3xl sm:text-4xl font-bold text-center text-gray-800 mb-2">
              🎨 색상 팔레트 생성기
            </h1>
            <p className="text-center text-gray-400 text-sm mb-8">
              색상을 선택하면 어둡고 밝은 팔레트를 만들어줍니다
            </p>

            {/* 색상 선택 */}
            <Card className="mb-6">
              <div className="flex flex-col items-center gap-5">
                <div className="flex items-center gap-4">
                  <div className="relative">
                    <input
                      type="color"
                      value={selectedColor}
                      onChange={handleColorPicker}
                      className="w-16 h-16 rounded-xl cursor-pointer border-2 border-gray-200"
                    />
                  </div>
                  <div className="flex-1">
                    <p className="text-sm text-gray-500 mb-1">HEX 코드 입력</p>
                    <div className={`flex items-center border rounded-lg overflow-hidden transition-all
                                    ${hexError ? 'border-red-300 ring-2 ring-red-100' : 'border-gray-200 focus-within:ring-2 focus-within:ring-indigo-400 focus-within:border-transparent'}`}>
                      <span className="text-2xl font-mono font-bold text-gray-400 pl-3 select-none">#</span>
                      <input
                        type="text"
                        value={hexInput}
                        onChange={handleHexInput}
                        placeholder="FF5733"
                        maxLength={6}
                        className="w-full text-2xl font-mono font-bold text-gray-800 px-1 py-1.5
                                  focus:outline-none bg-transparent"
                      />
                    </div>
                    {hexError && <p className="text-[11px] text-red-400 mt-1">{hexError}</p>}
                  </div>
                </div>

                {/* 프리셋 색상 */}
                <div className="flex flex-wrap justify-center gap-2">
                  {presetColors.map((c) => (
                    <button
                      key={c}
                      onClick={() => handlePreset(c)}
                      className={`w-8 h-8 rounded-full transition-all hover:scale-110
                                 ${selectedColor === c ? 'ring-2 ring-offset-2 ring-gray-400 scale-110' : ''}`}
                      style={{ backgroundColor: c }}
                    />
                  ))}
                </div>
              </div>
            </Card>

            {/* 기준 색상 */}
            <div className="mb-6">
              <div className="flex items-center justify-center mb-3">
                <div className="h-px bg-gray-300 flex-1" />
                <span className="px-4 text-sm font-semibold text-gray-500">기준 색상</span>
                <div className="h-px bg-gray-300 flex-1" />
              </div>
              <div
                className="rounded-2xl p-6 text-center shadow-md"
                style={{ backgroundColor: selectedColor }}
              >
                <p className="text-lg font-bold font-mono" style={{ color: getContrastColor(selectedColor) }}>
                  {selectedColor.toUpperCase()}
                </p>
              </div>
            </div>

            {/* 어두운 팔레트 */}
            <div className="mb-6">
              <div className="flex items-center mb-3">
                <span className="text-sm font-semibold text-gray-600">🌑 어두운 색상</span>
                <span className="text-xs text-gray-400 ml-2">어두운 순</span>
              </div>
              <div className="grid grid-cols-5 gap-2 sm:gap-3">
                {palette.darks.map((color, i) => (
                  <ColorSwatch
                    key={`dark-${i}`}
                    color={color}
                    label={`D${5 - i}`}
                    onCopy={handleCopy}
                  />
                ))}
              </div>
            </div>

            {/* 밝은 팔레트 */}
            <div className="mb-6">
              <div className="flex items-center mb-3">
                <span className="text-sm font-semibold text-gray-600">☀️ 밝은 색상</span>
                <span className="text-xs text-gray-400 ml-2">밝은 순</span>
              </div>
              <div className="grid grid-cols-5 gap-2 sm:gap-3">
                {palette.lights.map((color, i) => (
                  <ColorSwatch
                    key={`light-${i}`}
                    color={color}
                    label={`L${i + 1}`}
                    onCopy={handleCopy}
                  />
                ))}
              </div>
            </div>

            {/* 전체 팔레트 스트립 */}
            <div className="mb-6">
              <div className="flex items-center mb-3">
                <span className="text-sm font-semibold text-gray-600">📊 전체 팔레트</span>
              </div>
              <div className="flex rounded-2xl overflow-hidden shadow-md h-14">
                {[...palette.darks, selectedColor, ...palette.lights].map((color, i) => (
                  <div
                    key={`strip-${i}`}
                    className="flex-1 cursor-pointer hover:flex-[1.5] transition-all relative group"
                    style={{ backgroundColor: color }}
                    onClick={() => {
                      navigator.clipboard.writeText(color.toUpperCase());
                      handleCopy(color);
                    }}
                  >
                    {i === 5 && (
                      <div className="absolute inset-x-0 -top-1 h-1 bg-gray-800 rounded-t" />
                    )}
                    <span className="absolute inset-0 flex items-center justify-center text-[9px] font-mono font-bold
                                    opacity-0 group-hover:opacity-100 transition-opacity"
                          style={{ color: getContrastColor(color) }}>
                      {color.toUpperCase()}
                    </span>
                  </div>
                ))}
              </div>
              <div className="flex justify-between mt-1">
                <span className="text-[10px] text-gray-400">어두운</span>
                <span className="text-[10px] text-gray-400">기준</span>
                <span className="text-[10px] text-gray-400">밝은</span>
              </div>
            </div>

            {/* CSS 코드 복사 */}
            <Card>
              <div className="flex items-center justify-between mb-3">
                <span className="text-sm font-semibold text-gray-600">💻 CSS 변수 코드</span>
                <button
                  onClick={() => {
                    const allColors = [...palette.darks, selectedColor, ...palette.lights];
                    const css = `:root {\n${allColors.map((c, i) => {
                      const label = i < 5 ? `--color-dark-${5 - i}` : i === 5 ? `--color-base` : `--color-light-${i - 5}`;
                      return `  ${label}: ${c.toUpperCase()};`;
                    }).join('\n')}\n}`;
                    navigator.clipboard.writeText(css);
                    handleCopy('CSS 코드');
                  }}
                  className="text-xs px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg
                            font-medium text-gray-600 transition-colors"
                >
                  전체 복사
                </button>
              </div>
              <pre className="bg-gray-900 text-green-400 rounded-xl p-4 text-xs overflow-x-auto font-mono">
{`:root {
${[...palette.darks, selectedColor, ...palette.lights].map((c, i) => {
  const label = i < 5 ? `  --color-dark-${5 - i}` : i === 5 ? `  --color-base` : `  --color-light-${i - 5}`;
  return `${label}: ${c.toUpperCase()};`;
}).join('\n')}
}`}
              </pre>
            </Card>

            <p className="text-center text-gray-400 text-xs mt-6">
              색상 클릭 시 HEX 코드가 클립보드에 복사됩니다
            </p>
          </div>
        </div>
      );
    }

    // ========================================
    // 🔧 Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
