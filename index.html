                          </span>
                        </div>
                      </div>
                    );
                  })}
                </Card>
              </>
            )}
          </div>
          <ProjectFormModal isOpen={modalOpen} onClose={() => setModalOpen(false)} onSubmit={handleCreated} />
          <ProjectFormModal mode="edit" project={editTarget} isOpen={!!editTarget}
            onClose={() => setEditTarget(null)} onSubmit={handleEdited} />
          <DeleteProjectModal isOpen={!!deleteTarget} onClose={() => setDeleteTarget(null)}
            onConfirm={handleDeleted} project={deleteTarget}
            sessionCount={delStats ? delStats.sessionCount : 0}
            questionCount={delStats ? delStats.questionCount : 0} />
          <BannedWordsModal isOpen={bannedOpen} onClose={() => setBannedOpen(false)} />
        </div>
      );
    };

    // 생성/수정 겸용 모달. mode='create' | 'edit', project(수정 시 prefill 대상)
    const emptyProjectForm = { name: '', client: '', description: '', start_date: '', end_date: '', status: '준비중' };
    const ProjectFormModal = ({ isOpen, onClose, onSubmit, mode = 'create', project = null }) => {
      const [form, setForm] = useState(emptyProjectForm);
      const [error, setError] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const isEdit = mode === 'edit';

      useEffect(() => {
        if (!isOpen) return;
        if (isEdit && project) {
          setForm({
            name: project.name || '',
            client: project.client || '',
            description: project.description || '',
            start_date: project.start_date || '',
            end_date: project.end_date || '',
            status: project.status || '준비중',
          });
        } else {
          setForm(emptyProjectForm);
        }
        setError('');
      }, [isOpen, isEdit, project]);

      const update = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));

      const submit = async () => {
        if (!form.name.trim()) { setError('프로젝트명을 입력해 주세요'); return; }
        setSubmitting(true);
        await onSubmit(form);
        setSubmitting(false);
      };

      return (
        <Modal isOpen={isOpen} onClose={onClose} title={isEdit ? '프로젝트 수정' : '새 프로젝트 만들기'}>
          <div className="space-y-3">
            <Input label="프로젝트명 *" placeholder="예: Mendix Korea Seminar 2026"
              value={form.name} onChange={update('name')} error={error} />
            <Input label="고객사 / 주최사명" placeholder="예: Mendix"
              value={form.client} onChange={update('client')} />
            <Textarea label="프로젝트 설명" placeholder="행사에 대한 간단한 설명" rows={3}
              value={form.description} onChange={update('description')} />
            <div className="grid grid-cols-2 gap-3">
              <Input label="시작일" type="date" value={form.start_date} onChange={update('start_date')} />
              <Input label="종료일" type="date" value={form.end_date} onChange={update('end_date')} />
            </div>
            <Select label="상태" value={form.status} onChange={update('status')}
              options={['준비중', '진행중', '종료']} />
          </div>
          <div className="flex gap-2 justify-end mt-5">
            <Button variant="secondary" onClick={onClose}>취소</Button>
            <Button onClick={submit} disabled={submitting}>
              {submitting ? <Spinner className="w-4 h-4" /> : (isEdit ? '저장' : '만들기')}
            </Button>
          </div>
        </Modal>
      );
    };

    // 프로젝트 삭제 확인 모달 — confirm-by-typing 패턴
    const DeleteProjectModal = ({ isOpen, onClose, onConfirm, project, sessionCount = 0, questionCount = 0 }) => {
      const [typed, setTyped] = useState('');
      const [submitting, setSubmitting] = useState(false);

      useEffect(() => {
        if (isOpen) { setTyped(''); setSubmitting(false); }
      }, [isOpen]);

      const name = project ? project.name : '';
      const canDelete = typed.trim() === name && name.length > 0;

      const confirm = async () => {
        if (!canDelete) return;
        setSubmitting(true);
        await onConfirm();
        setSubmitting(false);
      };

      return (
        <Modal isOpen={isOpen} onClose={onClose} title="프로젝트 삭제" size="md">
          <div className="space-y-4">
            <div className="flex items-start gap-3 rounded-md border border-red-200 bg-red-50 px-3.5 py-3 dark:border-red-900/70 dark:bg-red-950/30">
              <svg className="w-5 h-5 shrink-0 mt-0.5 text-red-600 dark:text-red-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01" />
              </svg>
              <div className="text-sm text-red-700 dark:text-red-300 leading-relaxed">
                이 작업은 <b>되돌릴 수 없습니다</b>. 프로젝트
                <span className="font-semibold"> “{name}” </span>
                와 함께 아래 하위 데이터가 <b>영구 삭제</b>됩니다.
              </div>
            </div>

            <div className="grid grid-cols-2 gap-2">
              <div className="rounded-md border border-ink-200 dark:border-ink-800 px-3 py-2.5 text-center">
                <div className="text-lg font-semibold tabular-nums tracking-tightish text-ink-900 dark:text-ink-50">{sessionCount}</div>
                <div className="text-[11px] text-ink-400 dark:text-ink-500 mt-0.5">삭제될 세션</div>
              </div>
              <div className="rounded-md border border-ink-200 dark:border-ink-800 px-3 py-2.5 text-center">
                <div className="text-lg font-semibold tabular-nums tracking-tightish text-ink-900 dark:text-ink-50">{questionCount}</div>
                <div className="text-[11px] text-ink-400 dark:text-ink-500 mt-0.5">삭제될 질문</div>
              </div>
            </div>

            <div>
              <label className={labelCls}>
                확인을 위해 프로젝트명 <span className="font-mono text-ink-900 dark:text-ink-100">{name}</span> 을(를) 입력하세요
              </label>
              <input
                value={typed}
                onChange={(e) => setTyped(e.target.value)}
                placeholder={name}
                autoComplete="off"
                onKeyDown={(e) => { if (e.key === 'Enter') confirm(); }}
                className={`${fieldBase} ${fieldNormal}`}
              />
            </div>
          </div>

          <div className="flex gap-2 justify-end mt-5">
            <Button variant="secondary" onClick={onClose}>취소</Button>
            <Button variant="danger" onClick={confirm} disabled={!canDelete || submitting}>
              {submitting ? <Spinner className="w-4 h-4" /> : <><TrashIcon className="w-3.5 h-3.5" /> 영구 삭제</>}
            </Button>
          </div>
        </Modal>
      );
    };

    // 행/헤더에서 재사용하는 작은 아이콘 버튼 (수정/삭제)
    const IconButton = ({ onClick, label, tone = 'default', className = '', children }) => {
      const tones = {
        default: 'border-ink-200 dark:border-ink-700 text-ink-500 dark:text-ink-300 hover:bg-ink-100 dark:hover:bg-ink-800 hover:text-ink-800 dark:hover:text-ink-100 focus-visible:ring-ink-400/40',
        danger: 'border-red-200 dark:border-red-900/70 text-red-500 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-950/40 hover:text-red-600 dark:hover:text-red-300 focus-visible:ring-red-400/40',
      };
      return (
        <button type="button" onClick={onClick} aria-label={label} title={label}
          className={`shrink-0 inline-flex items-center justify-center w-8 h-8 rounded-md border transition-colors focus:outline-none focus-visible:ring-2 ${tones[tone]} ${className}`}>
          {children}
        </button>
      );
    };

    // ========================================
    // 📄 Page: 프로젝트 상세  #/admin/project/:projectId
    // ========================================
    const ProjectDetailPage = ({ params }) => {
      const { navigate } = useRouter();
      const toast = useToast();
      const copy = useClipboard();
      const [project, setProject] = useState(undefined); // undefined=loading
      const [sessions, setSessions] = useState(null);
      const [statsMap, setStatsMap] = useState({});
      const [modalOpen, setModalOpen] = useState(false);
      const [editOpen, setEditOpen] = useState(false);
      const [deleteOpen, setDeleteOpen] = useState(false);
      const [qrOpen, setQrOpen] = useState(false);              // 행사 QR 모달
      const [editSession, setEditSession] = useState(null);     // 수정 대상 세션
      const [deleteSession, setDeleteSession] = useState(null); // 삭제 대상 세션

      const load = useCallback(async () => {
        const p = await mockApi.fetchProject(params.projectId);
        setProject(p);
        if (!p) return;
        const list = await mockApi.fetchSessions(params.projectId);
        setSessions(list);
        const entries = await Promise.all(list.map(async (s) => [s.id, await mockApi.fetchSessionStats(s.id)]));
        setStatsMap(Object.fromEntries(entries));
      }, [params.projectId]);

      useEffect(() => { load(); }, [load]);

      const handleCreated = async (payload) => {
        await mockApi.createSession(params.projectId, payload);
        setModalOpen(false);
        await load();
      };

      const handleEdited = async (payload) => {
        const updated = await mockApi.updateProject(params.projectId, payload);
        setEditOpen(false);
        if (updated) setProject(updated);
        toast.show('프로젝트가 수정되었습니다', 'success');
      };

      const handleDeleted = async () => {
        await mockApi.deleteProject(params.projectId);
        setDeleteOpen(false);
        toast.show('프로젝트를 삭제했습니다', 'success');
        navigate('/admin');
      };

      const handleSessionEdited = async (payload) => {
        await mockApi.updateSession(editSession.id, payload);
        setEditSession(null);
        await load();
        toast.show('세션이 수정되었습니다', 'success');
      };

      const handleSessionDeleted = async () => {
        const res = await mockApi.deleteSession(deleteSession.id);
        setDeleteSession(null);
        await load();
        toast.show(`세션을 삭제했습니다 (질문 ${res.removedQuestions} 포함)`, 'success');
      };

      // 삭제 확인 모달용 프로젝트 전체 집계 (세션별 질문 합산)
      const delCounts = useMemo(() => {
        const list = sessions || [];
        const questionCount = list.reduce((sum, s) => sum + ((statsMap[s.id] || {}).total || 0), 0);
        return { sessionCount: list.length, questionCount };
      }, [sessions, statsMap]);

      if (project === undefined) return <div className="min-h-screen bg-ink-50 dark:bg-ink-950"><Loading /></div>;
      if (project === null) return <NotFound />;

      return (
        <div className="min-h-screen bg-ink-50 dark:bg-ink-950">
          <AdminHeader
            eyebrow="프로젝트"
            title={project.name}
            subtitle={project.client || undefined}
            back="/admin"
            right={
              <>
                <IconButton label="프로젝트 수정" onClick={() => setEditOpen(true)}>
                  <PencilIcon className="w-4 h-4" />
                </IconButton>
                <IconButton label="프로젝트 삭제" tone="danger" onClick={() => setDeleteOpen(true)}>
                  <TrashIcon className="w-4 h-4" />
                </IconButton>
                <Button variant="secondary" onClick={() => setQrOpen(true)}>
                  <QrIcon className="w-4 h-4" /> 행사 QR
                </Button>
                <ExcelButton label="전체 Q&A" kind="project" id={params.projectId} />
                <Button onClick={() => setModalOpen(true)}><PlusIcon /> 세션 만들기</Button>
              </>
            }
          />
          <div className="max-w-5xl mx-auto px-4 sm:px-6 py-7">
            {sessions === null ? (
              <Loading />
            ) : sessions.length === 0 ? (
              <EmptyState title="아직 세션이 없습니다"
                desc="첫 번째 세션을 만들어 사용자/관리자 URL을 발급하세요."
                action={<Button onClick={() => setModalOpen(true)}><PlusIcon /> 세션 만들기</Button>} />
            ) : (
              <>
                <div className="flex items-baseline justify-between mb-3">
                  <h2 className="text-xs font-semibold uppercase tracking-[0.12em] text-ink-400 dark:text-ink-500">세션</h2>
                  <span className="text-xs text-ink-400 tabular-nums">{sessions.length}개</span>
                </div>
                <div className="space-y-3">
                  {sessions.map((s) => {
                    const st = statsMap[s.id] || { total: 0, pending: 0, answered: 0, hidden: 0 };
                    const userUrl = buildUserUrl(s.id);
                    const adminUrl = buildAdminUrl(s.id, s.admin_token);
                    return (
                      <Card key={s.id} className="group p-5">
                        <div className="flex items-start justify-between gap-3 flex-wrap">
                          <div className="min-w-0">
                            <div className="flex items-center gap-2 flex-wrap">
                              <h3 className="text-base font-semibold text-ink-900 dark:text-ink-50 tracking-tightish">{s.name}</h3>
                              {s.is_public
                                ? <Badge color="accent">공개</Badge>
                                : <Badge color="slate">비공개</Badge>}
                            </div>
                            {(s.description || s.duration) && (
                              <p className="text-sm text-ink-500 dark:text-ink-400 mt-1">
                                {s.duration && <span className="tabular-nums">{s.duration}</span>}
                                {s.duration && s.description && <span className="mx-1.5 text-ink-300 dark:text-ink-600">·</span>}
                                {s.description}
                              </p>
                            )}
                          </div>
                          <div className="flex items-center gap-1.5 shrink-0 opacity-60 group-hover:opacity-100 focus-within:opacity-100 transition-opacity">
                            <IconButton label="세션 수정"
                              onClick={() => setEditSession(s)}>
                              <PencilIcon className="w-4 h-4" />
                            </IconButton>
                            <IconButton label="세션 삭제" tone="danger"
                              onClick={() => setDeleteSession(s)}>
                              <TrashIcon className="w-4 h-4" />
                            </IconButton>
                          </div>
                        </div>

                        <div className="mt-4 grid grid-cols-4 divide-x divide-ink-100 dark:divide-ink-800 border-y border-ink-100 dark:border-ink-800">
                          <Stat label="질문" value={st.total} />
                          <Stat label="답변대기" value={st.pending} tone="amber" />
                          <Stat label="답변완료" value={st.answered} tone="accent" />
                          <Stat label="숨김" value={st.hidden} tone="muted" />
                        </div>

                        <div className="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-2">
                          <UrlRow label="사용자 URL" url={userUrl}
                            onCopy={() => copy(userUrl, '사용자 URL이 복사되었습니다')} />
                          <UrlRow label="관리자 URL" url={adminUrl}
                            onCopy={() => copy(adminUrl, '관리자 URL이 복사되었습니다')} />
                        </div>

                        <div className="mt-4 flex flex-wrap gap-2">
                          <Button variant="primary" size="sm"
                            onClick={() => navigate(`/admin/session/${s.id}?token=${s.admin_token}`)}>
                            대시보드 열기
                          </Button>
                          <Button variant="secondary" size="sm"
                            onClick={() => navigate(`/session/${s.id}`)}>
                            사용자 화면 미리보기
                          </Button>
                          <ExcelButton size="sm" label="엑셀" kind="session" id={s.id} token={s.admin_token} />
                        </div>
                      </Card>
                    );
                  })}
                </div>
              </>
            )}
          </div>
          <SessionFormModal isOpen={modalOpen} onClose={() => setModalOpen(false)} onSubmit={handleCreated} />
          <SessionFormModal mode="edit" session={editSession} isOpen={!!editSession}
            onClose={() => setEditSession(null)} onSubmit={handleSessionEdited} />
          <DeleteSessionModal isOpen={!!deleteSession} onClose={() => setDeleteSession(null)}
            onConfirm={handleSessionDeleted} session={deleteSession}
            questionCount={deleteSession ? ((statsMap[deleteSession.id] || {}).total || 0) : 0} />
          <ProjectFormModal mode="edit" project={project} isOpen={editOpen}
            onClose={() => setEditOpen(false)} onSubmit={handleEdited} />
          <DeleteProjectModal isOpen={deleteOpen} onClose={() => setDeleteOpen(false)}
            onConfirm={handleDeleted} project={project}
            sessionCount={delCounts.sessionCount} questionCount={delCounts.questionCount} />
          <QrCodeModal isOpen={qrOpen} onClose={() => setQrOpen(false)}
            url={buildEventUrl(params.projectId)}
            title="행사 QR"
            fileName={`${(project.name || '행사').replace(/[\\/:*?"<>|]+/g, '_').replace(/\s+/g, '_')}_QR.png`} />
        </div>
      );
    };

    const Stat = ({ label, value, tone = 'default' }) => {
      const valTone = {
        default: 'text-ink-900 dark:text-ink-50',
        amber: 'text-amber-600 dark:text-amber-400',
        accent: 'text-accent-600 dark:text-accent-400',
        muted: 'text-ink-400 dark:text-ink-500',
      };
      return (
        <div className="px-3 py-2.5 text-center first:pl-0">
          <div className={`text-lg font-semibold tabular-nums tracking-tightish ${valTone[tone]}`}>{value}</div>
          <div className="text-[11px] text-ink-400 dark:text-ink-500 mt-0.5">{label}</div>
        </div>
      );
    };

    const UrlRow = ({ label, url, onCopy }) => (
      <div className="flex items-center gap-2 bg-ink-50 border border-ink-200 rounded-md px-3 py-2 min-w-0 dark:bg-ink-950 dark:border-ink-800">
        <div className="min-w-0 flex-1">
          <div className="text-[11px] font-semibold text-ink-400 dark:text-ink-500 uppercase tracking-wide">{label}</div>
          <div className="text-xs text-ink-600 dark:text-ink-300 truncate font-mono" title={url}>{url}</div>
        </div>
        <Button variant="subtle" size="sm" onClick={onCopy} className="shrink-0">복사</Button>
      </div>
    );

    // 생성/수정 겸용 모달. mode='create' | 'edit', session(수정 시 prefill 대상)
    // ⚠️ admin_token / session_id(URL)은 수정 대상이 아니므로 폼에 포함하지 않음 → URL 유지
    const emptySessionForm = { name: '', description: '', duration: '', is_public: true };
    const SessionFormModal = ({ isOpen, onClose, onSubmit, mode = 'create', session = null }) => {
      const [form, setForm] = useState(emptySessionForm);
      const [error, setError] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const isEdit = mode === 'edit';

      useEffect(() => {
        if (!isOpen) return;
        if (isEdit && session) {
          setForm({
            name: session.name || '',
            description: session.description || '',
            duration: session.duration || '',
            is_public: !!session.is_public,
          });
        } else {
          setForm(emptySessionForm);
        }
        setError('');
      }, [isOpen, isEdit, session]);

      const update = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));

      const submit = async () => {
        if (!form.name.trim()) { setError('세션명을 입력해 주세요'); return; }
        setSubmitting(true);
        await onSubmit(form);
        setSubmitting(false);
      };

      return (
        <Modal isOpen={isOpen} onClose={onClose} title={isEdit ? '세션 수정' : '세션 만들기'}>
          <div className="space-y-3">
            <Input label="세션명 *" placeholder="예: 오프닝 키노트"
              value={form.name} onChange={update('name')} error={error} />
            <Textarea label="세션 설명" placeholder="세션에 대한 간단한 설명" rows={3}
              value={form.description} onChange={update('description')} />
            <Input label="진행 시간" placeholder="예: 10:00 ~ 11:00"
              value={form.duration} onChange={update('duration')} />
            <label className="flex items-center gap-2.5 cursor-pointer select-none py-1">
              <input type="checkbox" checked={form.is_public}
                onChange={(e) => setForm((f) => ({ ...f, is_public: e.target.checked }))}
                style={{ accentColor: '#236d70' }}
                className="w-5 h-5 rounded" />
              <span className="text-sm text-ink-700 dark:text-ink-300">공개 세션 (사용자에게 노출)</span>
            </label>
          </div>
          <div className="flex gap-2 justify-end mt-5">
            <Button variant="secondary" onClick={onClose}>취소</Button>
            <Button onClick={submit} disabled={submitting}>
              {submitting ? <Spinner className="w-4 h-4" /> : (isEdit ? '저장' : '만들기')}
            </Button>
          </div>
        </Modal>
      );
    };

    // 세션 삭제 확인 모달 — confirm-by-typing 패턴 (프로젝트 삭제와 동일)
    const DeleteSessionModal = ({ isOpen, onClose, onConfirm, session, questionCount = 0 }) => {
      const [typed, setTyped] = useState('');
      const [submitting, setSubmitting] = useState(false);

      useEffect(() => {
        if (isOpen) { setTyped(''); setSubmitting(false); }
      }, [isOpen]);

      const name = session ? session.name : '';
      const canDelete = typed.trim() === name && name.length > 0;

      const confirm = async () => {
        if (!canDelete) return;
        setSubmitting(true);
        await onConfirm();
        setSubmitting(false);
      };

      return (
        <Modal isOpen={isOpen} onClose={onClose} title="세션 삭제" size="md">
          <div className="space-y-4">
            <div className="flex items-start gap-3 rounded-md border border-red-200 bg-red-50 px-3.5 py-3 dark:border-red-900/70 dark:bg-red-950/30">
              <svg className="w-5 h-5 shrink-0 mt-0.5 text-red-600 dark:text-red-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01" />
              </svg>
              <div className="text-sm text-red-700 dark:text-red-300 leading-relaxed">
                이 작업은 <b>되돌릴 수 없습니다</b>. 세션
                <span className="font-semibold"> “{name}” </span>
                와 함께 해당 세션의 모든 질문이 <b>영구 삭제</b>됩니다.
              </div>
            </div>

            <div className="rounded-md border border-ink-200 dark:border-ink-800 px-3 py-2.5 text-center">
              <div className="text-lg font-semibold tabular-nums tracking-tightish text-ink-900 dark:text-ink-50">{questionCount}</div>
              <div className="text-[11px] text-ink-400 dark:text-ink-500 mt-0.5">삭제될 질문</div>
            </div>

            <div>
              <label className={labelCls}>
                확인을 위해 세션명 <span className="font-mono text-ink-900 dark:text-ink-100">{name}</span> 을(를) 입력하세요
              </label>
              <input
                value={typed}
                onChange={(e) => setTyped(e.target.value)}
                placeholder={name}
                autoComplete="off"
                onKeyDown={(e) => { if (e.key === 'Enter') confirm(); }}
                className={`${fieldBase} ${fieldNormal}`}
              />
            </div>
          </div>

          <div className="flex gap-2 justify-end mt-5">
            <Button variant="secondary" onClick={onClose}>취소</Button>
            <Button variant="danger" onClick={confirm} disabled={!canDelete || submitting}>
              {submitting ? <Spinner className="w-4 h-4" /> : <><TrashIcon className="w-3.5 h-3.5" /> 영구 삭제</>}
            </Button>
          </div>
        </Modal>
      );
    };

    // ========================================
    // 📄 Page: 공개 랜딩  #/event/:projectId  (행사 단일 QR → 세션 선택, 모바일 우선)
    // -----------------------------------------------------------------------
    //  공개 페이지 — 토큰 게이트 밖. 공개 API(/api/public/.../landing)만 호출한다.
    //  행사 제목 + 공개 세션 카드 목록. 카드 탭 → #/session/:sessionId (질문 화면).
    // ========================================
    // 'starts_at ~ ends_at' (HH:MM) 표시. 시간 정보 없으면 빈 문자열.
    const landingDuration = (s) => buildDuration(s.starts_at, s.ends_at);

    const EventLandingPage = ({ params }) => {
      const { navigate } = useRouter();
      const [data, setData] = useState(undefined);  // undefined=loading, null=오류/없음
      const [error, setError] = useState('');

      const load = useCallback(async () => {
        setData(undefined);
        setError('');
        try {
          const res = await mockApi.fetchLanding(params.projectId);
          setData(res);
        } catch (e) {
          console.error('[event] 랜딩 로드 실패:', e);
          // 404(행사 없음) 와 일반 오류를 구분해 안내
          if (e && e.status === 404) {
            setData(null);
            setError('notfound');
          } else {
            setData(null);
            setError('error');
          }
        }
      }, [params.projectId]);

      useEffect(() => { load(); }, [load]);

      if (data === undefined) return <div className="min-h-screen bg-ink-50 dark:bg-ink-950"><Loading /></div>;

      if (data === null) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-ink-50 dark:bg-ink-950 px-4">
            <EmptyState
              title={error === 'notfound' ? '행사를 찾을 수 없습니다' : '불러오지 못했습니다'}
              desc={error === 'notfound'
                ? '링크가 만료되었거나 잘못되었습니다.'
                : '잠시 후 다시 시도해 주세요.'}
              action={error === 'notfound' ? null : <Button onClick={load}>다시 시도</Button>} />
          </div>
        );
      }

      const { project, sessions } = data;

      return (
        <div className="min-h-screen bg-ink-50 dark:bg-ink-950">
          {/* 모바일 우선 헤더 — 사용자 페이지와 동일한 잉크 솔리드 톤 */}
          <div className="bg-ink-900 dark:bg-ink-900 text-white sticky top-0 z-30 border-b border-ink-800">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-start justify-between gap-3">
              <div className="min-w-0">
                <p className="text-accent-400 text-[11px] font-semibold uppercase tracking-[0.14em]">Live Q&amp;A · 세션 선택</p>
                <h1 className="text-xl font-bold leading-tight mt-1 tracking-tightish">{project.title}</h1>
                <p className="text-ink-400 text-sm mt-1">참여할 세션을 선택해 주세요</p>
              </div>
              <ThemeToggle className="border-ink-700 text-ink-300 hover:bg-ink-800 hover:text-white" />
            </div>
          </div>

          <div className="max-w-6xl mx-auto px-4 sm:px-6 py-5 pb-10">
            <div className="flex items-baseline justify-between mb-3">
              <h2 className="text-xs font-semibold uppercase tracking-[0.12em] text-ink-400 dark:text-ink-500">공개 세션</h2>
              <span className="text-xs text-ink-400 tabular-nums">{sessions.length}개</span>
            </div>

            {sessions.length === 0 ? (
              <EmptyState title="공개된 세션이 없습니다"
                desc="아직 공개된 세션이 없어요. 잠시 후 다시 확인해 주세요." />
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                {sessions.map((s) => {
                  const dur = landingDuration(s);
                  return (
                    <button key={s.id} type="button"
                      onClick={() => navigate(`/session/${s.id}`)}
                      className="group w-full text-left bg-white border border-ink-200 rounded-lg p-5 transition active:scale-[0.99] hover:border-accent-400 hover:shadow-sm dark:bg-ink-900 dark:border-ink-800 dark:hover:border-accent-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-accent-500/50 animate-fade-in-up">
                      <div className="flex items-start justify-between gap-3">
                        <div className="min-w-0 flex-1">
                          <h3 className="text-base font-semibold text-ink-900 dark:text-ink-50 tracking-tightish leading-snug">{s.title}</h3>
                          {(dur || s.description) && (
                            <p className="text-sm text-ink-500 dark:text-ink-400 mt-1">
                              {dur && <span className="tabular-nums">{dur}</span>}
                              {dur && s.description && <span className="mx-1.5 text-ink-300 dark:text-ink-600">·</span>}
                              {s.description}
                            </p>
                          )}
                          <div className="mt-3 flex items-center gap-1.5 text-xs text-ink-400 dark:text-ink-500">
                            <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" /></svg>
                            <span className="tabular-nums">질문 {s.questionCount}</span>
                          </div>
                        </div>
                        <svg className="w-5 h-5 mt-0.5 shrink-0 text-ink-300 dark:text-ink-600 group-hover:text-accent-500 dark:group-hover:text-accent-400 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6" /></svg>
                      </div>
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    };

    // ========================================
    // 📄 Page: 사용자 페이지  #/session/:sessionId  (모바일 우선)
    // ========================================
    const UserSessionPage = ({ params }) => {
      const toast = useToast();
      const [session, setSession] = useState(undefined);
      const [questions, setQuestions] = useState(null);
      const [votedIds, setVotedIds] = useState([]);
      const [modalOpen, setModalOpen] = useState(false);
      const voterKey = useMemo(() => getVoterKey(), []);

      const load = useCallback(async () => {
        try {
          const s = await mockApi.fetchSession(params.sessionId);
          setSession(s);
          if (!s) return; // 비공개/없는 세션 → "세션을 찾을 수 없습니다" 빈 상태
          const list = await mockApi.fetchQuestions(params.sessionId, 'user');
          setQuestions(list);
          setVotedIds(mockApi.getVotedIds(voterKey));
        } catch (e) {
          console.error('[user] 세션 로드 실패:', e);
          // 로드 실패 시 스피너에 멈추지 않도록 빈 상태로 정리
          setSession((prev) => (prev === undefined ? null : prev));
          setQuestions((prev) => (prev === null ? [] : prev));
          toast.show('데이터를 불러오지 못했어요. 잠시 후 다시 시도해 주세요', 'error');
        }
      }, [params.sessionId, voterKey, toast]);

      useEffect(() => { load(); }, [load]);

      const handleLike = async (qid) => {
        if (votedIds.includes(qid)) return; // 중복 방지
        // Optimistic UI
        setVotedIds((v) => [...v, qid]);
        setQuestions((qs) =>
          [...qs.map((q) => (q.id === qid ? { ...q, likes: q.likes + 1 } : q))]
            .sort((a, b) => b.likes - a.likes || new Date(a.created_at) - new Date(b.created_at))
        );
        try {
          const res = await mockApi.likeQuestion(qid, voterKey);
          if (res.voted) {
            // 성공 → 서버 like_count 로 보정 + 로컬 캐시 기록
            mockApi.recordVote(voterKey, qid);
            setQuestions((qs) =>
              [...qs.map((q) => (q.id === qid ? { ...q, likes: res.likes } : q))]
                .sort((a, b) => b.likes - a.likes || new Date(a.created_at) - new Date(b.created_at))
            );
          } else {
            // 서버 기준 이미 투표됨 → 서버 값으로 보정 (voted 상태는 유지)
            mockApi.recordVote(voterKey, qid);
            setQuestions((qs) =>
              qs.map((q) => (q.id === qid ? { ...q, likes: res.likes } : q))
            );
          }
        } catch (e) {
          // 실패 → 낙관적 변경 롤백 후 최신 상태 재조회
          setVotedIds((v) => v.filter((x) => x !== qid));
          toast.show('좋아요 처리에 실패했어요. 잠시 후 다시 시도해 주세요', 'error');
          await load();
        }
      };

      const handleCreated = async (payload) => {
        try {
          await mockApi.createQuestion(params.sessionId, payload);
          setModalOpen(false);
          toast.show('질문이 등록되었습니다', 'success');
          await load();
        } catch (e) {
          // 서버 트리거가 금지어로 거부 → 일반 에러 토스트 대신 폼에 친절 안내 표시
          if (e && e.banned) {
            toast.show(BANNED_WORD_MESSAGE, 'error');
            return { banned: true };   // 모달이 닫히지 않고 본문 아래 오류 노출
          }
          toast.show('질문 등록에 실패했어요. 잠시 후 다시 시도해 주세요', 'error');
        }
      };

      if (session === undefined) return <div className="min-h-screen bg-ink-50 dark:bg-ink-950"><Loading /></div>;
      if (session === null) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-ink-50 dark:bg-ink-950">
            <EmptyState title="세션을 찾을 수 없습니다" desc="링크가 만료되었거나 잘못되었습니다." />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-ink-50 dark:bg-ink-950">
          {/* 모바일 우선 헤더 — 잉크 솔리드, 장식 최소화 */}
          <div className="bg-ink-900 dark:bg-ink-900 text-white sticky top-0 z-30 border-b border-ink-800">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-start justify-between gap-3">
              <div className="min-w-0">
                <p className="text-accent-400 text-[11px] font-semibold uppercase tracking-[0.14em]">Live Q&amp;A</p>
                <h1 className="text-xl font-bold leading-tight mt-1 tracking-tightish truncate">{session.name}</h1>
                {session.duration && <p className="text-ink-400 text-sm mt-1 tabular-nums">{session.duration}</p>}
              </div>
              <div className="flex items-center gap-2 shrink-0">
                {/* 데스크탑 전용 헤더 CTA — 모바일에서는 하단 고정 바 사용 */}
                <button onClick={() => setModalOpen(true)}
                  className="hidden md:inline-flex items-center gap-1.5 bg-white text-ink-900 hover:bg-ink-200 active:scale-[0.99] transition text-sm font-semibold px-4 py-2 rounded-lg shadow-sm dark:bg-accent-500 dark:text-white dark:hover:bg-accent-400">
                  <PlusIcon className="w-4 h-4" /> 질문하기
                </button>
                <ThemeToggle className="border-ink-700 text-ink-300 hover:bg-ink-800 hover:text-white" />
              </div>
            </div>
          </div>

          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-5 pb-28 md:pb-10">
            <div className="flex items-baseline justify-between mb-3">
              <h2 className="text-xs font-semibold uppercase tracking-[0.12em] text-ink-400 dark:text-ink-500">인기 질문</h2>
              <span className="text-xs text-ink-400 tabular-nums">
                {questions ? `${questions.length}개` : ''}
              </span>
            </div>

            {questions === null ? (
              <Loading />
            ) : questions.length === 0 ? (
              <EmptyState title="아직 질문이 없습니다"
                desc="첫 번째 질문을 남겨보세요." />
            ) : (
              // 행 우선(row-major) CSS Grid — 인기순(좋아요 desc, created_at asc) 보존: 1등이 좌상단 → 우측 → 다음 줄
              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3 items-start">
                {questions.map((q) => (
                  <UserQuestionCard key={q.id} q={q}
                    voted={votedIds.includes(q.id)}
                    onLike={() => handleLike(q.id)} />
                ))}
              </div>
            )}
          </div>

          {/* 모바일 하단 고정 CTA — 데스크탑에서는 헤더 버튼으로 대체 */}
          <div className="md:hidden fixed bottom-0 inset-x-0 z-30 bg-gradient-to-t from-ink-50 via-ink-50/95 to-transparent dark:from-ink-950 dark:via-ink-950/95 pt-8">
            <div className="max-w-xl mx-auto px-4 pb-4 pb-safe">
              <button onClick={() => setModalOpen(true)}
                className="w-full bg-ink-900 hover:bg-ink-800 active:scale-[0.99] transition text-white text-base font-semibold py-4 rounded-lg shadow-lg shadow-ink-950/20 flex items-center justify-center gap-2 dark:bg-white dark:text-ink-900 dark:hover:bg-ink-200">
                <PlusIcon className="w-5 h-5" /> 질문하기
              </button>
            </div>
          </div>

          <QuestionFormModal isOpen={modalOpen} onClose={() => setModalOpen(false)} onSubmit={handleCreated} />
        </div>
      );
    };

    const UserQuestionCard = ({ q, voted, onLike }) => {
      const [pop, setPop] = useState(false);
      const handle = () => {
        if (!voted) { setPop(true); setTimeout(() => setPop(false), 300); }
        onLike();
      };
      return (
        <Card className="p-4 animate-fade-in-up">
          <div className="flex items-center gap-2 flex-wrap mb-2">
            <span className="text-sm font-medium text-ink-700 dark:text-ink-200">{q.author || '익명'}</span>
            <span className="text-ink-300 dark:text-ink-600">·</span>
            <span className="text-xs text-ink-400 dark:text-ink-500">{timeAgo(q.created_at)}</span>
            {q.is_answered && (
              <Badge color="accent">
                <CheckIcon className="w-3 h-3" /> 답변완료
              </Badge>
            )}
          </div>
          <h3 className="text-base font-semibold text-ink-900 dark:text-ink-50 leading-snug tracking-tightish">{q.title}</h3>
          <p className="text-sm text-ink-600 dark:text-ink-300 mt-1.5 whitespace-pre-wrap leading-relaxed">{q.body}</p>
          <div className="flex justify-end mt-3">
            <button onClick={handle} disabled={voted} aria-pressed={voted}
              className={`inline-flex items-center gap-1.5 px-3.5 py-2 rounded-md text-sm font-semibold border transition ${
                voted
                  ? 'bg-accent-600 border-accent-600 text-white cursor-default'
                  : 'bg-white border-ink-200 text-ink-700 hover:border-accent-400 hover:text-accent-700 active:scale-[0.97] dark:bg-ink-900 dark:border-ink-700 dark:text-ink-200 dark:hover:border-accent-500 dark:hover:text-accent-300'
              }`}>
              <svg className={`w-3.5 h-3.5 ${pop ? 'animate-like-pop' : ''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19V5M5 12l7-7 7 7" /></svg>
              <span className="tabular-nums">{q.likes}</span>
            </button>
          </div>
        </Card>
      );
    };

    const QuestionFormModal = ({ isOpen, onClose, onSubmit }) => {
      const [form, setForm] = useState({ title: '', author: '', body: '' });
      const [errors, setErrors] = useState({});
      const [submitting, setSubmitting] = useState(false);

      useEffect(() => {
        if (isOpen) {
          setForm({ title: '', author: '', body: '' });
          setErrors({});
          // 폼을 열 때 금지어 목록을 미리 받아둠(세션 단위 캐시; 실패해도 무시)
          fetchBannedWords();
        }
      }, [isOpen]);

      const update = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));

      const submit = async () => {
        const errs = {};
        if (!form.title.trim()) errs.title = '제목을 입력해 주세요';
        if (!form.author.trim()) errs.author = '이름을 입력해 주세요';
        if (!form.body.trim()) errs.body = '내용을 입력해 주세요';
        setErrors(errs);
        if (Object.keys(errs).length) return;
        setSubmitting(true);
        // 🚫 금지어 사전 차단 — 제목+내용+이름 합쳐 검사(조회 실패 시 빈 목록 → 통과)
        const words = await fetchBannedWords();
        const hit = findBannedWord(
          [form.title.trim(), form.body.trim(), form.author.trim()], words);
        if (hit) {
          setErrors({ body: BANNED_WORD_MESSAGE });
          setSubmitting(false);
          return;
        }
        // 서버 트리거가 거부하면 onSubmit(handleCreated)이 banned 플래그로 동일 안내 처리
        const result = await onSubmit({
          title: form.title.trim(),
          author: form.author.trim(),
          body: form.body.trim(),
        });
        // onSubmit 이 { banned: true } 를 반환하면 모달을 닫지 않고 오류 표시
        if (result && result.banned) {
          setErrors({ body: BANNED_WORD_MESSAGE });
          setSubmitting(false);
          return;
        }
        setSubmitting(false);
      };

      return (
        <Modal isOpen={isOpen} onClose={onClose} title="질문하기">
          <div className="space-y-1">
            <Input label="제목 *" placeholder="궁금한 점을 한 줄로 적어주세요"
              maxLength={50} showCount value={form.title} onChange={update('title')} error={errors.title} />
            <Input label="이름 *" placeholder="실명 또는 소속을 입력해 주세요"
              maxLength={20} showCount value={form.author} onChange={update('author')} error={errors.author} />
            <Textarea label="내용 *" placeholder="질문 내용을 자세히 적어주세요"
              maxLength={500} showCount rows={5} value={form.body} onChange={update('body')} error={errors.body} />
          </div>
          <div className="flex gap-2 mt-4">
            <Button variant="secondary" size="lg" className="flex-1" onClick={onClose}>취소</Button>
            <Button size="lg" className="flex-1" onClick={submit} disabled={submitting}>
              {submitting ? <Spinner className="w-5 h-5" /> : '등록하기'}
            </Button>
          </div>
        </Modal>
      );
    };

    // ========================================
    // 📄 Page: 관리자 Q&A 대시보드  #/admin/session/:sessionId
    // ========================================
    const AdminDashboardPage = ({ params }) => {
      const { query } = useRouter();
      const toast = useToast();
      // 세션 admin_token: URL ?token= 으로 처음 받으면 sessionStorage 에 보관하고,
      // 주소창에서는 토큰을 숨긴다(아래 effect). 새로고침 시엔 sessionStorage 에서 복원.
      const tokenKey = `qa_admin_token_${params.sessionId}`;
      const sessionToken = useMemo(() => {
        if (query.token) {
          try { sessionStorage.setItem(tokenKey, query.token); } catch (e) {}
          return query.token;
        }
        try { return sessionStorage.getItem(tokenKey) || ''; } catch (e) { return ''; }
      }, [query.token, params.sessionId]);
      const [session, setSession] = useState(undefined);
      const [questions, setQuestions] = useState(null);
      const [filter, setFilter] = useState('전체'); // 전체 | 답변대기 | 답변완료 | 숨김

      // toast 를 deps 에 넣으면 무한 루프 → ref 로 안정화 (load 의 catch 에서 사용)
      const toastRef = useRef(toast);
      useEffect(() => { toastRef.current = toast; });

      // 🔒 주소창에서 ?token= 제거(토큰 노출 방지). 토큰은 위에서 이미 메모리/세션에 보관됨.
      useEffect(() => {
        if (query.token) {
          try { history.replaceState(null, '', `#/admin/session/${params.sessionId}`); } catch (e) {}
        }
      }, [query.token, params.sessionId]);

      // 질문만 다시 받아오는 함수 (Realtime refetch 용)
      const refetchQuestions = useCallback(async () => {
        try {
          const list = await mockApi.fetchQuestions(params.sessionId, 'admin', sessionToken);
          setQuestions(list);
        } catch (e) {
          console.error('[admin] 질문 재조회 실패:', e);
        }
      }, [params.sessionId, sessionToken]);

      const load = useCallback(async () => {
        try {
          // ✅ 공개/비공개 무관: 서버(service_role) 라우트를 URL 세션 token 으로 호출.
          const s = await mockApi.fetchAdminSession(params.sessionId, sessionToken);
          setSession(s);
          if (!s) return;
          const list = await mockApi.fetchQuestions(params.sessionId, 'admin', sessionToken);
          setQuestions(list);
        } catch (e) {
          console.error('[admin] 세션/질문 로드 실패:', e);
          // 세션 메타 로드 실패(토큰 불일치/없음 등) → 빈 상태로 정리
          setSession((prev) => (prev === undefined ? null : prev));
          setQuestions((prev) => (prev === null ? [] : prev));
          toastRef.current.show('질문을 불러오지 못했어요. 토큰을 확인해 주세요', 'error');
        }
        // ⚠️ toast 를 deps 에 넣지 말 것: useToast() 가 매 렌더 새 객체라
        //    에러 시 toast 호출 → 리렌더 → load 재생성 → 재호출 무한루프가 됨. ref 로 안정화.
      }, [params.sessionId, sessionToken]);

      useEffect(() => { load(); }, [load]);

      // 🔴 Realtime: anon Supabase 클라이언트(sb)로 questions 변경 구독 → 재조회.
      //  RLS상 anon realtime 은 비숨김 질문의 신규/좋아요/답변 변경을 잡는다.
      //  본인의 숨김/답변 토글은 API 호출 후 로컬 refetch 로 이미 갱신되므로 충분.
      useEffect(() => {
        if (!params.sessionId) return;
        const channel = sb
          .channel(`admin-questions-${params.sessionId}`)
          .on('postgres_changes',
            { event: '*', schema: 'public', table: 'questions', filter: `session_id=eq.${params.sessionId}` },
            () => { refetchQuestions(); })
          .subscribe();
        return () => { sb.removeChannel(channel); };
      }, [params.sessionId, refetchQuestions]);

      const counts = useMemo(() => {
        const list = questions || [];
        return {
          전체: list.filter((q) => !q.is_hidden).length,
          답변대기: list.filter((q) => !q.is_answered && !q.is_hidden).length,
          답변완료: list.filter((q) => q.is_answered && !q.is_hidden).length,
          숨김: list.filter((q) => q.is_hidden).length,
        };
      }, [questions]);

      const filtered = useMemo(() => {
        const list = questions || [];
        switch (filter) {
          case '답변대기': return list.filter((q) => !q.is_answered && !q.is_hidden);
          case '답변완료': return list.filter((q) => q.is_answered && !q.is_hidden);
          case '숨김': return list.filter((q) => q.is_hidden);
          default: return list.filter((q) => !q.is_hidden);
        }
      }, [questions, filter]);

      const updateQuestion = (updated) => {
        if (!updated) return;
        setQuestions((qs) => qs.map((q) => (q.id === updated.id ? updated : q)));
      };

      const onToggleAnswered = async (qid) => {
        const cur = (questions || []).find((q) => q.id === qid);
        if (!cur) return;
        try {
          updateQuestion(await mockApi.toggleAnswered(qid, !cur.is_answered, sessionToken));
        } catch (e) {
          toast.show('상태 변경에 실패했어요', 'error');
        }
      };
      const onToggleHidden = async (qid) => {
        const cur = (questions || []).find((q) => q.id === qid);
        if (!cur) return;
        try {
          updateQuestion(await mockApi.toggleHidden(qid, !cur.is_hidden, sessionToken));
        } catch (e) {
          toast.show('상태 변경에 실패했어요', 'error');
        }
      };

      if (session === undefined) return <div className="min-h-screen bg-ink-50 dark:bg-ink-950"><Loading /></div>;
      if (session === null) return <NotFound />;

      const tokenInfo = sessionToken ? `토큰 인증됨` : '토큰 없음';

      return (
        <div className="min-h-screen bg-ink-50 dark:bg-ink-950">
          <AdminHeader
            eyebrow="관리자 모드"
            title={session.name}
            subtitle={`진행자/운영자용 · ${tokenInfo}`}
            back={`/admin/project/${session.project_id}`}
            right={<ExcelButton label="세션 Q&A" kind="session" id={params.sessionId} token={sessionToken} />}
          />

          {/* 필터 탭 */}
          <div className="bg-white/90 dark:bg-ink-950/90 backdrop-blur border-b border-ink-200 dark:border-ink-800 sticky top-[61px] z-20">
            <div className="max-w-5xl mx-auto px-4 sm:px-6">
              <div className="flex gap-5 overflow-x-auto -mb-px no-scrollbar">
                {['전체', '답변대기', '답변완료', '숨김'].map((tab) => (
                  <button key={tab} onClick={() => setFilter(tab)}
                    className={`shrink-0 px-0.5 py-3 text-sm font-medium border-b-2 transition flex items-center gap-1.5 ${
                      filter === tab
                        ? 'border-ink-900 text-ink-900 dark:border-white dark:text-white'
                        : 'border-transparent text-ink-500 dark:text-ink-400 hover:text-ink-800 dark:hover:text-ink-200'
                    }`}>
                    {tab}
                    <span className={`text-xs px-1.5 py-0.5 rounded tabular-nums ${
                      filter === tab
                        ? 'bg-ink-900 text-white dark:bg-white dark:text-ink-900'
                        : 'bg-ink-100 text-ink-500 dark:bg-ink-800 dark:text-ink-400'
                    }`}>{counts[tab]}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div className="max-w-5xl mx-auto px-4 sm:px-6 py-6">
            {questions === null ? (
              <Loading />
            ) : filtered.length === 0 ? (
              <EmptyState title="해당 항목이 없습니다"
                desc={`'${filter}' 상태의 질문이 없습니다.`} />
            ) : (
              <div className="space-y-3">
                {filtered.map((q) => (
                  <AdminQuestionCard key={q.id} q={q}
                    onToggleAnswered={() => onToggleAnswered(q.id)}
                    onToggleHidden={() => onToggleHidden(q.id)} />
                ))}
              </div>
            )}
          </div>
        </div>
      );
    };

    const AdminQuestionCard = ({ q, onToggleAnswered, onToggleHidden }) => (
      <Card className={`p-4 sm:p-5 ${q.is_hidden ? 'opacity-60' : ''}`}>
        <div className="flex items-start justify-between gap-3 flex-wrap">
          <div className="flex items-center gap-2 flex-wrap text-sm">
            <span className="font-semibold text-ink-900 dark:text-ink-50">{q.author || '익명'}</span>
            <span className="inline-flex items-center gap-1 text-accent-600 dark:text-accent-400 font-semibold tabular-nums">
              <svg className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19V5M5 12l7-7 7 7" /></svg>
              {q.likes}
            </span>
            <span className="text-ink-300 dark:text-ink-600">·</span>
            <span className="text-ink-400 dark:text-ink-500 text-xs tabular-nums">{formatDateTime(q.created_at)}</span>
          </div>
          <div className="flex gap-1.5">
            {q.is_hidden && <Badge color="gray">숨김</Badge>}
            {q.is_answered
              ? <Badge color="accent"><CheckIcon className="w-3 h-3" /> 답변완료</Badge>
              : <Badge color="amber">답변대기</Badge>}
          </div>
        </div>

        <h3 className="text-base sm:text-lg font-semibold text-ink-900 dark:text-ink-50 mt-2 leading-snug tracking-tightish">{q.title}</h3>
        <p className="text-sm text-ink-600 dark:text-ink-300 mt-1.5 whitespace-pre-wrap leading-relaxed">{q.body}</p>

        <div className="flex flex-wrap gap-2 mt-3 pt-3 border-t border-ink-100 dark:border-ink-800">
          <Button size="sm" variant={q.is_answered ? 'success' : 'secondary'} onClick={onToggleAnswered}>
            {q.is_answered ? <><CheckIcon className="w-3.5 h-3.5" /> 답변완료됨</> : '답변완료 체크'}
          </Button>
          <Button size="sm" variant={q.is_hidden ? 'danger' : 'ghost'} onClick={onToggleHidden}>
            {q.is_hidden ? '숨김 해제' : '숨김'}
          </Button>
        </div>
      </Card>
    );

    // ========================================
    // 🚀 App
    // ========================================
    // 콘솔 화면(#/admin, #/admin/project/:id)은 운영자 토큰 게이트로 감싼다.
    //  세션 대시보드(#/admin/session/:id)는 URL token 으로 인증하므로 게이트 제외.
    const GatedAdminHome = (props) => (
      <ConsoleTokenGate><AdminHomePage {...props} /></ConsoleTokenGate>
    );
    const GatedProjectDetail = (props) => (
      <ConsoleTokenGate><ProjectDetailPage {...props} /></ConsoleTokenGate>
    );

    const routes = [
      { path: '/admin', component: GatedAdminHome },
      { path: '/admin/project/:projectId', component: GatedProjectDetail },
      { path: '/admin/session/:sessionId', component: AdminDashboardPage },
      // 공개 라우트(토큰 게이트 밖): 행사 랜딩 + 사용자 질문 화면
      { path: '/event/:projectId', component: EventLandingPage },
      { path: '/session/:sessionId', component: UserSessionPage },
    ];

    const App = () => (
      <ThemeProvider>
        <ToastProvider>
          <Router>
            <Routes routes={routes} />
          </Router>
        </ToastProvider>
      </ThemeProvider>
    );

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
