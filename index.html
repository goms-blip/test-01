  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useContext, createContext, useCallback, useMemo, useRef } = React;

    // ========================================
    // 🔌 Supabase 설정 & 클라이언트
    // -----------------------------------------------------------------------
    //  anon 키는 브라우저 공개 가능 키(RLS로 보호)이므로 하드코딩 OK.
    //  ⚠️ service_role 키는 절대 여기에 넣지 말 것 (다음 단계 server.js에서만 사용).
    // ========================================
    const SUPABASE_URL = 'https://dxnmroyjqklbuughassw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4bm1yb3lqcWtsYnV1Z2hhc3N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMzY3NDgsImV4cCI6MjA5NjcxMjc0OH0.sMSL_9JWsY0pIyhGfGTjOuIaGx5Q5HBQS1PRDHrAD7M';
    // 전역 window.supabase 와 이름이 겹치지 않도록 우리 클라이언트는 `sb` 로 둔다.
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ========================================
    // 🚫 금지어 사전 차단 (사용자 폼 UX)
    // -----------------------------------------------------------------------
    //  anon 으로 banned_words.word 목록을 읽어(공개 select 허용) 클라이언트에서
    //  먼저 검사한다. 세션 단위로 1회 캐시. 조회 실패해도 등록은 막지 않음
    //  (server.js questions 트리거가 백스톱). 서버 거부 시에도 동일 안내를 띄운다.
    // ========================================
    let _bannedWordsCache = null;          // string[] | null(미로딩)
    let _bannedWordsPromise = null;        // 중복 조회 방지
    const fetchBannedWords = async () => {
      if (_bannedWordsCache) return _bannedWordsCache;
      if (_bannedWordsPromise) return _bannedWordsPromise;
      _bannedWordsPromise = (async () => {
        try {
          const { data, error } = await sb.from('banned_words').select('word');
          if (error) throw error;
          _bannedWordsCache = (data || [])
            .map((r) => (r.word || '').toString().trim().toLowerCase())
            .filter(Boolean);
          return _bannedWordsCache;
        } catch (e) {
          console.warn('[supabase] banned_words 조회 실패(등록은 계속 진행, 서버 트리거가 백스톱):', e);
          return [];   // 실패해도 등록 자체는 막지 않음
        } finally {
          _bannedWordsPromise = null;
        }
      })();
      return _bannedWordsPromise;
    };
    // 새 금지어가 추가/삭제되면 다음 폼에서 최신 목록을 받도록 캐시 무효화
    const invalidateBannedWordsCache = () => { _bannedWordsCache = null; };
    // 제목+내용+이름 합쳐 소문자 부분 문자열 매칭. 걸린 단어(원문 lower) 반환 or null.
    const findBannedWord = (parts, words) => {
      const haystack = (parts || []).join(' ').toLowerCase();
      if (!haystack.trim()) return null;
      for (const w of (words || [])) {
        if (w && haystack.includes(w)) return w;
      }
      return null;
    };
    // 서버(트리거)가 금지어로 거부했는지 판별 (BANNED_WORD 또는 check_violation)
    const isBannedWordError = (err) => {
      if (!err) return false;
      const msg = (err.message || '').toString();
      const code = (err.code || '').toString();
      return msg.includes('BANNED_WORD') || code === '23514' || /check_violation/i.test(msg);
    };
    const BANNED_WORD_MESSAGE = '부적절한 표현이 포함되어 있어 등록할 수 없습니다.';

    // ========================================
    // 🌗 Theme (라이트/다크 — localStorage + prefers-color-scheme)
    // ========================================
    const ThemeContext = createContext(null);
    const useTheme = () => useContext(ThemeContext);

    const getInitialTheme = () => {
      try {
        const stored = localStorage.getItem('qa_theme');
        if (stored === 'light' || stored === 'dark') return stored;
      } catch (e) {}
      return window.matchMedia &&
        window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    };

    const ThemeProvider = ({ children }) => {
      const [theme, setTheme] = useState(getInitialTheme);

      useEffect(() => {
        const root = document.documentElement;
        if (theme === 'dark') root.classList.add('dark');
        else root.classList.remove('dark');
        try { localStorage.setItem('qa_theme', theme); } catch (e) {}
      }, [theme]);

      // 사용자가 명시적으로 고르지 않은 동안에는 시스템 변경을 따라감
      useEffect(() => {
        if (!window.matchMedia) return;
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        const onChange = (e) => {
          const stored = (() => { try { return localStorage.getItem('qa_theme'); } catch (x) { return null; } })();
          if (stored !== 'light' && stored !== 'dark') setTheme(e.matches ? 'dark' : 'light');
        };
        mq.addEventListener ? mq.addEventListener('change', onChange) : mq.addListener(onChange);
        return () => { mq.removeEventListener ? mq.removeEventListener('change', onChange) : mq.removeListener(onChange); };
      }, []);

      const toggle = useCallback(() => setTheme((t) => (t === 'dark' ? 'light' : 'dark')), []);
      return (
        <ThemeContext.Provider value={{ theme, toggle }}>{children}</ThemeContext.Provider>
      );
    };

    const SunIcon = ({ className = '' }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
      </svg>
    );
    const MoonIcon = ({ className = '' }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    );

    const PlusIcon = ({ className = 'w-4 h-4' }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <path d="M12 5v14M5 12h14" />
      </svg>
    );

    const CheckIcon = ({ className = 'w-4 h-4' }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <path d="M20 6L9 17l-5-5" />
      </svg>
    );

    const PencilIcon = ({ className = 'w-4 h-4' }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <path d="M12 20h9" />
        <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z" />
      </svg>
    );

    const TrashIcon = ({ className = 'w-4 h-4' }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M10 11v6M14 11v6" />
      </svg>
    );

    const ThemeToggle = ({ className = '' }) => {
      const { theme, toggle } = useTheme();
      const isDark = theme === 'dark';
      return (
        <button
          type="button"
          onClick={toggle}
          role="switch"
          aria-checked={isDark}
          aria-label={isDark ? '라이트 모드로 전환' : '다크 모드로 전환'}
          title={isDark ? '라이트 모드' : '다크 모드'}
          className={`shrink-0 inline-flex items-center justify-center w-9 h-9 rounded-md border
            border-ink-200 dark:border-ink-700 text-ink-500 dark:text-ink-300
            hover:bg-ink-100 dark:hover:bg-ink-800 hover:text-ink-700 dark:hover:text-ink-100
            focus:outline-none focus-visible:ring-2 focus-visible:ring-accent-500/50 ${className}`}>
          {isDark ? <SunIcon className="w-[18px] h-[18px]" /> : <MoonIcon className="w-[18px] h-[18px]" />}
        </button>
      );
    };

    // ========================================
    // 🛠️ Utilities (uuid, 상대시간, 랜덤 토큰)
    // ========================================
    const uuid = () =>
      (crypto && crypto.randomUUID)
        ? crypto.randomUUID()
        : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
            const r = (Math.random() * 16) | 0;
            const v = c === 'x' ? r : (r & 0x3) | 0x8;
            return v.toString(16);
          });

    const randomToken = (len = 12) => {
      const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let out = '';
      for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * chars.length)];
      return out;
    };

    const timeAgo = (iso) => {
      const diff = Date.now() - new Date(iso).getTime();
      const sec = Math.floor(diff / 1000);
      if (sec < 60) return '방금 전';
      const min = Math.floor(sec / 60);
      if (min < 60) return `${min}분 전`;
      const hr = Math.floor(min / 60);
      if (hr < 24) return `${hr}시간 전`;
      const day = Math.floor(hr / 24);
      if (day < 7) return `${day}일 전`;
      return new Date(iso).toLocaleDateString('ko-KR');
    };

    const formatDateTime = (iso) =>
      new Date(iso).toLocaleString('ko-KR', {
        month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit',
      });

    // voter_key: 사용자 기기 식별용 (localStorage UUID)
    const getVoterKey = () => {
      let key = localStorage.getItem('qa_voter_key');
      if (!key) {
        key = uuid();
        localStorage.setItem('qa_voter_key', key);
      }
      return key;
    };

    // ========================================
    // 🗺️ DB(row) ↔ 앱(object) 필드 매핑 헬퍼
    // -----------------------------------------------------------------------
    //   DB 스키마와 현재 앱 객체의 필드명이 다르다. 사용자 페이지 컴포넌트는
    //   그대로 두고, mockApi 메서드 안에서 변환한다.
    //   - questions: content(DB) ↔ body(앱), like_count(DB) ↔ likes(앱)
    //   - sessions:  title(DB) ↔ name(앱), starts_at/ends_at(DB) → duration(앱)
    // ========================================
    // 'HH:MM' 형식만 뽑아 'starts ~ ends' 문자열을 만든다 (없으면 빈 문자열)
    const fmtTime = (iso) => {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return '';
      return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
    };
    const buildDuration = (startsAt, endsAt) => {
      const s = fmtTime(startsAt), e = fmtTime(endsAt);
      if (s && e) return `${s} ~ ${e}`;
      return s || e || '';
    };
    // DB sessions row → 앱 session 객체 (사용자 페이지는 name/duration 사용)
    const mapSessionRow = (row) => row ? ({
      ...row,
      name: row.title,                                   // title(DB) → name(앱)
      duration: buildDuration(row.starts_at, row.ends_at), // 시간 표시용
    }) : null;
    // DB questions row → 앱 question 객체 (body/likes 로 변환)
    const mapQuestionRow = (row) => row ? ({
      ...row,
      body: row.content,        // content(DB) → body(앱)
      likes: row.like_count,    // like_count(DB) → likes(앱)
    }) : null;

    // ========================================
    // 📦 mockApi
    // -----------------------------------------------------------------------
    //  과도기 상태: 사용자(공개) 경로는 Supabase(anon)를 직접 호출하고,
    //  관리자 경로는 아직 mock/localStorage 를 사용한다. (다음 단계 server.js 에서 통일)
    //   - 사용자 경로(Supabase 교체 완료): fetchSession / fetchQuestions('user')
    //                                       / createQuestion / likeQuestion
    //   - 관리자 경로(mock 유지, service_role 경유로 교체 예정): 아래 TODO 주석 참고
    //   - DB: projects / sessions / questions / votes
    //   - votes는 (question_id, voter_key) unique 제약으로 1인 1표 보장 (RPC like_question)
    // ========================================
    const STORAGE_KEY = 'qa_mock_db_v1';

    const seedDB = () => {
      const now = Date.now();
      const t = (minAgo) => new Date(now - minAgo * 60000).toISOString();

      const projects = [
        {
          id: 'proj-mendix',
          name: 'Mendix Korea Seminar 2026',
          client: 'Mendix',
          description: '로우코드 플랫폼 신기능 소개 및 고객 사례 공유 세미나',
          start_date: '2026-07-15',
          end_date: '2026-07-15',
          status: '진행중',
          created_at: t(60 * 24 * 3),
        },
        {
          id: 'proj-unreal',
          name: 'Unreal Fest Seoul 2026',
          client: 'Epic Games',
          description: '언리얼 엔진 개발자 컨퍼런스',
          start_date: '2026-09-02',
          end_date: '2026-09-03',
          status: '준비중',
          created_at: t(60 * 24 * 5),
        },
      ];

      const sessions = [
        // Mendix
        {
          id: 'sess-mendix-keynote', project_id: 'proj-mendix', name: '오프닝 키노트',
          description: 'Mendix 10 비전과 로드맵', duration: '10:00 ~ 11:00',
          is_public: true, admin_token: randomToken(), created_at: t(60 * 24 * 2),
        },
        {
          id: 'sess-mendix-tech', project_id: 'proj-mendix', name: '기술 딥다이브: AI Assist',
          description: 'Maia AI 어시스턴트 실전 활용', duration: '11:15 ~ 12:15',
          is_public: true, admin_token: randomToken(), created_at: t(60 * 24 * 2),
        },
        {
          id: 'sess-mendix-case', project_id: 'proj-mendix', name: '고객 사례: 제조업 디지털 전환',
          description: '', duration: '13:30 ~ 14:30',
          is_public: false, admin_token: randomToken(), created_at: t(60 * 24 * 2),
        },
        // Unreal
        {
          id: 'sess-unreal-keynote', project_id: 'proj-unreal', name: 'State of Unreal',
          description: '언리얼 엔진 5.x 최신 소식', duration: '10:00 ~ 11:30',
          is_public: true, admin_token: randomToken(), created_at: t(60 * 24 * 4),
        },
        {
          id: 'sess-unreal-nanite', project_id: 'proj-unreal', name: 'Nanite & Lumen 심화',
          description: '차세대 렌더링 파이프라인', duration: '13:00 ~ 14:30',
          is_public: true, admin_token: randomToken(), created_at: t(60 * 24 * 4),
        },
      ];

      const questions = [
        // sess-mendix-keynote

    const loadDB = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) { /* noop */ }
      const seeded = seedDB();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
      return seeded;
    };

    const saveDB = (db) => localStorage.setItem(STORAGE_KEY, JSON.stringify(db));

    // 살짝의 지연으로 실제 네트워크 호출 흉내 (다음 단계에서 자연스럽게 교체)
    const delay = (ms = 120) => new Promise((r) => setTimeout(r, ms));

    // ========================================
    // 🔐 관리자 콘솔 토큰 게이트 (운영자 토큰 — sessionStorage)
    // -----------------------------------------------------------------------
    //  콘솔 화면(#/admin, #/admin/project/:id)은 ADMIN_CONSOLE_TOKEN 으로 보호된다.
    //  토큰을 코드에 하드코딩하지 않고, 입력값을 sessionStorage 에 저장해 재사용한다.
    //  서버가 401 을 주면 토큰을 비우고 다시 입력받는다(아래 ConsoleTokenGate).
    // ========================================
    const CONSOLE_TOKEN_KEY = 'qa_console_token';
    const getConsoleToken = () => {
      try { return sessionStorage.getItem(CONSOLE_TOKEN_KEY) || ''; } catch (e) { return ''; }
    };
    const setConsoleToken = (t) => {
      try { sessionStorage.setItem(CONSOLE_TOKEN_KEY, t); } catch (e) {}
    };
    const clearConsoleToken = () => {
      try { sessionStorage.removeItem(CONSOLE_TOKEN_KEY); } catch (e) {}
    };
    // 콘솔 토큰이 유효하지 않을 때 게이트가 구독하는 알림 (간단 이벤트)
    const consoleAuthListeners = new Set();
    const notifyConsoleAuthFailed = () => { consoleAuthListeners.forEach((fn) => { try { fn(); } catch (e) {} }); };

    // 서버 API 호출 공통 래퍼. 콘솔 토큰은 x-admin-token 헤더로, 세션 토큰은 token 인자로.
    //  - opts.console: true 면 콘솔 토큰을 헤더에 첨부 (없으면 즉시 인증실패 처리)
    //  - opts.token: 세션 admin_token (세션 범위 호출 시 ?token= 으로 사용하거나 헤더로 첨부)
    const apiFetch = async (path, { method = 'GET', body, console: useConsole = false, token } = {}) => {
      const headers = {};
      if (body !== undefined) headers['Content-Type'] = 'application/json';
      if (useConsole) {
        const ct = getConsoleToken();
        if (!ct) { notifyConsoleAuthFailed(); throw new Error('NO_CONSOLE_TOKEN'); }
        headers['x-admin-token'] = ct;
      } else if (token) {
        headers['x-admin-token'] = token;
      }
      const res = await fetch(path, {
        method,
        headers,
        body: body !== undefined ? JSON.stringify(body) : undefined,
      });
      if (res.status === 401 && useConsole) {
        // 콘솔 토큰 무효 → 비우고 게이트 재노출
        clearConsoleToken();
        notifyConsoleAuthFailed();
        throw new Error('CONSOLE_UNAUTHORIZED');
      }
      let json = null;
      try { json = await res.json(); } catch (e) {}
      if (!res.ok || !json || json.success === false) {
        const msg = (json && json.message) || `요청 실패 (${res.status})`;
        const err = new Error(msg);
        err.status = res.status;
        throw err;
      }
      return json.data;
    };

    const mockApi = {
      // --- Projects --- (✅ server.js(service_role) 경유로 교체 완료)
      async fetchProjects() {
        // 서버가 sessionCount/questionCount/status 를 함께 내려줌 → fetchProjectStats 에서 재사용
        const list = await apiFetch('/api/admin/projects', { console: true });
        // 통계 캐시(같은 응답을 fetchProjectStats 가 재사용)
        mockApi._projectStatsCache = {};
        list.forEach((p) => {
          mockApi._projectStatsCache[p.id] = {
            sessionCount: p.sessionCount || 0,
            questionCount: p.questionCount || 0,
          };
        });
        return list;
      },
      async fetchProject(projectId) {
        return apiFetch(`/api/admin/projects/${projectId}`, { console: true });
      },
      async createProject(payload) {
        return apiFetch('/api/admin/projects', { method: 'POST', console: true, body: {
          name: (payload.name || '').trim(),
          client: (payload.client || '').trim(),
          description: (payload.description || '').trim(),
          start_date: payload.start_date || '',
          end_date: payload.end_date || '',
          status: payload.status || '준비중',
        }});
      },
      async updateProject(id, fields) {
        return apiFetch(`/api/admin/projects/${id}`, { method: 'PATCH', console: true, body: fields });
      },
      // 프로젝트 삭제 — 서버에서 FK on delete cascade 로 하위 세션/질문/votes 정리.
      //  반환 { removedSessions, removedQuestions } 형태 유지.
      async deleteProject(id) {
        return apiFetch(`/api/admin/projects/${id}`, { method: 'DELETE', console: true });
      },

      // --- Sessions --- (✅ server.js 경유로 교체 완료)
      async fetchSessions(projectId) {
        const list = await apiFetch(`/api/admin/projects/${projectId}/sessions`, { console: true });
        // 세션별 통계를 함께 받으므로 fetchSessionStats 가 재사용하도록 캐시
        mockApi._sessionStatsCache = mockApi._sessionStatsCache || {};
        list.forEach((s) => {
          if (s.stats) mockApi._sessionStatsCache[s.id] = s.stats;
        });
        return list;
      },
      // ✅ Supabase 교체 완료 (사용자 경로). 공개 세션만 RLS로 조회됨.
      //    admin 경로도 이 메서드를 쓰므로, Supabase에 없으면 mock(localStorage)으로 폴백.
      //    (admin 세션은 다음 단계 server.js 통일 전까지 mock에 남아있음)
      async fetchSession(sessionId) {
        const { data, error } = await sb
          .from('sessions')
          .select('*')
          .eq('id', sessionId)
          .maybeSingle();
        if (error) {
          console.error('[supabase] fetchSession 실패:', error);
          // Supabase 오류 시 mock 폴백 (admin 과도기 호환)
          const db = loadDB();
          return db.sessions.find((s) => s.id === sessionId) || null;
        }
        if (data) return mapSessionRow(data);
        // Supabase에 없음 → mock(localStorage)에 있는지 폴백 조회 (admin 세션 호환)
        const db = loadDB();
        return db.sessions.find((s) => s.id === sessionId) || null;
      },
      // ✅ 관리자 대시보드 전용 세션 메타 조회 (server.js service_role 경유).
      //    anon RLS 로는 비공개 세션을 못 읽으므로, URL 세션 admin_token 으로 서버 호출.
      //    공개/비공개 모두 정상 반환. 사용자(공개) 경로는 위 fetchSession(anon) 유지.
      async fetchAdminSession(sessionId, sessionToken) {
        return apiFetch(`/api/admin/sessions/${sessionId}`, { token: sessionToken });
      },
      // 세션 생성/수정/삭제 (✅ server.js 경유). admin_token 은 DB default 가 생성.
      async createSession(projectId, payload) {
        return apiFetch(`/api/admin/projects/${projectId}/sessions`, { method: 'POST', console: true, body: {
          name: (payload.name || '').trim(),
          description: (payload.description || '').trim(),
          duration: (payload.duration || '').trim(),
          is_public: !!payload.is_public,
        }});
      },
      // 세션 수정 — [세션admin] 범위. 콘솔 화면에서 호출되므로 콘솔 토큰 헤더로 통과.
      async updateSession(id, fields) {
        return apiFetch(`/api/admin/sessions/${id}`, { method: 'PATCH', console: true, body: fields });
      },
      // 세션 삭제 — 서버에서 FK on delete cascade 로 하위 질문/votes 정리. [콘솔]
      //  반환 { removedQuestions } 형태 유지.
      async deleteSession(id) {
        return apiFetch(`/api/admin/sessions/${id}`, { method: 'DELETE', console: true });
      },

      // --- Questions ---
      // role: 'user' => 숨김 제외(Supabase anon) / 'admin' => 숨김 포함 전체(server.js)
      //  admin 경로는 URL 의 세션 admin_token 으로 호출 (sessionToken 인자).
      async fetchQuestions(sessionId, role = 'user', sessionToken) {
        if (role === 'admin') {
          // ✅ server.js 경유: 숨김 포함 전체, like_count desc / created_at asc
          return apiFetch(`/api/admin/sessions/${sessionId}/questions`, { token: sessionToken });
        }
        if (role === 'user') {
          // ✅ Supabase 교체 완료 (사용자 경로): 숨김 제외 + 좋아요 DESC, 동점 created_at ASC
          const { data, error } = await sb
            .from('questions')
            .select('*')
            .eq('session_id', sessionId)
            .eq('is_hidden', false)
            .order('like_count', { ascending: false })
            .order('created_at', { ascending: true });
          if (error) {
            console.error('[supabase] fetchQuestions 실패:', error);
            throw error;
          }
          return (data || []).map(mapQuestionRow);
        }
        // TODO: server.js(service_role) 경유로 교체 예정 — anon RLS로는 숨김/전체 질문 조회 불가
        await delay();
        const db = loadDB();
        let list = db.questions.filter((q) => q.session_id === sessionId);
        // 관리자: 최신순 기본 (화면에서 탭 필터)
        list.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        return list;
      },
      // ✅ Supabase 교체 완료 (사용자 경로): 질문 등록. 반환을 앱 형태(body/likes)로 매핑.
      async createQuestion(sessionId, payload) {
        const { data, error } = await sb
          .from('questions')
          .insert({
            session_id: sessionId,
            title: (payload.title || '').trim(),
            content: (payload.body || '').trim(),        // body(앱) → content(DB)
            author: (payload.author || '익명').trim() || '익명', // 빈값 방지
          })
          .select()
          .single();
        if (error) {
          console.error('[supabase] createQuestion 실패:', error);
          // 서버 트리거(reject_banned_words) 거부 → 친절 안내용 플래그를 달아 전달
          if (isBannedWordError(error)) {
            const e = new Error(BANNED_WORD_MESSAGE);
            e.banned = true;
            throw e;
          }
          throw error;
        }
        return mapQuestionRow(data);
      },
      // ✅ Supabase 교체 완료 (사용자 경로): RPC like_question 으로 1인 1표 처리.
      //    반환 json({ success, liked, like_count }) 을 앱 형태({ voted, likes })로 변환.
      async likeQuestion(questionId, voterKey) {
        const { data, error } = await sb.rpc('like_question', {
          p_question_id: questionId,
          p_voter_key: voterKey,
        });
        if (error) {
          console.error('[supabase] likeQuestion 실패:', error);
          throw error;
        }
        // RPC가 단일 json 또는 배열로 줄 수 있어 안전하게 정규화
        const res = Array.isArray(data) ? data[0] : data;
        return {
          voted: !!(res && res.liked),
          likes: res && typeof res.like_count === 'number' ? res.like_count : 0,
        };
      },
      // 사용자 경로용: 이미 좋아요한 질문 id 목록 (localStorage 캐시).
      //  실제 1인 1표 보장은 서버 RPC(like_question)가 하지만, 새로고침 후 버튼 상태
      //  복원과 Optimistic UI 를 위해 로컬에도 기록해 둔다.
      getVotedIds(voterKey) {
        try { return JSON.parse(localStorage.getItem(`qa_voted_${voterKey}`) || '[]'); }
        catch (e) { return []; }
      },
      // 좋아요 성공 시 로컬 캐시에 기록 (버튼 상태 영속화용)
      recordVote(voterKey, questionId) {
        const key = `qa_voted_${voterKey}`;
        let voted = [];
        try { voted = JSON.parse(localStorage.getItem(key) || '[]'); } catch (e) {}
        if (!voted.includes(questionId)) {
          voted.push(questionId);
          try { localStorage.setItem(key, JSON.stringify(voted)); } catch (e) {}
        }
      },

      // --- 관리자 상태 토글 (✅ server.js 경유) ---
      //  값을 명시적으로 보냄(value). nextValue 미지정 시 토글로 동작하도록 현재 상태를 받아 반전.
      //  관리자 대시보드는 세션 admin_token 으로 호출하므로 sessionToken 을 함께 전달.
      async toggleAnswered(questionId, nextValue, sessionToken) {
        return apiFetch(`/api/admin/questions/${questionId}/answered`, {
          method: 'POST', token: sessionToken, body: { value: !!nextValue },
        });
      },
      async toggleHidden(questionId, nextValue, sessionToken) {
        return apiFetch(`/api/admin/questions/${questionId}/hide`, {
          method: 'POST', token: sessionToken, body: { value: !!nextValue },
        });
      },

      // --- 금지어 관리 (✅ server.js 콘솔 경유, requireConsole) ---
      //  추가/삭제 시 사용자 폼 사전차단용 anon 캐시도 무효화한다.
      async fetchBannedWords() {
        return apiFetch('/api/admin/banned-words', { console: true });
      },
      async addBannedWord(word) {
        const res = await apiFetch('/api/admin/banned-words', {
          method: 'POST', console: true, body: { word: (word || '').trim() },
        });
        invalidateBannedWordsCache();
        return res;
      },
      async deleteBannedWord(id) {
        const res = await apiFetch(`/api/admin/banned-words/${id}`, {
          method: 'DELETE', console: true,
        });
        invalidateBannedWordsCache();
        return res;
      },

      // --- 집계 (카드 통계용) ---
      //  목록 조회(fetchSessions/fetchProjects)가 통계를 함께 내려주므로 캐시를 재사용한다.
      //  캐시에 없으면(직접 진입 등) 서버에서 다시 받아온다.
      _projectStatsCache: {},
      _sessionStatsCache: {},
      async fetchSessionStats(sessionId) {
        if (mockApi._sessionStatsCache && mockApi._sessionStatsCache[sessionId]) {
          return mockApi._sessionStatsCache[sessionId];
        }
        return { total: 0, pending: 0, answered: 0, hidden: 0 };
      },
      async fetchProjectStats(projectId) {
        if (mockApi._projectStatsCache && mockApi._projectStatsCache[projectId]) {
          return mockApi._projectStatsCache[projectId];
        }
        return { sessionCount: 0, questionCount: 0 };
      },

      // --- 공개 랜딩 (✅ server.js 공개 라우트, 토큰 불필요) ---
      //  행사 단일 QR → 랜딩 페이지(#/event/:projectId)에서 호출.
      //  반환: { project: { id, title }, sessions: [{ id, title, description, starts_at, ends_at, questionCount }] }
      //  세션은 공개(is_public=true)만, admin_token 등 민감정보는 서버가 제외한다.
      async fetchLanding(projectId) {
        return apiFetch(`/api/public/projects/${projectId}/landing`);
      },
    };

    // ========================================
    const Button = ({ variant = 'primary', size = 'md', disabled, onClick, className = '', type = 'button', children }) => {
      const base = 'inline-flex items-center justify-center gap-1.5 font-medium rounded-md transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-1 focus-visible:ring-offset-transparent disabled:opacity-50 disabled:cursor-not-allowed select-none';
      const variants = {
        // primary: 잉크 솔리드 (운영 도구다운 차분한 강조)
        primary: 'bg-ink-900 text-white hover:bg-ink-800 focus-visible:ring-ink-500/50 dark:bg-white dark:text-ink-900 dark:hover:bg-ink-200',
        secondary: 'bg-white text-ink-700 border border-ink-200 hover:bg-ink-50 hover:border-ink-300 focus-visible:ring-ink-400/40 dark:bg-ink-900 dark:text-ink-200 dark:border-ink-700 dark:hover:bg-ink-800 dark:hover:border-ink-600',
        danger: 'bg-white text-red-600 border border-red-200 hover:bg-red-50 focus-visible:ring-red-400/40 dark:bg-transparent dark:text-red-400 dark:border-red-900/70 dark:hover:bg-red-950/40',
        ghost: 'bg-transparent text-ink-500 hover:bg-ink-100 hover:text-ink-800 focus-visible:ring-ink-300/50 dark:text-ink-400 dark:hover:bg-ink-800 dark:hover:text-ink-100',
        subtle: 'bg-accent-50 text-accent-700 border border-accent-100 hover:bg-accent-100 focus-visible:ring-accent-400/40 dark:bg-accent-950/50 dark:text-accent-300 dark:border-accent-900 dark:hover:bg-accent-900/50',
        // success: 답변완료 확정 상태 — 액센트로 표시
        success: 'bg-accent-600 text-white hover:bg-accent-700 focus-visible:ring-accent-500/50 dark:bg-accent-600 dark:hover:bg-accent-500',
      };
      const sizes = {
        sm: 'text-xs px-2.5 py-1.5',
        md: 'text-sm px-3.5 py-2',
        lg: 'text-base px-5 py-3',
      };
      return (
        <button type={type} disabled={disabled} onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    };

    const Card = ({ className = '', children, ...rest }) => (
      <div className={`bg-white border border-ink-200 rounded-lg dark:bg-ink-900 dark:border-ink-800 ${className}`} {...rest}>
        {children}
      </div>
    );

    const Badge = ({ color = 'slate', children, className = '' }) => {
      const colors = {
        slate: 'bg-ink-100 text-ink-600 dark:bg-ink-800 dark:text-ink-300',
        indigo: 'bg-accent-50 text-accent-700 dark:bg-accent-950/60 dark:text-accent-300',
        accent: 'bg-accent-50 text-accent-700 dark:bg-accent-950/60 dark:text-accent-300',
        emerald: 'bg-accent-50 text-accent-700 dark:bg-accent-950/60 dark:text-accent-300',
        amber: 'bg-amber-50 text-amber-700 dark:bg-amber-950/40 dark:text-amber-400',
        rose: 'bg-red-50 text-red-700 dark:bg-red-950/40 dark:text-red-400',
        gray: 'bg-ink-100 text-ink-500 dark:bg-ink-800 dark:text-ink-400',
      };
      return (
        <span className={`inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded ${colors[color]} ${className}`}>
          {children}
        </span>
      );
    };

    const StatusBadge = ({ status }) => {
      const map = { '준비중': 'amber', '진행중': 'accent', '종료': 'gray' };
      const dot = {
        '준비중': 'bg-amber-500',
        '진행중': 'bg-accent-500',
        '종료': 'bg-ink-400 dark:bg-ink-500',
      };
      return (
        <Badge color={map[status] || 'slate'}>
          <span className={`w-1.5 h-1.5 rounded-full ${dot[status] || 'bg-ink-400'}`}></span>
          {status}
        </Badge>
      );
    };

    const fieldBase =
      'w-full px-3 py-2.5 rounded-md border bg-white text-ink-900 placeholder-ink-400 ' +
      'focus:outline-none focus:ring-2 focus:ring-offset-0 ' +
      'dark:bg-ink-950 dark:text-ink-100 dark:placeholder-ink-500 ' +
      '[color-scheme:light] dark:[color-scheme:dark]';
    const fieldNormal = 'border-ink-300 focus:border-accent-500 focus:ring-accent-500/30 dark:border-ink-700';
    const fieldError = 'border-red-400 focus:border-red-500 focus:ring-red-500/30 dark:border-red-800';
    const labelCls = 'block text-sm font-medium text-ink-700 dark:text-ink-300 mb-1.5';

    const Input = ({ label, error, className = '', maxLength, value, onChange, showCount, ...rest }) => (
      <div className={className}>
        {label && <label className={labelCls}>{label}</label>}
        <input
          value={value}
          onChange={onChange}
          maxLength={maxLength}
          className={`${fieldBase} ${error ? fieldError : fieldNormal}`}
          {...rest}
        />
        <div className="flex justify-between mt-1">
          <span className="text-xs text-red-500 dark:text-red-400">{error || ''}</span>
          {showCount && maxLength && (
            <span className="text-xs text-ink-400 tabular-nums">{(value || '').length}/{maxLength}</span>
          )}
        </div>
      </div>
    );

    const Textarea = ({ label, error, className = '', maxLength, value, onChange, showCount, rows = 4, ...rest }) => (
      <div className={className}>
        {label && <label className={labelCls}>{label}</label>}
        <textarea
          value={value}
          onChange={onChange}
          maxLength={maxLength}
          rows={rows}
          className={`${fieldBase} resize-none ${error ? fieldError : fieldNormal}`}
          {...rest}
        />
        <div className="flex justify-between mt-1">
          <span className="text-xs text-red-500 dark:text-red-400">{error || ''}</span>
          {showCount && maxLength && (
            <span className="text-xs text-ink-400 tabular-nums">{(value || '').length}/{maxLength}</span>
          )}
        </div>
      </div>
    );

    const Select = ({ label, value, onChange, options, className = '' }) => (
      <div className={className}>
        {label && <label className={labelCls}>{label}</label>}
        <select value={value} onChange={onChange}
          className={`${fieldBase} ${fieldNormal}`}>
          {options.map((o) => <option key={o} value={o}>{o}</option>)}
        </select>
      </div>
    );

    const Modal = ({ isOpen, onClose, title, children, size = 'md' }) => {
      useEffect(() => {
        if (!isOpen) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
      }, [isOpen, onClose]);
      if (!isOpen) return null;
      const sizes = { sm: 'max-w-sm', md: 'max-w-md', lg: 'max-w-lg' };
      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
          <div className="absolute inset-0 bg-ink-950/40 dark:bg-black/60 backdrop-blur-[1px]" onClick={onClose}></div>
          <div className={`relative w-full ${sizes[size]} bg-white border border-ink-200 rounded-t-xl sm:rounded-xl shadow-2xl shadow-ink-950/10 animate-fade-in-up max-h-[92vh] overflow-y-auto dark:bg-ink-900 dark:border-ink-700`}
            role="dialog" aria-modal="true" aria-label={title}>
            <div className="flex items-center justify-between px-5 py-3.5 border-b border-ink-100 sticky top-0 bg-white dark:bg-ink-900 dark:border-ink-800">
              <h3 className="text-base font-semibold text-ink-900 dark:text-ink-50 tracking-tightish">{title}</h3>
              <button onClick={onClose} aria-label="닫기"
                className="text-ink-400 hover:text-ink-700 dark:hover:text-ink-200 text-2xl leading-none w-8 h-8 flex items-center justify-center rounded-md hover:bg-ink-100 dark:hover:bg-ink-800">×</button>
            </div>
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    };

    const Spinner = ({ className = '' }) => (
      <svg className={`animate-spin ${className}`} viewBox="0 0 24 24" fill="none">
        <circle className="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3.5" />
        <path className="opacity-90" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
      </svg>
    );

    const Loading = ({ label = '불러오는 중' }) => (
      <div className="flex flex-col items-center justify-center py-20 text-ink-400 dark:text-ink-500">
        <Spinner className="w-6 h-6 text-accent-500" />
        <span className="mt-3 text-sm">{label}</span>
      </div>
    );

    // 장식 이모지 대신 절제된 라인 아이콘으로 빈 상태를 표현
    const EmptyState = ({ title, desc, action }) => (
      <div className="flex flex-col items-center justify-center py-16 text-center px-6">
        <div className="w-12 h-12 rounded-lg border border-ink-200 dark:border-ink-700 flex items-center justify-center mb-4 text-ink-300 dark:text-ink-600">
          <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
        </div>
        <p className="text-ink-800 dark:text-ink-100 font-semibold">{title}</p>
        {desc && <p className="text-ink-400 dark:text-ink-500 text-sm mt-1 max-w-xs">{desc}</p>}
        {action && <div className="mt-5">{action}</div>}
      </div>
    );

    // ========================================
    // 🔔 Toast (전역 알림)
    // ========================================
    const ToastContext = createContext(null);
    const useToast = () => useContext(ToastContext);

    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);
      const show = useCallback((message, type = 'info') => {
        const id = uuid();
        setToasts((t) => [...t, { id, message, type }]);
        setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 2400);
      }, []);
      const styles = {
        info: 'bg-ink-900 text-white dark:bg-ink-100 dark:text-ink-900',
        success: 'bg-accent-600 text-white',
        warn: 'bg-amber-600 text-white',
        error: 'bg-red-600 text-white',
      };
      return (
        <ToastContext.Provider value={{ show }}>
          {children}
          <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-[60] flex flex-col items-center gap-2 pb-safe">
            {toasts.map((t) => (
              <div key={t.id}
                className={`${styles[t.type]} text-sm font-medium px-4 py-2.5 rounded-lg shadow-lg shadow-ink-950/20 animate-toast-in max-w-[90vw]`}>
                {t.message}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };

    // ========================================
    // 🔀 Router (hash 기반)
    // ========================================
    const RouterContext = createContext(null);
    const useRouter = () => useContext(RouterContext);

    const parseHash = () => {
      let hash = window.location.hash.replace(/^#/, '');
      if (!hash) hash = '/admin';
      const [pathPart, queryPart] = hash.split('?');
      const query = {};
      if (queryPart) {
        queryPart.split('&').forEach((kv) => {
          const [k, v] = kv.split('=');
          if (k) query[decodeURIComponent(k)] = decodeURIComponent(v || '');
        });
      }
      return { path: pathPart || '/admin', query };
    };

    const matchRoute = (pattern, path) => {
      const pp = pattern.split('/').filter(Boolean);
      const cp = path.split('/').filter(Boolean);
      if (pp.length !== cp.length) return null;
      const params = {};
      for (let i = 0; i < pp.length; i++) {
        if (pp[i].startsWith(':')) params[pp[i].slice(1)] = decodeURIComponent(cp[i]);
        else if (pp[i] !== cp[i]) return null;
      }
      return params;
    };

    const Router = ({ children }) => {
      const [route, setRoute] = useState(parseHash());
      useEffect(() => {
        const onChange = () => { setRoute(parseHash()); window.scrollTo(0, 0); };
        window.addEventListener('hashchange', onChange);
        return () => window.removeEventListener('hashchange', onChange);
      }, []);
      const navigate = useCallback((to) => { window.location.hash = to; }, []);
      return (
        <RouterContext.Provider value={{ ...route, navigate }}>
          {children}
        </RouterContext.Provider>
      );
    };

    // routes: [{ path, component }]
    const Routes = ({ routes, fallback }) => {
      const { path } = useRouter();
      for (const r of routes) {
        const params = matchRoute(r.path, path);
        if (params) {
          const C = r.component;
          return <C params={params} />;
        }
      }
      return fallback || <NotFound />;
    };

    const NotFound = () => {
      const { navigate } = useRouter();
      return (
        <div className="min-h-screen flex items-center justify-center bg-ink-50 dark:bg-ink-950">
          <EmptyState title="페이지를 찾을 수 없습니다"
            desc="주소를 확인해 주세요."
            action={<Button onClick={() => navigate('/admin')}>관리자 홈으로</Button>} />
        </div>
      );
    };

    // ========================================
    // 🧩 Common Components
    // ========================================
    const buildUserUrl = (sessionId) => `${location.origin}${location.pathname}#/session/${sessionId}`;
    const buildAdminUrl = (sessionId, token) => `${location.origin}${location.pathname}#/admin/session/${sessionId}?token=${token}`;
    // 행사(프로젝트) 단일 QR 이 가리키는 공개 랜딩 URL. window.location.origin 사용 → 배포 환경에서도 동작.
    const buildEventUrl = (projectId) => `${window.location.origin}${location.pathname}#/event/${projectId}`;

    const useClipboard = () => {
      const toast = useToast();
      return useCallback(async (text, label = '복사되었습니다') => {
        try {
          await navigator.clipboard.writeText(text);
        } catch (e) {
          // fallback
          const ta = document.createElement('textarea');
          ta.value = text; document.body.appendChild(ta); ta.select();
          document.execCommand('copy'); document.body.removeChild(ta);
        }
        toast.show(label, 'success');
      }, [toast]);
    };

    const AdminHeader = ({ title, subtitle, back, right, eyebrow }) => {
      const { navigate } = useRouter();
      return (
        <div className="bg-white/90 dark:bg-ink-950/90 backdrop-blur border-b border-ink-200 dark:border-ink-800 sticky top-0 z-30">
          <div className="max-w-5xl mx-auto px-4 sm:px-6 py-3.5 flex flex-col sm:flex-row sm:items-center gap-3">
            <div className="flex items-start gap-3 flex-1 min-w-0">
              {back && (
                <button onClick={() => navigate(back)} aria-label="뒤로"
                  className="mt-0.5 shrink-0 w-9 h-9 rounded-md border border-ink-200 dark:border-ink-700 text-ink-500 dark:text-ink-300 hover:bg-ink-100 dark:hover:bg-ink-800 hover:text-ink-800 dark:hover:text-ink-100 flex items-center justify-center">
                  <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 19l-7-7 7-7" /></svg>
                </button>
              )}
              <div className="min-w-0">
                {eyebrow && (
                  <p className="text-[11px] font-semibold uppercase tracking-[0.14em] text-accent-600 dark:text-accent-400">{eyebrow}</p>
                )}
                <h1 className="text-lg sm:text-xl font-bold text-ink-900 dark:text-ink-50 tracking-tightish truncate leading-tight mt-0.5">{title}</h1>
                {subtitle && <p className="text-sm text-ink-500 dark:text-ink-400 mt-0.5 truncate">{subtitle}</p>}
              </div>
            </div>
            <div className="flex flex-wrap items-center gap-2 sm:shrink-0">
              {right}
              <ThemeToggle />
            </div>
          </div>
        </div>
      );
    };

    // 엑셀 다운로드 버튼.
    //  - kind='session': /api/admin/sessions/:id/questions/export?token=<세션admin_token>
    //  - kind='project': /api/admin/projects/:id/questions/export?token=<콘솔 토큰>
    //  토큰을 쿼리에 붙여 새 탭/네비게이션으로 다운로드를 트리거한다(헤더 첨부 불가한 단순 GET).
    const ExcelButton = ({ size = 'md', label = '엑셀 다운로드', kind, id, token }) => {
      const toast = useToast();
      const download = () => {
        let url = '';
        let tok = token;
        if (kind === 'session') {
          if (!id) return;
          url = `/api/admin/sessions/${id}/questions/export`;
        } else if (kind === 'project') {
          if (!id) return;
          url = `/api/admin/projects/${id}/questions/export`;
          if (!tok) tok = getConsoleToken();
        } else {
          toast.show('다운로드 대상이 지정되지 않았습니다', 'warn');
          return;
        }
        if (!tok) { toast.show('인증 토큰이 없습니다', 'error'); return; }
        const full = `${url}?token=${encodeURIComponent(tok)}`;
        // 브라우저가 Content-Disposition: attachment 를 받아 파일로 저장
        window.location.href = full;
      };
      return (
        <Button variant="secondary" size={size} onClick={download}>
          <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" /></svg>
          {label}
        </Button>
      );
    };

    // ========================================
    // 📱 QR 코드 모달 (재사용 컴포넌트)
    // -----------------------------------------------------------------------
    //  url 을 prop 으로 받아 QR 을 생성한다. 행사 단일 QR(랜딩) 외에
    //  나중에 세션 카드에도 동일 컴포넌트를 재사용할 수 있다.
    //  - QR 자체는 스캔 가독성을 위해 항상 흰 배경/검은 모듈 (다크모드에서도 동일).
    //  - 캔버스 렌더(QRCode.toCanvas) + PNG 다운로드(toDataURL).
    //  props: { isOpen, onClose, url, title, fileName }
    // ========================================
    const QrCodeModal = ({ isOpen, onClose, url, title = '행사 QR', fileName = 'QR.png' }) => {
      const canvasRef = useRef(null);
      const copy = useClipboard();
      const toast = useToast();
      const [ready, setReady] = useState(false);
      const [error, setError] = useState('');

      useEffect(() => {
        if (!isOpen || !url) return;
        setReady(false);
        setError('');
        // 모달 DOM(canvas)이 마운트된 뒤 그린다.
        const id = requestAnimationFrame(() => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          if (!window.QRCode || typeof window.QRCode.toCanvas !== 'function') {
            setError('QR 라이브러리를 불러오지 못했습니다.');
            return;
          }
          window.QRCode.toCanvas(
            canvas, url,
            {
              width: 240,
              margin: 2,
              // 스캔 가독성 — 항상 흰 배경/검은 모듈 (다크모드 무관)
              color: { dark: '#0e1013', light: '#ffffff' },
              errorCorrectionLevel: 'M',
            },
            (err) => {
              if (err) { setError('QR 생성에 실패했습니다.'); return; }
              setReady(true);
            }
          );
        });
        return () => cancelAnimationFrame(id);
      }, [isOpen, url]);

      const download = () => {
        const canvas = canvasRef.current;
        if (!canvas || !ready) return;
        try {
          const dataUrl = canvas.toDataURL('image/png');
          const a = document.createElement('a');
          a.href = dataUrl;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          toast.show('QR 이미지를 저장했습니다', 'success');
        } catch (e) {
          toast.show('이미지 저장에 실패했습니다', 'error');
        }
      };

      return (
        <Modal isOpen={isOpen} onClose={onClose} title={title} size="sm">
          <div className="flex flex-col items-center">
            <p className="text-sm text-ink-500 dark:text-ink-400 text-center mb-4">
              이 QR 을 스캔하면 행사의 공개 세션 목록으로 이동합니다.
            </p>
            {/* QR: 흰 배경 고정(스캔 가독성) */}
            <div className="rounded-lg border border-ink-200 dark:border-ink-700 bg-white p-3 shadow-sm">
              {error ? (
                <div className="w-[240px] h-[240px] flex items-center justify-center text-sm text-red-500 text-center px-4">
                  {error}
                </div>
              ) : (
                <canvas ref={canvasRef} width={240} height={240} className="block" />
              )}
            </div>

            {/* URL + 복사 */}
            <div className="w-full mt-4">
              <div className="flex items-center gap-2 bg-ink-50 border border-ink-200 rounded-md px-3 py-2 min-w-0 dark:bg-ink-950 dark:border-ink-800">
                <div className="min-w-0 flex-1">
                  <div className="text-[11px] font-semibold text-ink-400 dark:text-ink-500 uppercase tracking-wide">랜딩 URL</div>
                  <div className="text-xs text-ink-600 dark:text-ink-300 truncate font-mono" title={url}>{url}</div>
                </div>
                <Button variant="subtle" size="sm" className="shrink-0"
                  onClick={() => copy(url, 'URL이 복사되었습니다')}>복사</Button>
              </div>
            </div>

            {/* 다운로드 */}
            <Button variant="secondary" className="w-full mt-3" disabled={!ready || !!error} onClick={download}>
              <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" /></svg>
              PNG 다운로드
            </Button>
          </div>
        </Modal>
      );
    };

    // QR 아이콘 (헤더 버튼용)
    const QrIcon = ({ className = 'w-4 h-4' }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7" rx="1" />
        <rect x="14" y="3" width="7" height="7" rx="1" />
        <rect x="3" y="14" width="7" height="7" rx="1" />
        <path d="M14 14h3v3M21 14v.01M14 21h.01M17 21h4v-4" />
      </svg>
    );

    // ========================================
    // 🔐 콘솔 토큰 게이트 — 운영자 토큰 입력 화면
    //  콘솔 화면(#/admin, #/admin/project/:id) 진입 시 토큰이 없거나 401 이면 표시.
    //  입력값을 sessionStorage 에 저장하고 children(실제 콘솔)을 렌더한다.
    // ========================================
    const ConsoleTokenGate = ({ children }) => {
      const [authed, setAuthed] = useState(() => !!getConsoleToken());
      const [input, setInput] = useState('');
      const [error, setError] = useState('');
      const [checking, setChecking] = useState(false);

      // apiFetch 가 401 을 만나면 토큰을 비우고 알림 → 게이트 재노출
      useEffect(() => {
        const onFail = () => { setAuthed(false); setError('토큰이 유효하지 않습니다. 다시 입력해 주세요.'); };
        consoleAuthListeners.add(onFail);
        return () => { consoleAuthListeners.delete(onFail); };
      }, []);

      const submit = async () => {
        const t = input.trim();
        if (!t) { setError('토큰을 입력해 주세요'); return; }
        setChecking(true);
        setError('');
        setConsoleToken(t);
        try {
          // 검증: 토큰으로 프로젝트 목록을 한 번 호출해 본다
          const res = await fetch('/api/admin/projects', { headers: { 'x-admin-token': t } });
          if (res.status === 401) {
            clearConsoleToken();
            setError('토큰이 올바르지 않습니다.');
            setChecking(false);
            return;
          }
          if (!res.ok) {
            setError(`인증 확인 실패 (${res.status})`);
            setChecking(false);
            return;
          }
          setAuthed(true);
        } catch (e) {
          setError('서버에 연결할 수 없습니다.');
        } finally {
          setChecking(false);
        }
      };

      if (authed) return children;

      return (
        <div className="min-h-screen flex items-center justify-center bg-ink-50 dark:bg-ink-950 px-4">
          <Card className="w-full max-w-sm p-6">
            <div className="mb-1 text-[11px] font-semibold uppercase tracking-[0.14em] text-accent-600 dark:text-accent-400">Event Q&amp;A Console</div>
            <h1 className="text-lg font-bold text-ink-900 dark:text-ink-50 tracking-tightish">운영자 인증</h1>
            <p className="text-sm text-ink-500 dark:text-ink-400 mt-1 mb-4">
              관리자 콘솔에 접근하려면 운영자 토큰을 입력하세요.
            </p>
            <Input label="운영자 토큰" type="password" placeholder="ADMIN_CONSOLE_TOKEN"
              value={input} onChange={(e) => setInput(e.target.value)} error={error}
              onKeyDown={(e) => { if (e.key === 'Enter') submit(); }} autoFocus />
            <Button className="w-full mt-2" onClick={submit} disabled={checking}>
              {checking ? <Spinner className="w-4 h-4" /> : '인증하기'}
            </Button>
          </Card>
        </div>
      );
    };

    // 금지어 관리 진입 버튼용 아이콘 (라인 스타일, 기존 톤 일치)
    const ShieldIcon = ({ className = 'w-4 h-4' }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
      </svg>
    );

    // ========================================
    // 🚫 운영자 금지어 관리 모달 (#/admin 콘솔, requireConsole API 사용)
    // -----------------------------------------------------------------------
    //  현재 금지어 목록 표시 · 추가 · 삭제. 추가/삭제 후 목록 즉시 갱신 + 토스트.
    //  디자인은 기존 톤(잉크/틸, 다크모드, IconButton/TrashIcon) 재사용.
    // ========================================
    const BannedWordsModal = ({ isOpen, onClose }) => {
      const toast = useToast();
      const [words, setWords] = useState(null);   // null=로딩
      const [input, setInput] = useState('');
      const [error, setError] = useState('');
      const [adding, setAdding] = useState(false);
      const [deletingId, setDeletingId] = useState(null);

      // toast 를 의존성에 넣으면 재생성 시 useEffect 가 반복 실행돼 무한 조회됨 → ref 로 안정화
      const toastRef = useRef(toast);
      useEffect(() => { toastRef.current = toast; });
      const load = useCallback(async () => {
        try {
          const list = await mockApi.fetchBannedWords();
          setWords(list);
        } catch (e) {
          // 콘솔 인증 실패는 게이트가 처리. 그 외에는 빈 목록 + 안내.
          if (e && (e.message === 'CONSOLE_UNAUTHORIZED' || e.message === 'NO_CONSOLE_TOKEN')) return;
          setWords([]);
          toastRef.current.show('금지어 목록을 불러오지 못했습니다. (banned_words 테이블/SQL 확인)', 'error');
        }
      }, []);

      useEffect(() => {
        if (isOpen) { setInput(''); setError(''); setWords(null); load(); }
      }, [isOpen, load]);

      const add = async () => {
        const w = input.trim();
        if (!w) { setError('금지어를 입력해 주세요'); return; }
        setError('');
        setAdding(true);
        try {
          await mockApi.addBannedWord(w);
          setInput('');
          await load();
          toast.show('금지어를 추가했습니다', 'success');
        } catch (e) {
          if (e && e.status === 409) setError('이미 등록된 금지어입니다');
          else if (!(e && (e.message === 'CONSOLE_UNAUTHORIZED' || e.message === 'NO_CONSOLE_TOKEN')))
            toast.show('금지어 추가에 실패했어요. 잠시 후 다시 시도해 주세요', 'error');
        } finally {
          setAdding(false);
        }
      };

      const remove = async (item) => {
        setDeletingId(item.id);
        try {
          await mockApi.deleteBannedWord(item.id);
          await load();
          toast.show('금지어를 삭제했습니다', 'success');
        } catch (e) {
          if (!(e && (e.message === 'CONSOLE_UNAUTHORIZED' || e.message === 'NO_CONSOLE_TOKEN')))
            toast.show('금지어 삭제에 실패했어요. 잠시 후 다시 시도해 주세요', 'error');
        } finally {
          setDeletingId(null);
        }
      };

      return (
        <Modal isOpen={isOpen} onClose={onClose} title="금지어 관리" size="md">
          <p className="text-sm text-ink-500 dark:text-ink-400 -mt-1 mb-4">
            등록된 단어가 질문의 제목·내용·이름에 포함되면 등록이 차단됩니다.
          </p>

          {/* 추가 입력 */}
          <div className="flex items-start gap-2">
            <div className="flex-1">
              <Input placeholder="추가할 금지어를 입력하세요"
                maxLength={40} value={input} error={error}
                onChange={(e) => { setInput(e.target.value); if (error) setError(''); }}
                onKeyDown={(e) => { if (e.key === 'Enter') add(); }} />
            </div>
            <Button onClick={add} disabled={adding} className="mt-0 shrink-0">
              {adding ? <Spinner className="w-4 h-4" /> : <><PlusIcon className="w-4 h-4" /> 추가</>}
            </Button>
          </div>

          {/* 목록 */}
          <div className="mt-2">
            <div className="flex items-baseline justify-between mb-2">
              <h4 className="text-xs font-semibold uppercase tracking-[0.12em] text-ink-400 dark:text-ink-500">등록된 금지어</h4>
              <span className="text-xs text-ink-400 tabular-nums">{words ? `${words.length}개` : ''}</span>
            </div>
            {words === null ? (
              <Loading label="불러오는 중" />
            ) : words.length === 0 ? (
              <p className="text-sm text-ink-400 dark:text-ink-500 py-6 text-center">등록된 금지어가 없습니다.</p>
            ) : (
              <div className="max-h-72 overflow-y-auto rounded-md border border-ink-200 dark:border-ink-800 divide-y divide-ink-100 dark:divide-ink-800">
                {words.map((item) => (
                  <div key={item.id} className="flex items-center justify-between gap-3 px-3.5 py-2.5">
                    <span className="text-sm text-ink-800 dark:text-ink-100 break-all">{item.word}</span>
                    <IconButton label="금지어 삭제" tone="danger"
                      onClick={() => remove(item)}>
                      {deletingId === item.id
                        ? <Spinner className="w-4 h-4" />
                        : <TrashIcon className="w-4 h-4" />}
                    </IconButton>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="flex justify-end mt-5">
            <Button variant="secondary" onClick={onClose}>닫기</Button>
          </div>
        </Modal>
      );
    };

    // ========================================
    // 📄 Page: 관리자 홈  #/admin
    // ========================================
    const AdminHomePage = () => {
      const { navigate } = useRouter();
      const toast = useToast();

      const [bannedOpen, setBannedOpen] = useState(false);    // 금지어 관리 모달

      const load = useCallback(async () => {
        const list = await mockApi.fetchProjects();
        setProjects(list);
        const entries = await Promise.all(
          list.map(async (p) => [p.id, await mockApi.fetchProjectStats(p.id)])

      }, []);

      useEffect(() => { load(); }, [load]);

      const handleCreated = async (payload) => {
        const p = await mockApi.createProject(payload);

        await load();
        navigate(`/admin/project/${p.id}`);

      const handleEdited = async (payload) => {

        setEditTarget(null);
        await load();
        toast.show('프로젝트가 수정되었습니다', 'success');
      };

      const handleDeleted = async () => {
        const res = await mockApi.deleteProject(deleteTarget.id);
        setDeleteTarget(null);
        await load();
        toast.show(`프로젝트를 삭제했습니다 (세션 ${res.removedSessions}·질문 ${res.removedQuestions} 포함)`, 'success');
      };

      const delStats = deleteTarget ? (statsMap[deleteTarget.id] || { sessionCount: 0, questionCount: 0 }) : null;

      return (
        <div className="min-h-screen bg-ink-50 dark:bg-ink-950">
          <AdminHeader
            eyebrow="Event Q&A Console"
            title="프로젝트"
            subtitle="행사 프로젝트와 세션을 관리합니다"
            right={
              <>
                <Button variant="secondary" onClick={() => setBannedOpen(true)}>
                  <ShieldIcon className="w-4 h-4" /> 금지어 관리
                </Button>
                <Button onClick={() => setModalOpen(true)}>
                  <PlusIcon /> 새 프로젝트
                </Button>
              </>

          />
          <div className="max-w-5xl mx-auto px-4 sm:px-6 py-7">

              <Loading />

              <EmptyState title="아직 프로젝트가 없습니다"
                desc="첫 번째 행사 프로젝트를 만들어 보세요."
                action={<Button onClick={() => setModalOpen(true)}><PlusIcon /> 새 프로젝트</Button>} />
            ) : (
              <>
                <div className="flex items-baseline justify-between mb-3">
                  <h2 className="text-xs font-semibold uppercase tracking-[0.12em] text-ink-400 dark:text-ink-500">전체 프로젝트</h2>
                  <span className="text-xs text-ink-400 tabular-nums">{projects.length}개</span>
                </div>
                <Card className="divide-y divide-ink-100 dark:divide-ink-800 overflow-hidden">
                  {projects.map((p) => {
                    const st = statsMap[p.id] || { sessionCount: 0, questionCount: 0 };
                    return (
                      <div key={p.id}
                        className="group p-5 hover:bg-ink-50/70 dark:hover:bg-ink-800/40 cursor-pointer transition-colors"
                        onClick={() => navigate(`/admin/project/${p.id}`)}>
                        <div className="flex items-start justify-between gap-3">
                          <div className="min-w-0">
                            <div className="flex items-center gap-2 flex-wrap">
                              <h3 className="text-base font-semibold text-ink-900 dark:text-ink-50 tracking-tightish truncate">{p.name}</h3>
                              <StatusBadge status={p.status} />
                            </div>
                            {p.client && <p className="text-sm text-ink-500 dark:text-ink-400 mt-0.5">{p.client}</p>}
                            {p.description && <p className="text-sm text-ink-500 dark:text-ink-400 mt-1.5 line-clamp-1">{p.description}</p>}
                          </div>
                          <div className="flex items-center gap-1.5 shrink-0">
                            <div className="flex items-center gap-1.5 opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition-opacity"
                              onClick={(e) => e.stopPropagation()}>
                              <IconButton label="프로젝트 수정"
                                onClick={(e) => { e.stopPropagation(); setEditTarget(p); }}>
                                <PencilIcon className="w-4 h-4" />
                              </IconButton>
                              <IconButton label="프로젝트 삭제" tone="danger"
                                onClick={(e) => { e.stopPropagation(); setDeleteTarget(p); }}>
                                <TrashIcon className="w-4 h-4" />
                              </IconButton>
                            </div>
                            <svg className="w-5 h-5 text-ink-300 dark:text-ink-600 group-hover:text-ink-500 dark:group-hover:text-ink-300 mt-0.5 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6" /></svg>
                          </div>
                        </div>
                        <div className="mt-3 flex items-center gap-4 text-sm">
                          <span className="text-ink-500 dark:text-ink-400">세션 <b className="text-ink-800 dark:text-ink-100 tabular-nums font-semibold">{st.sessionCount}</b></span>
                          <span className="text-ink-200 dark:text-ink-700">·</span>
                          <span className="text-ink-500 dark:text-ink-400">전체 질문 <b className="text-ink-800 dark:text-ink-100 tabular-nums font-semibold">{st.questionCount}</b></span>
                          <span className="ml-auto" onClick={(e) => e.stopPropagation()}>
